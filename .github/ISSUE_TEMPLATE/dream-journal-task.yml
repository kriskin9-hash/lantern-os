name: Dream Journal task
description: Agent-workable task for the Dream Journal stream (incl. Three Doors / Kingdome of Hearts). Agents pull these top-of-queue by priority.
title: "[dream-journal] "
labels: ["dream-journal", "agent-task"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: p0 = pull first. Human sets this; agents never change it.
      options:
        - p0
        - p1
        - p2
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Mechanical, checkable statements. The agent implements these and nothing more.
      placeholder: |
        - [ ] !three-doors scene X reachable from Y
        - [ ] python -m pytest tests/test_dream_journal.py passes
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files expected to change
      placeholder: |
        src/discord_lounge_bot/bot_v2.py
        lore/doors/...
    validations:
      required: true
  - type: input
    id: test-command
    attributes:
      label: Test command (definition of done)
      placeholder: "python -m pytest tests/test_dream_journal.py -q --tb=short"
    validations:
      required: true
  - type: textarea
    id: csf
    attributes:
      label: CSF sources (lore canon this task must honor)
      placeholder: |
        csf/ingest/three-doors/2026-06-09-kingdome-of-hearts-lore-expansion.md
  - type: checkboxes
    id: gates
    attributes:
      label: Gates
      options:
        - label: Touches lore canon (lore/ directory) — requires `needs-founder` review per LORE.md promotion gate
