name: Convergence IO task
description: Agent-workable task for the Convergence IO stream. Agents pull these top-of-queue by priority.
title: "[convergence-io] "
labels: ["convergence-io", "agent-task"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: p0 = pull first. Human sets this; agents never change it.
      options:
        - p0
        - p1
        - p2
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Mechanical, checkable statements. The agent implements these and nothing more.
      placeholder: |
        - [ ] /api/... returns ...
        - [ ] test X passes
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files expected to change
      placeholder: |
        apps/lantern-garage/lib/...
    validations:
      required: true
  - type: input
    id: test-command
    attributes:
      label: Test command (definition of done)
      placeholder: "python -m pytest tests/test_x.py -q --tb=short  /  make check-node"
    validations:
      required: true
  - type: checkboxes
    id: gates
    attributes:
      label: Gates
      options:
        - label: Requires `needs-founder` review (security, providers, keys, lore canon, data/, pricing)
