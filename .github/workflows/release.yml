name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "20"

jobs:
  # ── Build dream journal bundle ────────────────────────────────────────────────
  build:
    name: Build release bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "Building release: ${TAG}"

      - name: Install dependencies
        working-directory: apps/lantern-garage
        run: npm ci --production

      - name: Validate server
        working-directory: apps/lantern-garage
        run: node --check server.js

      - name: Build release zip — Dream Journal Web App
        run: |
          mkdir -p _release
          zip -r "_release/lantern-dream-journal-${{ steps.version.outputs.version }}.zip" \
            apps/lantern-garage/public/ \
            apps/lantern-garage/server.js \
            apps/lantern-garage/package.json \
            -x "*/node_modules/*" "*.DS_Store" "**/__pycache__/*"
          echo "✓ Dream Journal web app bundle:"
          ls -lh _release/

      - name: Build release zip — Full repo source
        run: |
          git archive --format=zip \
            --output="_release/lantern-os-source-${{ steps.version.outputs.version }}.zip" \
            HEAD
          echo "✓ Source archive:"
          ls -lh _release/lantern-os-source-${{ steps.version.outputs.version }}.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: _release/
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: _release/

      - name: Extract release notes from CHANGELOG.MD
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          VERSION="${VERSION#v}"
          python3 - <<PYEOF
          import re, os
          ver = os.environ.get('VERSION', '')
          try:
              content = open('CHANGELOG.MD').read()
              pattern = r'## \[' + re.escape(ver) + r'\][^\n]*\n([\s\S]*?)(?=\n## \[|\Z)'
              m = re.search(pattern, content)
              notes = m.group(1).strip() if m else ''
          except Exception:
              notes = ''
          if not notes:
              notes = f'See [CHANGELOG.MD](CHANGELOG.MD) for details.'
          with open('/tmp/release-notes.md', 'w') as f:
              f.write(notes)
          PYEOF
        env:
          VERSION: ${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "Keystone OS ${{ needs.build.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          generate_release_notes: false
          files: |
            _release/*.zip
          body_path: /tmp/release-notes.md

  # ── Deploy to GitHub Pages ────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Build pages bundle
        run: |
          mkdir -p _site
          cp -r surfaces/. _site/ 2>/dev/null || true
          mkdir -p _site/dream
          cp -r apps/lantern-garage/public/. _site/dream/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Lantern OS — Dream Journal</title>
            <meta http-equiv="refresh" content="0;url=dream/">
          </head>
          <body>
            <p>Redirecting to <a href="dream/">Dream Journal</a>…</p>
          </body>
          </html>
          HTML
          echo "✓ Pages bundle ready"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
