name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ── Build dream journal bundle ────────────────────────────────────────────────
  build:
    name: Build release bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/*" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "Building release: ${TAG}"

      - name: Install dependencies
        working-directory: apps/lantern-garage
        run: npm ci --production

      - name: Validate server
        working-directory: apps/lantern-garage
        run: node --check server.js && node --check cloud-server.js

      - name: Build release zip — Dream Journal Web App
        run: |
          mkdir -p _release
          zip -r "_release/lantern-dream-journal-${{ steps.version.outputs.version }}.zip" \
            apps/lantern-garage/public/ \
            apps/lantern-garage/server.js \
            apps/lantern-garage/cloud-server.js \
            apps/lantern-garage/package.json \
            railway.json \
            -x "*/node_modules/*" "*.DS_Store" "**/__pycache__/*"
          echo "✓ Dream Journal web app bundle:"
          ls -lh _release/

      - name: Build release zip — Full repo source
        run: |
          git archive --format=zip \
            --output="_release/lantern-os-source-${{ steps.version.outputs.version }}.zip" \
            HEAD
          echo "✓ Source archive:"
          ls -lh _release/lantern-os-source-${{ steps.version.outputs.version }}.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: _release/
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: _release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "Lantern OS ${{ needs.build.outputs.version }}"
          draft: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            _release/*.zip
          body: |
            ## Lantern OS ${{ needs.build.outputs.version }}

            ### Dream Journal — Web App
            Local-first dream journal with AI agent (Orion), multi-turn conversation, and offline fallback.

            **What's included:**
            - `lantern-dream-journal-*.zip` — Dream Journal web app (deploy to Railway or run locally with `node server.js`)
            - `lantern-os-source-*.zip` — Full source archive

            **Quick start:**
            ```bash
            unzip lantern-dream-journal-*.zip
            cd apps/lantern-garage
            npm install
            node server.js
            # Open http://127.0.0.1:4177
            ```

            **Deploy to Railway:**
            Connect your fork at [railway.app](https://railway.app) — `railway.json` is pre-configured.

            ### Feature comparison vs market
            | Feature | Lantern OS | Oniri | DreamStream |
            |---------|-----------|-------|-------------|
            | Private / local-first | ✓ | ✗ | ✗ |
            | AI agent chat | ✓ (Orion) | ✓ | ✓ |
            | 8 entry types | ✓ | partial | partial |
            | Offline fallback | ✓ | ✗ | partial |
            | Open source | ✓ | ✗ | ✗ |
            | Voice capture | roadmap | ✓ | ✓ |
            | Dream art / images | roadmap | ✓ | ✓ |
            | Lucid dreaming tools | roadmap | ✓ | partial |

  # ── Deploy to GitHub Pages ────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Build pages bundle
        run: |
          mkdir -p _site
          cp -r surfaces/. _site/ 2>/dev/null || true
          mkdir -p _site/dream
          cp -r apps/lantern-garage/public/. _site/dream/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Lantern OS — Dream Journal</title>
            <meta http-equiv="refresh" content="0;url=/lantern-os/dream/">
          </head>
          <body>
            <p>Redirecting to <a href="/lantern-os/dream/">Dream Journal</a>…</p>
          </body>
          </html>
          HTML
          echo "✓ Pages bundle ready"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
