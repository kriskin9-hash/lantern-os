name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ── Build dream journal bundle ────────────────────────────────────────────────
  build:
    name: Build release bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "Building release: ${TAG}"

      - name: Install dependencies
        working-directory: apps/lantern-garage
        run: npm ci --production

      - name: Validate server
        working-directory: apps/lantern-garage
        run: node --check server.js

      - name: Build release zip — Dream Journal Web App
        run: |
          mkdir -p _release
          zip -r "_release/lantern-dream-journal-${{ steps.version.outputs.version }}.zip" \
            apps/lantern-garage/public/ \
            apps/lantern-garage/server.js \
            apps/lantern-garage/package.json \
            -x "*/node_modules/*" "*.DS_Store" "**/__pycache__/*"
          echo "✓ Dream Journal web app bundle:"
          ls -lh _release/

      - name: Build release zip — Full repo source
        run: |
          git archive --format=zip \
            --output="_release/lantern-os-source-${{ steps.version.outputs.version }}.zip" \
            HEAD
          echo "✓ Source archive:"
          ls -lh _release/lantern-os-source-${{ steps.version.outputs.version }}.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: _release/
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: _release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "Dream Journal ${{ needs.build.outputs.version }}"
          draft: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          generate_release_notes: false
          files: |
            _release/*.zip
          body: |
            ## What is Dream Journal?

            Dream Journal is a local-first, private journaling app for capturing and exploring your dreams. Everything runs on your machine. Nothing is uploaded to a cloud. Your entries live in plain JSONL files you control — no account required, no subscription gate on the core experience.

            ## What's new in ${{ needs.build.outputs.version }}

            **Voice capture** — tap the mic button to speak a dream directly into the entry field using your browser's built-in speech recognition. No third-party transcription service.

            **Interactive search** — filters entries by text or tag in real time, inline, no page reload.

            **Export: CSV and JSONL** — both generated locally and downloaded straight to your machine.

            **8 entry types** — Dream, Note, Place, Character, Event, Lore, Symbol, Mirror.

            **Local, privacy-first** — data lives in `data/dreams/` JSONL files on your machine. No analytics, no telemetry, no cloud sync by default. The server binds to `127.0.0.1` only.

            **Single command startup** — `npm start` from repo root, server up in 2–3 seconds.

            ## How to get it

            ```bash
            git pull origin master
            npm start --prefix apps/lantern-garage
            # Open http://127.0.0.1:4177
            ```

            Or download `lantern-dream-journal-${{ needs.build.outputs.version }}.zip` and run:

            ```bash
            cd apps/lantern-garage && npm install && node server.js
            ```

            Node.js v20+ required. No database, no environment variables needed for local use.

            ## What's coming in v1.0.1

            The 3 Door Game — an interactive symbolic layer built on top of the journal. Design ships with v1.0.0; the full interactive experience follows in v1.0.1.

            ---

            Thank you for being here at the beginning. Every dream you capture is yours.

  # ── Deploy to GitHub Pages ────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Build pages bundle
        run: |
          mkdir -p _site
          cp -r surfaces/. _site/ 2>/dev/null || true
          mkdir -p _site/dream
          cp -r apps/lantern-garage/public/. _site/dream/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Lantern OS — Dream Journal</title>
            <meta http-equiv="refresh" content="0;url=dream/">
          </head>
          <body>
            <p>Redirecting to <a href="dream/">Dream Journal</a>…</p>
          </body>
          </html>
          HTML
          echo "✓ Pages bundle ready"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
