name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.9.0-rc1)"
        required: true
      force:
        description: "Force release even if milestones not shipped"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  milestone-gate:
    name: Milestone gate check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify milestones shipped
        id: gate
        shell: python
        run: |
          import json, sys
          from pathlib import Path

          manifest = json.loads(Path("manifests/shipping-milestones.json").read_text())

          dream = next(m for m in manifest["milestones"] if m["id"] == "DREAM-JOURNAL-v1")
          trading = next(m for m in manifest["milestones"] if m["id"] == "TRADING-AGENT-v1")

          dream_shipped = all(dream["definitionOfShipped"].values())
          trading_shipped = all(trading["definitionOfShipped"].values())

          print(f"dream_shipped={dream_shipped}")
          print(f"trading_shipped={trading_shipped}")

          if not dream_shipped or not trading_shipped:
            print("MILESTONE GATE: NOT ALL SHIPPED")
            if not dream_shipped:
              print("  Dream Journal: NOT SHIPPED")
              for k, v in dream["definitionOfShipped"].items():
                print(f"    {k}: {'PASS' if v else 'FAIL'}")
            if not trading_shipped:
              print("  Trading Agent: NOT SHIPPED")
              for k, v in trading["definitionOfShipped"].items():
                print(f"    {k}: {'PASS' if v else 'FAIL'}")

            if "${{ github.event.inputs.force }}" != "true":
              print("Release BLOCKED. Use force=true to override.")
              sys.exit(1)
            else:
              print("Force override enabled. Continuing despite incomplete milestones.")
          else:
            print("MILESTONE GATE: ALL SHIPPED — release approved")

  build-dist:
    name: Build distribution archive
    runs-on: ubuntu-latest
    needs: milestone-gate

    steps:
      - uses: actions/checkout@v4

      - name: Build release ZIP
        run: |
          TAG="${{ github.event.inputs.tag }}"
          DIST="lantern-os-${TAG}.zip"
          mkdir -p dist
          zip -r "dist/${DIST}" . \
            -x ".git/*" \
            -x "node_modules/*" \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x ".env*" \
            -x "*.log"
          echo "dist_file=${DIST}" >> "$GITHUB_OUTPUT"
        id: build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lantern-os-release
          path: dist/*.zip

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-dist

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lantern-os-release
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release create "${TAG}" \
            --title "Lantern OS ${TAG}" \
            --notes "Automated release. Focus lock lifted. Both milestones shipped." \
            dist/*.zip

      - name: Update shipping milestones
        shell: python
        run: |
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          manifest = json.loads(Path("manifests/shipping-milestones.json").read_text())
          manifest["updatedAt"] = datetime.now(timezone.utc).isoformat()

          for m in manifest["milestones"]:
            m["status"] = "shipped"
            m["releasedAt"] = manifest["updatedAt"]

          Path("manifests/shipping-milestones.json").write_text(
            json.dumps(manifest, indent=2) + "\n"
          )
          print("Shipping milestones updated to SHIPPED")
