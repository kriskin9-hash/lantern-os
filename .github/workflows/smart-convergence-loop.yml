name: Smart Convergence Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: smart-convergence-loop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GH_TOKEN: ${{ github.token }}

jobs:
  cloud-convergence:
    name: Cloud repository convergence scan
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync GitHub issues to agent slots
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\orchestration\Sync-GitHubIssuesToAgentSlots.ps1 `
            -Root . `
            -Owner alex-place `
            -Repo lantern-os

      - name: Run smart convergence loop
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\Invoke-LanternSmartConvergenceLoop.ps1 `
            -Root . `
            -Profile Cloud `
            -Depth Standard `
            -SkipNetwork `
            -OutputPath smart-convergence-loop-report.json

      - name: Upload convergence report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smart-convergence-loop-report
          path: smart-convergence-loop-report.json
          retention-days: 14
