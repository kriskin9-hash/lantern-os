name: Automated Tests

on:
  push:
    branches: [ master, main, 'codex/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test PowerShell Scripts Syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $scripts = Get-ChildItem -Path scripts -Filter "*.ps1" -Recurse
          $failures = @()
          foreach ($script in $scripts) {
            try {
              $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $script.FullName -Raw), [ref]$null)
              Write-Host "PASS: $($script.Name)"
            } catch {
              $failures += $script.Name
              Write-Host "FAIL: $($script.Name) - $($_.Exception.Message)"
            }
          }
          if ($failures.Count -gt 0) {
            throw "Script syntax errors found in: $($failures -join ', ')"
          }

      - name: Test MCP Connector
        shell: pwsh
        run: |
          if (Test-Path scripts/Test-LanternMcpConnector.ps1) {
            .\scripts\Test-LanternMcpConnector.ps1 -DryRun
          } else {
            Write-Host "MCP connector test script not found, skipping"
          }
        continue-on-error: true

      - name: Validate Markdown Structure
        shell: pwsh
        run: |
          $reports = Get-ChildItem -Path reports, offers, manifests -Filter "*.md" -Recurse -ErrorAction SilentlyContinue
          $issues = @()
          foreach ($report in $reports) {
            $content = Get-Content $report.FullName -Raw
            if (-not ($content -match "^# .+")) {
              $issues += "$($report.Name): Missing H1 title"
            }
            if (-not ($content -match "## Simple Answer" -or $content -match "## Executive Summary")) {
              $issues += "$($report.Name): Missing Simple Answer or Executive Summary"
            }
          }
          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Host "::warning::$_" }
          }
