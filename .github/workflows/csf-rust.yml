name: CSF Rust

on:
  push:
    branches: ["master"]
    paths:
      - "src/csf_rust/**"
      - ".github/workflows/csf-rust.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "src/csf_rust/**"
      - ".github/workflows/csf-rust.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/csf_rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/csf_rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: src/csf_rust
        run: cargo build --release

      - name: Test
        working-directory: src/csf_rust
        run: cargo test --release

      - name: Check formatting
        working-directory: src/csf_rust
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: src/csf_rust
        run: cargo clippy -- -D warnings

      - name: Upload binary artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: csf-linux-x64
          path: src/csf_rust/target/release/csf

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/csf_rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/csf_rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run benchmarks
        working-directory: src/csf_rust
        run: cargo bench
        continue-on-error: true

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-report
          path: src/csf_rust/target/criterion/
