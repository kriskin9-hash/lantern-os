name: Eval Leaderboard Gate
# Σ₀-K1 §4.6 (#850): no serving-path change ships without a leaderboard row.
# Any PR that touches the serving path must add at least one row to
# data/eval/leaderboard.jsonl (a fresh eval_keystone.py run), so the kernel's
# performance is re-measured on every serving change.
#
# The trigger deliberately does NOT include data/eval/** so a leaderboard-only PR
# can never self-satisfy the gate without a serving change.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: ["master"]
    paths:
      - "scripts/ouro_serve.py"
      - "scripts/eval_keystone.py"
      - "src/serving_benchmark.py"
      - "src/serving_modes.py"
      - "src/unified_agent_connector.py"
      - "src/serving/**"
      - ".github/workflows/eval-leaderboard-gate.yml"

permissions:
  contents: read

jobs:
  require-leaderboard-row:
    name: Require a new leaderboard row
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require a fresh data/eval/leaderboard.jsonl row
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          LEDGER="data/eval/leaderboard.jsonl"

          # Added lines on the leaderboard between base and head (numstat col 1).
          ADDED=$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" -- "$LEDGER" 2>/dev/null | awk 'NR==1{print $1}')
          ADDED=${ADDED:-0}
          [ "$ADDED" = "-" ] && ADDED=0   # binary guard (jsonl is text, defensive)
          echo "New $LEDGER rows in this PR: $ADDED"

          if [ "$ADDED" -lt 1 ]; then
            echo ""
            echo "❌ Eval Leaderboard Gate FAILED: this PR changes the serving path but adds"
            echo "   no new row to $LEDGER. Re-measure the kernel and commit the row:"
            echo "     python scripts/eval_keystone.py --label <label> --model <model> --base <url>"
            exit 1
          fi

          # The new last row must be a well-formed leaderboard entry. The leaderboard is
          # shared: eval_keystone rows carry 'accuracy', HumanEval rows carry 'pass@1'.
          LAST=$(tail -n 1 "$LEDGER")
          printf '%s' "$LAST" | python3 -c "import sys, json; d = json.loads(sys.stdin.read()); assert 'label' in d and ('accuracy' in d or 'pass@1' in d), 'row needs label + accuracy|pass@1'; print('row ok:', d.get('label'), d.get('accuracy', d.get('pass@1')))" || {
            echo "❌ last $LEDGER line is not a well-formed leaderboard row"; exit 1; }

          echo "✅ Eval Leaderboard Gate passed (+${ADDED} row)."
