name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # VALIDATION: Static surface, repo structure, manifests
  # ============================================================================
  validate-repo:
    name: Validate repo structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f AGENTS.md || (echo "AGENTS.md missing" && exit 1)
          test -f docs/CONVERGENCE-LOOP.md || (echo "docs/CONVERGENCE-LOOP.md missing" && exit 1)
          echo "All required top-level files present"

      - name: Check manifests
        run: |
          test -f manifests/FOUNDRY-MATRIX-RAG-DOLLHOUSE.md || (echo "FOUNDRY-MATRIX-RAG-DOLLHOUSE.md missing" && exit 1)
          test -f manifests/open-issues.md || (echo "open-issues.md missing" && exit 1)
          echo "All required manifests present"

      - name: Check surfaces
        run: |
          test -f surfaces/shareholder-index/index.html || (echo "shareholder-index/index.html missing" && exit 1)
          test -f surfaces/shareholder-index/styles.css || (echo "shareholder-index/styles.css missing" && exit 1)
          echo "All required surfaces present"

      - name: Validate HTML links
        run: |
          python3 - << 'EOF'
          from pathlib import Path
          import re

          html_path = Path("surfaces/shareholder-index/index.html")
          index = html_path.read_text()
          hrefs = re.findall(r'href=["\']([^"\']+)["\']', index)

          missing = []
          for href in hrefs:
            if href.startswith(("http", "https", "#", "mailto")):
              continue
            target = (html_path.parent / href).resolve()
            if not target.exists():
              missing.append(href)

          if missing:
            print(f"Missing links: {missing}")
            exit(1)
          print(f"All {len(hrefs)} links valid")
          EOF

  # ============================================================================
  # TESTS: Automated tests, Python, Node
  # ============================================================================
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('tests/**/*.py', 'src/**/*.py') }}
          restore-keys: ${{ runner.os }}-pip-ci-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio discord.py dpytest python-dotenv requests pydantic cryptography

      - name: Run pytest
        run: python -m pytest tests -q --tb=short --junitxml=pytest-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: pytest-results.xml
          retention-days: 30

  test-node:
    name: Node tests (Playwright, etc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: cd apps/lantern-garage && npm ci --prefer-offline

      - name: Start server
        run: node apps/lantern-garage/server.js &

      - name: Wait for server to be healthy
        run: |
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:4177/api/health && break
            echo "Waiting for server... ($i)"
            sleep 1
          done
          curl -sf http://127.0.0.1:4177/api/health || (echo "Server did not start" && exit 1)

      - name: Run Node API tests
        run: |
          node tests/test_dream_journal_api.js
          node tests/test_dream_chat_parser.js

      - name: Upload Node test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-test-results
          path: node-test-results.xml
          retention-days: 30

  # ============================================================================
  # CONVERGENCE: Consistency checks
  # ============================================================================
  convergence-check:
    name: Convergence validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repo contract
        run: |
          test -f docs/REPO-CONTRACT.md || echo "docs/REPO-CONTRACT.md missing"
          echo "Repo contract check"

      - name: Verify workflow structure
        run: |
          python3 - << 'EOF'
          from pathlib import Path
          required = [
              '.github/workflows/ci.yml',
              '.github/workflows/deploy.yml',
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit(f'Missing workflows: {missing}')
          print('All required workflows present')
          EOF

  # ============================================================================
  # INTEGRATION: MCP, Cloud mirrors
  # ============================================================================
  integration-checks:
    name: Integration & cloud readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check cloud mirrors config
        run: |
          test -f manifests/cloud-mirrors.json || (echo "cloud-mirrors.json missing" && exit 1)
          python3 -m json.tool manifests/cloud-mirrors.json > /dev/null || (echo "Invalid JSON" && exit 1)
          echo "Cloud mirrors config valid"

      - name: Check MCP contract
        run: |
          test -f docs/LANTERN-RUNTIME-CICD.md || echo "LANTERN-RUNTIME-CICD.md missing"
          echo "MCP contract check"

  # ============================================================================
  # CONVERGENCE: Full convergence loop validation
  # ============================================================================
  convergence-loop-validation:
    name: Convergence Loop Validation
    runs-on: ubuntu-latest
    needs: [validate-repo, integration-checks]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Validate convergence batch framework
        run: |
          echo "Checking batch framework configuration..."
          test -f config/batch-jobs-enhanced.json || (echo "Batch config missing" && exit 1)

          # Validate JSON structure
          python3 -c "import json; json.load(open('config/batch-jobs-enhanced.json'))" || (echo "Invalid batch config JSON" && exit 1)

          echo "Batch framework validated by CI/CD"

      - name: Validate CI/CD from convergence perspective
        run: |
          echo "Checking that convergence loop can validate CI/CD..."
          test -f .github/workflows/ci.yml || (echo "CI workflow missing" && exit 1)
          test -f .github/workflows/deploy.yml || (echo "Deploy workflow missing" && exit 1)
          echo "CI/CD workflows validated from batch perspective"

      - name: Test mutual validation loop
        run: |
          echo "Testing mutual validation contract:"
          echo "- Batch framework validates CI/CD: $(test -f .github/workflows/ci.yml && echo 'YES' || echo 'NO')"
          echo "- CI/CD validates batch framework: $(test -f config/batch-jobs-enhanced.json && echo 'YES' || echo 'NO')"
          echo ""
          echo "Mutual validation contract is active"

  # ============================================================================
  # SECURITY: Bandit + pip-audit
  # ============================================================================
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-security-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit (Python SAST)
        run: bandit -r src -f json -o bandit-results.json || true

      - name: Run pip-audit
        run: pip-audit --format=json --output=pip-audit-results.json || true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            bandit-results.json
            pip-audit-results.json
          retention-days: 30

  # ============================================================================
  # CSF CACHE: Validate cached format integrity
  # ============================================================================
  csf-cache-validate:
    name: CSF cache validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate CSF cache format
        run: |
          python3 - << 'EOF'
          import sys
          sys.path.insert(0, 'src')
          try:
              from csf_cache_manager import CsfCacheManager
              mgr = CsfCacheManager()
              stats = mgr.stats()
              ok, corrupt = mgr.validate_all()
              print(f"CSF cache entries: {stats['entry_count']}")
              print(f"Valid segments: {ok}, Corrupt: {corrupt}")
              if corrupt > 0:
                  print("::warning::Corrupt CSF cache segments found")
              print("CSF cache format validated")
          except Exception as e:
              print(f"CSF cache validation skipped: {e}")
          EOF

  # ============================================================================
  # CONVERGENCE: Run full convergence loop, upload artifact, gate PRs
  # ============================================================================
  convergence-loop:
    name: Convergence Loop + Promotion Gate
    runs-on: ubuntu-latest
    needs: [validate-repo, test-python, test-node, convergence-check, integration-checks, convergence-loop-validation]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run convergence loop
        run: python src/convergence_io_engine.py loop > convergence-report.json

      - name: Upload convergence report
        uses: actions/upload-artifact@v4
        with:
          name: convergence-report
          path: convergence-report.json
          retention-days: 30

      - name: PR Promotion Gate
        if: github.event_name == 'pull_request'
        run: |
          verdict=$(python3 -c "import json,sys; print(json.load(open('convergence-report.json')).get('promotion_ready','false'))")
          score=$(python3 -c "import json,sys; print(json.load(open('convergence-report.json')).get('convergence_score',0))")
          echo "promotion_ready=$verdict"
          echo "convergence_score=$score"
          echo "convergence-report=$verdict" >> "$GITHUB_STEP_SUMMARY"
          if [ "$verdict" != "True" ]; then
            echo "::error::Convergence loop promotion_ready=$verdict — promotion blocked"
            exit 1
          fi
          echo "Convergence gate passed (score=$score)"

  # ============================================================================
  # SUMMARY: All checks passed
  # ============================================================================
  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [validate-repo, test-python, test-node, convergence-check, integration-checks, convergence-loop-validation, convergence-loop, security-scan, csf-cache-validate]
    if: always()
    steps:
      - name: Check for failures
        run: |
          FAILED=""
          [ "${{ needs.validate-repo.result }}"              != "success" ] && FAILED="$FAILED validate-repo(${{ needs.validate-repo.result }})"
          [ "${{ needs.test-python.result }}"                != "success" ] && FAILED="$FAILED test-python(${{ needs.test-python.result }})"
          [ "${{ needs.test-node.result }}"                  != "success" ] && FAILED="$FAILED test-node(${{ needs.test-node.result }})"
          [ "${{ needs.convergence-check.result }}"          != "success" ] && FAILED="$FAILED convergence-check(${{ needs.convergence-check.result }})"
          [ "${{ needs.integration-checks.result }}"         != "success" ] && FAILED="$FAILED integration-checks(${{ needs.integration-checks.result }})"
          [ "${{ needs.convergence-loop-validation.result }}" != "success" ] && FAILED="$FAILED convergence-loop-validation(${{ needs.convergence-loop-validation.result }})"
          [ "${{ needs.convergence-loop.result }}"           != "success" ] && FAILED="$FAILED convergence-loop(${{ needs.convergence-loop.result }})"
          [ "${{ needs.security-scan.result }}"              != "success" ] && FAILED="$FAILED security-scan(${{ needs.security-scan.result }})"
          [ "${{ needs.csf-cache-validate.result }}"         != "success" ] && FAILED="$FAILED csf-cache-validate(${{ needs.csf-cache-validate.result }})"

          if [ -n "$FAILED" ]; then
            echo "FAILED jobs:$FAILED"
            exit 1
          fi
          echo "All required checks passed."
