name: Browser Testing CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: browser-testing-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-deps:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        run: |
          cd tests
          npm ci
          npx playwright install --with-deps

  browser-tests:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd tests
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tests
          npx playwright install --with-deps

      - name: Start static server
        run: |
          python -m http.server 8080 --directory surfaces &
          sleep 5

      - name: Run Playwright tests
        run: |
          cd tests
          npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/test-results/
          retention-days: 7

  trade-chat-unit-tests:
    name: Trade chat unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd apps/lantern-trade-chat
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          cd apps/lantern-trade-chat
          pytest tests/ -v

  summary:
    name: Browser testing summary
    runs-on: ubuntu-latest
    needs: [browser-tests, trade-chat-unit-tests]
    steps:
      - name: Summarize results
        run: |
          echo "browser-tests=${{ needs.browser-tests.result }}"
          echo "trade-chat-unit-tests=${{ needs.trade-chat-unit-tests.result }}"
          echo "Browser testing CI complete."
