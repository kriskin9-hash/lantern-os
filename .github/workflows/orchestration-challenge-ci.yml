name: Orchestration challenge CI

on:
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      challenge:
        description: "Challenge mode label"
        required: false
        default: "comet-leap-parallel"

concurrency:
  group: orchestration-challenge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  workflow-inventory:
    name: Workflow inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify workflow surfaces
        shell: python
        run: |
          from pathlib import Path
          required = [
              '.github/workflows/static-surface-ci.yml',
              '.github/workflows/release-provenance.yml',
              '.github/workflows/orchestration-challenge-ci.yml',
          ]
          missing = [path for path in required if not Path(path).exists()]
          if missing:
              raise SystemExit(f'Missing workflows: {missing}')

  mcp-contract:
    name: MCP contract guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify local-first MCP verifier contract
        shell: python
        run: |
          from pathlib import Path
          docs = Path('docs/MCP-CONNECTOR.md').read_text(encoding='utf-8')
          script = Path('scripts/Test-LanternMcpConnector.ps1').read_text(encoding='utf-8')
          required_docs = [
              'Use `http://127.0.0.1:8771`',
              'List tools, inspect descriptors, verify parameters, then invoke the minimum safe tool.',
              'remote tunnels as untrusted',
          ]
          required_script = [
              '$isLoopback',
              '-AllowRemote',
              'remote_endpoint_blocked',
              'loopbackOnlyDefault',
              'remoteRequiresAllowRemote',
              '/tools',
              '/mcp/tools',
          ]
          missing = [x for x in required_docs if x not in docs] + [x for x in required_script if x not in script]
          if missing:
              raise SystemExit(f'Missing MCP anchors: {missing}')

  action-pool-contract:
    name: Action pool contract guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify action pooling and search trigger policy
        shell: python
        run: |
          from pathlib import Path
          text = Path('docs/ACTION-POOLING-AND-BATCHING.md').read_text(encoding='utf-8')
          required = [
              'Remote search should happen from typed natural-language intent',
              'Action batching means executing independent, low-risk actions together after they are classified.',
              'Purchases, account actions, hardware mutation, payment actions, boot changes, and public publication do not batch automatically.',
              'Human-in-the-loop CAPTCHA completion is allowed only for normal manual use',
              'Do not automate CAPTCHA solving',
          ]
          missing = [x for x in required if x not in text]
          if missing:
              raise SystemExit(f'Missing action-pool anchors: {missing}')

  science-report-contract:
    name: COMET LEAP report contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify science-only report anchors
        shell: python
        run: |
          from pathlib import Path
          text = Path('reports/COMET-LEAP-ORCH-CHALLENGE-SCIENCE-FIRST.md').read_text(encoding='utf-8').lower()
          required = [
              'status: candidate',
              'science-only frame',
              'door and fog/cloud chamber language',
              'no mania',
              'no hyperconfidence',
              'markdown is source; pdf and art are deliverables',
              'typed natural-language intent',
              'parallel ci lanes',
          ]
          missing = [x for x in required if x not in text]
          if missing:
              raise SystemExit(f'Missing report anchors: {missing}')

  python-tests:
    name: Existing pytest suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install pytest and bot test dependencies
        run: |
          python -m pip install --upgrade pytest pytest-asyncio pytest-timeout
          python -m pip install "discord.py>=2.3.2" dpytest numpy
      - name: Run tests
        run: |
          # Full suite — no excludes (anti-entropy/audit-chain pass; discord suites
          # self-skip via importorskip when their deps are absent).
          python -m pytest tests -q --timeout=30

  summary:
    name: Orchestration challenge summary
    runs-on: ubuntu-latest
    needs: [workflow-inventory, mcp-contract, action-pool-contract, science-report-contract, python-tests]
    steps:
      - name: Summarize challenge lanes
        run: |
          echo "workflow-inventory=${{ needs.workflow-inventory.result }}"
          echo "mcp-contract=${{ needs.mcp-contract.result }}"
          echo "action-pool-contract=${{ needs.action-pool-contract.result }}"
          echo "science-report-contract=${{ needs.science-report-contract.result }}"
          echo "python-tests=${{ needs.python-tests.result }}"
          echo "Orchestration challenge complete."
