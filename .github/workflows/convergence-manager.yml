name: Convergence Manager

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master", "dev"]
  workflow_dispatch:

concurrency:
  group: convergence-manager-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  convergence-scan:
    name: Convergence scan (anti-sprawl + repo health)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run convergence manager
        id: scan
        run: |
          node scripts/convergence-manager.js --json | tee manifests/validation/CONVERGENCE-MANAGER-LATEST.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload convergence receipt
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: convergence-receipt
          path: manifests/validation/CONVERGENCE-MANAGER-LATEST.json

      - name: Enforce clean on master
        if: github.ref == 'refs/heads/master'
        run: node scripts/convergence-manager.js
