name: Validate Dream Journal

on:
  push:
    branches: ["master"]
    paths:
      - "apps/lantern-garage/**"
      - ".github/workflows/validate-dream-journal.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "apps/lantern-garage/**"
  workflow_dispatch:

concurrency:
  group: dream-journal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix apps/lantern-garage

      - name: Validate HTML
        run: |
          npx html-validate apps/lantern-garage/public/dream-chat.html || true

      - name: Check server starts
        run: |
          node apps/lantern-garage/server.js &
          PID=$!
          # Retry loop — server may take 5-10s on cold CI runner
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:4177/api/health && break
            echo "Waiting for server... ($i/20)"
            sleep 1
          done
          curl -sf http://127.0.0.1:4177/api/health || (echo "Server did not start in time"; kill $PID 2>/dev/null; exit 1)
          curl -sf http://127.0.0.1:4177/api/agents || (echo "Agents endpoint missing"; kill $PID 2>/dev/null; exit 1)
          kill $PID 2>/dev/null
          echo "✓ Server starts and responds"
