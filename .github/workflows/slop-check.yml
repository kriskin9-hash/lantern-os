name: Slop Check

on:
  pull_request:
    branches: ["master"]

concurrency:
  group: slop-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets-scan:
    name: Hardcoded secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan diff for hardcoded secrets
        run: |
          set +e
          diff=$(git diff origin/master...HEAD -- '*.js' '*.ts' '*.py' '*.sh' '*.mjs' '*.env.example')
          hits=$(echo "$diff" | grep -iE \
            "(api_key|apikey|api_secret|secret_key|password|passwd|access_token|auth_token|private_key)\s*[=:]\s*['\"][a-zA-Z0-9/+_\-]{12,}['\"]" \
            | grep '^+' | grep -v '^+++')
          if [ -n "$hits" ]; then
            echo "::error::Possible hardcoded credential detected in diff:"
            echo "$hits"
            exit 1
          fi
          echo "No hardcoded secrets found."

  debug-pollution:
    name: Debug statement check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for committed debug statements
        run: |
          set +e
          # Exempt code where console.* is the intended interface, not a debug leak:
          #   - test files anywhere (top-level tests/, colocated apps/**/test/, *.test.*,
          #     *.spec.*, test_*) — console.log is the test reporter
          #   - scripts/ and experiments/ — CLI / research tools whose stdout IS console.log
          # The old list only matched top-level tests/ + test_*, so colocated
          # apps/**/test/*.test.js and scripts/*.mjs CLIs tripped the gate falsely (#1561).
          # Real leaks in shipped lib/ routes/ public/ code are still caught.
          diff=$(git diff origin/master...HEAD -- '*.js' '*.ts' '*.py' '*.mjs' \
            ':(exclude,glob)**/tests/**' ':(exclude,glob)**/test/**' \
            ':(exclude,glob)**/*.test.*' ':(exclude,glob)**/*.spec.*' \
            ':(exclude,glob)**/test_*.py' ':(exclude,glob)**/test_*.js' ':(exclude,glob)**/test_*.ts' \
            ':(exclude,glob)scripts/**' ':(exclude,glob)experiments/**')
          hits=$(echo "$diff" | grep -E \
            '^\+(.*)(console\.log\(|debugger;|pdb\.set_trace\(\)|breakpoint\(\))' \
            | grep -v '^+++')
          if [ -n "$hits" ]; then
            echo "::error::Debug statements found in PR diff (test files exempt):"
            echo "$hits"
            exit 1
          fi
          echo "No debug pollution found."

  security-basics:
    name: OWASP basics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for eval / shell injection patterns
        run: |
          set +e
          diff=$(git diff origin/master...HEAD -- '*.js' '*.ts' '*.py' '*.sh')
          hits=$(echo "$diff" | grep -E \
            '^\+.*(eval\(|exec\(|os\.system\(|subprocess\.call\([^,]*shell\s*=\s*True)' \
            | grep -v '^+++')
          if [ -n "$hits" ]; then
            echo "::error::Unsafe eval/exec pattern found:"
            echo "$hits"
            exit 1
          fi
          echo "No unsafe exec patterns found."
      - name: Check for SQL string concatenation
        run: |
          set +e
          diff=$(git diff origin/master...HEAD -- '*.js' '*.ts' '*.py')
          hits=$(echo "$diff" | grep -iE \
            '^\+.*(SELECT|INSERT|UPDATE|DELETE).*\+\s*(req\.|params\.|query\.|body\.|args\.)' \
            | grep -v '^+++')
          if [ -n "$hits" ]; then
            echo "::error::Possible SQL injection via string concatenation:"
            echo "$hits"
            exit 1
          fi
          echo "No SQL injection patterns found."

  diff-size:
    name: Commit size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Block oversized PRs (> 5000 added lines of source)
        run: |
          added=$(git diff origin/master...HEAD --numstat -- '*.js' '*.ts' '*.py' '*.sh' \
            | awk '{sum += $1} END {print sum+0}')
          echo "Source lines added: $added"
          if [ "$added" -gt 5000 ]; then
            echo "::error::PR adds $added lines of source code. Split into smaller atomic PRs (limit: 5000)."
            exit 1
          fi

  boilerplate-check:
    name: Boilerplate / duplication check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check new files don't duplicate existing ones
        shell: python3 {0}
        run: |
          import subprocess, sys, os, pathlib

          # Get list of new files added in this PR
          result = subprocess.run(
            ["git", "diff", "--name-status", "--diff-filter=A", "origin/master...HEAD"],
            capture_output=True, text=True
          )
          new_files = [line.split("\t")[1] for line in result.stdout.strip().splitlines() if line.startswith("A")]

          # Standard filenames that are legitimately repeated everywhere
          UBIQUITOUS = {
            "__init__.py", "README.md", "README.rst", "setup.py",
            "conftest.py", "pytest.ini", "pyproject.toml", "setup.cfg",
            ".gitignore", ".gitkeep", "index.html", "index.js",
          }

          slop = []
          for f in new_files:
            name = pathlib.Path(f).name
            if name in UBIQUITOUS:
              continue  # standard boilerplate — not a duplicate signal
            # Find files with the same name anywhere in the repo
            existing = subprocess.run(
              ["git", "ls-files", "--", f"**/{name}", name],
              capture_output=True, text=True
            ).stdout.strip().splitlines()
            dupes = [e for e in existing if e != f]
            if dupes:
              slop.append(f"  {f} duplicates: {', '.join(dupes)}")

          if slop:
            print("::error::Possible duplicate files added (check before creating new files):")
            for s in slop:
              print(s)
            sys.exit(1)

          print(f"Checked {len(new_files)} new file(s) — no duplicates found.")

  slop-summary:
    name: Slop gate summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, debug-pollution, security-basics, diff-size, boilerplate-check]
    steps:
      - name: All slop checks passed
        run: |
          echo "secrets-scan=${{ needs.secrets-scan.result }}"
          echo "debug-pollution=${{ needs.debug-pollution.result }}"
          echo "security-basics=${{ needs.security-basics.result }}"
          echo "diff-size=${{ needs.diff-size.result }}"
          echo "boilerplate-check=${{ needs.boilerplate-check.result }}"
          echo "Slop gate: clean."
