name: MCP Tunnel Canary

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public HTTPS tunnel base URL for the local MCP bridge, for example https://example.trycloudflare.com
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  canary:
    name: Probe MCP tunnel without tool execution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate tunnel URL shape
        shell: python
        env:
          MCP_BASE_URL: ${{ inputs.base_url }}
        run: |
          from urllib.parse import urlparse
          import os
          import sys
          url = os.environ.get("MCP_BASE_URL", "")
          parsed = urlparse(url)
          if parsed.scheme != "https":
              raise SystemExit("MCP tunnel must be https")
          if not parsed.netloc:
              raise SystemExit("MCP tunnel URL must include a host")
          blocked = ("localhost", "127.0.0.1", "::1")
          if parsed.hostname in blocked:
              raise SystemExit("Cloud canary cannot use loopback hostnames")
          print("Tunnel URL shape accepted; URL value intentionally not printed.")

      - name: Probe health and tool-discovery endpoints only
        shell: pwsh
        env:
          MCP_BASE_URL: ${{ inputs.base_url }}
        run: |
          ./scripts/Test-LanternMcpConnector.ps1 -BaseUrl $env:MCP_BASE_URL -AllowRemote -OutputPath ./mcp-tunnel-canary-result.json

      - name: Upload canary result
        uses: actions/upload-artifact@v7
        with:
          name: mcp-tunnel-canary-result
          path: ./mcp-tunnel-canary-result.json
          if-no-files-found: error
