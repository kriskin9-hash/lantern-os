name: Auto-tag on version bump

# Fires when package.json lands on master (direct push with OVERRIDE_MERGE=1,
# or — more commonly — when assemble-changelog.js commits a chore(release) bump
# via a merged PR).  Creates a vX.X.X tag if one doesn't already exist, which
# in turn triggers release.yml to build + publish the GitHub Release.

on:
  push:
    branches: [master]
    paths:
      - 'package.json'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  auto-tag:
    name: Tag v${{ github.sha }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need full history to check existing tags

      - name: Read version from package.json
        id: ver
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check whether tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.ver.outputs.value }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.ver.outputs.value }} is new — will create."
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.value }}" \
            -m "Release v${{ steps.ver.outputs.value }}"
          git push origin "v${{ steps.ver.outputs.value }}"
          echo "✓ Created tag v${{ steps.ver.outputs.value }}"
          echo "  release.yml will pick it up and publish the GitHub Release."
