name: OSS Repository Validation

on:
  push:
    branches: [ master, main, 'codex/**' ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  validate-hff:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lantern-os

      - name: Checkout HFF Repository
        uses: actions/checkout@v4
        with:
          repository: human-flourishing-frameworks/human-flourishing-frameworks
          path: human-flourishing-frameworks
        continue-on-error: true

      - name: Checkout HFF Public Site
        uses: actions/checkout@v4
        with:
          repository: human-flourishing-frameworks/hff-public-site
          path: hff-public-site
        continue-on-error: true

      - name: Checkout Lantern Symbolic Sandbox
        uses: actions/checkout@v4
        with:
          repository: alex-place/lantern-symbolic-sandbox
          path: lantern-symbolic-sandbox
        continue-on-error: true

      - name: Validate HFF Repository
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ragIndex = Get-Content lantern-os/manifests/TMP-REPO-RAG-INDEX.json | ConvertFrom-Json
          foreach ($repo in $ragIndex.ciCdCheckout) {
            $localPath = $repo.path
            if (Test-Path $localPath) {
              Write-Host "Validating $($repo.repo) at $localPath"
              Copy-Item lantern-os/scripts/Invoke-LanternConvergenceLoop.ps1 "$localPath/scripts/" -Force -ErrorAction SilentlyContinue
              if (Test-Path "$localPath/scripts/Invoke-LanternConvergenceLoop.ps1") {
                cd $localPath
                .\scripts\Invoke-LanternConvergenceLoop.ps1 -Root . -Output convergence-ci.json -CloudVirtualization
                $results = Get-Content convergence-ci.json | ConvertFrom-Json
                if ($results.issues.Count -gt 0) {
                  Write-Host "::warning:: $($repo.repo): $($results.issues.Count) issues found"
                }
                if ($results.issues | Where-Object { $_.severity -eq 'HIGH' }) {
                  throw "HIGH severity issues in $($repo.repo). Fix before claiming convergence."
                }
                cd ..
              }
            } else {
              Write-Host "::warning:: $($repo.repo) not checked out. Skipping validation."
            }
          }

      - name: Upload Validation Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oss-validation-results
          path: '**/convergence-ci.json'
        continue-on-error: true
