name: Dream Journal CI

on:
  push:
    branches: ["master"]
    paths:
      - "dashboard/**"
      - "apps/lantern-garage/public/courtney.html"
      - "apps/lantern-garage/public/dreamer-dashboard.html"
      - "apps/lantern-garage/server.js"
      - "AGENTS.md"
      - "manifests/shipping-milestones.json"
  pull_request:
    branches: ["master"]
    paths:
      - "dashboard/**"
      - "apps/lantern-garage/public/courtney.html"
      - "apps/lantern-garage/public/dreamer-dashboard.html"
  workflow_dispatch:

concurrency:
  group: dream-journal-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dashboard-panel:
    name: Dashboard panel launches Dream Journal
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify panel-journal exists and references correct files
        shell: python
        run: |
          from pathlib import Path
          import re

          html = Path("dashboard/index.html").read_text(encoding="utf-8")

          # Must reference both dream journal surfaces
          assert "courtney.html" in html or "dreamer" in html, \
            "dashboard panel must reference courtney.html or dreamer-dashboard.html"
          assert "dreamer-dashboard.html" in html or "courtney" in html, \
            "dashboard panel must reference dreamer-dashboard.html or courtney.html"

          # Must NOT contain broken chat interface remnants
          broken = ["chat-interface", "chat_ui", "broken_chat", "non_functional_chat"]
          for b in broken:
            assert b not in html, f"Broken chat remnant found: {b}"

          print("PASS: Dashboard panel correctly launches Dream Journal")

  dream-journal-api:
    name: Dream Journal API endpoints declared
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify API routes exist in server.js
        shell: python
        run: |
          from pathlib import Path
          import re

          server = Path("apps/lantern-garage/server.js").read_text(encoding="utf-8")

          required_routes = [
            "/api/dreamer",
            "/api/dreamer/stats",
            "/api/dreamer/matrix",
            "/api/dreamer/tasks",
          ]

          for route in required_routes:
            assert route in server, f"Missing API route: {route}"

          print("PASS: All Dream Journal API endpoints declared")

  agemts-naming-convention:
    name: AGENTS.md naming convention documented
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify naming aliases documented
        shell: python
        run: |
          from pathlib import Path

          agents = Path("AGENTS.md").read_text(encoding="utf-8")

          aliases = ["Dream Journal", "Dreamer", "Courtney's Well", "data-analyst", "/sales"]
          for alias in aliases:
            assert alias in agents, f"Missing alias in AGENTS.md: {alias}"

          print("PASS: All Dream Journal naming aliases documented in AGENTS.md")

  dream-journal-summary:
    name: Dream Journal CI summary gate
    runs-on: ubuntu-latest
    needs: [dashboard-panel, dream-journal-api, agemts-naming-convention]

    steps:
      - name: Summarize Dream Journal CI
        run: |
          echo "Dream Journal CI Gate: ALL LANES PASSED"
          echo "Dashboard panel: launches correct surfaces"
          echo "API endpoints: all routes declared"
          echo "AGENTS.md: naming convention documented"
          echo "Status: Ready for merge and Netlify deploy"
