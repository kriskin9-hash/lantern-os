name: Focus Lock

on:
  pull_request:
    branches: ["master"]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: focus-lock-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  focus-lock-gate:
    name: Hard focus lock on trading + dream journal
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load shipping milestones
        id: milestones
        shell: python
        run: |
          import json, os
          from pathlib import Path

          manifest = json.loads(Path("manifests/shipping-milestones.json").read_text())
          m = {m["id"]: m for m in manifest["milestones"]}

          # Check shipped definitions
          dream_shipped = all(m["DREAM-JOURNAL-v1"]["definitionOfShipped"].values())
          trading_shipped = all(m["TRADING-AGENT-v1"]["definitionOfShipped"].values())

          print(f"dream_shipped={dream_shipped}")
          print(f"trading_shipped={trading_shipped}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"dream_shipped={'true' if dream_shipped else 'false'}\n")
            f.write(f"trading_shipped={'true' if trading_shipped else 'false'}\n")
            f.write(f"lock_active={'false' if (dream_shipped and trading_shipped) else 'true'}\n")
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check PR scope against focus lock
        if: steps.milestones.outputs.lock_active == 'true'
        shell: python
        run: |
          import json, os, re, sys
          from pathlib import Path

          manifest = json.loads(Path("manifests/shipping-milestones.json").read_text())
          allowed = [t.lower() for t in manifest["focusLock"]["allowedTopics"]]

          title = os.environ.get("PR_TITLE", "").lower()
          body = os.environ.get("PR_BODY", "").lower()
          combined = title + " " + body

          exempt_paths = manifest["focusLock"]["exemptPaths"]
          # Check if PR only touches exempt paths
          # (In real CI, use GitHub API to get changed files; here we check body references)
          if any(p.lower() in combined for p in exempt_paths):
            print("PASS: PR touches exempt CI/infrastructure paths.")
            sys.exit(0)

          matched = [t for t in allowed if t in combined]

          if matched:
            print(f"PASS: PR references allowed focus topics: {matched}")
            sys.exit(0)
          else:
            print("FAIL: Focus lock is ACTIVE.")
            print("Neither Dream Journal nor Trading Agent has shipped yet.")
            print("PRs must reference one of the allowed topics:")
            for t in allowed:
              print(f"  - {t}")
            sys.exit(1)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: Focus lock disabled — both milestones shipped
        if: steps.milestones.outputs.lock_active == 'false'
        run: |
          echo "Both Dream Journal and Trading Agent have shipped."
          echo "Focus lock is DISABLED. All PR topics allowed."
