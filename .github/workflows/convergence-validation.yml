name: Convergence Validation

on:
  push:
    branches: [ master, main, 'codex/**' ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Convergence Loop
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\scripts\Invoke-LanternConvergenceLoop.ps1 -Root . -Output manifests\evidence\convergence-ci.json -CloudVirtualization
          $results = Get-Content manifests\evidence\convergence-ci.json | ConvertFrom-Json
          if ($results.issues.Count -gt 0) {
            Write-Host "::warning:: $($results.issues.Count) convergence issues found"
            $results.issues | ForEach-Object { Write-Host "::warning:: $($_.severity): $($_.summary)" }
          }
          if ($results.issues | Where-Object { $_.severity -eq 'HIGH' }) {
            throw "HIGH severity convergence issues found. Fix before merge."
          }

      - name: Upload Convergence Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: convergence-results
          path: manifests/evidence/convergence-ci.json
