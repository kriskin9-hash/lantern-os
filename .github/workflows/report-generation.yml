name: Report Generation

on:
  push:
    branches: [ master, main ]
    paths:
      - 'reports/**'
      - 'scripts/Build-PerfectArtPdf*.ps1'
      - 'docs/ORION-MOOKMANREPORT4-STYLE.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-reports:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install reportlab

      - name: Generate Consolidated Report PDF
        shell: pwsh
        run: |
          .\scripts\Build-PerfectArtPdf.founder-v4.dark.print.ps1 `
            -Source "reports/CONSOLIDATED-THREE-PART-STRATEGY-REPORT-2026-05-30.md" `
            -Output "artifacts/CONSOLIDATED-THREE-PART-STRATEGY-REPORT-2026-05-30-PRINT.pdf"
        continue-on-error: true

      - name: Upload Generated PDFs
        uses: actions/upload-artifact@v4
        with:
          name: generated-reports
          path: artifacts/*.pdf
        continue-on-error: true
