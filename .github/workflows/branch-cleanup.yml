name: Branch Cleanup

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not delete branches)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Deleting merged/stale branches (action-delete-branch + `git push --delete`)
# requires write access to refs; the default token is read-only.
permissions:
  contents: write

jobs:
  delete-merged-branches:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - name: Delete merged branch
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: ${{ github.event.pull_request.head.ref }}
          soft_fail: true

  prune-stale-branches:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete stale branches older than 30 days
        run: |
          git fetch --prune
          echo "Checking for stale branches..."
          stale_branches=$(git branch -r --merged origin/master | grep 'origin/' | grep -v 'origin/master' | grep -v 'origin/gh-pages' | sed 's|origin/||')
          for branch in $stale_branches; do
            echo "Deleting stale branch: $branch"
            git push origin --delete "$branch" || true
          done
