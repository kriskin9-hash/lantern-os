name: Sprawl Tripwire

# Every NEW public surface (page) added in a PR must declare which loop stage it
# strengthens — Observe / Remember / Reason / Act / Verify / Converge — via a
#   <meta name="loop-stage" content="...">  or  <!-- loop-stage: ... -->  marker.
# Existing pages are grandfathered (only added-in-PR surfaces are checked), so this
# prevents scope from silently regrowing without a retroactive sweep (#1561).

on:
  pull_request:
    branches: [master]

jobs:
  sprawl-tripwire:
    name: New surfaces must justify a loop stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin master
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run sprawl tripwire
        run: node scripts/sprawl-tripwire.mjs --base origin/master
