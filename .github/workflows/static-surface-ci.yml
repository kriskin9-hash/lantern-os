name: Static surface CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: static-surface-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-surface:
    name: Repo surface anchors
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify shareholder index exists
        run: |
          test -f surfaces/shareholder-index/index.html
          test -f surfaces/shareholder-index/styles.css

      - name: Verify top-level operator files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f docs/CONVERGENCE-LOOP.md

  manifests:
    name: Manifest anchors
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required Lantern manifests
        run: |
          test -f manifests/FOUNDRY-MATRIX-RAG-DOLLHOUSE.md
          test -f manifests/foundry-shareholder-repos.md
          test -f manifests/open-issues.md
          test -f dual-boot/SONS-PC-READINESS.md

  html-links:
    name: HTML link integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify HTML surface links
        shell: python
        run: |
          from pathlib import Path
          import re
          html_path = Path("surfaces/shareholder-index/index.html")
          html = html_path.read_text(encoding="utf-8")
          hrefs = re.findall(r'href="([^"]+)"', html)
          missing = []
          for href in hrefs:
            if href.startswith(("http://", "https://", "#")):
              continue
            target = (html_path.parent / href).resolve()
            try:
              target.relative_to(Path.cwd().resolve())
            except ValueError:
              missing.append(f"{href} leaves repo")
              continue
            if not target.exists():
              missing.append(href)
          if missing:
            raise SystemExit("Missing HTML targets: " + ", ".join(missing))

  python-tests:
    name: Python report and policy tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pytest
        run: python -m pip install --upgrade pytest

      - name: Run tests
        run: python -m pytest tests -q

  workflow-shape:
    name: CI parallel shape guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify CI has parallel lanes and final summary gate
        shell: python
        run: |
          from pathlib import Path
          text = Path(".github/workflows/static-surface-ci.yml").read_text(encoding="utf-8")
          required_jobs = [
              "repo-surface:",
              "manifests:",
              "html-links:",
              "python-tests:",
              "workflow-shape:",
              "summary:",
          ]
          missing = [job for job in required_jobs if job not in text]
          if missing:
            raise SystemExit(f"Missing jobs: {missing}")
          if "needs: [repo-surface, manifests, html-links, python-tests, workflow-shape]" not in text:
              raise SystemExit("summary job must depend on every parallel lane")

  summary:
    name: CI summary gate
    runs-on: ubuntu-latest
    needs: [repo-surface, manifests, html-links, python-tests, workflow-shape]

    steps:
      - name: Summarize passed lanes
        run: |
          echo "All static-surface CI lanes passed."
          echo "repo-surface=${{ needs.repo-surface.result }}"
          echo "manifests=${{ needs.manifests.result }}"
          echo "html-links=${{ needs.html-links.result }}"
          echo "python-tests=${{ needs.python-tests.result }}"
          echo "workflow-shape=${{ needs.workflow-shape.result }}"