name: Deploy

on:
  push:
    branches: ["master"]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Guard: block RC / prerelease deployments from master ────────────────────
  guard-stable:
    name: Verify stable version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block RC / prerelease
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $VERSION"
          if echo "$VERSION" | grep -qiE '(rc|beta|alpha|pre)'; then
            echo "ERROR: Refusing to deploy unstable version '$VERSION' from master"
            exit 1
          fi
          echo "✓ Version '$VERSION' is stable — deploy allowed"

  # ── GitHub Pages ────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [guard-stable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pages bundle
        run: |
          mkdir -p _site

          # Copy surfaces (shareholder index, dashboards, etc.)
          cp -r surfaces/. _site/ 2>/dev/null || true

          # Copy full Dream Journal public bundle into /dream path
          mkdir -p _site/dream
          cp -r apps/lantern-garage/public/. _site/dream/

          # Root redirect → /dream
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Lantern OS — Dream Journal</title>
            <meta http-equiv="refresh" content="0;url=/lantern-os/dream/">
          </head>
          <body>
            <p>Redirecting to <a href="/lantern-os/dream/">Dream Journal</a>…</p>
          </body>
          </html>
          HTML

          echo "✓ Pages bundle ready"
          ls -la _site/dream/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Smoke test deployed URL
        run: |
          sleep 15
          curl -sfL "https://alex-place.github.io/lantern-os/" \
            -o /dev/null \
            -w "HTTP %{http_code} — %{size_download} bytes\n" \
            || echo "Smoke test skipped (DNS propagation may take time)"

  # ── Smoke Test ────────────────────────────────────────────────────────────
  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-pages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Smoke test static endpoints
        run: |
          python3 - << 'EOF'
          import urllib.request, sys
          urls = [
              "https://alex-place.github.io/lantern-os/",
              "https://alex-place.github.io/lantern-os/dream/",
              "https://alex-place.github.io/lantern-os/dream/dream-chat.html",
          ]
          ok = 0
          for url in urls:
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      if r.status == 200:
                          print(f"OK  {url}")
                          ok += 1
                      else:
                          print(f"WARN {url} — status {r.status}")
              except Exception as e:
                  print(f"FAIL {url} — {e}")
          print(f"\n{ok}/{len(urls)} endpoints reachable")
          if ok == 0:
              sys.exit(1)
          EOF

  # ── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Deploy summary
    needs: [deploy-pages, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Print deploy targets
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ GitHub Pages: https://alex-place.github.io/lantern-os/"
          echo "✓ Dream Journal UI: https://alex-place.github.io/lantern-os/dream/"
          echo "✓ Dream Chat: https://alex-place.github.io/lantern-os/dream/dream-chat.html"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
