name: Anti-Sprawl Gate

on:
  pull_request:
    branches: [master]

env:
  MAX_NEW_FILES: 25
  MAX_NEW_MARKDOWN: 4
  ALLOWED_TOP_LEVEL: src,apps,docs,tests,scripts,config,data,ops,integrations,skills,manifests,surfaces,archive,.github

jobs:
  anti-sprawl:
    name: Enforce anti-sprawl rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin master

      - name: Analyze PR changes
        id: analyze
        shell: bash
        run: |
          echo "=== Anti-Sprawl Analysis ==="
          echo "Base: origin/master"
          echo ""

          # New files (handle empty-string so wc -l returns 0 not 1)
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/master...HEAD)
          if [ -z "$NEW_FILES" ]; then
            NEW_FILE_COUNT=0
          else
            NEW_FILE_COUNT=$(echo "$NEW_FILES" | wc -l)
          fi
          echo "new_file_count=$NEW_FILE_COUNT" >> $GITHUB_OUTPUT

          # New top-level directories — skip root-level files (no "/" in path)
          # e.g. .clauderules, .gitignore, CLAUDE.md live at root and are not dirs
          NEW_TOP_LEVEL=""
          if [ -n "$NEW_FILES" ]; then
            NEW_TOP_LEVEL=$(echo "$NEW_FILES" | { grep '/' || true; } | cut -d/ -f1 | sort -u | { grep -vE "^(${ALLOWED_TOP_LEVEL//,/|})$" || true; })
          fi
          echo "new_top_level_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_TOP_LEVEL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # New markdown files (guard grep so pipefail doesn't fire on no matches)
          NEW_MD=0
          if [ -n "$NEW_FILES" ]; then
            NEW_MD=$(echo "$NEW_FILES" | { grep -E '\.md$' || true; } | wc -l)
          fi
          echo "new_markdown_count=$NEW_MD" >> $GITHUB_OUTPUT

      - name: Check new top-level directories
        if: steps.analyze.outputs.new_top_level_dirs != ''
        run: |
          echo "❌ BLOCKED: New top-level directories detected"
          echo ""
          echo "${{ steps.analyze.outputs.new_top_level_dirs }}"
          echo ""
          echo "Only the following top-level directories are allowed:"
          echo "${{ env.ALLOWED_TOP_LEVEL }}"
          exit 1

      - name: Check file count
        if: fromJSON(steps.analyze.outputs.new_file_count) > fromJSON(env.MAX_NEW_FILES)
        run: |
          echo "❌ BLOCKED: Too many new files (${{ steps.analyze.outputs.new_file_count }})"
          echo "Maximum allowed per PR: ${{ env.MAX_NEW_FILES }}"
          echo "Please split this change into smaller PRs."
          exit 1

      - name: Check markdown file count
        if: fromJSON(steps.analyze.outputs.new_markdown_count) > fromJSON(env.MAX_NEW_MARKDOWN)
        run: |
          echo "❌ BLOCKED: Too many new markdown files (${{ steps.analyze.outputs.new_markdown_count }})"
          echo "Maximum allowed per PR: ${{ env.MAX_NEW_MARKDOWN }}"
          exit 1

      - name: Pass
        run: |
          echo "✅ Anti-sprawl checks passed"
          echo "New files: ${{ steps.analyze.outputs.new_file_count }}"
          echo "New markdown: ${{ steps.analyze.outputs.new_markdown_count }}"