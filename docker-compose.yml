version: '3.9'

services:
  # Main Lantern unified container
  lantern-unified:
    build:
      context: .
      dockerfile: config/docker/Dockerfile
    container_name: lantern-unified
    ports:
      - "5000:5000"      # Flask API
      - "4177:4177"      # Dashboard
      - "8765:8765"      # Browser
      - "4178:4178"      # Discord bot
      - "9000:9000"      # Health endpoint
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      LANTERN_MODE: unified
      # Optional API keys
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
    volumes:
      - lantern-data:/app/data
      - lantern-logs:/app/logs
      - lantern-state:/app/state
    networks:
      - lantern-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database (optional)
  lantern-db:
    image: postgres:16-alpine
    container_name: lantern-db
    environment:
      POSTGRES_DB: lantern
      POSTGRES_USER: lantern
      POSTGRES_PASSWORD: lantern-dev-password
    volumes:
      - lantern-db-data:/var/lib/postgresql/data
    networks:
      - lantern-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lantern"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache (optional)
  lantern-cache:
    image: redis:7-alpine
    container_name: lantern-cache
    ports:
      - "6379:6379"
    volumes:
      - lantern-cache-data:/data
    networks:
      - lantern-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lantern-data:
  lantern-logs:
  lantern-state:
  lantern-db-data:
  lantern-cache-data:

networks:
  lantern-network:
    driver: bridge
