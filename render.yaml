services:
  - type: web
    name: lantern-os
    runtime: node
    branch: master
    rootDir: apps/lantern-garage
    buildCommand: npm install --omit=dev
    startCommand: node render-server.js
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LANTERN_CLOUD_MIRROR_URLS
        value: "https://lantern-os.onrender.com,https://human-flourishing-frameworks.onrender.com"
