# Lantern OS MCP Server — OpenAPI Schema for Custom GPT (OAuth 2.0 + PKCE)
# 
# How to use:
# 1. Start the OAuth MCP server: python src/mcp_server/server_oauth.py
# 2. In ChatGPT "Configure" → "Actions" → "Add action"
# 3. Import this schema URL or paste the YAML
# 4. Set Authentication to OAuth, paste your client credentials
# 5. Test the connection
#
# Note: The /messages endpoint is the main JSON-RPC channel.
# GPT sends initialize, tools/list, and tools/call via POST /messages.

openapi: 3.1.0
info:
  title: Lantern OS MCP Server
  description: >
    Lantern OS Model Context Protocol server with OAuth 2.0 + PKCE authentication.
    Provides tools for task intake, work dispatch, skill listing, system status,
    and PDF report generation.
  version: 1.0.0
  contact:
    name: Lantern OS
servers:
  - url: http://localhost:8772
    description: Local OAuth MCP server

paths:
  /messages:
    post:
      operationId: mcpMessage
      summary: MCP JSON-RPC message endpoint
      description: >
        Send JSON-RPC requests to the MCP server. GPT uses this for
        initialize, tools/list, and tools/call methods.
      security:
        - OAuth2: [mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
        '401':
          description: Unauthorized — invalid or expired Bearer token
        '400':
          description: Invalid request — malformed JSON or missing fields

  /health:
    get:
      operationId: healthCheck
      summary: Public health check
      description: Check if the MCP server is online. No auth required.
      responses:
        '200':
          description: Server status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: online
                  queue_depth:
                    type: integer
                    example: 0
                  slots_online:
                    type: integer
                    example: 3

  /.well-known/oauth-authorization-server:
    get:
      operationId: oauthDiscovery
      summary: OAuth 2.0 discovery document
      description: >
        Returns authorization endpoint, token endpoint, and supported
        grant types. GPT reads this automatically for OAuth config.
      responses:
        '200':
          description: OAuth server metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  registration_endpoint:
                    type: string
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  response_types_supported:
                    type: array
                    items:
                      type: string
                  grant_types_supported:
                    type: array
                    items:
                      type: string
                  code_challenge_methods_supported:
                    type: array
                    items:
                      type: string

  /oauth/register:
    get:
      operationId: oauthRegister
      summary: Register an OAuth client
      description: >
        Create a new OAuth client and get client_id + client_secret.
        Call this once before configuring GPT.
      parameters:
        - name: client_name
          in: query
          schema:
            type: string
          example: MyGPT
        - name: redirect_uri
          in: query
          schema:
            type: string
          example: https://oauth.pstmn.io/v1/callback
      responses:
        '200':
          description: Client registration response
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
                  redirect_uri:
                    type: string
                  grant_types:
                    type: array
                    items:
                      type: string

components:
  schemas:
    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        method:
          type: string
          enum:
            - initialize
            - tools/list
            - tools/call
        id:
          oneOf:
            - type: string
            - type: integer
          description: Request ID for correlating responses
        params:
          type: object
          description: Method-specific parameters

    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
        result:
          type: object
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string

  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:8772/oauth/authorize
          tokenUrl: http://localhost:8772/oauth/token
          refreshUrl: http://localhost:8772/oauth/token
          scopes:
            mcp: Full access to Lantern OS MCP tools
