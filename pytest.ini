[pytest]
pythonpath = apps src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = --import-mode=importlib
markers =
    synthetic: test uses synthetic-only data (real_fraction=0)
    real: test uses real/externally-grounded data (real_fraction=1)
    mixed: test uses mixed real+synthetic data (0<real_fraction<1)
