version: '3.9'

services:
  # Headless agent launcher - spawns agents inside container (NO POPUPS)
  agent-launcher:
    build:
      context: .
      dockerfile: Dockerfile.agent-launcher
    container_name: lantern-agent-launcher
    ports:
      - "5000-5010:5000-5010"
    volumes:
      - ./config/agent-slots.json:/app/config/agents.json:ro
      - ./services:/app/services:ro
      - ./skills:/app/skills:ro
      - agent-logs:/app/logs
      - agent-state:/app/state
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      LANTERN_MODE: agent-launcher
      AGENT_CONFIG: /app/config/agents.json
    networks:
      - lantern-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # MCP Delegation Service (Swarm Coordinator)
  mcp-delegation:
    build:
      context: .
      dockerfile: services/mcp-delegation/Dockerfile
    container_name: lantern-mcp-swarm
    ports:
      - "5100:5100"
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
    depends_on:
      agent-launcher:
        condition: service_healthy
    networks:
      - lantern-network
    restart: unless-stopped

volumes:
  agent-logs:
  agent-state:

networks:
  lantern-network:
    driver: bridge
