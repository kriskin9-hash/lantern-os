<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Cart - Emergency Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #16213e;
            border: 2px solid #e94560;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        h1 {
            margin: 0 0 10px 0;
            color: #e94560;
            font-size: 28px;
        }

        .status {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            background: #0f3460;
            border: 1px solid #533483;
            border-radius: 4px;
            color: #eee;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }

        textarea:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 5px rgba(233, 69, 96, 0.3);
        }

        button {
            padding: 12px 24px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: #c73550;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .response-container {
            margin-top: 20px;
        }

        .response-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        #response {
            background: #0f3460;
            border: 1px solid #533483;
            border-radius: 4px;
            padding: 15px;
            min-height: 100px;
            max-height: 600px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #response img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid #533483;
        }

        #response.loading {
            color: #aaa;
        }

        #response.error {
            color: #ff6b6b;
        }

        #response.success {
            color: #51cf66;
        }

        .timestamp {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Crash Cart</h1>
        <div class="status">Emergency Dashboard | All Lanes Blocked</div>

        <div class="input-group">
            <textarea id="message" placeholder="Type your message here..."></textarea>
            <button id="send" onclick="sendToCrashCart()">SEND</button>
        </div>

        <div class="response-container">
            <div class="response-label">Response:</div>
            <div id="response"></div>
            <div id="timestamp" class="timestamp"></div>
        </div>
    </div>

    <script>
        async function sendToCrashCart() {
            const messageInput = document.getElementById('message');
            const responseDiv = document.getElementById('response');
            const sendBtn = document.getElementById('send');
            const timestamp = document.getElementById('timestamp');

            const message = messageInput.value.trim();
            if (!message) {
                responseDiv.textContent = 'Error: Message cannot be empty';
                responseDiv.className = 'error';
                return;
            }

            // Show loading state
            responseDiv.textContent = 'Sending...';
            responseDiv.className = 'loading';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/crash-cart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message }),
                });

                const data = await response.json();

                if (response.ok && data.response) {
                    // Check if response contains a screenshot path
                    const screenshotMatch = data.response.match(/C:\\[^\s]+\.png/i);

                    if (screenshotMatch) {
                        // Display screenshot image
                        const imagePath = screenshotMatch[0];
                        const fileUrl = 'file:///' + imagePath.replace(/\\/g, '/');

                        responseDiv.innerHTML = `
                            <div>ChatGPT Response Screenshot:</div>
                            <img src="${fileUrl}" alt="ChatGPT Response" onerror="this.parentElement.innerHTML='<div style=\"color: #ffaa00;\">⚠️ Could not load image. File: ${imagePath}</div>'">
                            <div style="margin-top: 10px; font-size: 11px; color: #888;">Screenshot: ${imagePath}</div>
                        `;
                    } else {
                        // Display text response
                        responseDiv.textContent = data.response;
                    }

                    responseDiv.className = 'success';
                    timestamp.textContent = `Received at ${new Date().toLocaleTimeString()}`;
                    messageInput.value = '';
                } else {
                    responseDiv.textContent = `Error: ${data.error || 'Failed to get response'}`;
                    responseDiv.className = 'error';
                }
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
                responseDiv.className = 'error';
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Allow Enter key to send (Ctrl+Enter or Cmd+Enter)
        document.getElementById('message').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                sendToCrashCart();
            }
        });
    </script>
</body>
</html>
