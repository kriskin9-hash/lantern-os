name: Orchestrator Health

on:
  pull_request:
    paths:
      - ".claude/**/*.json"
      - ".claude/hooks/**/*.ps1"
      - ".github/workflows/orchestrator-health.yml"
      - "dashboard/**/*.html"
      - "scripts/**/*.ps1"
      - "tests/**/*.ps1"
      - "config/**/*.json"
      - "docs/**/*.md"
      - "docs/**/*.yml"
      - "tasks/**/*.md"
  push:
    branches:
      - master
    paths:
      - ".claude/**/*.json"
      - ".claude/hooks/**/*.ps1"
      - ".github/workflows/orchestrator-health.yml"
      - "dashboard/**/*.html"
      - "scripts/**/*.ps1"
      - "tests/**/*.ps1"
      - "config/**/*.json"
      - "docs/**/*.md"
      - "docs/**/*.yml"
      - "tasks/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-contracts:
    name: Static contracts and syntax
    runs-on: windows-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate PowerShell syntax
        shell: pwsh
        run: ./tests/Test-PowerShellSyntax.ps1 -Root .

      - name: Validate local ChatGPT prompt stager contract
        shell: pwsh
        run: ./tests/Test-LocalChatGptPromptStagerContract.ps1 -Root .

      - name: Validate agent config safety
        shell: pwsh
        run: ./tests/Test-AgentConfigSafety.ps1 -Root .

      - name: Validate Claude PR closure hook
        shell: pwsh
        run: ./tests/Test-ClaudePrClosureHook.ps1 -Root .

      - name: Validate Claude protected-work guard
        shell: pwsh
        run: ./tests/Test-ClaudeProtectedWorkGuard.ps1 -Root .

      - name: Validate Gemini CLI preflight contract
        shell: pwsh
        run: ./tests/Test-GeminiCliPreflightContract.ps1 -Root .

      - name: Validate Gemini dispatch preflight gate
        shell: pwsh
        run: ./tests/Test-GeminiDispatchPreflightGate.ps1 -Root .

      - name: Validate hook opportunity advisor
        shell: pwsh
        run: ./tests/Test-HookOpportunityAdvisor.ps1 -Root .

      - name: Validate repo structure contract
        shell: pwsh
        run: ./tests/Test-RepoStructureContract.ps1 -Root .

      - name: Validate evidence record handoff contract
        shell: pwsh
        run: ./tests/Test-AgentContractEvidenceRecord.ps1 -Root .

      - name: Validate agent routing map
        shell: pwsh
        run: ./tests/Test-AgentRoutingMap.ps1

      - name: Validate token research evidence hygiene
        shell: pwsh
        run: ./tests/Test-TokenResearchEvidence.ps1

      - name: Validate research ingestion contract
        shell: pwsh
        run: ./tests/Test-ResearchIngestionContract.ps1 -Root .

      - name: Validate threat model contract
        shell: pwsh
        run: ./tests/Test-PromptInjectionContract.ps1 -Root .

      - name: Validate grandma mode safety contract
        shell: pwsh
        run: ./tests/Test-GrandmaModeSafety.ps1 -Root .

      - name: Validate user API key policy contracts
        shell: pwsh
        run: ./tests/Test-UserApiKeyPolicyContracts.ps1 -Root .

      - name: Validate git hook installer contract
        shell: pwsh
        run: ./tests/Test-GitHookInstallerContract.ps1 -Root .

  queue-and-agent-contracts:
    name: Queue and agent lifecycle contracts
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate queue task movement contract
        shell: pwsh
        run: ./tests/Test-TaskMovement.ps1 -Root .

      - name: Validate queue claim selector hardness
        shell: pwsh
        run: ./tests/Test-QueueClaimHardness.ps1 -Root .

      - name: Validate work pipeline E2E contract
        shell: pwsh
        run: ./tests/Test-WorkPipelineE2E.ps1 -Root .

      - name: Validate agent slot movement helper usage
        shell: pwsh
        run: ./tests/Test-AgentSlotUsesTaskMovement.ps1 -Root .

      - name: Validate stale branch status contract
        shell: pwsh
        run: ./tests/Test-StaleBranchStatusContract.ps1 -Root .

      - name: Validate legacy headless slot retirement
        shell: pwsh
        run: ./tests/Test-HeadlessSlotRetirement.ps1 -Root .

  mcp-and-control-contracts:
    name: MCP and control-plane contracts
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate repository sync JSON contract
        shell: pwsh
        run: ./tests/Test-OrchestratorRepoSync.ps1 -Root .

      - name: Validate control helper JSON contracts
        shell: pwsh
        run: ./tests/Test-OrchestratorControlHelpers.ps1 -Root .

      - name: Validate MCP server route contracts
        shell: pwsh
        run: ./tests/Test-OrchMcpServerContracts.ps1 -Root .

      - name: Validate MCP safe PowerShell tool contract
        shell: pwsh
        run: ./tests/Test-OrchMcpSafePowerShellToolContract.ps1 -Root .

      - name: Validate MCP ops tools contract
        shell: pwsh
        run: ./tests/Test-OrchMcpOpsToolsContract.ps1 -Root .

      - name: Validate MCP safe tools patch contract
        shell: pwsh
        run: ./tests/Test-OrchMcpSafeToolsPatchContract.ps1 -Root .

      - name: Validate MCP connector capability states
        shell: pwsh
        run: ./tests/Test-OrchMcpCapabilityStatus.ps1 -Root .

      - name: Validate LM Studio preflight lane contract
        shell: pwsh
        run: ./tests/Test-LmStudioPreflightLaneContract.ps1 -Root .

  status-dashboard-and-services:
    name: Status, dashboard, and service health
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate orchestrator status JSON stdout
        shell: pwsh
        run: ./tests/Test-OrchestratorStatusJson.ps1 -Root .

      - name: Generate orchestrator status snapshot
        shell: pwsh
        run: ./scripts/Get-OrchestratorStatus.ps1 -Root . | ConvertFrom-Json | Out-Null

      - name: Validate dashboard activity failure context
        shell: pwsh
        run: ./tests/Test-ActivityLogFailureContext.ps1 -Root .

      - name: Validate dashboard restart contract
        shell: pwsh
        run: ./tests/Test-DashboardRestartContract.ps1 -Root .

      - name: Validate server health pulse contract
        shell: pwsh
        run: ./tests/Test-ServerHealthPulse.ps1 -Root .

      - name: Validate restart service supervisor contract
        shell: pwsh
        run: ./tests/Test-OrchestratorServicesSupervisor.ps1 -Root .

      - name: Validate restart startup task contract
        shell: pwsh
        run: ./tests/Test-OrchestratorStartupTask.ps1 -Root .

      - name: Validate dashboard service health contract
        shell: pwsh
        run: ./tests/Test-DashboardServiceHealthContract.ps1 -Root .
