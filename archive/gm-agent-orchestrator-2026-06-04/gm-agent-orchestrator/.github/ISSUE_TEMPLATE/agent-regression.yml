name: Agent Regression
about: Track a broken or degraded agent lane
title: "Agent regression: "
labels: ["agent-regression"]
body:
  - type: input
    id: slot
    attributes:
      label: Agent slot / lane
      placeholder: headless, gpt-main, claude-main, etc.
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed failure
      description: Include the smallest safe log excerpt or status output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: last_good
    attributes:
      label: Last known good state
      description: Commit, date, version, or evidence if known.
  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      value: |
        - Do not route production work to this lane until fixed.
        - Do not requeue active tasks unless explicitly authorized.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation required
    validations:
      required: true
