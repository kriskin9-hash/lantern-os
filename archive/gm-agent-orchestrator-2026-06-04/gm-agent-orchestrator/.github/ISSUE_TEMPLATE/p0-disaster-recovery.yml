name: P0 Disaster Recovery
about: Track a production/operator recovery incident for Orchestra
title: "P0: "
labels: ["P0", "disaster-recovery"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken and what user/operator impact exists?
    validations:
      required: true
  - type: textarea
    id: current_state
    attributes:
      label: Current state
      description: Queue/active/done/failed counts, server/process state, and known active task.
    validations:
      required: true
  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      description: What must not be moved, restarted, closed, or mutated?
      value: |
        - Do not requeue unless explicitly authorized.
        - Do not move active tasks unless explicitly authorized.
        - Do not start unrelated agents.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation / evidence
      description: Exact commands, outputs, logs, comments, commits, or PRs that prove the state.
    validations:
      required: true
  - type: textarea
    id: next_action
    attributes:
      label: Next action
      description: One concrete next action.
    validations:
      required: true
