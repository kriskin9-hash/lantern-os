name: MCP Capability Gap
about: Track a mismatch between reported MCP capability and exposed/working tool surface
title: "P0: MCP capability gap — "
labels: ["P0", "mcp", "capability-gap"]
body:
  - type: textarea
    id: reported
    attributes:
      label: Reported capability
      description: What did capability status, docs, or UI claim was available?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual exposed behavior
      description: What tool/route/action was missing or failed?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What recovery or workflow loop is blocked?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        1. Capability status and exposed tool surface agree.
        2. Tool call returns structured JSON.
        3. Operation writes an audit record when mutating.
        4. Safety guardrails are documented.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Exact local/MCP/GitHub validation required.
    validations:
      required: true
