name: Dashboard View
about: Track product, developer/operator, or public dashboard changes
title: "Dashboard: "
labels: ["dashboard"]
body:
  - type: dropdown
    id: audience
    attributes:
      label: Audience
      options:
        - Product manager
        - Developer/operator
        - Public/shareholder
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is confusing, unsafe, missing, or noisy in the current view?
    validations:
      required: true
  - type: textarea
    id: data_policy
    attributes:
      label: Data exposure policy
      value: |
        Product/public views must not expose raw local paths, internal task filenames, raw provider/model names, worktree details, raw command errors, or log tails unless explicitly approved.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Include screenshot/checklist/redaction validation where possible.
    validations:
      required: true
