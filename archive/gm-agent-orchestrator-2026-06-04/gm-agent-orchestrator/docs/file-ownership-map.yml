# File Ownership Map
# Status: active
# Authority: docs/repo-structure-contract.md is the human-readable authority.
#   This file is the machine-checkable derivative. When they conflict, fix this file.
# Enforcement: advisory; Test-RepoStructureContract.ps1 validates the root allowlist.
# Last updated: 2026-05-06 (aligned with repo-structure-contract.md post PR #291)

paths:
  docs/:
    owner: operator-docs
    use: durable system docs, standards, ADRs, contracts, model guides
    allowed_extensions: [md, yml, yaml, json]
    retention: long_lived
    cleanup_policy: manual_review_before_archive
    notes: all filenames must be kebab-case.md; exceptions are README.md only

  docs/archive/:
    owner: operator-docs
    use: preserved historical material grouped by event/period
    allowed_extensions: [md, json, jsonl, html, txt, yml, yaml]
    retention: archive
    cleanup_policy: append_only_unless_explicitly_cleaned
    notes: each subdirectory must contain INDEX.md

  docs/archive/disaster-recovery-2026-04/:
    owner: operator-docs
    use: disaster recovery sprint artifacts
    retention: archive

  docs/archive/crash-cart-2026-04/:
    owner: operator-docs
    use: crash-cart sprint artifacts
    retention: archive

  docs/archive/pre-rc2-2026-04/:
    owner: operator-docs
    use: pre-RC2 exploration and planning artifacts
    retention: archive

  docs/agents/:
    owner: operator-docs
    use: agent slot documentation
    allowed_extensions: [md]
    retention: long_lived

  docs/handoffs/:
    owner: operator-docs
    use: active handoff documents still guiding implementation
    allowed_extensions: [md]
    retention: current_or_archive

  docs/model-guides/:
    owner: operator-docs
    use: model-specific behavior for each agent type
    allowed_extensions: [md]
    retention: long_lived

  docs/releases/:
    owner: operator-docs
    use: release notes and changelog records
    allowed_extensions: [md]
    retention: long_lived

  docs/research/:
    owner: research
    use: research artifacts and syntheses
    allowed_extensions: [md, yml, json]
    retention: long_lived

  skills/:
    owner: operator-docs
    use: private operator-authored skill docs reusable across agent sessions
    allowed_extensions: [md]
    retention: long_lived
    notes: each skill lives at skills/<category>/SKILL.md with YAML frontmatter (name, description)

  scripts/:
    owner: tooling
    use: active orchestrator scripts
    allowed_extensions: [ps1, js, py, sh, md]
    retention: code
    cleanup_policy: review_as_code

  scripts/archive/:
    owner: tooling
    use: retired or one-off scripts kept for provenance
    allowed_extensions: [ps1, js, py, sh, md]
    retention: archive
    cleanup_policy: append_only

  tests/:
    owner: validation
    use: regression checks for repo behavior and documentation contracts
    allowed_extensions: [ps1]
    retention: code
    cleanup_policy: review_as_code

  config/:
    owner: runtime-config
    use: slot bindings, agent config, local service overrides, project paths
    allowed_extensions: [json, yml, yaml, md]
    retention: config
    cleanup_policy: avoid_local_secrets_or_untracked_state

  tasks/queue/:
    owner: orchestrator
    use: unclaimed task files
    allowed_extensions: [md]
    retention: queue_lifecycle
    cleanup_policy: no_manual_moves_without_queue_policy

  tasks/active/:
    owner: orchestrator
    use: claimed task files, one per slot
    allowed_extensions: [md]
    retention: temporary
    cleanup_policy: never_delete_manually

  tasks/done/:
    owner: orchestrator
    use: completed task records with PR evidence
    allowed_extensions: [md]
    retention: audit_history
    cleanup_policy: archive_only_with_operator_approval

  tasks/failed/:
    owner: orchestrator
    use: failed task records for triage
    allowed_extensions: [md]
    retention: triage_history
    cleanup_policy: preserve_until_triaged

  tasks/hold/:
    owner: orchestrator
    use: tasks explicitly parked with operator reason
    allowed_extensions: [md]
    retention: hold_until_resumed
    cleanup_policy: never_delete_without_reason

  status/:
    owner: orchestrator
    use: compact current state, slot status JSON, quota tracker
    allowed_extensions: [json, md]
    retention: current_state
    cleanup_policy: update_via_scripts_only

  logs/:
    owner: orchestrator
    use: agent run logs, slot output
    allowed_extensions: [log, txt, md, json]
    retention: rolling
    cleanup_policy: prune_after_configurable_window

  logs/control-actions/:
    owner: orchestrator
    use: audit records for every MCP/safe-powershell invocation
    allowed_extensions: [json, jsonl]
    retention: audit_history
    cleanup_policy: compress_or_archive_after_review

  reports/:
    owner: validation
    use: generated evidence, queue movement audit, scan output
    allowed_extensions: [md, json, jsonl, html, txt, log]
    retention: evidence
    cleanup_policy: compress_or_archive_after_review

  reports/queue-movements/:
    owner: orchestrator
    use: JSONL audit trail of every queue lane transition
    allowed_extensions: [jsonl]
    retention: audit_history
    cleanup_policy: archive_after_90_days

  locks/:
    owner: orchestrator
    use: manual slot lock files
    allowed_extensions: [lock, json]
    retention: temporary
    cleanup_policy: remove_when_unlocked

  worktrees/:
    owner: orchestrator
    use: git worktrees for agent slots; each slot has one branch+worktree
    notes: managed by New-AgentWorktree.ps1 and Start-GmAgentOrchestrator.ps1
    retention: active_while_slot_running
    cleanup_policy: prune_with_git_worktree_prune_after_slot_retirement

  .claude/:
    owner: operator-config
    use: Claude Code hooks, settings, session state
    notes: >
      settings.local.json = read-only default permissions.
      settings.supervised-write.json = elevated permissions reference (opt-in only).
      hooks/ = Stop/PreToolUse enforcement scripts.
    allowed_extensions: [json, ps1, md]
    retention: config
    cleanup_policy: review_as_code

  .github/:
    owner: ci
    use: GitHub Actions workflows and repo configuration
    allowed_extensions: [yml, yaml, json, md]
    retention: code
    cleanup_policy: review_as_code

  research/:
    owner: research
    use: research syntheses, printables, indexes, audits
    allowed_extensions: [md, yml, yaml, json, jsonl, html, pdf]
    retention: long_lived
    cleanup_policy: archive_or_supersede_with_source_note

root_rules:
  allow_root_files:
    - README.md
    - AGENTS.md
    - CLAUDE.md
    - .gitignore
    - .gitattributes
    - LICENSE
    - SECURITY.md
    - CONTRIBUTING.md
  notes: >
    CLAUDE.md is an intentional uppercase exception — P0 init gate for Claude Code sessions.
    All other root markdown files are prohibited. Root drift is a contract violation.
    Tool manifests (package.json, pyproject.toml, etc.) required by the repo are allowed.
  discourage_root_patterns:
    - "*latest*"
    - "*final*"
    - "*copy*"
    - "*backup*"
    - "*old*"
    - "*new*"
    - "*.log"
    - "*.bak"
  root_markdown_policy: no_new_root_markdown_without_explicit_operator_reason_and_contract_update

cleanup_modes:
  report_only:
    default: true
    destructive: false
  proposal_only:
    destructive: false
    requires_operator_approval: true
  apply_approved_plan:
    destructive: possible
    requires_operator_approval: true
    requires_git_diff_validation: true

control_plane_files:
  description: >
    Changes to these files affect the governance or runtime behavior of the orchestrator.
    They require operator review before merge and should not be changed in rapid succession
    without a stable audit checkpoint between changes.
  files:
    - AGENTS.md
    - CLAUDE.md
    - .claude/settings.local.json
    - .claude/settings.supervised-write.json
    - docs/agent-contract.md
    - docs/repo-structure-contract.md
    - docs/file-ownership-map.yml
    - scripts/Start-GmAgentOrchestrator.ps1
    - scripts/Start-AgentSlot.ps1
    - scripts/Start-OrchMcpServer.ps1
    - scripts/Invoke-OrchestratorAgentAction.ps1
    - scripts/Invoke-OrchestratorTaskAction.ps1
    - scripts/Claim-OrchestratorQueueTask.ps1
    - scripts/Move-OrchestratorTask.ps1
