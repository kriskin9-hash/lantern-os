version: 1
name: hook-opportunity-rules
mode: advisory
rules:
  - id: deterministic-first
    title: Prefer deterministic validation before token-heavy review
    description: Suggest static analysis, schema parsing, regex, diff inspection, logs, status files, or contract tests before model/tool-heavy work.
    triggers:
      - scripts/**/*.ps1
      - config/**/*.json
      - .github/workflows/**/*.yml
      - .claude/hooks/**/*.ps1
      - docs/**/*.md
    suggestions:
      - Check for an existing deterministic script or contract test before invoking an agent.
      - Add a PowerShell contract test when a rule can be validated by parsing files, JSON, logs, or command output.
      - Reserve model/tool-heavy review for semantic judgment, ambiguity, architecture, risk, or tradeoffs.

  - id: script-change-needs-test
    title: Script changes should have deterministic validation
    description: Script changes should usually update or add a contract test.
    triggers:
      - scripts/**/*.ps1
    expected_companions:
      - tests/**/*.ps1

  - id: mcp-change-needs-contract
    title: MCP and tool boundary changes need contract coverage
    description: MCP/tool changes should preserve schema, capability-state, and safe PowerShell boundaries.
    triggers:
      - scripts/*Mcp*.ps1
      - scripts/*Tool*.ps1
      - config/**/*mcp*.json
    expected_companions:
      - tests/*Mcp*.ps1
      - tests/*Tool*.ps1
      - tests/*Capability*.ps1

  - id: queue-dispatch-change-needs-dry-run
    title: Queue and dispatch changes need dry-run coverage
    description: Queue movement, task claiming, dispatch, and agent startup changes should be protected by dry-run contract tests.
    triggers:
      - scripts/*Queue*.ps1
      - scripts/*Task*.ps1
      - scripts/*AgentAction*.ps1
      - scripts/*OrchestratorAgent*.ps1
    expected_companions:
      - tests/*Queue*.ps1
      - tests/*Task*.ps1
      - tests/*Agent*.ps1

  - id: config-change-needs-safety-check
    title: Config changes need safety validation
    description: JSON config changes should keep schema or safety validation current.
    triggers:
      - config/**/*.json
    expected_companions:
      - tests/*Config*.ps1
      - tests/*Safety*.ps1

  - id: hook-change-needs-hook-contract
    title: Hook changes need hook contract tests
    description: Local hook changes should be covered by deterministic contract tests.
    triggers:
      - .claude/hooks/**/*.ps1
    expected_companions:
      - tests/*Hook*.ps1
