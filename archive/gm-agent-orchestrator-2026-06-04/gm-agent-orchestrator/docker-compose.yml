version: '3.8'

services:
  lantern:
    build: .
    container_name: lantern-app
    volumes:
      - ~/.lantern:/root/.lantern:rw
      - ~/.bettersafe:/root/.bettersafe:rw
      - ~/lantern-rag-books:/app/rag-knowledge-base:rw
    environment:
      - PYTHONUNBUFFERED=1
      - LANTERN_MODE=local
      - RAG_STORAGE=local
    restart: always
    networks:
      - lantern-net

  rag-server:
    image: python:3.12-slim
    container_name: rag-knowledge-base
    working_dir: /app
    command: python3 scripts/rag_server_local.py
    volumes:
      - ~/lantern-rag-books:/app/rag-knowledge-base:rw
      - ~/.lantern:/root/.lantern:rw
    ports:
      - "8767:8767"
    environment:
      - PYTHONUNBUFFERED=1
      - RAG_MODE=local
    restart: always
    networks:
      - lantern-net

  orchestrator:
    image: python:3.12-slim
    container_name: agent-orchestrator
    working_dir: /app
    command: python3 scripts/lantern-agent-orchestrator.py
    volumes:
      - ~/.lantern:/root/.lantern:rw
      - ~/.bettersafe:/root/.bettersafe:rw
      - ~/lantern-rag-books:/app/rag-knowledge-base:rw
    environment:
      - PYTHONUNBUFFERED=1
      - ORCHESTRATOR_MODE=autopilot
    restart: always
    networks:
      - lantern-net

networks:
  lantern-net:
    driver: bridge
