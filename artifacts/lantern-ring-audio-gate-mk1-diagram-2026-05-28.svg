<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg{fill:#f7f4ec}.header{fill:#202832}.panel{fill:#ffffff;stroke:#1f2933;stroke-width:2}.ink{fill:#1f2933}.muted{fill:#5d6872}.teal{fill:#0f8f8f}.gold{fill:#b48732}.rose{fill:#c86b83}.stone{fill:#eef3f5;stroke:#1f2933;stroke-width:2}.active{fill:#d8fff8;stroke:#0f8f8f;stroke-width:4}.line{stroke:#0f8f8f;stroke-width:5;fill:none;stroke-linecap:round}.thin{stroke:#1f2933;stroke-width:2;fill:none}.dash{stroke:#8a939b;stroke-width:2;fill:none;stroke-dasharray:8 7}.big{font:800 46px Arial,sans-serif}.med{font:700 30px Arial,sans-serif}.small{font:400 22px Arial,sans-serif}.smallb{font:700 22px Arial,sans-serif}.tiny{font:400 18px Arial,sans-serif}.mono{font:400 17px Courier New,monospace}.num{font:800 26px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#0f8f8f"/></marker>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <rect class="header" width="1600" height="115"/>
  <text class="big" x="52" y="58" fill="#fff">LANTERN RING AUDIO GATE MK1</text>
  <text class="small" x="55" y="94" fill="#d8e0e6">12-Stone Matrix / Push-to-Talk / Optical Self-Loop / Public-Safe Concept Sheet</text>
  <rect x="1250" y="24" width="285" height="62" rx="10" fill="#111820" stroke="#0f8f8f" stroke-width="2"/>
  <text class="smallb" x="1272" y="51" fill="#8ee5df">CANDIDATE ARTIFACT</text>
  <text class="tiny" x="1272" y="76" fill="#d9e2e8">No production claim</text>

  <rect class="panel" x="50" y="145" width="700" height="500" rx="14"/>
  <text class="med" x="85" y="188">1. Ring Matrix Layout</text>
  <text class="small" x="85" y="222">Active stones at 12 / 4 / 8. Other stones reserved.</text>
  <circle cx="400" cy="410" r="170" fill="none" stroke="#1f2933" stroke-width="6"/>
  <circle cx="400" cy="410" r="116" fill="none" stroke="#b48732" stroke-width="3"/>
  <path d="M400 240 A170 170 0 1 1 399 240" class="dash"/>
  <circle class="active" cx="400" cy="240" r="34"/><text class="smallb" x="386" y="248">12</text>
  <circle class="active" cx="547" cy="495" r="34"/><text class="smallb" x="535" y="503">4</text>
  <circle class="active" cx="253" cy="495" r="34"/><text class="smallb" x="241" y="503">8</text>
  <circle class="stone" cx="485" cy="263" r="24"/><text class="tiny" x="480" y="270">1</text>
  <circle class="stone" cx="547" cy="325" r="24"/><text class="tiny" x="542" y="332">2</text>
  <circle class="stone" cx="570" cy="410" r="24"/><text class="tiny" x="565" y="417">3</text>
  <circle class="stone" cx="485" cy="557" r="24"/><text class="tiny" x="480" y="564">5</text>
  <circle class="stone" cx="400" cy="580" r="24"/><text class="tiny" x="395" y="587">6</text>
  <circle class="stone" cx="315" cy="557" r="24"/><text class="tiny" x="310" y="564">7</text>
  <circle class="stone" cx="230" cy="410" r="24"/><text class="tiny" x="225" y="417">9</text>
  <circle class="stone" cx="253" cy="325" r="24"/><text class="tiny" x="243" y="332">10</text>
  <circle class="stone" cx="315" cy="263" r="24"/><text class="tiny" x="305" y="270">11</text>
  <path class="line" marker-end="url(#arrow)" d="M400 240 C520 250 615 350 570 455"/>
  <path class="line" marker-end="url(#arrow)" d="M547 495 C470 610 330 610 253 495"/>
  <path class="line" marker-end="url(#arrow)" d="M253 495 C170 360 250 250 400 240"/>
  <text class="tiny" x="82" y="610">Optical pulse travels circular path and returns to 12 o'clock sensor.</text>

  <rect class="panel" x="790" y="145" width="760" height="235" rx="14"/>
  <text class="med" x="825" y="188">2. Audio Gate Functions</text>
  <rect x="835" y="230" width="150" height="70" rx="10" fill="#eef3f5" stroke="#1f2933" stroke-width="2"/><text class="tiny" x="862" y="258">Push-to-talk</text><text class="tiny" x="873" y="282">default off</text>
  <rect x="1030" y="230" width="150" height="70" rx="10" fill="#eef3f5" stroke="#1f2933" stroke-width="2"/><text class="tiny" x="1052" y="258">Bluetooth mic</text><text class="tiny" x="1072" y="282">connector</text>
  <rect x="1225" y="230" width="150" height="70" rx="10" fill="#eef3f5" stroke="#1f2933" stroke-width="2"/><text class="tiny" x="1261" y="258">Lantern OS</text><text class="tiny" x="1263" y="282">local route</text>
  <rect x="1410" y="230" width="110" height="70" rx="10" fill="#eef3f5" stroke="#1f2933" stroke-width="2"/><text class="tiny" x="1429" y="258">Off-ring</text><text class="tiny" x="1428" y="282">speaker</text>
  <path class="line" marker-end="url(#arrow)" d="M985 265 H1030"/><path class="line" marker-end="url(#arrow)" d="M1180 265 H1225"/><path class="line" marker-end="url(#arrow)" d="M1375 265 H1410"/>
  <text class="tiny" x="825" y="340">No hidden hot-mic claim. No always-on recording claim. Audio route is gated and review-only.</text>

  <rect class="panel" x="790" y="410" width="365" height="235" rx="14"/>
  <text class="med" x="825" y="453">3. Pair + Feedback</text>
  <circle cx="875" cy="535" r="38" fill="#d8fff8" stroke="#0f8f8f" stroke-width="3"/><text class="smallb" x="851" y="543">NFC</text>
  <circle cx="990" cy="535" r="38" fill="#fff2d6" stroke="#b48732" stroke-width="3"/><text class="smallb" x="963" y="543">HAPTIC</text>
  <text class="tiny" x="825" y="610">NFC pairing cue + haptic confirmation/fault feedback.</text>

  <rect class="panel" x="1185" y="410" width="365" height="235" rx="14"/>
  <text class="med" x="1220" y="453">4. Safety Gate</text>
  <path d="M1320 500 h80 l-40 82 z" fill="#fff2d6" stroke="#1f2933" stroke-width="2"/>
  <text class="smallb" x="1287" y="612">Battery safety held</text>
  <text class="tiny" x="1220" y="635">Charge, heat, enclosure, and compliance require review.</text>

  <rect class="panel" x="50" y="680" width="1500" height="245" rx="14"/>
  <text class="med" x="85" y="723">5. Public-Safe Boundary / Handoff Status</text>
  <rect x="85" y="755" width="430" height="125" rx="10" fill="#fffaf0" stroke="#1f2933" stroke-width="2"/>
  <text class="smallb" x="110" y="790">Allowed here</text>
  <text class="tiny" x="110" y="820">Concept layout, function routing, symbolic positions, validation gates.</text>
  <text class="tiny" x="110" y="850">Public-safe optical self-loop explanation.</text>
  <rect x="585" y="755" width="430" height="125" rx="10" fill="#fffaf0" stroke="#1f2933" stroke-width="2"/>
  <text class="smallb" x="610" y="790">Held outside</text>
  <text class="tiny" x="610" y="820">Dimensions, schematics, battery chemistry, firmware, suppliers.</text>
  <text class="tiny" x="610" y="850">No certification, shipment, production, or patent claim.</text>
  <rect x="1085" y="755" width="430" height="125" rx="10" fill="#fffaf0" stroke="#1f2933" stroke-width="2"/>
  <text class="smallb" x="1110" y="790">MCP status</text>
  <text class="mono" x="1110" y="820">workLoadedToMcp: held</text>
  <text class="tiny" x="1110" y="850">Remote PR is handoff until local MCP probe exists.</text>

  <rect x="0" y="955" width="1600" height="45" fill="#202832"/>
  <text class="tiny" x="52" y="984" fill="#d9e2e8">Lantern Ring Audio Gate MK1 - candidate concept / validation artifact / not a build-ready hardware file</text>
</svg>
