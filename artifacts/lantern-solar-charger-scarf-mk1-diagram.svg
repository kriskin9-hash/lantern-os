<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Lantern Solar Charger Scarf MK1 concept diagram</title>
  <desc id="desc">Public-safe Orion Charge Scarf concept showing graphite travel scarf, phone sleeve, watch dock loop, memory puck, ship kit, and local MCP memory flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f4ee"/>
      <stop offset="1" stop-color="#e9eef0"/>
    </linearGradient>
    <linearGradient id="graphite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111820"/>
      <stop offset="0.5" stop-color="#26313a"/>
      <stop offset="1" stop-color="#0b1015"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1015" flood-opacity="0.22"/>
    </filter>
    <style>
      .ink{fill:#13212b;font-family:Segoe UI,Arial,sans-serif}
      .muted{fill:#5d6971;font-family:Segoe UI,Arial,sans-serif}
      .gold{fill:#a97738;font-family:Segoe UI,Arial,sans-serif}
      .teal{fill:#17c8d2}
      .line{stroke:#17c8d2;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#8aa0a8;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .panel{fill:#ffffff;stroke:#c7d0d2;stroke-width:2;rx:24}
      .darkPanel{fill:#0f1b24;stroke:#24404a;stroke-width:2;rx:24}
      .label{font-size:28px;font-weight:800;letter-spacing:.02em}
      .small{font-size:22px}
      .tiny{font-size:18px}
      .caption{font-size:20px;font-weight:700}
      .mono{font-family:Consolas,Monaco,monospace}
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <text x="56" y="78" class="ink" font-size="48" font-weight="900">Lantern OS Orion Charge Scarf MK1</text>
  <text x="58" y="122" class="gold" font-size="24" font-weight="800" letter-spacing="5">SOLAR-INSPIRED TRAVEL SCARF + LOCAL MEMORY TAP</text>
  <text x="1320" y="70" class="ink" font-size="36" font-weight="800" letter-spacing="8">ORION</text>
  <text x="1324" y="108" class="teal" font-size="19" font-weight="800" letter-spacing="4">LANTERN OS</text>

  <g transform="translate(52 170)">
    <rect class="panel" width="940" height="610" rx="28"/>
    <text x="34" y="52" class="ink label">Scarf body</text>
    <text x="36" y="86" class="muted small">Graphite wrap with constellation stitch and removable components</text>

    <path d="M155 170 C220 70 430 85 510 180 C600 290 510 430 350 455 C205 480 88 410 96 295 C100 245 125 198 155 170 Z" fill="url(#graphite)" filter="url(#shadow)"/>
    <path d="M275 138 C350 92 455 120 505 198 C570 300 500 398 382 430 C260 464 145 415 132 310" class="thin"/>
    <path d="M120 315 C250 350 395 340 555 250" class="line" opacity=".55"/>
    <path d="M165 230 C245 270 352 288 472 268" class="line" opacity=".35"/>

    <g opacity=".86">
      <circle cx="180" cy="270" r="4" class="teal"/><circle cx="245" cy="232" r="3" fill="#d7f7f3"/><circle cx="315" cy="284" r="4" class="teal"/><circle cx="390" cy="245" r="3" fill="#d7f7f3"/><circle cx="455" cy="305" r="4" class="teal"/>
      <path d="M180 270 L245 232 L315 284 L390 245 L455 305" stroke="#8eeaf0" stroke-width="2" fill="none" opacity=".75"/>
      <circle cx="230" cy="365" r="3" fill="#d7f7f3"/><circle cx="310" cy="390" r="4" class="teal"/><circle cx="405" cy="365" r="3" fill="#d7f7f3"/>
      <path d="M230 365 L310 390 L405 365" stroke="#8eeaf0" stroke-width="2" fill="none" opacity=".65"/>
    </g>

    <rect x="146" y="410" width="116" height="62" rx="12" fill="#0c1218" stroke="#17c8d2" stroke-width="2"/>
    <text x="170" y="448" class="gold tiny" font-weight="800">PHONE</text>

    <circle cx="595" cy="320" r="52" fill="#0c1218" stroke="#17c8d2" stroke-width="4"/>
    <circle cx="595" cy="320" r="31" fill="#17242d" stroke="#a97738" stroke-width="2"/>
    <path d="M595 289 L604 316 L632 320 L605 329 L595 356 L586 329 L558 320 L586 311 Z" fill="#17c8d2" opacity=".85"/>
    <text x="545" y="395" class="ink caption">Memory puck</text>

    <circle cx="650" cy="190" r="58" fill="#111820" stroke="#555" stroke-width="5"/>
    <circle cx="650" cy="190" r="45" fill="#06131b" stroke="#17c8d2" stroke-width="3"/>
    <text x="616" y="197" fill="#ffffff" font-family="Segoe UI,Arial" font-size="20">10:09</text>
    <path d="M650 154 L657 182 L687 190 L657 198 L650 228 L642 198 L613 190 L642 182 Z" fill="#17c8d2" opacity=".6"/>
    <text x="592" y="270" class="ink caption">Watch dock loop</text>

    <line x1="262" y1="442" x2="760" y2="470" class="line"/>
    <text x="770" y="478" class="ink caption">Hidden phone sleeve</text>
    <line x1="595" y1="320" x2="802" y2="350" class="line"/>
    <text x="812" y="358" class="ink caption">Removable NFC / QR puck</text>
    <line x1="650" y1="190" x2="800" y2="200" class="line"/>
    <text x="812" y="208" class="ink caption">Orion Watch carry dock</text>
    <line x1="430" y1="246" x2="760" y2="132" class="line"/>
    <text x="770" y="140" class="ink caption">Solar-inspired stitch pattern</text>
    <line x1="180" y1="270" x2="70" y2="520" class="line"/>
    <text x="80" y="555" class="ink caption">Reflective constellation thread</text>
  </g>

  <g transform="translate(1034 170)">
    <rect class="panel" width="510" height="610" rx="28"/>
    <text x="32" y="52" class="ink label">Store-safe features</text>
    <g transform="translate(34 96)">
      <circle cx="30" cy="30" r="25" fill="#10202a"/><text x="23" y="39" fill="#17c8d2" font-size="29" font-family="Segoe UI">1</text>
      <text x="76" y="28" class="ink caption">Hidden storage</text><text x="76" y="58" class="muted tiny">phone, watch, slim power bank</text>
      <circle cx="30" cy="122" r="25" fill="#10202a"/><text x="22" y="131" fill="#17c8d2" font-size="29" font-family="Segoe UI">2</text>
      <text x="76" y="120" class="ink caption">Local-first tap</text><text x="76" y="150" class="muted tiny">NFC or QR fallback, no silent recording</text>
      <circle cx="30" cy="214" r="25" fill="#10202a"/><text x="22" y="223" fill="#17c8d2" font-size="29" font-family="Segoe UI">3</text>
      <text x="76" y="212" class="ink caption">MCP memory route</text><text x="76" y="242" class="muted tiny">store, retrieve, converge, redact</text>
      <circle cx="30" cy="306" r="25" fill="#10202a"/><text x="22" y="315" fill="#17c8d2" font-size="29" font-family="Segoe UI">4</text>
      <text x="76" y="304" class="ink caption">Claim-safe launch</text><text x="76" y="334" class="muted tiny">solar-inspired until hardware is certified</text>
    </g>
    <rect x="34" y="470" width="442" height="92" rx="18" fill="#0f1b24"/>
    <text x="58" y="508" fill="#a97738" font-family="Segoe UI,Arial" font-size="21" font-weight="800">TIKTOK STORE FIRST SKU</text>
    <text x="58" y="540" fill="#ffffff" font-family="Segoe UI,Arial" font-size="27" font-weight="900">Orion Charge Scarf</text>
  </g>

  <g transform="translate(52 825)">
    <rect class="darkPanel" width="1492" height="250" rx="28"/>
    <text x="36" y="54" fill="#a97738" font-family="Segoe UI,Arial" font-size="24" font-weight="900" letter-spacing="3">LOCAL MCP MEMORY FLOW</text>
    <g transform="translate(48 96)">
      <rect x="0" y="0" width="250" height="92" rx="18" fill="#ffffff" opacity=".96"/>
      <text x="28" y="36" class="ink caption">1. Tap scarf</text><text x="28" y="66" class="muted tiny">puck or garment zone</text>
      <path d="M270 46 L338 46" stroke="#a97738" stroke-width="5" marker-end="url(#arrow)"/>
      <rect x="360" y="0" width="250" height="92" rx="18" fill="#ffffff" opacity=".96"/>
      <text x="388" y="36" class="ink caption">2. Confirm</text><text x="388" y="66" class="muted tiny">phone names setup</text>
      <path d="M630 46 L698 46" stroke="#a97738" stroke-width="5"/>
      <rect x="720" y="0" width="250" height="92" rx="18" fill="#ffffff" opacity=".96"/>
      <text x="748" y="36" class="ink caption">3. Store</text><text x="748" y="66" class="muted tiny">local MCP memory</text>
      <path d="M990 46 L1058 46" stroke="#a97738" stroke-width="5"/>
      <rect x="1080" y="0" width="250" height="92" rx="18" fill="#ffffff" opacity=".96"/>
      <text x="1108" y="36" class="ink caption">4. Retrieve</text><text x="1108" y="66" class="muted tiny">load allowed setup</text>
    </g>
    <text x="44" y="214" fill="#d7f7f3" font-family="Segoe UI,Arial" font-size="21">Boundary: no medical claim, no hidden recording, no certified charging claim until supplier/sample validation.</text>
  </g>
</svg>
