<svg viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Keystone — cracked stone coder">
  <!--
    Keystone, the Σ₀ coding agent (issue #628).
    A cracked keystone stone with a grounded little face — the cracks show its
    evidence, nothing hidden. Hand-drawn ink stand-in; replace with the canonical
    scan at /avatars/keystone.png and repoint the persona avatar field if desired.
  -->
  <g fill="none" stroke="#141414" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer teardrop / keystone shell -->
    <path d="M110 18 C 60 38, 24 108, 30 166 C 34 216, 74 242, 110 242 C 146 242, 186 216, 190 166 C 196 108, 160 38, 110 18 Z"
          fill="#f4f1ea"/>
    <!-- inner shell ring: the cracked plate the face sits in -->
    <path d="M78 70 C 56 96, 52 140, 64 178 C 76 214, 146 216, 158 176 C 170 138, 162 96, 142 70 C 124 50, 96 50, 78 70 Z"
          fill="#ffffff"/>
    <!-- cracks radiating from the ring out toward the edge -->
    <path d="M78 70 L 58 52 M78 70 L 50 78"/>
    <path d="M142 70 L 166 52 M142 70 L 174 84"/>
    <path d="M64 132 L 34 128 M64 150 L 36 162"/>
    <path d="M158 130 L 188 122 M156 152 L 186 160"/>
    <path d="M92 60 L 96 40 M128 60 L 124 40"/>
    <path d="M88 210 L 80 232 M132 210 L 140 232"/>
    <!-- a couple of hairline cracks across the shell ring -->
    <path d="M64 178 L 84 168 M158 176 L 138 168" stroke-width="3"/>
  </g>
  <!-- face -->
  <g fill="#141414">
    <ellipse cx="90" cy="132" rx="15" ry="20"/>
    <ellipse cx="132" cy="132" rx="15" ry="20"/>
    <!-- tiny eye highlights -->
    <circle cx="85" cy="124" r="3" fill="#ffffff"/>
    <circle cx="127" cy="124" r="3" fill="#ffffff"/>
  </g>
  <g fill="none" stroke="#141414" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- soft nose -->
    <path d="M104 162 C 108 170, 114 170, 118 162"/>
    <!-- friendly smile with a small curl at the right -->
    <path d="M86 178 C 100 198, 124 198, 134 180 C 136 176, 132 173, 129 176"/>
  </g>
</svg>
