<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kalshi Real-Time Positions</title><style>body{font-family:monospace;background:#0f0f1e;color:#e0e0e0;padding:20px}.container{max-width:1600px;margin:0 auto}header{text-align:center;border-bottom:2px solid #00d4ff;padding:20px 0;margin-bottom:20px}h1{color:#00d4ff;margin:0 0 10px 0}.btn{background:#00d4ff;color:#000;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin:10px 5px}.btn:hover{background:#0099ff}.section{background:rgba(20,30,50,0.8);border:1px solid #00d4ff;padding:20px;margin-bottom:20px;border-radius:6px}.section h2{color:#00d4ff;margin-top:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:20px}.card{background:rgba(10,20,40,0.9);border:1px solid #00aaff;padding:15px;text-align:center;border-radius:4px}.label{color:#88aaff;font-size:0.85em;margin-bottom:8px}.value{font-size:1.6em;font-weight:bold;color:#00ff88}.value.negative{color:#ff4466}table{width:100%;border-collapse:collapse;margin-top:15px}th{background:rgba(0,100,150,0.3);color:#00d4ff;padding:12px;text-align:left;font-size:0.9em}td{padding:12px;border-bottom:1px solid #00aaff}tr:hover{background:rgba(0,150,255,0.1)}.error{background:rgba(255,0,0,0.1);border:1px solid #ff4466;color:#ff6688;padding:15px;border-radius:4px;margin:20px 0}.loading{text-align:center;color:#00d4ff;padding:40px}</style></head><body><div class="container"><header><h1>Kalshi Real-Time Positions</h1><div id="timestamp" style="color:#66dd77;font-size:0.9em">Loading...</div></header><div style="text-align:center;margin-bottom:20px"><button class="btn" onclick="refreshDashboard()">Refresh</button><button class="btn" onclick="toggleAutoRefresh()">Auto-Refresh: ON</button></div><div id="content"></div></div><script>let autoRefreshEnabled=true,autoRefreshInterval=null;async function refreshDashboard(){const content=document.getElementById('content');content.innerHTML='<div class="loading">Loading...</div>';try{const r=await fetch('/api/trading/kalshi/realtime/dashboard');if(!r.ok)throw new Error('HTTP '+r.status);const data=await r.json();renderDashboard(data);document.getElementById('timestamp').textContent='Updated: '+new Date().toLocaleTimeString()}catch(e){content.innerHTML='<div class="error">Error: '+e.message+'</div>'}}function toggleAutoRefresh(){autoRefreshEnabled=!autoRefreshEnabled;const btn=event.target;btn.textContent=autoRefreshEnabled?'Auto-Refresh: ON':'Auto-Refresh: OFF';if(autoRefreshEnabled){autoRefreshInterval=setInterval(refreshDashboard,5000)}else{clearInterval(autoRefreshInterval)}}function renderDashboard(data){if(data.status==='no_positions'){document.getElementById('content').innerHTML='<div class="section"><h2>Portfolio</h2><p>No positions yet</p></div>';return}const s=data.stats||{};const p=data.positions||[];let html='<section class="section"><h2>Portfolio Summary</h2><div class="grid">';html+='<div class="card"><div class="label">Cost</div><div class="value">$'+(s.totalCost||0).toFixed(2)+'</div></div>';html+='<div class="card"><div class="label">Value</div><div class="value">$'+(s.totalValue||0).toFixed(2)+'</div></div>';html+='<div class="card"><div class="label">P&L</div><div class="value '+(s.totalUnrealizedPnL>=0?'':'negative')+'">$'+(s.totalUnrealizedPnL||0).toFixed(2)+'</div></div>';html+='<div class="card"><div class="label">ROI</div><div class="value '+(s.roi>=0?'':'negative')+'">'+(s.roi||0).toFixed(2)+'%</div></div>';html+='</div></section>';if(p.length>0){html+='<section class="section"><h2>Positions</h2><table><tr><th>Ticker</th><th>Side</th><th>Qty</th><th>Entry</th><th>Current</th><th>P&L</th><th>P&L%</th></tr>';for(const pos of p){const side=pos.side==='yes'?'YES':'NO';html+='<tr><td style="color:#00ffff;font-weight:bold">'+pos.ticker+'</td><td style="color:'+(pos.side==='yes'?'#00ff88':'#ff6688')+'">'+side+'</td>';html+='<td>'+Math.abs(pos.totalQuantity).toFixed(0)+'</td><td>$'+(pos.avgEntryPrice||0).toFixed(4)+'</td>';html+='<td>$'+(pos.currentPrice||0).toFixed(4)+'</td><td style="color:'+(pos.pnl>=0?'#00ff88':'#ff4466')+';font-weight:bold">$'+(pos.pnl||0).toFixed(2)+'</td>';html+='<td style="color:'+(pos.pnlPct>=0?'#00ff88':'#ff4466')+';font-weight:bold">'+(pos.pnlPct||0).toFixed(2)+'%</td></tr>'}html+='</table></section>'}document.getElementById('content').innerHTML=html}refreshDashboard();autoRefreshInterval=setInterval(refreshDashboard,5000)</script></body></html>
