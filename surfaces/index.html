<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lantern Trade Chat</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; }
    #statusStrip { display: flex; gap: 1rem; padding: 0.5rem; background: #f4f4f4; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; }
    .status-item { display: flex; gap: 0.25rem; }
    #transcript { border: 1px solid #ddd; border-radius: 4px; min-height: 300px; padding: 0.75rem; margin-bottom: 1rem; overflow-y: auto; }
    .composer { display: flex; gap: 0.5rem; }
    .composer input { flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
    .composer button { padding: 0.5rem 1rem; }
    .hint { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
    #loginBtn { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>Lantern Trade Chat</h1>

  <div id="statusStrip">
    <div class="status-item"><span>Env:</span><span id="envVal">paper</span></div>
    <div class="status-item"><span>Live:</span><span id="liveVal">off</span></div>
    <div class="status-item"><span>Kill switch:</span><span id="killVal">active</span></div>
  </div>

  <button id="loginBtn">Sign in with GitHub</button>

  <div id="transcript"></div>

  <form class="composer" onsubmit="return false;">
    <input id="msg" type="text" placeholder="buy 1 yes on TICKER at 40c" autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <p class="hint">Dry-run by default. Add <code>--live</code> to submit a real order (kill switch must be disarmed).</p>
</body>
</html>
