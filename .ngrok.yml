version: "3"
authtoken: ${NGROK_AUTHTOKEN}
log: stdout
log_level: info

tunnels:
  lantern-api:
    proto: http
    addr: 5000
    domain: ${NGROK_API_DOMAIN}
    bind_tls: true

  lantern-dashboard:
    proto: http
    addr: 4177
    domain: ${NGROK_DASHBOARD_DOMAIN}
    bind_tls: true

  lantern-browser:
    proto: http
    addr: 8765
    domain: ${NGROK_BROWSER_DOMAIN}
    bind_tls: true

  lantern-orchestrator:
    proto: http
    addr: 8000
    domain: ${NGROK_ORCHESTRATOR_DOMAIN}
    bind_tls: true

  lantern-rag:
    proto: http
    addr: 8767
    domain: ${NGROK_RAG_DOMAIN}
    bind_tls: true
