apiVersion: apps/v1
kind: Deployment
metadata:
  name: lantern-trade-chat
  namespace: lantern
  labels:
    app: lantern-trade-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lantern-trade-chat
  template:
    metadata:
      labels:
        app: lantern-trade-chat
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: app
          image: ghcr.io/alex-place/lantern-trade-chat:latest
          ports:
            - containerPort: 8080
          env:
            - name: KALSHI_ENVIRONMENT
              value: "prod"
            # Live trading is armed via this env. Keep "0" to run preview-only.
            - name: LANTERN_LIVE_ENABLED
              value: "0"
            - name: GITHUB_ALLOWED_LOGINS
              value: "alex-place"
          envFrom:
            - secretRef:
                name: lantern-trade-chat-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
