<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <link rel="manifest" href="/manifest.json">
  <script>
    /* Theme bootstrap — set before first paint to avoid flash of wrong theme */
    (function() {
      try {
        var stored = localStorage.getItem('lantern-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored ? stored === 'dark' : prefersDark;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/site.css">
  <title>Explore & Discover — Keystone OS</title>
  <style>
    .explore-hero {
      text-align: center;
      padding: 50px 20px 40px;
    }
    .explore-hero h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    .explore-hero .subtitle {
      font-size: 1rem;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── Single-pane ranked feed (#1217) ── */
    .feed-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 auto 24px;
      max-width: 920px;
    }
    .feed-chip {
      font: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .feed-chip:hover { border-color: var(--accent); color: var(--text); }
    .feed-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .feed-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .feed-stream {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      max-width: 920px;
      margin: 0 auto;
    }
    @media (min-width: 720px) { .feed-stream { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1100px) { .feed-stream { grid-template-columns: repeat(3, 1fr); } }

    .feed-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 16px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .feed-card:hover, .feed-card:focus-within {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .feed-card .fc-top {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .feed-card .fc-type { color: var(--accent); }
    .feed-card .fc-date { color: var(--muted); margin-left: auto; font-weight: 600; letter-spacing: 0; text-transform: none; }
    .feed-card .fc-title {
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      text-decoration: none;
    }
    .feed-card .fc-title:hover { color: var(--accent); }
    .feed-card .fc-why {
      font-size: 0.74rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .feed-card .fc-why .fc-src { color: var(--accent); font-weight: 700; }
    .feed-card .fc-dismiss {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
    }
    .feed-card:hover .fc-dismiss, .feed-card:focus-within .fc-dismiss { opacity: 1; }
    .feed-card .fc-dismiss:hover { background: var(--surface2); color: var(--text); }
    .feed-card .fc-dismiss:focus-visible { opacity: 1; outline: 2px solid var(--accent); }
    .feed-status { max-width: 920px; margin: 0 auto; color: var(--muted); font-size: 0.85rem; padding: 8px 0; }

    /* ── Infinite-scroll loading sentinel (endless feed) ── */
    .feed-sentinel {
      max-width: 920px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 28px;
      padding: 22px 0 40px;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .feed-sentinel::before {
      content: '';
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .feed-sentinel.is-loading::before { opacity: 1; animation: feed-spin 0.7s linear infinite; }
    @keyframes feed-spin { to { transform: rotate(360deg); } }

    /* ── Embed cards (#1217) — open-archive games + listening, rendered inline.
       Full-width "panels" with a small retro window chrome (a nod to the CSF/XP
       door) so an emulated DOS game or a public-domain record reads as a thing
       you operate, not a link you leave for. ── */
    .feed-card.is-embed {
      grid-column: 1 / -1;
      padding: 0;
      overflow: hidden;
      border-width: 2px;
    }
    .feed-card.is-embed:hover, .feed-card.is-embed:focus-within { transform: none; }
    .fc-embed-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent) 22%, var(--surface)) 0%,
        var(--surface) 100%);
      border-bottom: 1.5px solid var(--border);
    }
    .fc-embed-bar .fc-dots { display: flex; gap: 5px; }
    .fc-embed-bar .fc-dots i {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); display: inline-block;
    }
    .fc-embed-bar .fc-dots i:nth-child(1) { background: #ff5f57; }
    .fc-embed-bar .fc-dots i:nth-child(2) { background: #febc2e; }
    .fc-embed-bar .fc-dots i:nth-child(3) { background: #28c840; }
    .fc-embed-bar .fc-embed-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fc-embed-bar .fc-embed-src {
      margin-left: auto; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent);
      white-space: nowrap;
    }
    .feed-card.is-embed .fc-frame { background: #000; line-height: 0; }
    .feed-card.is-embed iframe { width: 100%; border: 0; display: block; }
    .feed-card.is-embed .fc-foot {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 14px 13px;
    }
    .feed-card.is-embed .fc-lore {
      font-size: 0.82rem; line-height: 1.5; color: var(--muted);
      font-style: italic; margin: 0; flex: 1;
    }
    .feed-card.is-embed .fc-why { padding: 0 14px 12px; }
    .feed-card.is-embed .fc-dismiss { opacity: 0.55; }

    /* ── Slim quick-links row — replaces the old static panel grid. ── */
    .quick-links {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 6px 18px;
      max-width: 920px; margin: 40px auto 0;
      padding: 18px 16px 4px;
      border-top: 1px solid var(--border);
    }
    .quick-links a {
      font-size: 0.8rem; font-weight: 600; color: var(--muted);
      text-decoration: none; transition: color 0.15s;
    }
    .quick-links a:hover { color: var(--accent); }
    .quick-links a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    .all-tools {
      max-width: 920px;
      margin: 48px auto 0;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .all-tools > summary {
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 14px 0;
      list-style: none;
    }
    .all-tools > summary::-webkit-details-marker { display: none; }
    .all-tools > summary::before { content: '▸ '; }
    .all-tools[open] > summary::before { content: '▾ '; }

    .explore-section {
      margin: 40px 0;
    }
    .explore-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .explore-panels {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 740px) {
      .explore-panels {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .panel {
      position: relative;
      padding: 20px 18px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.15s ease;
      outline: none;
    }
    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 12px 12px 0 0;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }
    .panel:hover,
    .panel:focus-visible {
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .panel:hover::before,
    .panel:focus-visible::before {
      transform: scaleX(1);
    }
    .panel:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .panel-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .panel-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: 6px;
    }
    .panel h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--text);
    }
    .panel p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
    }
    .panel-arrow {
      display: inline-block;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 8px;
    }

    .explore-info-box {
      max-width: 880px;
      margin: 0 auto;
      padding: 28px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .explore-info-box h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .explore-info-box p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }
    .explore-info-box p:last-of-type {
      margin-bottom: 0;
    }

    .video-embed {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .video-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-carousel {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 0 8px;
      -webkit-overflow-scrolling: touch;
    }
    .video-thumb {
      flex: 0 0 auto;
      width: 160px;
      cursor: pointer;
      padding: 0;
      text-align: left;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      color: inherit;
      font: inherit;
      transition: transform 0.15s, border-color 0.15s;
    }
    .video-thumb:hover,
    .video-thumb:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .video-thumb:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .video-thumb.active {
      border-color: var(--accent);
    }
    .video-thumb img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .video-thumb .vt-title {
      padding: 6px 8px;
      font-size: 0.75rem;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .discover-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 620px) {
      .discover-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 920px) {
      .discover-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .discover-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      transition: transform 0.15s, border-color 0.15s;
    }
    .discover-card:hover,
    .discover-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .discover-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .discover-card .dc-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .discover-card .dc-meta {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .discover-card .dc-source {
      color: var(--accent);
      font-weight: 700;
    }
    .discover-loading {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 6px 0;
    }

    .gh-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .gh-stars {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .gh-cta {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .gh-cta:hover {
      text-decoration: underline;
    }
    .gh-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 700px) {
      .gh-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .gh-col h3 {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 12px;
    }
    .gh-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .gh-item {
      display: flex;
      gap: 8px;
      align-items: baseline;
      color: inherit;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 4px 4px;
      border-radius: 4px;
      outline: none;
      transition: background-color 0.15s ease;
    }
    .gh-item:hover .gh-item-text,
    .gh-item:focus-visible .gh-item-text {
      color: var(--accent);
    }
    .gh-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .gh-tag {
      flex: 0 0 auto;
      font-family: ui-monospace, 'Courier New', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
    }
    .gh-item-text {
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gh-item-date {
      display: block;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .gh-loading {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 6px 0;
    }

    .support-tiers {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-top: 14px;
    }
    @media (min-width: 620px) {
      .support-tiers {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .tier-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s, border-color 0.15s;
    }
    .tier-card:hover,
    .tier-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .tier-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .tier-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .tier-price {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .tier-price span {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }
    .tier-perk {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Accessibility: Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Accessibility: High Contrast ── */
    @media (prefers-contrast: more) {
      .panel {
        border-width: 2px;
      }
      .panel:focus-visible {
        outline-width: 3px;
      }
      .discover-card:focus-visible,
      .video-thumb:focus-visible,
      .tier-card:focus-visible,
      .gh-item:focus-visible {
        outline-width: 3px;
      }
    }

    /* ── Accessibility: Forced Colors ── */
    @media (forced-colors: active) {
      .panel,
      .discover-card,
      .video-thumb,
      .tier-card {
        border: 2px solid CanvasText;
      }
      .panel::before,
      .discover-card::before,
      .video-thumb::before,
      .tier-card::before {
        background: CanvasText;
      }
    }
  </style>
</head>

<script>
/* Theme toggle event listener */
document.addEventListener('DOMContentLoaded', () => {
  const themeToggle = document.getElementById('theme-toggle');
  if (themeToggle && window.toggleTheme) {
    themeToggle.addEventListener('click', toggleTheme);
  }
});

/* Status connection indicator */
(async function() {
  const $ = id => document.getElementById(id);

  async function checkStatus() {
    const dot = $('status-dot');
    const label = $('status-label');
    if (!dot) return;
    try {
      const r = await fetch('/api/health', { cache: 'no-store', signal: AbortSignal.timeout(3000) });
      const data = r.ok ? await r.json() : null;
      const online = !!(data && data.ok);
      dot.className = online ? 'dot online' : 'dot offline';
      if (label) label.textContent = online ? 'Server online' : 'Server unreachable';
    } catch {
      dot.className = 'dot offline';
      if (label) label.textContent = 'Server unreachable';
    }
  }

  checkStatus();
  setInterval(checkStatus, 30000);
})();
</script>

<script>
/* Single ranked content pane (#1217) — /api/explore/feed.
   One PCSF-ranked stream of typed cards with filter chips. Every card carries a
   "why surfaced" line (the Verify rule, made visible). Click = engagement,
   ✕ = dismiss; both POST to /api/explore/interaction so the leaderboard learns. */
(function () {
  const stream = document.getElementById('feedStream');
  const statusEl = document.getElementById('feedStatus');
  const chips = document.getElementById('feedChips');
  if (!stream) return;

  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const ICON = { embed: '🕹️', read: '📰', watch: '🎬', build: '🛠️', doc: '📚', belief: '🌍', action: '⚡' };

  // Only http(s) and root-relative URLs are linkable. A card url is sourced from
  // 3rd-party RSS/API data, so a `javascript:`/`data:` scheme must never reach an
  // href (esc() escapes quotes but not the scheme). Anything else renders inert.
  const safeUrl = u => (/^https?:\/\//i.test(u) || /^\/[^/]/.test(u)) ? u : '#';

  // An embed src may only be a root-relative path (our own /t-rex/) or an https
  // archive.org/youtube embed URL. Anything else is dropped — never framed.
  const EMBED_HOSTS = /^https:\/\/(archive\.org|[a-z0-9-]+\.github\.io|www\.youtube(?:-nocookie)?\.com|player\.vimeo\.com)\//i;
  const safeEmbedSrc = u => (/^\/[^/]/.test(u) || EMBED_HOSTS.test(u)) ? u : '';

  function shortDate(d) {
    if (!d) return '';
    const t = typeof d === 'number' ? (d > 1e12 ? d : d * 1000) : Date.parse(d);
    if (!t || Number.isNaN(t)) return '';
    try { return new Date(t).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); }
    catch { return ''; }
  }

  function record(key, event, dwellMs) {
    if (!key) return;
    try {
      navigator.sendBeacon
        ? navigator.sendBeacon('/api/explore/interaction',
            new Blob([JSON.stringify({ key, event, dwellMs })], { type: 'application/json' }))
        : fetch('/api/explore/interaction', { method: 'POST', keepalive: true,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, event, dwellMs }) });
    } catch (e) { /* non-blocking */ }
  }

  let filter = 'all';
  const seen = new Set();            // stable card ids already shown (dedup across pages)
  let loading = false, totalShown = 0, cycles = 0;

  // Dwell = the engagement signal for embeds (they have no click-through). When a
  // panel sits ≥50% on-screen for 4s, that's a real "watched it" outcome → record
  // a success once. Scroll past and it never scores → it sinks (engagement or
  // discarded). One-shot per key per page load.
  const dwellDone = new Set();
  const dwellObserver = ('IntersectionObserver' in window) ? new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      const el = entry.target;
      const key = el.dataset.key;
      if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
        if (el._dwellTimer || !key || dwellDone.has(key)) return;
        el._dwellTimer = setTimeout(() => {
          el._dwellTimer = null;
          if (dwellDone.has(key)) return;
          dwellDone.add(key);
          record(key, 'dwell', 4000);
          dwellObserver.unobserve(el);
        }, 4000);
      } else if (el._dwellTimer) {
        clearTimeout(el._dwellTimer); el._dwellTimer = null;
      }
    });
  }, { threshold: [0, 0.5, 1] }) : null;

  function cardEl(c) {
    const el = document.createElement('div');
    el.dataset.type = c.type;
    el.dataset.key = c.key || '';
    const why = c.evidence && c.evidence.why ? c.evidence.why : '';
    const embedSrc = (c.embed && c.embed.src) ? safeEmbedSrc(c.embed.src) : '';

    if (embedSrc) {
      // Open-archive game / listening panel — framed inline with a small window
      // chrome. The iframe is sandboxed; archive.org runs on its own origin.
      el.className = 'feed-card is-embed';
      const h = Math.max(120, Math.min(720, (+c.embed.height) || 360));
      const openHref = safeUrl(c.url);
      el.innerHTML =
        '<div class="fc-embed-bar">' +
          '<span class="fc-dots" aria-hidden="true"><i></i><i></i><i></i></span>' +
          '<span class="fc-embed-title">' + (ICON[c.type] || '🕹️') + ' ' + esc(c.title) + '</span>' +
          '<span class="fc-embed-src">' + esc(c.source) + '</span>' +
          '<button type="button" class="fc-dismiss" aria-label="Dismiss this card" title="Show less like this">✕</button>' +
        '</div>' +
        '<div class="fc-frame"><iframe src="' + esc(embedSrc) + '" style="height:' + h + 'px" ' +
          'loading="lazy" title="' + esc(c.title) + '" ' +
          'allow="autoplay; fullscreen; gamepad" referrerpolicy="no-referrer" ' +
          'sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock"></iframe></div>' +
        (c.lore ? '<div class="fc-foot"><p class="fc-lore">' + esc(c.lore) + '</p></div>' : '') +
        '<div class="fc-why"><span class="fc-src">' + esc(c.source) + '</span>' + (why ? ' — ' + esc(why) : '') +
          (openHref !== '#' ? ' · <a class="fc-open" href="' + esc(openHref) + '" target="_blank" rel="noopener noreferrer">open ↗</a>' : '') +
        '</div>';
      const open = el.querySelector('.fc-open');
      if (open) open.addEventListener('click', () => record(c.key, 'click', 0));
      if (dwellObserver) dwellObserver.observe(el);
    } else {
      el.className = 'feed-card';
      const href = safeUrl(c.url);
      const ext = /^https?:/i.test(href);
      const date = shortDate(c.published);
      el.innerHTML =
        '<div class="fc-top"><span class="fc-type">' + (ICON[c.type] || '•') + ' ' + esc(c.type) + '</span>' +
          (date ? '<span class="fc-date">' + esc(date) + '</span>' : '') + '</div>' +
        '<a class="fc-title" href="' + esc(href) + '"' + (ext ? ' target="_blank" rel="noopener noreferrer"' : '') + '>' +
          esc(c.title) + '</a>' +
        '<div class="fc-why"><span class="fc-src">' + esc(c.source) + '</span>' + (why ? ' — ' + esc(why) : '') + '</div>' +
        '<button type="button" class="fc-dismiss" aria-label="Dismiss this card" title="Show less like this">✕</button>';
      el.querySelector('.fc-title').addEventListener('click', () => record(c.key, 'click', 0));
    }

    el.querySelector('.fc-dismiss').addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      record(c.key, 'dismiss', 0);
      if (el._dwellTimer) { clearTimeout(el._dwellTimer); el._dwellTimer = null; }
      if (dwellObserver) dwellObserver.unobserve(el);
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 150);
    });
    return el;
  }

  // ── Endless scroll (TikTok / YouTube-Shorts-style) ──
  // The feed never loads all at once. Each page is a FRESH server re-rank that
  // already reflects the dwell/click/dismiss recorded on the cards above it — so
  // your engagement steers what loads next. When the bounded catalog is
  // exhausted the server cycles, so the scroll never ends. We append (never
  // rebuild) and dedupe by stable card id; a bottom sentinel pulls the next page
  // as it nears the viewport. /api/explore/feed/page → lib/explore-feed pagedFeed.
  let filterEpoch = 0;        // bumped on filter change to cancel in-flight pages
  const PAGE = 9;
  const MAX_CYCLES = 2;       // after looping the catalog this many times, stop auto-loading

  // Sentinel below the stream — when it nears view, pull the next page.
  const sentinel = document.createElement('div');
  sentinel.className = 'feed-sentinel';
  sentinel.setAttribute('aria-hidden', 'true');
  stream.after(sentinel);

  function appendCards(cards) {
    const frag = document.createDocumentFragment();
    cards.forEach(c => { seen.add(c.id || c.key); frag.appendChild(cardEl(c)); });
    stream.appendChild(frag);
    totalShown += cards.length;
  }

  async function loadPage() {
    if (loading) return;
    loading = true;
    const epoch = filterEpoch;
    sentinel.classList.add('is-loading');
    if (statusEl && !totalShown) statusEl.textContent = 'Loading your feed…';
    try {
      const r = await fetch('/api/explore/feed/page', {
        method: 'POST', cache: 'no-store',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ seen: [...seen], limit: PAGE, type: filter === 'all' ? null : filter }),
      });
      const data = r.ok ? await r.json() : null;
      if (epoch !== filterEpoch) return;                 // a filter change superseded this page
      const cards = (data && data.cards) || [];
      if (data && data.cycled) { cycles++; seen.clear(); } // endless: re-serve a fresh cycle
      if (!cards.length) {
        if (io) io.unobserve(sentinel);
        if (statusEl) statusEl.textContent = totalShown ? '' : 'No content available right now.';
        return;
      }
      appendCards(cards);
      if (cycles >= MAX_CYCLES) {                          // looped the catalog enough — stop pulling
        if (io) io.unobserve(sentinel);
        if (statusEl) statusEl.textContent = totalShown + " loaded · you're all caught up";
      } else if (statusEl) {
        statusEl.textContent = (filter === 'all'
          ? totalShown + ' loaded · ranked by your engagement'
          : totalShown + ' ' + filter) + ' — keep scrolling';
      }
    } catch (e) {
      if (statusEl) statusEl.textContent = totalShown ? '' : 'Feed is offline right now — use the quick links below.';
    } finally {
      if (epoch === filterEpoch) loading = false;
      sentinel.classList.remove('is-loading');
    }
  }

  const io = ('IntersectionObserver' in window)
    ? new IntersectionObserver((entries) => {
        if (entries.some(e => e.isIntersecting)) loadPage();
      }, { rootMargin: '700px 0px' })
    : null;

  function reset() {
    filterEpoch++;
    loading = false; totalShown = 0; cycles = 0;
    seen.clear();
    if (dwellObserver) dwellObserver.disconnect();
    stream.innerHTML = '';
    if (io) { io.unobserve(sentinel); io.observe(sentinel); }
    loadPage();
  }

  if (chips) {
    chips.addEventListener('click', (e) => {
      const btn = e.target.closest('.feed-chip');
      if (!btn || btn.dataset.type === filter) return;
      filter = btn.dataset.type;
      chips.querySelectorAll('.feed-chip').forEach(b => {
        const on = b === btn;
        b.classList.toggle('active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      reset();
    });
  }

  // Kick off, then keep the sentinel observed. Fallback for no IntersectionObserver.
  loadPage();
  if (io) io.observe(sentinel);
  else window.addEventListener('scroll', () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 700) loadPage();
  }, { passive: true });
})();
</script>
</body>
</html>
