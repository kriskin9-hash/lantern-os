<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <title>API Keys Settings — Lantern OS</title>
  <link rel="stylesheet" href="/css/site.css">
  <style>
    .settings-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .api-keys-section {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .api-key-item {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 16px;
      padding: 16px;
      margin-bottom: 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      align-items: center;
    }

    .api-key-provider {
      font-weight: 600;
      font-size: 14px;
      text-align: center;
    }

    .api-key-controls {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
    }

    .api-key-input {
      font-family: monospace;
      font-size: 12px;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
    }

    .api-key-masked {
      display: inline-block;
      font-family: monospace;
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:hover {
      background: var(--bg-secondary);
      border-color: var(--accent);
    }

    .btn-test {
      background: rgba(34, 197, 94, 0.1);
      border-color: #22c55e;
      color: #22c55e;
    }

    .btn-test:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .btn-save {
      background: rgba(59, 130, 246, 0.1);
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .btn-save:hover {
      background: rgba(59, 130, 246, 0.2);
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-connected {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .status-disconnected {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .status-testing {
      background: rgba(251, 146, 60, 0.2);
      color: #fb923c;
    }

    .mode-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
    }

    .settings-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .settings-header h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
    }

    .settings-header p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
    }

    .toggle-visibility {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 16px;
      padding: 4px;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a class="nav-brand" href="/trader-dashboard.html">
      <img src="/mandala.svg" alt="" aria-hidden="true" style="width:24px;height:24px;vertical-align:middle">
      <span style="font-size:18px;font-weight:600">Lantern OS</span>
    </a>
    <div class="nav-links">
      <a href="/dream-chat.html" style="font-size:16px;padding:12px 16px">⚙️ Work</a>
      <a href="/trader-dashboard.html" style="font-size:16px;padding:12px 16px">📈 Trade</a>
      <a href="/create.html" style="font-size:16px;padding:12px 16px">✏️ Create</a>
    </div>
    <div class="nav-actions">
      <button class="nav-btn" id="theme-toggle" aria-label="Toggle light/dark mode" title="Light/Dark Mode">🌙</button>
      <button class="nav-btn" id="settings-btn" aria-label="API Keys" title="Settings" style="text-decoration: underline">⚙️</button>
    </div>
  </nav>

  <div class="settings-container">
    <div class="settings-header">
      <h1>API Keys</h1>
      <p>Save and test your AI provider keys. Keys are stored locally and never sent to our servers.</p>
    </div>

    <div class="api-keys-section">
      <div class="api-key-item">
        <div class="api-key-provider">🤖 Claude</div>
        <div class="api-key-controls">
          <div class="input-group" style="position: relative">
            <input type="password" class="api-key-input" id="key-claude" placeholder="sk-ant-..." autocomplete="off">
            <button class="toggle-visibility" onclick="toggleVisibility('key-claude')">👁️</button>
          </div>
          <button class="btn-small btn-test" onclick="testKey('claude')">Test</button>
          <button class="btn-small btn-save" onclick="saveKey('claude')">Save</button>
          <span class="status-badge" id="status-claude">Checking...</span>
        </div>
      </div>

      <div class="api-key-item">
        <div class="api-key-provider">🌐 Gemini</div>
        <div class="api-key-controls">
          <div class="input-group" style="position: relative">
            <input type="password" class="api-key-input" id="key-gemini" placeholder="AIza..." autocomplete="off">
            <button class="toggle-visibility" onclick="toggleVisibility('key-gemini')">👁️</button>
          </div>
          <button class="btn-small btn-test" onclick="testKey('gemini')">Test</button>
          <button class="btn-small btn-save" onclick="saveKey('gemini')">Save</button>
          <span class="status-badge" id="status-gemini">Checking...</span>
        </div>
      </div>

      <div class="api-key-item">
        <div class="api-key-provider">💬 ChatGPT</div>
        <div class="api-key-controls">
          <div class="input-group" style="position: relative">
            <input type="password" class="api-key-input" id="key-openai" placeholder="sk-..." autocomplete="off">
            <button class="toggle-visibility" onclick="toggleVisibility('key-openai')">👁️</button>
          </div>
          <button class="btn-small btn-test" onclick="testKey('openai')">Test</button>
          <button class="btn-small btn-save" onclick="saveKey('openai')">Save</button>
          <span class="status-badge" id="status-openai">Checking...</span>
        </div>
      </div>

      <div class="api-key-item">
        <div class="api-key-provider">𝕏 Grok</div>
        <div class="api-key-controls">
          <div class="input-group" style="position: relative">
            <input type="password" class="api-key-input" id="key-grok" placeholder="sk-..." autocomplete="off">
            <button class="toggle-visibility" onclick="toggleVisibility('key-grok')">👁️</button>
          </div>
          <button class="btn-small btn-test" onclick="testKey('grok')">Test</button>
          <button class="btn-small btn-save" onclick="saveKey('grok')">Save</button>
          <span class="status-badge" id="status-grok">Checking...</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const theme = document.documentElement.getAttribute('data-theme');
      const newTheme = theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      document.getElementById('theme-toggle').textContent = newTheme === 'dark' ? '🌙' : '☀️';
    });

    // Load theme preference
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-toggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

    // Toggle password visibility
    function toggleVisibility(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Save API key
    function saveKey(provider) {
      const keyId = `key-${provider}`;
      const input = document.getElementById(keyId);
      const key = input.value.trim();

      if (!key) {
        alert('Please enter an API key');
        return;
      }

      // Store in localStorage (client-side only)
      localStorage.setItem(`api_key_${provider}`, key);

      // Mask the input after saving
      const masked = '••••••••' + key.slice(-4);
      input.placeholder = masked;
      input.value = '';

      updateStatus(provider, 'connected');
      alert(`${provider} key saved locally`);
    }

    // Test API key
    async function testKey(provider) {
      const statusEl = document.getElementById(`status-${provider}`);
      statusEl.textContent = 'Testing...';
      statusEl.className = 'status-badge status-testing';

      try {
        const response = await fetch(`/api/providers/test/${provider}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });

        if (response.ok) {
          updateStatus(provider, 'connected');
          alert(`✓ ${provider} key is valid`);
        } else {
          updateStatus(provider, 'disconnected');
          alert(`✗ ${provider} key failed validation`);
        }
      } catch (error) {
        updateStatus(provider, 'disconnected');
        alert(`✗ Test failed: ${error.message}`);
      }
    }

    // Update status badge
    function updateStatus(provider, status) {
      const statusEl = document.getElementById(`status-${provider}`);
      if (status === 'connected') {
        statusEl.textContent = 'Connected';
        statusEl.className = 'status-badge status-connected';
      } else {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'status-badge status-disconnected';
      }
    }

    // Load initial key status
    ['claude', 'gemini', 'openai', 'grok'].forEach(provider => {
      const key = localStorage.getItem(`api_key_${provider}`);
      if (key) {
        updateStatus(provider, 'connected');
        const masked = '••••••••' + key.slice(-4);
        document.getElementById(`key-${provider}`).placeholder = masked;
      } else {
        updateStatus(provider, 'disconnected');
      }
    });
  </script>
</body>
</html>
