<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff424d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Dream Journal</title>
  <link rel="stylesheet" href="css/dream-chat.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
    }
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2332;
      --border: #1f2937;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #ff424d;
      --accent-hover: #ff5a63;
    }

    /* Modern minimal header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .header-brand-icon { font-size: 20px; }
    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 16px;
    }
    .icon-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* Main container */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Messages area - clean and spacious */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 40px;
    }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-state h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    .empty-state p {
      color: var(--muted);
      max-width: 300px;
      line-height: 1.5;
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { justify-content: flex-end; }
    .message-content {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user .message-content {
      background: var(--accent);
      color: white;
    }
    .message.agent .message-content {
      background: var(--surface2);
      color: var(--text);
    }

    /* Input area - modern and prominent */
    .input-container {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-field {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
      resize: none;
      max-height: 100px;
    }
    .input-field:focus {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .input-field::placeholder { color: var(--muted); }
    .send-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 18px;
    }
    .send-button:hover { background: var(--accent-hover); }
    .send-button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Modal overlays */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      max-height: 80vh;
      overflow-y: auto;
      margin-left: auto;
      margin-right: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .modal-overlay.open .modal-content {
      transform: translateY(0);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Form elements */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
    }
    .form-input::placeholder { color: var(--muted); }

    /* Settings card */
    .setting-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .setting-card-icon { font-size: 20px; }
    .setting-card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .setting-card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .setting-card-status {
      font-size: 12px;
      color: var(--muted);
    }
    .setting-card-status.ok { color: #34d399; }
    .setting-card-status.err { color: var(--accent); }

    /* Button styles */
    .button-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .button-primary:hover { background: var(--accent-hover); }
    .button-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .button-secondary:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Streaming cursor */
    .stream-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Quick-start chips */
    .starter-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
    .starter-chip {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.82rem; font-family: inherit;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .starter-chip:hover { border-color: var(--accent); color: var(--text); }

    /* Error / muted agent text */
    .message.agent.error .message-content { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <a href="/" style="font-size:16px;color:var(--muted);text-decoration:none;padding:4px 6px;border-radius:6px;transition:color 0.15s;margin-right:4px" title="Home">←</a>
      <img src="/mandala.svg" class="mandala-icon" alt="" aria-hidden="true" style="width:22px;height:22px;vertical-align:middle">
      <span>Dream Journal</span>
      <span id="header-status" style="font-size:11px;color:var(--muted);margin-left:8px;display:none">· connecting…</span>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
      <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Theme">🌙</button>
      <a href="/" class="icon-btn" title="Home" style="text-decoration:none;font-size:13px;color:var(--muted);">⌂</a>
    </div>
  </header>

  <!-- Chat area -->
  <div class="chat-container" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon" style="opacity:0.9"><img src="/mandala.svg" alt="" aria-hidden="true" style="width:64px;height:64px;display:block"></div>
      <h2>What's on your mind?</h2>
      <p>Write a dream, a reflection, or anything you want to explore. Your journal stays private on your device.</p>
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;margin-top:8px">
        <button onclick="fillPrompt('Last night I dreamed that ')" style="background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);cursor:pointer;text-align:left;font-size:13px;transition:border-color 0.15s;font-family:inherit" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">💭 Record a dream…</button>
        <button onclick="fillPrompt('I keep having a recurring dream about ')" style="background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);cursor:pointer;text-align:left;font-size:13px;transition:border-color 0.15s;font-family:inherit" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">🔄 Explore a recurring dream…</button>
        <button onclick="fillPrompt('What does it mean when you dream about ')" style="background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);cursor:pointer;text-align:left;font-size:13px;transition:border-color 0.15s;font-family:inherit" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">✨ Ask about a dream symbol…</button>
        <button onclick="fillAndSend('!three-doors')" style="background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);cursor:pointer;text-align:left;font-size:13px;transition:border-color 0.15s;font-family:inherit" onmouseover="this.style.borderColor='#a78bfa'" onmouseout="this.style.borderColor='var(--border)'" title="Play Three Doors">🚪 Play Three Doors game…</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-container">
    <div class="input-wrapper">
      <textarea id="input" class="input-field" placeholder="Write your dream, ask a question…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button class="send-button" id="send-btn" onclick="sendMessage()" title="Send">↑</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal" onclick="if(event.target===event.currentTarget) closeSettings()">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">AI Provider</label>
        <select id="provider-select" class="form-input">
          <option value="">Auto (pick best)</option>
          <option value="claude">Claude</option>
          <option value="openai">ChatGPT</option>
          <option value="gemini">Gemini</option>
          <option value="grok">Grok</option>
          <option value="ollama">Local (Ollama)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">API Keys</label>
        <div class="setting-card">
          <span class="setting-card-icon">✦</span>
          <div class="setting-card-info">
            <div class="setting-card-title">Claude</div>
            <div class="setting-card-status" id="status-claude">Not configured</div>
          </div>
        </div>
        <input type="password" id="key-claude" class="form-input" placeholder="ANTHROPIC_API_KEY" onchange="saveKey('claude','ANTHROPIC_API_KEY','key-claude')">
      </div>

      <div class="form-group">
        <div class="setting-card">
          <span class="setting-card-icon">🌐</span>
          <div class="setting-card-info">
            <div class="setting-card-title">Gemini</div>
            <div class="setting-card-status" id="status-gemini">Not configured</div>
          </div>
        </div>
        <input type="password" id="key-gemini" class="form-input" placeholder="GEMINI_API_KEY" onchange="saveKey('gemini','GEMINI_API_KEY','key-gemini')">
      </div>

      <div class="form-group">
        <div class="setting-card">
          <span class="setting-card-icon">◈</span>
          <div class="setting-card-info">
            <div class="setting-card-title">ChatGPT</div>
            <div class="setting-card-status" id="status-openai">Not configured</div>
          </div>
        </div>
        <input type="password" id="key-openai" class="form-input" placeholder="OPENAI_API_KEY" onchange="saveKey('openai','OPENAI_API_KEY','key-openai')">
      </div>

      <div class="form-group">
        <div class="setting-card">
          <span class="setting-card-icon">𝕏</span>
          <div class="setting-card-info">
            <div class="setting-card-title">Grok</div>
            <div class="setting-card-status" id="status-grok">Not configured</div>
          </div>
        </div>
        <input type="password" id="key-grok" class="form-input" placeholder="XAI_API_KEY" onchange="saveKey('grok','XAI_API_KEY','key-grok')">
      </div>

      <hr style="border: none; border-top: 1px solid var(--border); margin: 8px 0;">

      <div class="form-group">
        <label class="form-label">Dream Actions</label>
        <button class="button-primary" onclick="openLogDream()" style="width: 100%;">+ Record a Dream</button>
      </div>
    </div>
  </div>
</div>

<script src="js/dream-chat.js"></script>
<script>
  // ── Theme toggle ───────────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const next = (html.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('lantern-theme', next);
    updateThemeIcon();
  }
  function updateThemeIcon() {
    const btn = document.getElementById('theme-toggle');
    btn.textContent = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? '☀️' : '🌙';
  }
  updateThemeIcon();

  // ── Modal controls ─────────────────────────────────────────────────
  function openSettings() { document.getElementById('settings-modal').classList.add('open'); }
  function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
  function openLogDream() { alert('Dream logging coming soon'); closeSettings(); }
  function saveKey() {}

  // ── Conversation state ─────────────────────────────────────────────
  let isSending = false;
  const history = [];

  // Fallback messages — shown ONLY when all providers fail (never as a normal reply)
  const FALLBACKS = [
    "The lantern flickers. No model responded — is Ollama running? (ollama serve)",
    "Dream interpreter offline. Add an API key in Settings, or start your local models.",
    "All paths are quiet right now. Try again in a moment, or check Settings.",
    "The thread went dark. Ollama may be starting up — give it a moment and retry.",
    "No provider answered. Check Settings for API keys, or run: ollama pull lantern-csf-dream",
  ];

  // ── Quick-start chip fill ──────────────────────────────────────────
  function fillPrompt(text) {
    const input = document.getElementById('input');
    input.value = text;
    input.focus();
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  }

  function fillAndSend(text) {
    const input = document.getElementById('input');
    input.value = text;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    sendMessage();
  }

  // ── DOM helpers ────────────────────────────────────────────────────
  function hideEmptyState() {
    const el = document.getElementById('empty-state');
    if (el) el.style.display = 'none';
  }


  function addUserBubble(text) {
    hideEmptyState();
    const container = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'message user';
    msg.innerHTML = `<div class="message-content">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function createAgentBubble(isError) {
    const container = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'message agent' + (isError ? ' error' : '');
    const bubble = document.createElement('div');
    bubble.className = 'message-content';
    const cursor = document.createElement('span');
    cursor.className = 'stream-cursor';
    bubble.appendChild(cursor);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return { msg, bubble, cursor };
  }

  // ── Main send ──────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || isSending) return;

    isSending = true;
    document.getElementById('send-btn').disabled = true;

    addUserBubble(text);
    input.value = '';
    input.style.height = 'auto';
    history.push({ role: 'user', text });

    const { msg, bubble, cursor } = createAgentBubble(false);
    const container = document.getElementById('messages');

    let fullText = '';
    let didError = false;

    try {
      const provider = document.getElementById('provider-select')?.value || '';
      const resp = await fetch('/api/dream/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          user: 'dream-chat',
          agent: '',
          provider,
          history: history.slice(-10),
        }),
        signal: AbortSignal.timeout(90000),
      });

      if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            if (evt.type === 'token' && evt.text) {
              fullText += evt.text;
              cursor.remove();
              // Strip [DOORS:...] during streaming
              bubble.textContent = fullText.replace(/\[DOORS:[^\]]*\]?/i, '').trimEnd();
              bubble.appendChild(cursor);
              container.scrollTop = container.scrollHeight;
            } else if (evt.type === 'error') {
              // Server reported an error — may be followed by local fallback tokens, so don't stop
              didError = true;
              if (!fullText) {
                bubble.style.color = 'var(--muted)';
              }
            } else if (evt.type === 'done' && evt.cleanText) {
              fullText = evt.cleanText;
            }
          } catch { /* skip malformed line */ }
        }
      }
    } catch (e) {
      didError = true;
    }

    // Remove streaming cursor
    cursor.remove();

    if (!fullText) {
      // All providers failed — show random fallback as an error note
      fullText = FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
      msg.classList.add('error');
      bubble.style.color = 'var(--muted)';
      bubble.style.fontStyle = 'italic';
    }

    bubble.textContent = fullText;

    if (!didError) {
      history.push({ role: 'assistant', text: fullText });
    }

    isSending = false;
    document.getElementById('send-btn').disabled = false;
  }

  // ── Auto-expand textarea ───────────────────────────────────────────
  document.getElementById('input').addEventListener('input', e => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  });
</script>
<script src="js/convergance-sync.js"></script>
</body>
</html>
