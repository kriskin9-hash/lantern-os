<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dream Journal — Lantern OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e8eaf6;
      --muted: #8891b4;
      --accent: #7c6af7;
      --accent-dim: #4a4280;
      --user-bubble: #1e2440;
      --agent-bubble: #13161f;
      --cursor: #7c6af7;
      --green: #4caf82;
      --danger: #e05555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .title-block h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .title-block p {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.online { background: var(--green); }
    .dot.thinking {
      background: var(--accent);
      animation: pulse 0.9s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 16px;
    }
    .msg-row.user { align-items: flex-end; }
    .msg-row.agent { align-items: flex-start; }

    .msg-label {
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bubble {
      max-width: 86%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.58;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }
    .msg-row.agent .bubble {
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--cursor);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 2px 4px;
      margin-top: 4px;
    }
    .suggestion {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.82rem;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .suggestion:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    /* Source badge */
    .source-badge {
      font-size: 0.68rem;
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      align-self: flex-start;
      margin-top: 4px;
    }
    .source-badge.offline { color: var(--muted); }
    .source-badge.anthropic { color: var(--accent); }
    .source-badge.ollama { color: var(--green); }

    /* Thinking indicator */
    .thinking-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 8px 4px;
    }
    .thinking-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Error notice */
    .error-notice {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      padding: 2px 4px;
    }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--accent);
    }
    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 24px;
      max-height: 160px;
      overflow-y: auto;
    }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover { background: #6a59e0; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state h2 { font-size: 1.2rem; color: var(--text); }
    .empty-state p { font-size: 0.88rem; max-width: 380px; }
    .starter-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🔮</div>
    <div class="title-block">
      <h1>Dream Journal</h1>
      <p>Lantern OS · private · local</p>
    </div>
    <div class="status-dot">
      <div class="dot" id="status-dot"></div>
      <span id="status-label">connecting…</span>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">🌙</div>
      <h2>The dream door is open.</h2>
      <p>Tell me what you brought back from sleep. I am here, local, and private.</p>
      <div class="starter-chips">
        <button class="suggestion" onclick="sendStarter(this)">I had a dream last night</button>
        <button class="suggestion" onclick="sendStarter(this)">Mirror my last dream</button>
        <button class="suggestion" onclick="sendStarter(this)">Tell me about the doors</button>
        <button class="suggestion" onclick="sendStarter(this)">What are my recent dreams?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Tell me a dream…"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for newline</p>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const statusDot = document.getElementById("status-dot");
  const statusLabel = document.getElementById("status-label");
  const emptyState = document.getElementById("empty-state");

  let isStreaming = false;
  let currentEs = null;
  let serverBase = window.location.origin;  // same origin — server.js serves this file

  // ── Status check ──────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const r = await fetch(`${serverBase}/api/status`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) {
        statusDot.className = "dot online";
        statusLabel.textContent = "online";
        return true;
      }
    } catch {}
    statusDot.className = "dot";
    statusLabel.textContent = "offline mode";
    return false;
  }
  checkStatus();

  // ── Auto-resize textarea ──────────────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Suggestion / starter chips ────────────────────────────────────────
  function sendStarter(btn) {
    inputEl.value = btn.textContent.trim();
    sendMessage();
  }

  // ── Send ──────────────────────────────────────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    // Hide empty state
    if (emptyState) emptyState.style.display = "none";

    // Show user bubble
    appendUserBubble(text);

    // Clear input
    inputEl.value = "";
    inputEl.style.height = "auto";

    // Stream agent response
    streamAgentResponse(text);
  }

  // ── Append user bubble ────────────────────────────────────────────────
  function appendUserBubble(text) {
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `
      <div class="msg-label">You</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  // ── Stream agent response ─────────────────────────────────────────────
  function streamAgentResponse(message) {
    isStreaming = true;
    sendBtn.disabled = true;
    setThinking(true);

    // Create the agent row with empty bubble + cursor
    const row = document.createElement("div");
    row.className = "msg-row agent";

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = "Dream Journal";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const cursor = document.createElement("span");
    cursor.className = "cursor";
    bubble.appendChild(cursor);

    row.appendChild(label);
    row.appendChild(bubble);
    messagesEl.appendChild(row);

    scrollToBottom();

    let fullText = "";
    let thinkingShown = true;

    // Use fetch + ReadableStream for SSE (works cross-browser, same-origin)
    const url = `${serverBase}/api/dream/stream?message=${encodeURIComponent(message)}`;

    fetch(url)
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.body;
      })
      .then((body) => {
        const reader = body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) {
              finishStream(row, bubble, cursor, fullText, "done");
              return;
            }

            buf += decoder.decode(value, { stream: true });
            const lines = buf.split("\n");
            buf = lines.pop(); // keep incomplete line

            for (const line of lines) {
              if (!line.startsWith("data:")) continue;
              const raw = line.slice(5).trim();
              if (!raw) continue;
              try {
                const evt = JSON.parse(raw);

                if (evt.token !== undefined) {
                  // First token — remove thinking indicator, show cursor in bubble
                  if (thinkingShown) {
                    thinkingShown = false;
                    setThinking(false);
                  }
                  fullText += evt.token;
                  // Update bubble text before cursor
                  cursor.remove();
                  bubble.textContent = fullText;
                  bubble.appendChild(cursor);
                  scrollToBottom();
                }

                if (evt.suggestions) {
                  appendSuggestions(row, evt.suggestions);
                }

                if (evt.error) {
                  appendErrorNotice(row, evt.error);
                }

                if (evt.done) {
                  finishStream(row, bubble, cursor, fullText, evt.source);
                }
              } catch { /* skip malformed */ }
            }

            read();
          }).catch(() => finishStream(row, bubble, cursor, fullText, "error"));
        }

        read();
      })
      .catch((err) => {
        setThinking(false);
        bubble.textContent = "Something tangled. The dream door stays open — try again.";
        cursor.remove();
        finishStream(row, bubble, cursor, "", "error");
      });
  }

  function finishStream(row, bubble, cursor, text, source) {
    cursor.remove();
    if (!text) {
      bubble.textContent = bubble.textContent || "…";
    }
    // Add source badge
    if (source && source !== "error") {
      const badge = document.createElement("div");
      badge.className = `source-badge ${source}`;
      badge.textContent = source === "offline" ? "✦ offline mode" :
                          source === "anthropic" ? "✦ claude" :
                          source === "ollama" ? "✦ ollama" : `✦ ${source}`;
      row.appendChild(badge);
    }
    isStreaming = false;
    sendBtn.disabled = false;
    setThinking(false);
    statusDot.className = "dot online";
    statusLabel.textContent = "online";
    scrollToBottom();
  }

  function appendSuggestions(row, suggestions) {
    const container = document.createElement("div");
    container.className = "suggestions";
    for (const s of suggestions) {
      const btn = document.createElement("button");
      btn.className = "suggestion";
      btn.textContent = s;
      btn.onclick = () => {
        inputEl.value = s;
        sendMessage();
      };
      container.appendChild(btn);
    }
    row.appendChild(container);
  }

  function appendErrorNotice(row, msg) {
    const n = document.createElement("div");
    n.className = "error-notice";
    n.textContent = `Note: ${msg}`;
    row.appendChild(n);
  }

  function setThinking(thinking) {
    if (thinking) {
      statusDot.className = "dot thinking";
      statusLabel.textContent = "thinking…";
    } else {
      statusDot.className = "dot online";
      statusLabel.textContent = "online";
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s) {
    return s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
