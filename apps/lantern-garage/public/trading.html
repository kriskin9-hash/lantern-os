<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading Desk — Zones</title>
<!-- No Chart.js — zone ladder is pure CSS/HTML -->

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg0:#0a0c0f;--bg1:#111318;--bg2:#181c22;--bg3:#1f242d;
    --border:#252b35;--text0:#e8eaf0;--text1:#9aa0ad;--text2:#5c6370;
    --green:#00d4aa;--red:#ff5f6d;--amber:#f5a623;--blue:#4a9eff;
    --purple:#a78bfa;--gold:#f5a623;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  html,body{height:100%;background:var(--bg0);color:var(--text0);font-family:var(--sans);font-size:13px;overflow-x:hidden}
  /* ── Layout ── */
  .layout{display:grid;grid-template-columns:180px 1fr;grid-template-rows:52px 1fr auto;height:100vh}
  .header{grid-column:1/-1;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 18px}
  .sidebar{background:var(--bg1);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
  .main{overflow-y:auto;padding:12px;background:var(--bg0)}
  .footer{grid-column:1/-1;background:var(--bg1);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 260px;gap:1px;max-height:180px}
  /* ── Header ── */
  .logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green);letter-spacing:.08em;white-space:nowrap}
  .logo span{color:var(--text1);font-weight:400}
  .hstat{font-family:var(--mono);font-size:10px;display:flex;flex-direction:column;gap:1px;min-width:80px}
  .hstat .l{color:var(--text2);font-size:8px;text-transform:uppercase;letter-spacing:.1em}
  .hstat .v{color:var(--text0)}
  .hstat .pos{color:var(--green)}.hstat .neg{color:var(--red)}
  .badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:.1em}
  .badge-paper{background:rgba(245,166,35,.15);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;margin-left:auto}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .news-btn{font-family:var(--mono);font-size:9px;padding:3px 10px;border-radius:3px;border:1px solid var(--border);background:var(--bg2);color:var(--text1);text-decoration:none;cursor:pointer}
  .news-btn:hover{color:var(--text0)}
  /* ── Sidebar watchlist ── */
  .wl-item{padding:6px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
  .wl-item:hover,.wl-item.active{background:var(--bg2)}
  .wl-sym{font-family:var(--mono);font-size:11px;font-weight:600}
  .wl-row{display:flex;justify-content:space-between;align-items:center}
  .wl-price{font-family:var(--mono);font-size:10px;color:var(--text1)}
  .wl-chg{font-family:var(--mono);font-size:9px;font-weight:600}
  .up{color:var(--green)}.dn{color:var(--red)}.flat{color:var(--text2)}
  .wl-signal{font-family:var(--mono);font-size:8px;margin-top:2px}
  /* ── Ticker cards grid ── */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
  .card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .15s}
  .card.state-open{border-color:rgba(0,212,170,.35);grid-column:span 2}
  .card.state-watching{border-color:rgba(74,158,255,.25)}
  .card.state-quiet{opacity:.75}
  .card-header{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card-ticker{font-family:var(--mono);font-size:14px;font-weight:600}
  .card-price{font-family:var(--mono);font-size:12px;color:var(--text1)}
  .card-state{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:2px;letter-spacing:.1em}
  .state-open .card-state{background:rgba(0,212,170,.12);color:var(--green)}
  .state-watching .card-state{background:rgba(74,158,255,.12);color:var(--blue)}
  .state-quiet .card-state{background:rgba(92,99,112,.1);color:var(--text2)}
  /* Confidence badge */
  .conf-badge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;display:flex;gap:6px;flex-wrap:wrap;margin:0 14px 6px}
  .conf-badge.bull{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:var(--green)}
  .conf-badge.bear{background:rgba(255,95,109,.1);border:1px solid rgba(255,95,109,.3);color:var(--red)}
  .conf-badge.neut{background:rgba(92,99,112,.15);border:1px solid var(--border);color:var(--text2)}
  /* P&L badge */
  .pnl-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600}
  .pnl-pos{background:rgba(0,212,170,.15);color:var(--green)}
  .pnl-neg{background:rgba(255,95,109,.15);color:var(--red)}
  /* Riley badge */
  .riley-badge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:2px}
  .riley-PERFECT{background:rgba(245,166,35,.2);color:var(--gold)}
  .riley-GOOD{background:rgba(0,212,170,.1);color:var(--green)}
  .riley-WAIT{background:rgba(74,158,255,.1);color:var(--blue)}
  .riley-NO{background:rgba(255,95,109,.1);color:var(--red)}
  .zone-ladder{position:relative;height:220px;background:var(--bg0);margin:0 14px 10px;border-radius:3px;overflow:hidden;cursor:default}
  .card.state-open .zone-ladder{height:280px}
  .card.state-quiet .zone-ladder{height:130px}
  /* ── Footer panels ── */
  .fpanel{padding:10px 14px;overflow-y:auto;max-height:180px}
  .panel-title{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
  /* Agent log */
  .log-item{font-family:var(--mono);font-size:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);display:grid;grid-template-columns:45px 55px 1fr;gap:4px;align-items:start}
  .log-time{color:var(--text2)}.log-agent{font-weight:600}
  .log-grok{color:var(--purple)}.log-claude{color:var(--blue)}.log-risk{color:var(--amber)}
  .log-system{color:var(--text1)}.log-trail{color:var(--green)}.log-body{color:var(--text0);word-break:break-word}
  /* Orders */
  .order-row{display:flex;justify-content:space-between;padding:3px 0;font-family:var(--mono);font-size:9px;border-bottom:1px solid rgba(255,255,255,.03)}
  /* Market status */
  .mkt-row{display:flex;justify-content:space-between;padding:3px 0;font-family:var(--mono);font-size:10px}
  .mkt-label{color:var(--text2)}.mkt-val{color:var(--text0)}
</style>
</head>
<body>
<div class="layout">

<!-- Header -->
<div class="header">
  <div class="logo">AI<span>trader</span></div>
  <div class="badge badge-paper">PAPER</div>
  <div class="hstat"><div class="l">Equity</div><div class="v" id="hEquity">—</div></div>
  <div class="hstat"><div class="l">Day P&L</div><div class="v" id="hDayPnl">—</div></div>
  <div class="hstat"><div class="l">VIX</div><div class="v" id="hVix">—</div></div>
  <div class="hstat"><div class="l">Positions</div><div class="v" id="hPos">—</div></div>
  <div class="hstat"><div class="l">Market</div><div class="v" id="hMkt">—</div></div>
  <div class="pulse"></div>
  <a href="/trading-news.html" target="_blank" class="news-btn">📰 News</a>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div id="wlList"></div>
</div>

<!-- Main: ticker cards -->
<div class="main">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="fpanel">
    <div class="panel-title">Agent Feed</div>
    <div id="agentLog"></div>
  </div>
  <div class="fpanel">
    <div class="panel-title">Recent Orders</div>
    <div id="orders"></div>
  </div>
  <div class="fpanel">
    <div class="panel-title">Market Status</div>
    <div id="mktStatus"></div>
  </div>
</div>

</div><!-- /layout -->

<script>
// ── State ──────────────────────────────────────────────────────────────────
let zonesData    = {};
let wlPrices     = [];
let activeTicker = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(n, d=2){ return n == null ? '—' : Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtPct(n){ if(n==null)return '—'; return (n>=0?'+':'')+fmt(n,2)+'%'; }
function tickerState(d){
  if(d.position) return 'open';
  const c = d.last_signal?.confidence || d.confidence || 0;
  return c >= 45 ? 'watching' : 'quiet';
}
function getCurrentPrice(ticker){
  const wp = wlPrices.find(t => t.ticker === ticker);
  return wp ? wp.price : 0;
}

// ── Zone ladder renderer (pure CSS/HTML, zero dependencies) ──────────────────
function zlLine(topPct, color, label, textColor){
  return `<div style="position:absolute;left:0;right:64px;top:${topPct};height:1px;
    background:repeating-linear-gradient(90deg,${color} 0,${color} 5px,transparent 5px,transparent 9px);"></div>
    <div style="position:absolute;left:4px;top:${topPct};transform:translateY(-100%);
    font-family:'IBM Plex Mono',monospace;font-size:8px;color:${textColor};
    background:rgba(10,12,15,.8);padding:1px 3px;border-radius:2px;white-space:nowrap;">${label}</div>`;
}

function renderZoneLadder(ticker, d, currentPrice){
  const el = document.getElementById('ladder-'+ticker);
  if(!el) return;

  // Price fallback chain so the ladder always renders something useful:
  // 1. Live market price (normal case)
  // 2. Open-position entry price (market closed / data gap)
  // 3. Median of zone midpoints (zones loaded but no price yet)
  // 4. Only if all three fail: show a minimal placeholder
  let priceLabel = null;   // null = exact price; string = substitute label
  if(!currentPrice || currentPrice <= 0){
    const pos   = d.position;
    const zones = (d.zones || []).slice(0, 12);
    if(pos && pos.entry > 0){
      currentPrice = pos.entry;
      priceLabel   = 'entry $' + (pos.entry >= 100
                        ? pos.entry.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})
                        : pos.entry.toFixed(4));
    } else if(zones.length > 0){
      const mids = zones.map(z => z.mid).filter(m => m > 0);
      if(mids.length > 0){
        currentPrice = mids.reduce((a,b)=>a+b,0) / mids.length;
        priceLabel   = 'no price';
      }
    }
    if(!currentPrice || currentPrice <= 0){
      // Last resort: pull live price from wlPrices global
      currentPrice = getCurrentPrice(ticker);
      if(!currentPrice || currentPrice <= 0){
        el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;'
          + 'height:100%;font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--text2)'
          + '">Waiting for price data</div>';
        return;
      }
      priceLabel = 'live';
    }
  }
  const pos   = d.position;
  const zones = (d.zones||[]).slice(0,12);

  // Determine display range: ±3% around current price, expanded to include stop/TP/entry
  let rMin = currentPrice * 0.97, rMax = currentPrice * 1.03;
  if(pos){
    if(pos.stop)  { rMin=Math.min(rMin,pos.stop*0.998);  rMax=Math.max(rMax,pos.stop*1.002);  }
    if(pos.tp)    { rMin=Math.min(rMin,pos.tp*0.998);    rMax=Math.max(rMax,pos.tp*1.002);    }
    if(pos.entry) { rMin=Math.min(rMin,pos.entry*0.998); rMax=Math.max(rMax,pos.entry*1.002); }
  }
  // Expand to include nearby zones
  for(const z of zones){
    if(z.mid){ if(z.mid>rMax*0.998) rMax=z.mid*1.002; if(z.mid<rMin*1.002) rMin=z.mid*0.998; }
  }
  const rng = rMax - rMin; if(rng<=0) return;

  const pct  = p => (((rMax-p)/rng)*100).toFixed(2)+'%';
  const hpct = (t,b) => (Math.max(0.3,(t-b)/rng*100)).toFixed(2)+'%';

  let html = '';

  // Zone bands
  for(let i=0;i<zones.length;i++){
    const z=zones[i]; if(!z.mid) continue;
    const sup  = z.type==='SUPPORT';
    const today= z.tier==='today'||z.tier==='weekly';
    const op   = Math.max(0.07, Math.min(0.75, (z.strength||40)/100*0.9));
    const zTop = Math.min(rMax, z.top    || z.mid*1.001);
    const zBot = Math.max(rMin, z.bottom || z.mid*0.999);
    if(zTop<=rMin||zBot>=rMax) continue;
    const bgColor  = sup ? `rgba(0,212,170,${op})` : `rgba(255,95,109,${op})`;
    const bdColor  = z.triggered_entry ? '#f5a623' : (today ? (sup?'rgba(0,212,170,.6)':'rgba(255,95,109,.6)') : 'transparent');
    const bdWidth  = (today||z.triggered_entry) ? '1px' : '0';
    html += `<div style="position:absolute;left:0;right:64px;top:${pct(zTop)};height:${hpct(zTop,zBot)};
      background:${bgColor};border-top:${bdWidth} solid ${bdColor};border-bottom:${bdWidth} solid ${bdColor};
      box-sizing:border-box;min-height:3px;"></div>`;
    html += `<div style="position:absolute;right:0;width:62px;top:${pct(z.mid)};transform:translateY(-50%);
      font-family:'IBM Plex Mono',monospace;font-size:8px;line-height:1.3;padding:1px 3px;white-space:nowrap;
      color:${sup?'rgba(0,212,170,.85)':'rgba(255,95,109,.85)'}">${sup?'S':'R'} ${z.strength||'?'} \xb7 ${z.touches||'?'}T</div>`;
  }

  // P&L fill between entry and current price
  if(pos&&pos.entry){
    const fillTop = Math.max(rMin,Math.min(rMax,Math.max(currentPrice,pos.entry)));
    const fillBot = Math.max(rMin,Math.min(rMax,Math.min(currentPrice,pos.entry)));
    if(fillTop>fillBot){
      const profit = currentPrice>=pos.entry;
      html += `<div style="position:absolute;left:0;right:64px;top:${pct(fillTop)};height:${hpct(fillTop,fillBot)};
        background:${profit?'rgba(0,212,170,.06)':'rgba(255,95,109,.06)'};min-height:2px;pointer-events:none;"></div>`;
    }
    // Entry line
    if(pos.entry>=rMin&&pos.entry<=rMax)
      html += zlLine(pct(pos.entry),'rgba(74,158,255,.8)',`Entry $${fmt(pos.entry,pos.entry>=100?2:4)}`,'#4a9eff');
  }

  // Stop + TP lines
  if(pos&&pos.stop&&pos.stop>=rMin&&pos.stop<=rMax)
    html += zlLine(pct(pos.stop),'rgba(255,95,109,.85)',`STOP $${fmt(pos.stop,pos.stop>=100?2:4)}`,'#ff5f6d');
  if(pos&&pos.tp&&pos.tp>=rMin&&pos.tp<=rMax)
    html += zlLine(pct(pos.tp),'rgba(0,212,170,.85)',`TP $${fmt(pos.tp,pos.tp>=100?2:4)}`,'#00d4aa');

  // Current price line — use fallback label if we had no live price
  const priceText = priceLabel || ('$' + fmt(currentPrice, currentPrice>=100?2:4));
  const lineColor = priceLabel ? '#9aa0ad' : '#e8eaf0';   // dim line for fallback prices
  html += `<div style="position:absolute;left:0;right:0;top:${pct(currentPrice)};height:1.5px;background:${lineColor};z-index:5;"></div>`;
  html += `<div style="position:absolute;left:4px;top:${pct(currentPrice)};transform:translateY(-110%);z-index:6;
    font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:${lineColor};
    background:var(--bg1);padding:1px 4px;border-radius:2px;white-space:nowrap;">${priceText}</div>`;

  el.innerHTML = html;
}

// ── Build one ticker card ───────────────────────────────────────────────────
function buildCard(ticker, d){
  const state = tickerState(d);
  const pos   = d.position;
  const sig   = d.last_signal||{};
  const conf  = d.confidence || sig.confidence || 0;
  const dir   = d.direction  || sig.direction  || 'NEUTRAL';
  const riley = d.riley_result || '';

  const dirClass = dir==='BULLISH'?'bull':dir==='BEARISH'?'bear':'neut';
  const dirIcon  = dir==='BULLISH'?'▲ LONG ':dir==='BEARISH'?'▼ SHORT':'--- ';
  const confHtml = conf
    ? `<div class="conf-badge ${dirClass}">${dirIcon}${conf}%${d.catalyst?' | '+d.catalyst.slice(0,45):''}</div>`
    : '';

  let pnlHtml = '';
  if(pos){ const cl=pos.pnl_pct>=0?'pnl-pos':'pnl-neg'; pnlHtml=`<span class="pnl-badge ${cl}">${fmtPct(pos.pnl_pct)}</span>`; }

  const rileyHtml = riley ? `<span class="riley-badge riley-${riley}">${riley}</span>` : '';
  const patternHtml = pos?.candle_pattern && pos.candle_pattern!=='NONE'
    ? `<div style="font-family:var(--mono);font-size:8px;color:var(--amber);padding:0 14px 4px">${pos.candle_pattern.replace(/_/g,' ')}</div>`
    : '';

  let watchHtml = '';
  if(state==='watching'){
    const near = (d.zones||[])[0];
    if(near) watchHtml = `<div style="font-family:var(--mono);font-size:8px;color:var(--text2);padding:0 14px 4px">Nearest: ${near.type[0]} $${fmt(near.mid,near.mid>=100?2:4)} \xb7 ${near.touches||'?'}T</div>`;
  }

  return `
<div class="card state-${state}" id="card-${ticker}">
  <div class="card-header">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="card-ticker">${ticker}</span>${rileyHtml}${pnlHtml}
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="card-price" id="cp-${ticker}">—</span>
      <span class="card-state">${state.toUpperCase()}</span>
    </div>
  </div>
  ${confHtml}${patternHtml}${watchHtml}
  <div class="zone-ladder" id="ladder-${ticker}"></div>
</div>`;
}

// ── Render all cards ─────────────────────────────────────────────────────────
function renderCards(){
  const grid = document.getElementById('cardsGrid');
  const sorted = Object.keys(zonesData).filter(t=>!zonesData[t]?.is_crypto).sort((a,b)=>{
    const order={open:0,watching:1,quiet:2};
    return order[tickerState(zonesData[a])] - order[tickerState(zonesData[b])];
  });
  grid.innerHTML = sorted.map(t => buildCard(t, zonesData[t]||{})).join('');
  sorted.forEach(t => renderZoneLadder(t, zonesData[t]||{}, getCurrentPrice(t)));
}

// ── Watchlist sidebar ─────────────────────────────────────────────────────────
function renderWatchlist(){
  document.getElementById('wlList').innerHTML = wlPrices.map(t=>{
    const d  = zonesData[t.ticker]||{};
    const sig= d.last_signal||{};
    const dir= d.direction||sig.direction||'';
    const cl = t.chg_pct>0?'up':t.chg_pct<0?'dn':'flat';
    const sigTxt = dir ? `<div class="wl-signal" style="color:${dir==='BULLISH'?'var(--green)':dir==='BEARISH'?'var(--red)':'var(--text2)'}">${dir==='BULLISH'?'▲':dir==='BEARISH'?'▼':'\xb7'} ${d.confidence||sig.confidence||0}%</div>` : '';
    return `<div class="wl-item${activeTicker===t.ticker?' active':''}" onclick="focusTicker('${t.ticker}')">
      <div class="wl-row"><span class="wl-sym">${t.ticker}</span><span class="wl-chg ${cl}">${t.chg_pct>=0?'+':''}${t.chg_pct}%</span></div>
      <div class="wl-row"><span class="wl-price">$${t.price>100?t.price.toLocaleString():t.price.toFixed(4)}</span></div>
      ${sigTxt}
    </div>`;
  }).join('');
}

function focusTicker(t){
  activeTicker = t;
  const el = document.getElementById('card-'+t);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  renderWatchlist();
}

// ── Data loaders ─────────────────────────────────────────────────────────────
async function loadZones(){
  try{
    const r = await fetch('/api/trading/dashboard/zones');
    zonesData = await r.json();
    // Re-render zone ladders and price labels with latest data
    wlPrices.forEach(t=>{
      renderZoneLadder(t.ticker, zonesData[t.ticker]||{}, t.price);
      const el = document.getElementById('cp-'+t.ticker);
      if(el) el.textContent = '$'+fmt(t.price, t.price>=100?2:4);
    });
  }catch(e){ console.warn('zones load failed',e); }
}

async function loadWatchlistPrices(){
  try{
    const r = await fetch('/api/trading/dashboard/watchlist-prices');
    // Only show stocks (no crypto) in sidebar
    wlPrices = (await r.json()).filter(t => !t.is_crypto);
    renderWatchlist();
    wlPrices.forEach(t=>{
      const el = document.getElementById('cp-'+t.ticker);
      if(el) el.textContent = '$'+fmt(t.price, t.price>=100?2:4);
    });
  }catch(e){}
}

async function loadPortfolio(){
  try{
    const r  = await fetch('/api/trading/dashboard/positions');
    const d  = await r.json();
    const a  = d.account||{};
    document.getElementById('hEquity').textContent = a.equity ? '$'+fmt(a.equity,0) : '—';
    const pnl= a.pnl_today||0;
    const pe = document.getElementById('hDayPnl');
    pe.textContent = (pnl>=0?'+':'')+'$'+fmt(Math.abs(pnl),0);
    pe.className   = 'v '+(pnl>=0?'pos':'neg');
    document.getElementById('hPos').textContent = (d.positions||[]).length;
  }catch(e){}
}

async function loadMarketStatus(){
  try{
    const r = await fetch('/api/trading/dashboard/market-status');
    const d = await r.json();
    document.getElementById('hVix').textContent = d.vix ? d.vix+' '+d.vix_regime : '—';
    document.getElementById('hMkt').textContent = d.market||'—';
    const ms = document.getElementById('mktStatus');
    ms.innerHTML = `
      <div class="mkt-row"><span class="mkt-label">VIX</span><span class="mkt-val">${d.vix||'—'} (${d.vix_regime||'—'})</span></div>
      <div class="mkt-row"><span class="mkt-label">Market</span><span class="mkt-val">${d.market||'—'}</span></div>
      <div class="mkt-row"><span class="mkt-label">SPY 1D</span><span class="mkt-val" style="color:${(d.spy_1d||0)>=0?'var(--green)':'var(--red)'}">${fmtPct(d.spy_1d)}</span></div>
      <div class="mkt-row"><span class="mkt-label">SPY 5D</span><span class="mkt-val" style="color:${(d.spy_5d||0)>=0?'var(--green)':'var(--red)'}">${fmtPct(d.spy_5d)}</span></div>
      <div class="mkt-row"><span class="mkt-label">Day P&L</span><span class="mkt-val" style="color:${(d.day_pnl_pct||0)>=0?'var(--green)':'var(--red)'}">${fmtPct(d.day_pnl_pct)}</span></div>
      <div class="mkt-row"><span class="mkt-label">Status</span><span class="mkt-val" style="color:${d.market_open?'var(--green)':'var(--text2)'}">${d.market_open?'OPEN':'CLOSED'}</span></div>`;
  }catch(e){}
}

let lastLogLen = 0;
async function loadAgentLog(){
  try{
    const r = await fetch('/api/trading/dashboard/agent-log');
    const logs = await r.json();
    if(!Array.isArray(logs)||logs.length===lastLogLen) return;
    lastLogLen = logs.length;
    const cls = {grok:'log-grok',claude:'log-claude',risk:'log-risk',system:'log-system',trail:'log-trail'};
    document.getElementById('agentLog').innerHTML = [...logs].reverse().map(l=>`
      <div class="log-item">
        <span class="log-time">${l.time||''}</span>
        <span class="log-agent ${cls[l.type]||'log-system'}">${(l.agent||'').slice(0,8)}</span>
        <span class="log-body">${(l.body||'').slice(0,90)}</span>
      </div>`).join('');
  }catch(e){}
}

async function loadOrders(){
  try{
    const r = await fetch('/api/trading/dashboard/orders');
    const orders = await r.json();
    if(!Array.isArray(orders)||!orders.length){
      document.getElementById('orders').innerHTML = '<div style="font-family:var(--mono);font-size:9px;color:var(--text2)">No recent orders</div>';
      return;
    }
    document.getElementById('orders').innerHTML = orders.slice(0,8).map(o=>`
      <div class="order-row">
        <span style="color:${o.side==='buy'?'var(--green)':'var(--red)'}">${o.side.toUpperCase()}</span>
        <span>${o.symbol}</span>
        <span style="color:var(--text2)">${o.qty}</span>
        <span style="color:${o.status==='filled'?'var(--green)':o.status==='canceled'?'var(--red)':'var(--amber)'}">${o.status}</span>
        <span style="color:var(--text2)">${o.filled_at||'—'}</span>
      </div>`).join('');
  }catch(e){}
}

// ── Full refresh (every 30s) ──────────────────────────────────────────────────
async function fullRefresh(){
  await Promise.all([loadZones(), loadWatchlistPrices(), loadPortfolio(), loadMarketStatus()]);
  renderCards();
}

// ── Init ──────────────────────────────────────────────────────────────────────
function startDashboard(){
  fullRefresh();
  loadAgentLog();
  loadOrders();
  setInterval(fullRefresh,  30000);
  setInterval(loadAgentLog, 5000);
  setInterval(loadOrders,   60000);
}
document.addEventListener('DOMContentLoaded', startDashboard);

</script>
</body>
