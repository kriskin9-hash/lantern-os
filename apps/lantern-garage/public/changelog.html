  <style>
    .changelog-page { max-width: 780px; margin: 0 auto; padding: 0 24px 80px; }
    .changelog-header {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 0; border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .changelog-header h1 { font-size: 1.5rem; font-weight: 700; }
    .changelog-header a { color: var(--accent); text-decoration: none; font-size: 0.88rem; margin-left: auto; }
    .version-block { margin-bottom: 40px; }
    .version-header {
      display: flex; align-items: baseline; gap: 12px;
      cursor: pointer; user-select: none;
      padding: 12px 16px; margin: 0 -16px;
      border-radius: 12px;
      transition: background 0.15s;
    }
    .version-header:hover { background: var(--surface); }
    .version-header h2 { font-size: 1.15rem; font-weight: 700; color: var(--accent); margin: 0; }
    .version-header .date { font-size: 0.78rem; color: var(--muted); }
    .version-header .toggle { margin-left: auto; font-size: 0.8rem; color: var(--muted); transition: transform 0.2s; }
    .version-header.open .toggle { transform: rotate(90deg); }
    .version-body { padding: 8px 0 0 16px; display: none; }
    .version-body.open { display: block; }
    .version-body h3 { font-size: 0.9rem; font-weight: 600; color: var(--text); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .version-body ul { margin: 0 0 16px 0; padding-left: 18px; }
    .version-body li { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
    .version-body li strong { color: var(--text); }
    .version-body table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 8px 0 16px; }
    .version-body th, .version-body td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .version-body th { color: var(--muted); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; }
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error { text-align: center; padding: 60px 20px; color: var(--danger); }
  </style>
</head>

<div class="app">
  <div class="changelog-page">
    <div class="changelog-header">
      <h1>Changelog</h1>
    </div>

    <div id="changelog-content">
      <div class="loading">Loading patch notes…</div>
    </div>
  </div>
</div>

<script>
(function() {
  const content = document.getElementById('changelog-content');

  function parseMarkdown(md) {
    const blocks = [];
    const lines = md.split('\n');
    let currentVersion = null;
    let currentSection = null;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const versionMatch = line.match(/^## \[(.+?)\] — (.+)/);
      const sectionMatch = line.match(/^### (.+)/);
      const listMatch = line.match(/^- (.+)/);
      const tableMatch = line.match(/^\|/);

      if (versionMatch) {
        currentVersion = { title: versionMatch[1], date: versionMatch[2], sections: [] };
        currentSection = null;
        blocks.push(currentVersion);
      } else if (sectionMatch && currentVersion) {
        currentSection = { heading: sectionMatch[1], items: [] };
        currentVersion.sections.push(currentSection);
      } else if (listMatch && currentSection) {
        currentSection.items.push(parseInlineMarkdown(listMatch[1]));
      } else if (tableMatch && currentSection) {
        // Simple table passthrough
        currentSection.items.push({ type: 'table', raw: line });
      } else if (line.trim() && currentSection) {
        currentSection.items.push(parseInlineMarkdown(line.trim()));
      }
    }
    return blocks;
  }

  function parseInlineMarkdown(text) {
    // Bold, code, links
    let html = text
      .replace(/`([^`]+)`/g, '<code style="background:rgba(124,106,247,0.12);padding:2px 6px;border-radius:4px;font-size:0.85em;">$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);">$1</a>');
    return { type: 'text', html };
  }

  function renderChangelog(blocks) {
    if (!blocks.length) {
      content.innerHTML = '<div class="error">No versions found in changelog.</div>';
      return;
    }

    const html = blocks.map((ver, idx) => {
      const sectionsHtml = ver.sections.map(sec => {
        const itemsHtml = sec.items.map(item => {
          if (item.type === 'table') return item.raw; // skip tables for now
          return '<li>' + item.html + '</li>';
        }).join('');
        return `<h3>${sec.heading}</h3><ul>${itemsHtml}</ul>`;
      }).join('');

      return `
        <div class="version-block">
          <div class="version-header ${idx === 0 ? 'open' : ''}" onclick="toggleVersion(this)">
            <h2>${escapeHtml(ver.title)}</h2>
            <span class="date">${escapeHtml(ver.date)}</span>
            <span class="toggle">▶</span>
          </div>
          <div class="version-body ${idx === 0 ? 'open' : ''}">
            ${sectionsHtml}
          </div>
        </div>
      `;
    }).join('');

    content.innerHTML = html;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  window.toggleVersion = function(header) {
    const body = header.nextElementSibling;
    header.classList.toggle('open');
    body.classList.toggle('open');
  };

  fetch('/repo/CHANGELOG.MD', { cache: 'no-store' })
    .then(r => r.ok ? r.text() : Promise.reject('Failed to load'))
    .then(md => renderChangelog(parseMarkdown(md)))
    .catch(err => {
      content.innerHTML = '<div class="error">Could not load changelog: ' + err + '</div>';
    });
})();
</script>
