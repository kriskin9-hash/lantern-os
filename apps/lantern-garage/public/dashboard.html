<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7c6af7">
  <title>Dashboard — Lantern OS</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root {
      --bg: #0b0d14;
      --surface: #13161f;
      --surface2: #1a1d2a;
      --border: #252840;
      --text: #e8eaf6;
      --muted: #7880a4;
      --accent: #7c6af7;
      --green: #4caf82;
      --gold: #e2c97e;
      --danger: #e05555;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      margin: 0;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    header p { font-size: 0.78rem; color: var(--muted); margin: 0; }
    .nav { margin-left: auto; display: flex; gap: 16px; font-size: 0.82rem; }
    .nav a { color: var(--muted); text-decoration: none; }
    .nav a:hover { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 14px;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .metric:last-child { border-bottom: none; }
    .metric-label { font-size: 0.82rem; color: var(--muted); }
    .metric-value { font-size: 0.92rem; font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge.live { background: #1a3d2a; color: var(--green); }
    .badge.held { background: #2a2420; color: var(--muted); }
    .badge.warn { background: #2a2020; color: var(--danger); }

    .slot-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .slot-row:last-child { border-bottom: none; }
    .slot-priority {
      font-size: 0.72rem;
      font-weight: 700;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--muted);
      flex-shrink: 0;
    }
    .slot-id {
      font-size: 0.82rem;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .slot-status {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .slot-status.queued { color: var(--accent); }
    .slot-status.active { color: var(--green); }
    .slot-status.done { color: var(--muted); }

    .provider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .provider-row:last-child { border-bottom: none; }
    .provider-name { font-size: 0.82rem; }
    .provider-state {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface2);
    }
    .provider-state.available { color: var(--green); }
    .provider-state.no_key { color: var(--muted); }
    .provider-state.unavailable { color: var(--danger); }

    .log {
      font-family: ui-monospace, "Cascadia Mono", monospace;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
      padding: 8px;
      background: var(--surface2);
      border-radius: 8px;
    }

    .refresh-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .last-updated { font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">&#128161;</div>
    <div>
      <h1>Operator Dashboard</h1>
      <p>Lantern OS · Dispatch & Queue · Live telemetry</p>
    </div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/dream-chat.html">Dream Journal</a>
      <a href="/dream-journal/index.html">Journal</a>
    </nav>
  </header>

  <div class="refresh-bar">
    <button id="refreshBtn">Refresh</button>
    <span class="last-updated" id="lastUpdated">—</span>
  </div>

  <div class="grid">
    <div class="card">
      <h2>System Health</h2>
      <div id="healthPanel">Loading...</div>
    </div>
    <div class="card">
      <h2>Provider Capacity</h2>
      <div id="providerPanel">Loading...</div>
    </div>
    <div class="card">
      <h2>Agent Slots</h2>
      <div id="slotsPanel">Loading...</div>
    </div>
    <div class="card">
      <h2>Queue Depth</h2>
      <div id="queuePanel">Loading...</div>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <h2>Convergence Log</h2>
      <div class="log" id="logOutput">Waiting for first refresh...</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const origin = window.location.origin;

function log(msg) {
  const el = $('logOutput');
  const line = `${new Date().toLocaleTimeString()}  ${msg}`;
  el.textContent = line + '\n' + el.textContent;
}

async function api(path, opts = {}) {
  const res = await fetch(`${origin}${path}`, {
    cache: 'no-store',
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `${res.status}`);
  return body;
}

async function loadHealth() {
  try {
    const data = await api('/api/health');
    const ok = data.ok === true;
    $('healthPanel').innerHTML = `
      <div class="metric"><span class="metric-label">Service</span><span class="metric-value">${data.service || 'lantern-garage'}</span></div>
      <div class="metric"><span class="metric-label">Status</span><span class="badge ${ok ? 'live' : 'warn'}">${ok ? 'ONLINE' : 'DEGRADED'}</span></div>
      <div class="metric"><span class="metric-label">Generated</span><span class="metric-value" style="font-size:0.78rem;color:var(--muted)">${data.generatedAt ? new Date(data.generatedAt).toLocaleTimeString() : '—'}</span></div>
    `;
  } catch (e) {
    $('healthPanel').innerHTML = `<div class="metric"><span class="metric-label">Error</span><span class="badge warn">${e.message}</span></div>`;
    log('Health fetch failed: ' + e.message);
  }
}

async function loadProviders() {
  try {
    const data = await api('/api/settings/providers');
    const rows = Object.entries(data)
      .filter(([k]) => !k.startsWith('_'))
      .map(([k, v]) => {
        const name = k.replace('_API_KEY', '').toLowerCase();
        const state = v ? 'available' : 'no_key';
        return `<div class="provider-row"><span class="provider-name">${name}</span><span class="provider-state ${state}">${state}</span></div>`;
      }).join('');
    $('providerPanel').innerHTML = rows || '<div class="provider-row"><span class="provider-name">No providers</span></div>';
  } catch (e) {
    $('providerPanel').innerHTML = `<div class="provider-row"><span class="provider-name">Error</span><span class="provider-state unavailable">${e.message}</span></div>`;
    log('Providers fetch failed: ' + e.message);
  }
}

async function loadSlots() {
  try {
    const data = await api('/api/agents/slots');
    const slots = (data.slots || []).slice(0, 10);
    if (!slots.length) {
      $('slotsPanel').innerHTML = '<div class="slot-row"><span class="slot-id">No slots exposed</span></div>';
      return;
    }
    $('slotsPanel').innerHTML = slots.map((s, i) => `
      <div class="slot-row">
        <span class="slot-priority">${i + 1}</span>
        <span class="slot-id" title="${s.id}">${s.id}</span>
        <span class="slot-status ${s.status}">${s.status}</span>
      </div>
    `).join('');
  } catch (e) {
    $('slotsPanel').innerHTML = `<div class="slot-row"><span class="slot-id">Error: ${e.message}</span></div>`;
    log('Slots fetch failed: ' + e.message);
  }
}

async function loadQueue() {
  try {
    const data = await api('/api/agents/slots');
    const slots = data.slots || [];
    const queued = slots.filter(s => s.status === 'queued').length;
    const active = slots.filter(s => s.status === 'active').length;
    const done = slots.filter(s => s.status === 'done').length;
    $('queuePanel').innerHTML = `
      <div class="metric"><span class="metric-label">Queued</span><span class="metric-value" style="color:var(--accent)">${queued}</span></div>
      <div class="metric"><span class="metric-label">Active</span><span class="metric-value" style="color:var(--green)">${active}</span></div>
      <div class="metric"><span class="metric-label">Done</span><span class="metric-value" style="color:var(--muted)">${done}</span></div>
      <div class="metric"><span class="metric-label">Total</span><span class="metric-value">${slots.length}</span></div>
    `;
  } catch (e) {
    $('queuePanel').innerHTML = `<div class="metric"><span class="metric-label">Error</span><span class="badge warn">${e.message}</span></div>`;
    log('Queue fetch failed: ' + e.message);
  }
}

async function refresh() {
  log('Refreshing...');
  await Promise.all([loadHealth(), loadProviders(), loadSlots(), loadQueue()]);
  $('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  log('Refresh complete.');
}

$('refreshBtn').addEventListener('click', refresh);
refresh().catch(e => log('Initial refresh failed: ' + e.message));

// Auto-refresh every 30 seconds
setInterval(() => {
  refresh().catch(e => log('Auto-refresh failed: ' + e.message));
}, 30000);
</script>
</body>
</html>
