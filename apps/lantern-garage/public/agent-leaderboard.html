<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Performance Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0e27;
      color: #e0e6ff;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 30px; font-size: 2em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    select, button {
      padding: 10px 15px;
      background: #1a1f3a;
      color: #e0e6ff;
      border: 1px solid #667eea;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #667eea; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: #0f1428;
      border: 1px solid #2a3f5f;
      border-radius: 10px;
      padding: 20px;
    }
    .card h2 {
      font-size: 1.2em;
      margin-bottom: 15px;
      color: #667eea;
      border-bottom: 1px solid #2a3f5f;
      padding-bottom: 10px;
    }
    .agent-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1a1f3a;
    }
    .agent-row:last-child { border-bottom: none; }
    .agent-name {
      flex: 1;
      font-weight: 500;
    }
    .agent-metrics {
      display: flex;
      gap: 20px;
      font-size: 13px;
    }
    .metric {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .metric-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .metric-value {
      font-weight: 600;
      color: #4ade80;
    }
    .metric-value.low { color: #f87171; }
    .metric-value.medium { color: #fbbf24; }
    .rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #667eea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
      font-size: 12px;
    }
    .rank.gold { background: #fbbf24; color: #0a0e27; }
    .rank.silver { background: #d1d5db; color: #0a0e27; }
    .rank.bronze { background: #ea580c; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 15px;
    }
    .status-item {
      padding: 10px;
      background: #1a1f3a;
      border-radius: 6px;
      border-left: 3px solid #667eea;
      font-size: 13px;
    }
    .status-item.healthy { border-left-color: #4ade80; }
    .status-item.blocked { border-left-color: #f87171; }
    .status-item.warning { border-left-color: #fbbf24; }
    .provider-name { font-weight: 600; margin-bottom: 5px; }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .history-table th {
      background: #1a1f3a;
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #2a3f5f;
      color: #888;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
    }
    .history-table td {
      padding: 10px;
      border-bottom: 1px solid #1a1f3a;
    }
    .history-table tr:hover { background: #1a1f3a; }
    .retired { color: #f87171; }
    .promoted { color: #4ade80; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .error {
      background: #1a1f3a;
      border-left: 3px solid #f87171;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      color: #f87171;
    }
    .refresh-info {
      font-size: 12px;
      color: #888;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Agent Performance Leaderboard</h1>

    <div class="controls">
      <select id="taskTypeSelect">
        <option value="">All Task Types</option>
        <option value="coding">Coding</option>
        <option value="reasoning">Reasoning</option>
        <option value="creative">Creative</option>
        <option value="trading">Trading</option>
        <option value="default">Default</option>
      </select>
      <button onclick="loadData()">Refresh Data</button>
      <button onclick="toggleAutoRefresh()" id="autoRefreshBtn">Auto-Refresh: ON</button>
    </div>

    <div id="errorContainer"></div>

    <div class="grid">
      <div class="card">
        <h2>🏆 Top Agents (7-day)</h2>
        <div id="leaderboard" class="loading">Loading...</div>
      </div>

      <div class="card">
        <h2>🔧 Provider Health</h2>
        <div id="providerStatus" class="loading">Loading...</div>
      </div>
    </div>

    <div class="grid">
      <div class="card" style="grid-column: 1 / -1;">
        <h2>📊 Recent Performance Trend</h2>
        <canvas id="performanceChart" style="max-height: 250px; margin-top: 15px;"></canvas>
        <div class="refresh-info">Last updated: <span id="lastUpdated">—</span></div>
      </div>
    </div>

    <div class="grid">
      <div class="card" style="grid-column: 1 / -1;">
        <h2>🗑️ Agent Retirement History</h2>
        <div id="retirementHistory" class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    let autoRefreshInterval = null;
    let performanceChart = null;

    async function loadData() {
      const taskType = document.getElementById('taskTypeSelect').value;

      try {
        // Fetch leaderboard
        const leaderboardRes = await fetch(
          `/api/agent-performance/leaderboard?taskType=${taskType || 'default'}&topN=5`
        );
        const leaderboardData = await leaderboardRes.json();
        renderLeaderboard(leaderboardData.agents || []);

        // Fetch provider status
        const statusRes = await fetch('/api/status');
        const statusData = await statusRes.json();
        renderProviderStatus(statusData);

        // Fetch recent performance data
        loadPerformanceTrend();

        // Update timestamp
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();

        // Clear errors
        document.getElementById('errorContainer').innerHTML = '';
      } catch (err) {
        showError(`Failed to load data: ${err.message}`);
      }
    }

    function renderLeaderboard(agents) {
      if (!agents || agents.length === 0) {
        document.getElementById('leaderboard').innerHTML = '<div class="loading">No agents found</div>';
        return;
      }

      let html = '';
      agents.forEach((agent, idx) => {
        const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
        const score = ((agent.successRate || 0) * 10 / Math.max(agent.avgLatencyMs || 1000, 1) / Math.max(agent.costPerCall || 0.1)).toFixed(2);

        html += `
          <div class="agent-row">
            <div class="rank ${rankClass}">${idx + 1}</div>
            <div class="agent-name">${agent.agentId || 'Unknown'}</div>
            <div class="agent-metrics">
              <div class="metric">
                <div class="metric-label">Success</div>
                <div class="metric-value">${((agent.successRate || 0) * 100).toFixed(0)}%</div>
              </div>
              <div class="metric">
                <div class="metric-label">Latency</div>
                <div class="metric-value">${(agent.avgLatencyMs || 0).toFixed(0)}ms</div>
              </div>
              <div class="metric">
                <div class="metric-label">Cost</div>
                <div class="metric-value">$${(agent.costPerCall || 0).toFixed(4)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Calls</div>
                <div class="metric-value">${agent.totalCalls || 0}</div>
              </div>
            </div>
          </div>
        `;
      });
      document.getElementById('leaderboard').innerHTML = html;
    }

    function renderProviderStatus(status) {
      const providers = status.providers || {};
      let html = '';

      for (const [name, info] of Object.entries(providers)) {
        const isHealthy = info.healthy !== false && !info.noKey;
        const statusClass = info.noKey ? 'blocked' : !isHealthy ? 'warning' : 'healthy';
        const status_text = info.noKey ? '❌ No Key' : !isHealthy ? '⚠️ Degraded' : '✅ Healthy';

        html += `
          <div class="status-item ${statusClass}">
            <div class="provider-name">${name}</div>
            <div>${status_text}</div>
            ${info.quota_reset_at ? `<div style="font-size: 11px; color: #888; margin-top: 5px;">Reset: ${new Date(info.quota_reset_at).toLocaleTimeString()}</div>` : ''}
          </div>
        `;
      }
      document.getElementById('providerStatus').innerHTML = html || '<div class="loading">No provider data</div>';
    }

    async function loadPerformanceTrend() {
      try {
        // Try to load recent convergence metrics
        const res = await fetch('/api/status');
        const data = await res.json();

        // Placeholder for trend chart - would connect to actual metrics endpoint
        renderTrendChart(data);
      } catch (err) {
        console.error('Failed to load trend:', err);
      }
    }

    function renderTrendChart(data) {
      const canvas = document.getElementById('performanceChart');
      if (!canvas) return;

      // Simple canvas rendering of trend data
      const ctx = canvas.getContext('2d');
      const width = canvas.offsetWidth || 800;
      const height = 200;

      canvas.width = width;
      canvas.height = height;

      // Draw simple grid and placeholder
      ctx.fillStyle = '#1a1f3a';
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = '#2a3f5f';
      ctx.beginPath();
      for (let i = 0; i <= 10; i++) {
        const y = (height / 10) * i;
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
      }
      ctx.stroke();

      ctx.fillStyle = '#667eea';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Performance trend data available when running Convergence loop', width / 2, height / 2);
    }

    function toggleAutoRefresh() {
      const btn = document.getElementById('autoRefreshBtn');
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
        btn.textContent = 'Auto-Refresh: OFF';
      } else {
        autoRefreshInterval = setInterval(loadData, 5000);
        btn.textContent = 'Auto-Refresh: ON';
      }
    }

    function showError(message) {
      document.getElementById('errorContainer').innerHTML = `<div class="error">${message}</div>`;
    }

    // Initial load
    loadData();
  </script>
</body>
</html>
