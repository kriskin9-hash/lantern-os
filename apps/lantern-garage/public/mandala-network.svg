<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.ring{animation:spin 12s linear infinite;transform-origin:100px 100px}</style>
  </defs>

  <g class="ring" filter="url(#glow)">
    <!-- Outer dense network: 24 nodes in 2 rings -->
    <circle cx="100" cy="15" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="122" cy="21" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="141" cy="36" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="154" cy="57" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="160" cy="80" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="160" cy="100" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="160" cy="120" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="154" cy="143" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="141" cy="164" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="122" cy="179" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="100" cy="185" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="78" cy="179" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="59" cy="164" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="46" cy="143" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="40" cy="120" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="40" cy="100" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="40" cy="80" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="46" cy="57" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="59" cy="36" r="2" fill="currentColor" opacity="0.9"/>
    <circle cx="78" cy="21" r="2" fill="currentColor" opacity="0.9"/>

    <!-- Secondary network ring: 16 nodes -->
    <circle cx="100" cy="32" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="135" cy="45" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="155" cy="75" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="155" cy="125" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="135" cy="155" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="100" cy="168" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="65" cy="155" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="45" cy="125" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="45" cy="75" r="1.8" fill="currentColor" opacity="0.8"/>
    <circle cx="65" cy="45" r="1.8" fill="currentColor" opacity="0.8"/>

    <!-- Inner network: 12 nodes -->
    <circle cx="100" cy="55" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="130" cy="72" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="142" cy="100" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="130" cy="128" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="100" cy="145" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="70" cy="128" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="58" cy="100" r="1.5" fill="currentColor" opacity="0.75"/>
    <circle cx="70" cy="72" r="1.5" fill="currentColor" opacity="0.75"/>

    <!-- Core geometric structure: 3D cube with 8 vertices -->
    <circle cx="95" cy="85" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="105" cy="85" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="110" cy="100" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="100" cy="100" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="95" cy="115" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="105" cy="115" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="110" cy="130" r="1.2" fill="currentColor" opacity="0.85"/>
    <circle cx="90" cy="130" r="1.2" fill="currentColor" opacity="0.85"/>

    <!-- Center point -->
    <circle cx="100" cy="100" r="1.5" fill="currentColor" opacity="1"/>

    <!-- Connections: outer ring -->
    <line x1="100" y1="15" x2="122" y2="21" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="122" y1="21" x2="141" y2="36" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="141" y1="36" x2="154" y2="57" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="154" y1="57" x2="160" y2="80" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="160" y1="80" x2="160" y2="100" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="160" y1="100" x2="160" y2="120" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="160" y1="120" x2="154" y2="143" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="154" y1="143" x2="141" y2="164" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="141" y1="164" x2="122" y2="179" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="122" y1="179" x2="100" y2="185" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="100" y1="185" x2="78" y2="179" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="78" y1="179" x2="59" y2="164" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="59" y1="164" x2="46" y2="143" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="46" y1="143" x2="40" y2="120" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="40" y1="120" x2="40" y2="100" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="40" y1="100" x2="40" y2="80" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="40" y1="80" x2="46" y2="57" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="46" y1="57" x2="59" y2="36" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="59" y1="36" x2="78" y2="21" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <line x1="78" y1="21" x2="100" y2="15" stroke="currentColor" stroke-width="0.6" opacity="0.25"/>

    <!-- Cross connections inner to outer -->
    <line x1="100" y1="55" x2="100" y2="32" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="130" y1="72" x2="135" y2="45" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="142" y1="100" x2="155" y2="75" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="130" y1="128" x2="155" y2="125" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="100" y1="145" x2="100" y2="168" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="70" y1="128" x2="65" y2="155" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="58" y1="100" x2="45" y2="125" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    <line x1="70" y1="72" x2="45" y2="75" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>

    <!-- Core cube edges -->
    <line x1="95" y1="85" x2="105" y2="85" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="105" y1="85" x2="110" y2="100" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="110" y1="100" x2="100" y2="100" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="100" y1="100" x2="95" y2="85" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="95" y1="115" x2="105" y2="115" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="105" y1="115" x2="110" y2="130" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="110" y1="130" x2="90" y2="130" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="90" y1="130" x2="95" y2="115" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="95" y1="85" x2="95" y2="115" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
    <line x1="105" y1="85" x2="105" y2="115" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>
  </g>
</svg>