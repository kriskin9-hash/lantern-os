<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ops — unisona.ai</title>
  <link rel="stylesheet" href="/css/site.css">
  <style>
    body { overflow: hidden; }

    .ops-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Tab bar ── */
    .ops-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 44px;
      overflow-x: auto;
    }
    .ops-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 100%;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .ops-tab:hover { color: var(--text); }
    .ops-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .ops-tab-badge {
      font-size: 10px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 1px 5px;
      font-weight: 700;
    }

    .ops-tab-spacer { flex: 1; }
    .ops-refresh-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .ops-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Panels ── */
    .ops-panels { flex: 1; overflow: hidden; position: relative; }
    .ops-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
    }
    .ops-panel.active { display: block; }

    iframe.ops-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Native panel (agent status) ── */
    .ops-native {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ops-section { display: flex; flex-direction: column; gap: 10px; }
    .ops-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .stat-value.ok  { color: var(--green); }
    .stat-value.warn { color: var(--gold); }
    .stat-value.err  { color: var(--danger); }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .slot-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .slot-card.working { border-color: var(--accent); }
    .slot-card.failed  { border-color: var(--danger); }
    .slot-card.disabled { opacity: 0.45; }
    .slot-header { display: flex; align-items: center; justify-content: space-between; }
    .slot-name  { font-size: 14px; font-weight: 600; }
    .slot-status-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 10px; text-transform: uppercase;
    }
    .slot-status-badge.idle     { background: var(--surface); color: var(--muted); }
    .slot-status-badge.working  { background: rgba(6,182,212,0.15); color: var(--accent); }
    .slot-status-badge.failed   { background: rgba(239,68,68,0.15); color: var(--danger); }
    .slot-status-badge.disabled { background: var(--surface); color: var(--muted); }
    .slot-meta { font-size: 11px; color: var(--muted); }
    .slot-current { font-size: 12px; color: var(--text); }

    .queue-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .queue-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .queue-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
    }
    .queue-table tr:last-child td { border-bottom: none; }
    .queue-table tr:hover td { background: var(--surface2); }
    .status-pill {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 10px; text-transform: uppercase; white-space: nowrap;
    }
    .status-pill.pending  { background: rgba(251,191,36,0.15); color: var(--gold); }
    .status-pill.assigned { background: rgba(6,182,212,0.15); color: var(--accent); }
    .status-pill.completed{ background: rgba(52,211,153,0.15); color: var(--green); }
    .status-pill.failed   { background: rgba(239,68,68,0.15); color: var(--danger); }

    .empty-msg { color: var(--muted); font-size: 13px; padding: 12px 0; }
  </style>
</head>
<body>
<div class="ops-shell">

  <!-- Nav -->
  <nav class="site-nav">
    <a class="nav-brand" href="/stock-trader.html">
      <img src="/mandala.svg" alt="" aria-hidden="true" style="width:18px;height:18px;vertical-align:middle">
      <span>unisona.ai</span>
    </a>
    <div class="nav-links">
      <a href="/dream-chat.html">💬 Chat</a>
      <a href="/ops.html" class="active">⚙️ Ops</a>
    </div>
  </nav>

  <div class="ops-shell">
    <!-- Tab bar -->
    <div class="ops-tabs" role="tablist">
      <button class="ops-tab active" role="tab" aria-selected="true"  data-panel="orchestration">🔄 Orchestration</button>
      <button class="ops-tab"        role="tab" aria-selected="false" data-panel="agents">🤖 Agent Status <span class="ops-tab-badge" id="badge-working" style="display:none">0</span></button>
      <button class="ops-tab"        role="tab" aria-selected="false" data-panel="leaderboard">🏆 Leaderboard</button>
      <button class="ops-tab"        role="tab" aria-selected="false" data-panel="providers">🔑 Providers</button>
      <div class="ops-tab-spacer"></div>
      <button class="ops-refresh-btn" onclick="refreshAll()" aria-label="Refresh all panels">↻ Refresh</button>
    </div>

    <!-- Panels -->
    <div class="ops-panels">

      <!-- Orchestration — iframe -->
      <div class="ops-panel active" id="panel-orchestration" role="tabpanel">
        <iframe class="ops-frame" id="frame-orchestration" src="/orchestration.html" title="Orchestration" loading="lazy"></iframe>
      </div>

      <!-- Agent Status — native live panel -->
      <div class="ops-panel" id="panel-agents" role="tabpanel">
        <div class="ops-native">
          <div class="ops-section">
            <div class="ops-section-title">Queue Summary</div>
            <div class="stat-grid" id="queue-stats">
              <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="stat-pending">—</div></div>
              <div class="stat-card"><div class="stat-label">Working</div><div class="stat-value" id="stat-working">—</div></div>
              <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value ok" id="stat-completed">—</div></div>
              <div class="stat-card"><div class="stat-label">Progress</div><div class="stat-value" id="stat-pct">—</div></div>
            </div>
          </div>
          <div class="ops-section">
            <div class="ops-section-title">Agent Slots</div>
            <div class="slot-grid" id="slot-grid"><div class="empty-msg">Loading…</div></div>
          </div>
          <div class="ops-section">
            <div class="ops-section-title">Work Queue</div>
            <table class="queue-table">
              <thead><tr><th>#</th><th>Title</th><th>Lane</th><th>Status</th><th>Assigned</th></tr></thead>
              <tbody id="queue-rows"><tr><td colspan="5" class="empty-msg">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Leaderboard — iframe -->
      <div class="ops-panel" id="panel-leaderboard" role="tabpanel">
        <iframe class="ops-frame" id="frame-leaderboard" src="" data-src="/agent-leaderboard.html" title="Leaderboard" loading="lazy"></iframe>
      </div>

      <!-- Providers — iframe -->
      <div class="ops-panel" id="panel-providers" role="tabpanel">
        <iframe class="ops-frame" id="frame-providers" src="" data-src="/settings/providers.html" title="Provider Settings" loading="lazy"></iframe>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Tab switching ──────────────────────────────────────────────────────────
  const tabs   = document.querySelectorAll(".ops-tab[data-panel]");
  const panels = document.querySelectorAll(".ops-panel");

  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      const target = tab.dataset.panel;
      tabs.forEach(t => { t.classList.toggle("active", t === tab); t.setAttribute("aria-selected", t === tab); });
      panels.forEach(p => p.classList.toggle("active", p.id === `panel-${target}`));
      // Lazy-load iframes on first activate
      const frame = document.querySelector(`#panel-${target} iframe[data-src]`);
      if (frame && !frame.src.includes(frame.dataset.src)) {
        frame.src = frame.dataset.src;
        frame.removeAttribute("data-src");
      }
    });
  });

  // ── Agent status live data ─────────────────────────────────────────────────
  async function loadAgentStatus() {
    try {
      const r = await fetch("/api/dream/status/agents", { cache: "no-store", signal: AbortSignal.timeout(8000) });
      if (!r.ok) return;
      const d = await r.json();

      // Queue stats
      const q = d.queue || {};
      document.getElementById("stat-pending").textContent   = q.pending   ?? "—";
      document.getElementById("stat-working").textContent   = q.working   ?? "—";
      document.getElementById("stat-completed").textContent = q.completed ?? "—";
      document.getElementById("stat-pct").textContent       = q.pct != null ? `${q.pct}%` : "—";

      // Working badge on tab
      const badge = document.getElementById("badge-working");
      if (q.working > 0) { badge.textContent = q.working; badge.style.display = ""; }
      else { badge.style.display = "none"; }

      // Slot cards
      const grid = document.getElementById("slot-grid");
      const slots = d.slots || [];
      if (slots.length === 0) { grid.innerHTML = '<div class="empty-msg">No slots loaded — run <code>sm.loadSlots()</code></div>'; }
      else {
        grid.innerHTML = slots.map(s => {
          const assigned = (d.raw?.snap?.assigned || []).find(e => e.agent_id === s.id);
          const ago = s.lastHeartbeat ? Math.round((Date.now() - s.lastHeartbeat) / 1000) + "s ago" : "—";
          return `<div class="slot-card ${s.status}">
            <div class="slot-header">
              <span class="slot-name">${escHtml(s.label || s.id)}</span>
              <span class="slot-status-badge ${s.status}">${s.status}</span>
            </div>
            <div class="slot-meta">Lane: ${escHtml(s.lane)} · Retries: ${s.retries ?? 0} · ♥ ${ago}</div>
            ${assigned ? `<div class="slot-current">→ #${assigned.issue_number} ${escHtml((assigned.title||"").slice(0,45))}</div>` : ""}
            ${s.lastError ? `<div class="slot-meta" style="color:var(--danger)">${escHtml(s.lastError.slice(0,60))}</div>` : ""}
          </div>`;
        }).join("");
      }

      // Queue rows
      const snap = d.raw?.snap || {};
      const all = [...(snap.pending||[]), ...(snap.assigned||[]), ...(snap.completed||[])].slice(0, 30);
      const tbody = document.getElementById("queue-rows");
      if (all.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">Queue empty</td></tr>'; }
      else {
        tbody.innerHTML = all.map(e => `<tr>
          <td><a href="${escHtml(e.issue_url||"#")}" target="_blank" rel="noopener" style="color:var(--accent)">#${e.issue_number}</a></td>
          <td>${escHtml((e.title||"").slice(0,55))}</td>
          <td>${escHtml(e.lane||"—")}</td>
          <td><span class="status-pill ${e.status}">${e.status}</span></td>
          <td style="font-size:11px;color:var(--muted)">${e.agent_id||"—"}</td>
        </tr>`).join("");
      }
    } catch {}
  }

  function escHtml(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function refreshAll() {
    loadAgentStatus();
    // Reload active iframes
    document.querySelectorAll(".ops-panel.active iframe").forEach(f => {
      if (f.src) { const s = f.src; f.src = ""; f.src = s; }
    });
  }

  // Initial load + 30s poll
  loadAgentStatus();
  setInterval(loadAgentStatus, 30_000);
</script>
<script src="/js/auth-gate.js" defer></script>
</body>
</html>
