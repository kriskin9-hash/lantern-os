<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="/vendor/fonts/fonts.css"><!-- #861: vendored local-first (was Google Fonts CDN) -->
<title>Kalshi Terminal — unisona.ai</title>
<style>
/* ── palette override: match kalshi-dashboard aesthetic ── */
[data-theme="dark"]{
  --bg:#0a0c10;
  --surface:#12151c;
  --surface2:#1a1f29;
  --border:#2a313d;
  --text:#e8eaf0;
  --muted:#a4adbf;
  --accent:#4a9eff;
  --accent-dim:#1a2d4d;
  --green:#00d4aa;
  --gold:#f5a623;
  --danger:#ff5f6d;
  --shadow:0 2px 12px rgba(0,0,0,.45);
  --shadow-hover:0 4px 24px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f0f2f7;
  --surface:#ffffff;
  --surface2:#f5f7fb;
  --border:#d0d5e0;
  --text:#1a1f2e;
  --muted:#6b7280;
  --accent:#1a6fcf;
  --accent-dim:#dbeafe;
  --green:#059669;
  --gold:#d97706;
  --danger:#dc2626;
  --shadow:0 2px 12px rgba(0,0,0,.10);
  --shadow-hover:0 4px 24px rgba(0,0,0,.18);
}
body{height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── nav status indicators ───────────────────────────────── */
.nav-stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-stat b{color:var(--text);font-weight:600}


/* ── card stage ──────────────────────────────────────────── */
.deck{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:8px 16px 0;min-height:0}
.stage{position:relative;width:min(440px,94vw);height:min(500px,62vh)}

.card{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;
  box-shadow:var(--shadow);will-change:transform;touch-action:none;cursor:grab;user-select:none;overflow:hidden}
.card.front{box-shadow:var(--shadow-hover);z-index:2;border-color:#3a4355}
.card.peek{transform:scale(.94) translateY(18px);filter:brightness(.65);z-index:1;pointer-events:none}
.card.peek2{transform:scale(.88) translateY(36px);filter:brightness(.45);z-index:0;pointer-events:none}
.card.exit{border-color:var(--danger)}

/* card content */
.card-top{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin-bottom:4px;gap:8px}
.card-klass{font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:10px}
.card-klass.position{color:var(--accent)}.card-klass.exit{color:var(--danger)}.card-klass.engine,.card-klass.suggestion{color:var(--gold)}.card-klass.crypto{color:var(--green)}.card-klass.convergence{color:var(--green);font-size:11px}
.countdown{font-weight:600;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px}
.countdown.soon{color:var(--gold)}.countdown.now{color:var(--danger)}
/* uniform real-time generation-age chip — same on every card kind */
.gen-age{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;font-weight:600;
  color:var(--green);letter-spacing:.04em;padding:1px 6px;border:1px solid var(--green);
  border-radius:999px;background:rgba(0,212,170,.06);white-space:nowrap}

.card-q{font-size:16px;font-weight:600;line-height:1.35;margin:6px 0 8px;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}

/* favorable hero */
.fav{border-radius:8px;padding:9px 11px;margin:6px 0 8px;border:1px solid var(--border);background:var(--bg)}
.fav.yes{border-color:var(--green);background:rgba(0,212,170,.04)}.fav.no{border-color:var(--danger);background:rgba(255,95,109,.04)}
.fav-tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
.fav-act{font-size:19px;font-weight:800;margin:4px 0 3px;line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fav.yes .fav-act{color:var(--green)}.fav.no .fav-act{color:var(--danger)}
.fav-px{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',ui-monospace,monospace}
.conv-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.conv-bar{flex:1;height:4px;border-radius:2px;background:var(--surface2);overflow:hidden}
.conv-fill{height:100%;border-radius:2px}
.conv-num{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;color:var(--muted);min-width:54px;text-align:right}
.reason{font-size:11px;color:var(--muted);margin-top:6px;min-height:13px;font-family:'IBM Plex Mono',ui-monospace,monospace}

/* exit ribbon */
.ribbon{font-size:11px;padding:5px 10px;border-radius:7px;background:rgba(239,68,68,.1);
  border:1px solid var(--danger);color:var(--danger);margin-bottom:8px;font-weight:600;letter-spacing:.04em}
.ribbon.profit{background:rgba(52,211,153,.08);border-color:var(--green);color:var(--green)}

/* market meta strip */
.card-meta{display:flex;gap:10px;align-items:center;padding:5px 0 3px;font-size:11px;
  color:var(--muted);font-family:'IBM Plex Mono',ui-monospace,monospace;border-top:1px solid var(--border);margin-top:auto}
.card-meta span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta .meta-badge{padding:1px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);font-size:10px;font-weight:600;letter-spacing:.06em}

/* card actions */
.card-actions{display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.card-actions button{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s}
.card-actions .btn-pass,.card-actions .btn-skip{color:var(--muted);border-color:var(--border)}
.card-actions .btn-pass:hover,.card-actions .btn-skip:hover{background:rgba(255,255,255,.05);color:var(--text)}
.card-actions .btn-take,.card-actions .btn-exit,.card-actions .btn-lockin,.card-actions .btn-hold{background:var(--green);color:#000;border-color:var(--green)}
.card-actions .btn-take:hover,.card-actions .btn-exit:hover,.card-actions .btn-lockin:hover,.card-actions .btn-hold:hover{background:color-mix(in srgb,var(--green) 85%,#fff)}

/* hide actions from peek cards */
.card.peek .card-actions,.card.peek2 .card-actions{display:none}

/* sides */
.sides{display:flex;gap:6px;padding-top:6px}
.side{flex:1;border:1px solid var(--border);border-radius:6px;padding:6px 6px;text-align:center;background:var(--bg)}
.side .lbl{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-transform:uppercase;letter-spacing:.08em;font-family:'IBM Plex Mono',ui-monospace,monospace}
.side .pct{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:17px;font-weight:600;margin-top:2px}
.side.yes .pct{color:var(--green)}.side.no .pct{color:var(--danger)}

/* stamps */
.stamp{position:absolute;top:22px;font-weight:800;font-size:23px;letter-spacing:.06em;
  padding:4px 12px;border-radius:8px;border:3px solid;opacity:0}
.stamp.take{left:20px;color:var(--green);border-color:var(--green);transform:rotate(-12deg)}
.stamp.pass{right:20px;color:var(--danger);border-color:var(--danger);transform:rotate(12deg)}

/* IE state badge */
.state-badge{font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:4px;border:1px solid;vertical-align:middle}
.state-badge.DETERMINED{color:var(--green);border-color:var(--green);background:rgba(52,211,153,.1)}
.state-badge.CONFIDENT{color:var(--gold);border-color:var(--gold);background:rgba(251,191,36,.1)}
.state-badge.UNCERTAIN{color:var(--muted);border-color:var(--border)}
.engine-trace{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.trace-chip{padding:1px 5px;border-radius:3px;background:var(--surface);border:1px solid var(--border)}

/* progress + end screen */
.progress{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;color:var(--muted);text-align:center;padding:3px}
.end{text-align:center;color:var(--muted);font-size:15px;display:none;flex-direction:column;gap:12px;align-items:center}
.reload{font-size:12px;padding:8px 20px;border-radius:8px;border:1px solid var(--accent);
  background:rgba(6,182,212,.1);color:var(--accent);cursor:pointer;font-weight:600}

/* action buttons — live inside each card */
.actions{display:none}
.card-actions{display:flex;gap:12px;align-items:center;justify-content:center;
  padding:10px 0 2px;margin-top:auto;border-top:1px solid var(--border)}
.btn-pass{font-size:16px;font-weight:700;padding:10px 28px;border-radius:12px;border:2px solid var(--danger);
  background:rgba(220,38,38,.1);color:var(--danger);cursor:pointer;letter-spacing:.03em;transition:all .15s;min-width:110px}
.btn-pass:hover{background:rgba(220,38,38,.22);transform:scale(1.04)}
.btn-take{font-size:16px;font-weight:700;padding:10px 28px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#059669,#00d4aa);color:#fff;cursor:pointer;letter-spacing:.03em;transition:all .15s;min-width:110px;box-shadow:0 3px 14px rgba(0,180,130,.35)}
.btn-take:hover{filter:brightness(1.08);transform:scale(1.04)}
.peek .card-actions,.peek2 .card-actions{display:none}
.keyboard-hint{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.05em;text-transform:uppercase;font-weight:500}
/* theme toggle */
.theme-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px;cursor:pointer;color:var(--muted);font-size:13px;transition:border-color .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--text)}

/* focus visible for keyboard navigation */
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* visually hidden heading for screen readers */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}

/* toast */
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;
  font-size:12px;font-family:'IBM Plex Mono',ui-monospace,monospace;max-width:90vw;opacity:0;transition:.25s;z-index:50;white-space:pre-wrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.dry{border-color:var(--green)}.toast.live{border-color:var(--danger)}.toast.err{border-color:var(--gold)}

/* freshness dot pulse (extends site.css .dot) */
@keyframes dotpulse{0%{transform:scale(1.7);opacity:1}100%{transform:scale(1);opacity:.8}}
#sdot{vertical-align:middle;margin-right:4px;transition:background .3s}
#sdot.pulse{animation:dotpulse .5s ease-out}

/* side why — brief rationale under the % */
.side-why{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.3;
  font-family:'IBM Plex Mono',ui-monospace,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* image gallery panel */
.image-gallery{padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;max-height:180px;overflow-y:auto}
.image-gallery-title{font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;font-weight:600}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
.image-item{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border);
  background:var(--surface);aspect-ratio:1;cursor:pointer;transition:all .2s}
.image-item:hover{border-color:var(--accent);transform:scale(1.05);box-shadow:0 0 12px rgba(6,182,212,.3)}
.image-item img{width:100%;height:100%;object-fit:cover}
.image-item-loader{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:24px;animation:spin .8s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

/* image modal */
.image-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;
  justify-content:center;z-index:100;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.image-modal-overlay.active{opacity:1;pointer-events:auto}
.image-modal-content{position:relative;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;gap:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.image-modal-img{max-width:100%;max-height:70vh;object-fit:contain}
.image-modal-close{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);
  color:var(--text);border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:16px;
  transition:background .2s}
.image-modal-close:hover{background:rgba(0,0,0,.8)}
/* ── deck mode toggle + Σ₀ council banner ───────────────────────────────────── */
.mode-bar{display:flex;gap:6px;justify-content:center;padding:8px 8px 4px;flex-wrap:wrap}
.mode-btn{background:#161b24;color:var(--muted);border:1px solid #2c3446;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.mode-btn.active{background:var(--accent,#3b82f6);color:#fff;border-color:transparent}
.mode-btn:focus-visible{outline:2px solid var(--accent,#3b82f6);outline-offset:2px}
.council-banner{margin:0 auto 4px;max-width:560px;padding:8px 12px;border-radius:8px;font-size:11px;line-height:1.5}
.council-banner.warn{background:rgba(220,70,70,.10);border:1px solid rgba(220,70,70,.45)}
.council-banner.ok{background:rgba(60,180,120,.08);border:1px solid rgba(60,180,120,.4)}
.council-banner .cb-head{font-weight:700;font-size:12px;margin-bottom:2px;color:#e8edf5}
.council-banner.warn .cb-head{color:#ff9b9b}
.council-banner .cb-stats{color:var(--muted);font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px}
.council-banner .cb-verdict{color:var(--muted);margin-top:3px;font-size:10px;font-style:italic}
/* grounded-card evidence box */
.grounded-box{margin-top:6px;padding:7px 9px;border-radius:7px;font-size:10.5px;line-height:1.5;font-family:'IBM Plex Mono',ui-monospace,monospace}
.grounded-box.ok{background:rgba(60,150,220,.08);border:1px solid rgba(60,150,220,.4)}
.grounded-box.warn{background:rgba(220,160,40,.08);border:1px solid rgba(220,160,40,.4);color:var(--muted)}
.grounded-box.pending{background:#11151d;border:1px solid #2c3446;color:var(--muted)}
.grounded-box .gb-head{color:#cfe3f5;margin-bottom:3px}
.grounded-box .gb-rat{color:var(--muted);margin-bottom:3px;font-family:inherit}
.grounded-box .gb-foot{color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.grounded-box a{color:#6db3f2;text-decoration:none}
.reground-btn{margin-left:auto;background:#1b2230;color:#cfe3f5;border:1px solid #2c3446;border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer;font-family:inherit}
.reground-btn:hover{background:#222b3d}
.reground-btn:disabled{opacity:.6;cursor:default}
.grounded-box .spin{display:inline-block;animation:spin 1.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<h1 class="sr-only">Kalshi Terminal — Swipe Deck</h1>

<nav class="site-nav">
  <a class="nav-brand" href="/stock-trader.html">
    <img src="/mandala.svg" alt="" aria-hidden="true" style="width:18px;height:18px;vertical-align:middle">
    unisona.ai
  </a>
  <div class="nav-links">
    <a href="/kalshi-terminal.html" class="active">Kalshi Swipe</a>
    <a href="/stock-trader.html">Dashboard</a>
  </div>
  <div class="nav-actions">
    <span class="nav-stat" id="cEnv" aria-label="Environment status"><span class="dot" id="envDot"></span>—</span>
    <span class="nav-stat" id="cBal" aria-label="Account balance">—</span>
    <span class="nav-stat" id="cCreds" aria-label="Credentials status">—</span>
    <span id="cMode" aria-label="Trading mode"><span class="pill held">—</span></span>
    <span class="nav-stat" id="cFresh" aria-label="Data freshness"><span class="dot" id="sdot"></span>—</span>
    <span class="nav-stat" id="cLive" aria-label="Live poller status" style="font-size:11px;color:var(--green)">⟳ —</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" onclick="toggleTheme()">☀</button>
  </div>
</nav>

<div class="mode-bar" role="tablist" aria-label="Deck mode">
  <button class="mode-btn" id="mGrounded" role="tab" aria-selected="false" onclick="setMode('grounded')" title="Web-grounded event markets — research-driven P(YES) vs market price, paper-only">🔎 Grounded</button>
  <button class="mode-btn" id="mReplay" role="tab" aria-selected="true" onclick="setMode('replay')" title="Swipe recorded history — graded instantly vs the real outcome">⟲ Replay</button>
  <button class="mode-btn" id="mPaper" role="tab" aria-selected="false" onclick="setMode('paper')" title="Live candidate markets, paper-only (no real orders)">📝 Paper</button>
  <button class="mode-btn" id="mLive" role="tab" aria-selected="false" onclick="setMode('live')" title="Live decks (currently paused — no proven edge after fees)">● Live</button>
</div>
<div class="council-banner" id="councilBanner" aria-live="polite"></div>

<main class="deck">
  <article class="stage" id="stage" role="region" aria-label="Current market position"></article>
  <div class="end" id="end" role="status" aria-label="No positions available">
    <div>No open positions</div>
    <div style="font-size:12px;color:var(--muted)">Checking for new positions every 5s automatically.</div>
    <button class="btn-ghost" onclick="syncDeck()">↻ Refresh</button>
  </div>
</main>

<div class="progress" id="progress" aria-live="polite" aria-label="Deck progress" role="status"></div>
<div class="actions" role="region" aria-label="Card action buttons">
  <button class="btn-pass" id="bPass" aria-label="Pass on current position" onclick="act('pass')">✕ Pass</button>
  <button class="btn-take" id="bTake" aria-label="Take current position" onclick="act('take')">✓ Take it</button>
  <div class="keyboard-hint">← Pass  Take →</div>
</div>

<div class="image-gallery" id="imageGallery" style="display:none" aria-label="Market chart and news images">
  <div class="image-gallery-title">
    <span>📊 Market Charts</span>
    <button onclick="toggleGallery()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">▼</button>
  </div>
  <div class="image-grid" id="imageGrid"></div>
</div>

<div class="image-modal-overlay" id="imageModal" onclick="closeImageModal(event)">
  <div class="image-modal-content" onclick="event.stopPropagation()">
    <button class="image-modal-close" onclick="closeImageModal()">✕</button>
    <img id="modalImage" class="image-modal-img" src="" alt="Full size image">
  </div>
</div>

<div class="toast" id="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>


<script>
const API='/api/trading/kalshi';
const SYNC_MS=5000, DECK_TARGET=20, PREFETCH_AT=10, MAX_AGE_MS=60000;
let conn={}, deck=[], idx=0, busy=false, dragging=false, liveMap={}, prefetching=false;
let lastSyncMs=0, lastDetCount=null;
// Deck MODE: 'replay' (recorded history, graded vs known outcome — always works),
// 'paper' (live candidates, paper-only), 'live' (original decks, currently paused).
// Default to replay so the swipe is testable + the council trains while live is halted.
let MODE='replay', replayExhausted=false, lastGroundStats=null;

function setMode(m){
  if(MODE===m && deck.length) return;
  MODE=m; deck=[]; idx=0; liveMap={}; prefetching=false; replayExhausted=false;
  for(const [id,mode] of [['mGrounded','grounded'],['mReplay','replay'],['mPaper','paper'],['mLive','live']]){
    const b=document.getElementById(id);
    if(b){ b.classList.toggle('active',mode===m); b.setAttribute('aria-selected',mode===m?'true':'false'); }
  }
  const stage=document.getElementById('stage'); if(stage) stage.innerHTML='';
  document.getElementById('end').style.display='none';
  loadCouncil();
  if(MODE==='live') syncDeck(); else loadModeDeck();
}

// Load a paper/replay/grounded deck slice and append unique cards (continuous deck).
async function loadModeDeck(){
  let d;
  if(MODE==='replay'){
    if(replayExhausted) return;
    d=await j(`/replay-deck?limit=20&offset=${deck.length}`);
    if(!d || !(d.cards||[]).length){ replayExhausted=true; }
  } else if(MODE==='grounded'){
    d=await j('/grounded-deck?limit=14');
    if(d) lastGroundStats=d;
  } else { // paper
    d=await j('/paper-deck?limit=20');
  }
  const cards=(d&&d.cards)||[];
  stampCards(cards, d&&d.generatedAt);
  if(MODE==='grounded'){
    // Grounded cards mutate as background research completes (pending → done), so
    // UPDATE in place (preserving order + the card on screen) and append new tickers.
    const pos=new Map(deck.map((c,i)=>[c.ticker,i]));
    for(const nc of cards){
      if(pos.has(nc.ticker)){
        const i=pos.get(nc.ticker);
        if(!(i===idx&&dragging)) deck[i]=Object.assign({},nc,{_genMs:deck[i]._genMs});
      } else deck.push(nc);
    }
    if(idx<deck.length){
      document.getElementById('end').style.display='none';
      if(!document.getElementById('front')) render(); else if(!dragging) patchFront(deck[idx]);
    } else showModeEnd(d);
    markFresh(deck.length-idx);
    return;
  }
  const have=new Set(deck.map(c=>c.ticker));
  const add=cards.filter(c=>!have.has(c.ticker));
  if(deck.length===0){ deck=add.slice(); idx=0; }
  else if(add.length){ deck.push(...add); }
  if(idx<deck.length){
    document.getElementById('end').style.display='none';
    if(!document.getElementById('front')) render();
  } else {
    showModeEnd(d);
  }
  markFresh(deck.length-idx);
}

// ── real-time freshness ───────────────────────────────────────────────────────
// Every card carries _genMs (server generatedAt, else receipt time). Only cards
// generated within MAX_AGE_MS are shown; the rest are flushed continuously so the
// deck is always live and never serves a stale design.
function stampCards(cards, genAt){
  const ms = genAt ? Date.parse(genAt) : NaN;
  const base = isFinite(ms) ? ms : Date.now();
  for(const c of (cards||[])) c._genMs = base;
  return cards||[];
}
function cardAgeMs(card){ return card._genMs==null ? Infinity : Date.now()-card._genMs; }
// Replay cards are recorded history — staleness (a live-price concern) doesn't apply.
function isFresh(card){ return MODE==='replay' ? true : cardAgeMs(card) < MAX_AGE_MS; }
// Drop non-fresh cards. Never yank a card mid-drag. Returns true if the visible
// front card was removed (caller must re-render); pruning hidden cards needs none.
function flushStale(){
  for(let i=deck.length-1;i>idx;i--){ if(!isFresh(deck[i])) deck.splice(i,1); }
  let frontChanged=false;
  if(!dragging){ while(idx<deck.length && !isFresh(deck[idx])){ deck.splice(idx,1); frontChanged=true; } }
  return frontChanged;
}

// ── syncDeck: initial load + live merge every SYNC_MS ────────────────────────
// Show all open positions (exits first, then holds) + suggestion fill
async function syncDeck(){
  // Paper/replay/grounded modes are paper-only and don't use the live positions deck.
  // Paper + grounded re-poll (grounded cards mutate as background research completes).
  if(MODE!=='live'){ if(MODE==='paper'||MODE==='grounded') await loadModeDeck(); return; }
  const d=await j('/positions-deck');
  // GLOBAL TRADING-PAUSE: server cleared all cards. Force-empty the deck (the
  // in-place prune never removes the front card deck[idx]) and show why.
  if(d.paused){
    deck=[]; idx=0; liveMap={};
    const stage=document.getElementById('stage'); if(stage) stage.innerHTML='';
    const end=document.getElementById('end');
    if(end){
      end.style.display='flex';
      end.innerHTML='<div style="color:var(--gold);font-weight:700">⏸ TRADING PAUSED</div>'
        +'<div style="font-size:12px;color:var(--muted);max-width:320px">'
        +(d.note||'All cards cleared until a strategy is proven net-profitable after fees.')+'</div>'
        +'<button class="btn-ghost" onclick="syncDeck()">↻ Re-check</button>';
    }
    const prog=document.getElementById('progress'); if(prog) prog.textContent='';
    markFresh(0);
    return;
  }
  if(!d.cards) return;
  stampCards(d.cards, d.generatedAt);   // re-stamped each 5s sync → positions stay live
  // Drop positions that expired more than 5 minutes ago — they can't be acted on
  const fresh=d.cards.filter(c=>c.minsToClose==null||c.minsToClose>-5);
  liveMap={}; for(const x of fresh) liveMap[x.ticker]=x;
  markFresh(d.count);

  if(deck.length===0){
    deck=fresh; idx=0;
    document.getElementById('end').style.display='none';
    // No open positions → load the Σ₀ decisive deck instead of dead-ending empty
    if(deck.length===0){ await maybePrefetch(); } else { render(); }
    return;
  }

  const wasAtEnd=idx>=deck.length;
  const acted=new Set(deck.slice(0,idx).map(c=>c.ticker));
  const pending=new Set(deck.slice(idx).map(c=>c.ticker));
  const freshSet=new Set(fresh.map(c=>c.ticker));

  // 1. update prices on pending cards
  for(let i=idx;i<deck.length;i++){
    if(liveMap[deck[i].ticker]) deck[i]=Object.assign({},deck[i],liveMap[deck[i].ticker]);
  }
  // 2. inject brand-new tickers right after current position
  const newCards=fresh.filter(c=>!acted.has(c.ticker)&&!pending.has(c.ticker));
  if(newCards.length) deck.splice(Math.min(idx+1,deck.length),0,...newCards);
  // 3. prune expired positions (not in fresh), and expired/weak suggestion cards
  for(let i=deck.length-1;i>idx;i--){
    const isPosCard=deck[i].kind==='position'||deck[i].kind==='exit';
    if(isPosCard&&!freshSet.has(deck[i].ticker)){ deck.splice(i,1); continue; }
    const isSugg=!isPosCard;
    if(isSugg&&!isSuggestionTradeable(deck[i])) deck.splice(i,1);
  }
  // 4. auto-resurface: were at end, new cards have arrived
  if(wasAtEnd&&idx<deck.length){
    document.getElementById('end').style.display='none';
    render(); return;
  }
  if(idx>=deck.length){ maybePrefetch(); return; }
  // 5. patch front in place (no full re-render — preserves swipe state)
  if(!dragging) patchFront(deck[idx]);
  const rem=deck.length-idx;
  document.getElementById('progress').textContent=rem>0?`Card ${deck.length-rem+1} of ${deck.length} · soonest first`:'';
  maybePrefetch();
}

function markFresh(count){

  const cnt=lastDetCount!=null?` · <b>${lastDetCount}</b>`:'';

// Minimum quality bar for suggestion cards (entry/crypto/engine/convergence)
function isSuggestionTradeable(c){
  if(c.minsToClose!=null && c.minsToClose<=0) return false;   // expired
  if(c.favAsk==null) return false;                             // no live ask
  if(c.kind==='convergence'){
    if(c.favAsk>90) return false;  // <10¢ profit — not worth it
    if(c.favAsk<80) return false;  // not converged enough to be reliable
    return true;
  }
  if(c.favAsk<4 || c.favAsk>96) return false;                 // already resolved (entry cards)
  if((c.conviction||0)<45) return false;                       // edge too thin
  return true;
}

// ── blended deck prefetch (20-card buffer) ────────────────────────────────────
async function maybePrefetch(){
  if(prefetching) return;
  const remaining=deck.length-idx;
  if(remaining>=PREFETCH_AT) return;
  prefetching=true;
  try {
    // Paper/replay modes refill from their own endpoint (next history slice / fresh
    // live candidates). The prefetching flag guards re-entrancy via render().
    if(MODE!=='live'){ await loadModeDeck(); return; }
    const pendingTickers=new Set(deck.slice(idx).map(c=>c.ticker));
    const [detR, ieR, cryR]=await Promise.all([
      j('/decisive-deck?risk=0.5').catch(()=>({})),
      j('/impossibility-deck').catch(()=>({})),
      j('/crypto-intraday').catch(()=>({})),
    ]);
    const det=stampCards(detR.cards, detR.generatedAt);
    const ie =stampCards(ieR.cards,  ieR.generatedAt);
    const cry=stampCards(cryR.cards, cryR.generatedAt);
    // only admit cards generated within the last minute
    const ok=c=>!pendingTickers.has(c.ticker)&&isFresh(c)&&isSuggestionTradeable(c);
    const detCards=det.filter(ok);
    const ieDet=ie.filter(c=>c.stateLabel==='DETERMINED'&&ok(c));
    const ieConf=ie.filter(c=>c.stateLabel==='CONFIDENT'&&ok(c));
    const fill=cry.filter(ok);
    // Σ₀-ranked decisive cards first, then IE/crypto fill; de-dup by ticker; sort by Σ₀ score
    const seen=new Set(); const merged=[];
    for(const c of [...detCards,...ieDet,...ieConf,...fill]){ if(seen.has(c.ticker))continue; seen.add(c.ticker); merged.push(c); }
    merged.sort((a,b)=>(b.sigma0?.score||0)-(a.sigma0?.score||0));
    const toAdd=merged.slice(0,DECK_TARGET-remaining);
    if(!toAdd.length) return;
    deck.push(...toAdd);
    // Keep the not-yet-swiped portion Σ₀-ranked so the best risk-adjusted swipe
    // leads — but NEVER reorder the card currently on screen (deck[idx]). Sorting
    // from idx+1 keeps the visible front stable, which is what was causing the
    // design to visibly switch/flicker on each prefetch cycle.
    if(!dragging){
      const head=deck.slice(0,idx+1);
      const tail=deck.slice(idx+1).sort((a,b)=>(b.sigma0?.score||0)-(a.sigma0?.score||0));
      deck=head.concat(tail);
    }
    const rem=deck.length-idx;
    document.getElementById('progress').textContent=rem>0?`Card ${deck.length-rem+1} of ${deck.length} · soonest first`:'';
    // Only do a full render when there is no card on screen yet (came from the end
    // screen / empty deck). Otherwise refresh the front in place — no stage rebuild,
    // no flicker. Peek layers refresh on the next genuine card change (a swipe).
    if(!dragging&&idx<deck.length){
      if(!document.getElementById('front')) render(); else patchFront(deck[idx]);
    }
  } catch(_){}
  finally{ prefetching=false; }
}

function cleanTitle(title,ticker){
  if(!title) return ticker||'Market';
  // Strip leading "yes " / "no " prefix from raw position labels
  let clean=title.replace(/^(yes|no)\s+/i,'').trim();
  // Only split on compound-market separators (", yes " / ", no "), NOT currency commas
  const m=clean.match(/^(.+?),\s*(yes |no )/i);
  if(m) clean=m[1].trim();
  return clean.length>52?clean.slice(0,49)+'…':clean;
}
function shortLabel(lbl,fallback){
  if(!lbl||lbl===fallback) return fallback;
  // Garbage check: concatenated position list
  if(/,\s*(yes|no)\s/i.test(lbl)) return fallback;
  const clean=lbl.replace(/^(yes|no)\s+/i,'').trim();
  return clean.length>22?clean.slice(0,20)+'…':clean||fallback;
}
function sideLabels(card){
  const y=shortLabel(card.yesLabel,'YES');
  const n=shortLabel(card.noLabel,'NO');
  // If API returns identical labels for both sides, fall back to YES/NO
  return y===n ? {y:'YES',n:'NO'} : {y,n};
}
// Parse threshold from favLabel/yesLabel ("$64,500 or above") → side rationale.
function parseSideWhy(card){
  // Try favLabel first ("$64,500 or above"), then title, then ticker
  const src = card.favLabel || card.yesLabel || card.title || '';
  const m = src.match(/\$([\d,]+(?:\.\d+)?)\s*(?:or\s*(above|below))?/i);
  if(m){
    const price = m[0].replace(/\s+or\s+\w+/i,'').trim();
    const isAbove = !m[2] || m[2].toLowerCase()==='above';
    return {
      y: isAbove ? `▲ resolves above ${price}` : `▼ resolves below ${price}`,
      n: isAbove ? `▼ resolves below ${price}` : `▲ resolves above ${price}`
    };
  }
  // Fallback: parse ticker T-suffix (e.g. KXBTCD-26JUN14-T64499.99)
  const t=(card.ticker||'').match(/T([\d.]+)$/);
  if(t){
    const p='$'+parseFloat(t[1]).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
    return {y:`▲ resolves above ${p}`, n:`▼ resolves below ${p}`};
  }
  // Final fallback: compact reason
  const r=(card.reason||'').replace(/\d+m to close\s*·?\s*/,'').slice(0,30);
  return {y:r, n:r};
}
function convColor(v){ return v>=66?'var(--green)':v>=45?'var(--gold)':'var(--muted)'; }
function fmtCountdown(card){
  if(card.close){
    const ms=Date.parse(card.close)-Date.now();
    if(isFinite(ms)){
      const s=Math.max(0,Math.floor(ms/1000));
      const h=Math.floor(s/3600), m=Math.floor(s%3600/60), ss=s%60;
      const txt=h>0?`${h}h ${m}m`:m>0?`${m}m ${ss}s`:`${ss}s`;
      const cls=s<300?'now':s<3600?'soon':'';
      return {txt:'⏱ '+txt, cls};
    }
  }
  return {txt:'⏱ —', cls:''};
}

function fmtStrategyFitness(fitness){
  if(!fitness) return '';

  const pnl=(fitness.pnl||0).toFixed(1);

  return `<div style="margin-top:6px;padding:5px 8px;border-radius:4px;background:var(--bg);font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:flex;gap:10px;align-items:center">
    <span style="font-weight:600;color:var(--muted)">Fitness</span>
    <span>PnL <b style="color:${pnlCol}">${fitness.pnl>0?'+':''}${pnl}%</b></span>
    <span>DD <b>${dd}%</b></span>
    <span>Stab <b>${stab}</b></span>
    <span style="margin-left:auto">${cnt} trades</span>
  </div>`;
}

  const convLabel=isExit?'priority':'certainty';
  const sl=card.stateLabel||'';
  const stateBadge=(!isSell&&sl)?`<span class="state-badge ${sl}">${sl}</span>`:'';
  const traceHtml=(!isSell&&card.trace&&card.trace.length)?

  const why2=parseSideWhy(card);
  return `
    <div class="stamp take">${isSell?'EXIT':'TAKE'}</div><div class="stamp pass">PASS</div>

    <div class="card-top"><span class="countdown ${cd.cls}">${cd.txt}</span>${genAge}${regimeLabel}${stateBadge}<span class="card-klass ${klLabel}">${klLabel.toUpperCase()}</span></div>
    <h3 class="card-q">${cleanTitle(card.title,card.ticker)}</h3>
    <div class="fav ${favClass}">

function patchFront(card){
  const el=document.getElementById('front');
  if(el) el.innerHTML=cardInner(card);
}

function render(){
  const stage=document.getElementById('stage');
  const remaining=deck.length-idx;
  document.getElementById('progress').textContent=remaining>0?`Card ${deck.length-remaining+1} of ${deck.length} · soonest first`:'';
  if(idx>=deck.length){ stage.innerHTML=''; document.getElementById('end').style.display='flex'; return; }
  document.getElementById('end').style.display='none';
  let html='';
  if(deck[idx+2]){
    html+=`<div class="card peek2">${cardInner(deck[idx+2])}</div>`;
  }
  if(deck[idx+1]){
    const peekExit=deck[idx+1].kind==='exit'?' exit':'';
    html+=`<div class="card peek${peekExit}">${cardInner(deck[idx+1])}</div>`;
  }
  const frontExit=deck[idx].kind==='exit'?' exit':'';
  html+=`<div class="card front${frontExit}" id="front">${cardInner(deck[idx])}</div>`;
  stage.innerHTML=html;
  attachSwipe(document.getElementById('front'));
  maybePrefetch();
}

// tick countdown + freshness every second
setInterval(()=>{
  updateFreshnessChip();
  if(dragging) return;
  // flush cards older than one minute; only re-render if the visible front went stale
  const frontChanged=flushStale();
  if(frontChanged){
    if(idx>=deck.length){ document.getElementById('end').style.display='flex'; maybePrefetch(); }
    else render();
  }

},1000);

// ── swipe with deadzone + minimum distance + velocity ────────────────────────
// RIGHT (take): ≥150px swipe right → EXIT position (hard commit)
// LEFT (pass): ≥150px swipe left → HOLD position (hard commit)
// Deadzone: ±10px to ignore accidental taps
// Time: must complete within 500ms (velocity = distance/time)
function attachSwipe(el){
  if(!el) return;
  // Each render attaches fresh window-level move/up listeners; without removing the
  // previous card's, stale handlers accumulate and race on the shared `dragging` flag
  // (a stale mouseup can clear it before the live card's handler runs, eating swipes).
  if(attachSwipe._cleanup) attachSwipe._cleanup();
  const DEADZONE=10, MIN_SWIPE=150, MAX_SWIPE_TIME=500;
  let startX=0,startY=0,startMs=0,dx=0,dy=0,active=false;
  const take=el.querySelector('.stamp.take'), pass=el.querySelector('.stamp.pass');

  const down=e=>{
    dragging=true; active=true;
    startX=(e.touches?e.touches[0]:e).clientX;
    startY=(e.touches?e.touches[0]:e).clientY;
    startMs=Date.now();
    el.style.cursor='grabbing';
    el.style.transition='none';
    dx=0; dy=0;
  };

  const move=e=>{
    if(!dragging||!active) return;
    const p=e.touches?e.touches[0]:e;
    dx=p.clientX-startX;
    dy=p.clientY-startY;

    // Deadzone: if still in deadzone, don't show feedback
    const inDeadzone=Math.abs(dx)<DEADZONE && Math.abs(dy)<DEADZONE;
    if(inDeadzone){
      el.style.transform='';
      take.style.opacity=0;
      pass.style.opacity=0;
      return;
    }

    // Prevent vertical swipes (check if dx >> dy)
    if(Math.abs(dy) > Math.abs(dx)*0.5){
      active=false;  // not a horizontal swipe
      return;
    }

    // Show feedback proportional to swipe distance
    const swipePercent=Math.min(1, Math.abs(dx)/MIN_SWIPE);
    el.style.transform=`translate(${dx}px,0) rotate(${dx*0.03}deg)`;

    if(dx>DEADZONE){
      take.style.opacity=swipePercent*0.8;
      pass.style.opacity=0;
    } else if(dx<-DEADZONE){
      pass.style.opacity=swipePercent*0.8;
      take.style.opacity=0;
    } else {
      take.style.opacity=0;
      pass.style.opacity=0;
    }
  };

  const up=()=>{
    if(!dragging) return;
    dragging=false;
    active=false;
    el.style.cursor='grab';
    el.style.transition='transform .25s ease';

    const elapsed=Date.now()-startMs;
    const absDx=Math.abs(dx);

    // Require: min distance (150px) AND fast enough (<500ms)
    if(elapsed<=MAX_SWIPE_TIME && absDx>=MIN_SWIPE){
      if(dx>MIN_SWIPE) flyOut('take');        // RIGHT → EXIT
      else if(dx<-MIN_SWIPE) flyOut('pass');  // LEFT → HOLD
      else { reset(); }
    } else {
      reset();
    }
  };

  const reset=()=>{
    el.style.transform='';
    take.style.opacity=0;
    pass.style.opacity=0;
    dx=dy=0;
  };

  el.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
  el.addEventListener('touchstart',down,{passive:true});
  el.addEventListener('touchmove',move,{passive:true});
  el.addEventListener('touchend',up);
  // Remove THIS card's window listeners before the next card attaches its own.
  attachSwipe._cleanup=()=>{
    window.removeEventListener('mousemove',move);
    window.removeEventListener('mouseup',up);
  };
}
function flyOut(dir){
  const el=document.getElementById('front'); if(!el) return;
  const x=dir==='take'?700:-700;
  el.style.transition='transform .3s ease,opacity .3s'; el.style.opacity='0';
  el.style.transform=`translate(${x}px,0) rotate(${x*0.04}deg)`;
  setTimeout(()=>act(dir,true),180);
}

function blockTake(reason){
  const t=document.getElementById('toast');
  t.className='toast err show';
  t.textContent='✕ Blocked — '+reason;
  clearTimeout(blockTake._h); blockTake._h=setTimeout(()=>t.classList.remove('show'),3000);
  idx++; render();
}

// ── act ───────────────────────────────────────────────────────────────────────
async function act(dir,fromSwipe){
  if(busy||idx>=deck.length) return;
  if(dir==='pass'){ if(!fromSwipe) return flyOut('pass'); idx++; render(); return; }
  if(dir==='take' && !fromSwipe) return flyOut('take');

  const card=deck[idx];

  // ── REPLAY mode: grade the swipe vs the recorded outcome (Verify→Converge) ──
  if(MODE==='replay'){
    busy=true;
    try{
      const res=await j('/replay-grade',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ticker:card.ticker, side:card.favSide, entryCents:card.favAsk||card.entryCents||50})});
      showReplayResult(res,card);
      loadCouncil();
      idx++; render();
    }catch(e){ showResult({error:e.message},card); idx++; }
    finally{ busy=false; }
    return;
  }
  // ── GROUNDED mode: take a web-grounded pick → paper position (forward-graded) ─
  if(MODE==='grounded'){
    if(card.grounding_status!=='done'){
      blockTake(card.grounding_status==='knowledge-only'?'No live sources — Re-ground for live data before taking':'Still researching — wait for grounding');
      return;
    }
    if(card.favAsk==null){ blockTake('No live ask — cannot paper-trade'); return; }
    busy=true;
    try{
      const o={ticker:card.ticker, side:card.favSide, action:'buy', type:'limit', count:1, limitCents:card.favAsk,
        source:'kalshi-grounded', grounded_confidence:card.grounded_confidence, grounded_p_yes:card.grounded_p_yes};
      const res=await j('/paper-trade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
      showGroundedResult(res,card);
      idx++; render();
    }catch(e){ showResult({error:e.message},card); idx++; }
    finally{ busy=false; }
    return;
  }
  // ── PAPER mode: open a paper position (no real order) ───────────────────────
  if(MODE==='paper'){
    if(card.favAsk==null){ blockTake('No live ask — cannot paper-trade'); return; }
    busy=true;
    try{
      const o={ticker:card.ticker, side:card.favSide, action:'buy', type:'limit', count:1, limitCents:card.favAsk};
      const res=await j('/paper-trade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
      showPaperResult(res,card);
      idx++; render();
    }catch(e){ showResult({error:e.message},card); idx++; }
    finally{ busy=false; }
    return;
  }

  // ── LIVE mode: original guarded real/dry-run order path ─────────────────────
  // ── Guard: refuse bad takes before anything fires ─────────────────────────
  const isSell=card.kind==='exit'||card.kind==='position';
  if(!isSell){
    // Suggestion / signal / convergence card — enforce quality bar
    if(card.minsToClose!=null&&card.minsToClose<=0){ blockTake('Market expired — time window closed'); return; }
    if(card.marketFound===false){ blockTake('Market closed — no live data'); return; }
    if(card.favAsk==null){ blockTake('No live ask price — cannot trade'); return; }
    if(card.kind==='convergence'){
      if(card.favAsk>90){ blockTake(`Margin too thin (${100-(card.favAsk||0)}¢ profit) — need 10¢ min`); return; }
      if(card.favAsk<80){ blockTake(`Not converged enough (${card.favAsk}¢) — need 80¢ min`); return; }
    } else {
      if(card.favAsk<4||card.favAsk>96){ blockTake(`Market converged (${card.favAsk}¢) — no edge`); return; }
      if((card.conviction||0)<40){ blockTake(`Edge too thin — ${card.conviction||0}% conviction`); return; }
    }
    // Cash sufficiency check for buy orders
    const orderCostCents=card.favAsk||0;
    const balData=await j('/balance');
    const balanceCents=balData.error?0:(balData.balance||balData.balance_cents||0);
    if(balanceCents<orderCostCents){
      blockTake(`Insufficient balance — need $${(orderCostCents/100).toFixed(2)}, have $${(balanceCents/100).toFixed(2)}`);
      return;
    }
  } else {
    // Position / exit card — only block if truly stale with no price
    if(card.marketFound===false&&card.favAsk==null){ blockTake('Market settled — check your portfolio'); return; }
  }

  busy=true;
  try {
    const side=card.favSide;
    const action=isSell?'sell':'buy';
    const qty=isSell?(card.qty||1):1;
    const o={ticker:card.ticker,side,action,type:'limit',count:qty,limitCents:card.favAsk||50};
    const res=await j('/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
    showResult(res,card);
    // paper recording removed — real live data only
    idx++; render();
    if(res.mode==='live') loadBalance();
  } catch(e) {
    showResult({error:e.message},deck[idx]||{});
    idx++;
  } finally {
    busy=false;
  }
}

function showResult(res,card){
  const t=document.getElementById('toast');
  const lbl=(card.favSide==='yes'?'▲ ':'▼ ')+(card.favLabel||card.favSide.toUpperCase());
  if(res.mode==='dry_run'){
    t.className='toast dry show';
    t.textContent=`DRY-RUN · take ${lbl} @ ${card.favAsk||'?'}¢\nplanned, not sent (${(res.wouldBlock||[]).join('; ')})`;
  } else if(res.mode==='live'){
    const ok=res.status>=200&&res.status<300;
    t.className=ok?'toast live show':'toast err show';
    t.textContent=ok?`LIVE · took ${lbl} ✓`:`LIVE · FAILED ${lbl} (status ${res.status}) — check portfolio`;
  } else { t.className='toast err show'; t.textContent=JSON.stringify(res).slice(0,140); }
  clearTimeout(showResult._h); showResult._h=setTimeout(()=>t.classList.remove('show'),3200);
}

function showReplayResult(res,card){
  const t=document.getElementById('toast');
  if(res.error){ t.className='toast err show'; t.textContent='✕ '+res.error; }
  else{
    const w=res.won; const lbl=(card.favSide==='yes'?'▲ YES':'▼ NO');
    t.className='toast '+(w?'live':'err')+' show';
    t.textContent=`REPLAY · ${lbl} → ${w?'WON':'LOST'} · net ${res.net_cents>=0?'+':''}${res.net_cents}¢ after fee (real outcome: ${res.outcome===1?'YES':'NO'})`;
  }
  clearTimeout(showResult._h); showResult._h=setTimeout(()=>t.classList.remove('show'),3400);
}

function showPaperResult(res,card){
  const t=document.getElementById('toast');
  if(res.error){ t.className='toast err show'; t.textContent='✕ '+res.error; }
  else{
    const lbl=(card.favSide==='yes'?'▲ YES':'▼ NO');
    t.className='toast dry show';
    t.textContent=`PAPER · opened ${lbl} @ ${card.favAsk}¢ · tracked in ledger (no real order)`;
  }
  clearTimeout(showResult._h); showResult._h=setTimeout(()=>t.classList.remove('show'),3400);
}

function showGroundedResult(res,card){
  const t=document.getElementById('toast');
  if(res.error){ t.className='toast err show'; t.textContent='✕ '+res.error; }
  else{
    const lbl=(card.favSide==='yes'?'▲ YES':'▼ NO');
    t.className='toast live show';
    t.textContent=`GROUNDED · ${lbl} @ ${card.favAsk}¢ · P(YES) ${Math.round((card.grounded_p_yes||0)*100)}% · paper pick logged, graded on resolution`;
  }
  clearTimeout(showResult._h); showResult._h=setTimeout(()=>t.classList.remove('show'),3600);
}

// Re-ground a single market on demand (web search + LLM, ~20s). Updates the card in place.
async function reground(ticker){
  const card=deck[idx]; if(!card||card.ticker!==ticker) return;
  const btn=document.getElementById('regroundBtn'); if(btn){ btn.disabled=true; btn.textContent='🔎 Researching…'; }
  try{
    const res=await j('/ground',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker})});
    if(res&&res.card){ deck[idx]=Object.assign({},res.card,{_genMs:Date.now()}); patchFront(deck[idx]); loadCouncil(); }
    else if(btn){ btn.disabled=false; btn.textContent='🔎 Re-ground'; }
  }catch(_){ if(btn){ btn.disabled=false; btn.textContent='🔎 Re-ground'; } }
}

}

function openImageModal(url,title){
  document.getElementById('modalImage').src=url;
  document.getElementById('modalImage').alt=title;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeImageModal(e){
  if(e&&e.target!==document.getElementById('imageModal')) return;
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow='';
}

function toggleGallery(){
  const gallery=document.getElementById('imageGallery');
  const grid=document.getElementById('imageGrid');
  imageGalleryOpen=!imageGalleryOpen;
  grid.style.display=imageGalleryOpen?'':'none';
}

// Consolidated keyboard shortcut handler (arrow keys + escape)
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') act('take');
  else if(e.key==='ArrowLeft') act('pass');
  else if(e.key==='Escape') closeImageModal();
});

// ── live-status heartbeat ─────────────────────────────────────────────────────
async function pollLiveStatus(){
  try {
    const d = await fetch(API+'/live-status', {cache:'no-store', signal: AbortSignal.timeout(4000)});
    if(!d.ok){ document.getElementById('cLive').textContent='⟳ —'; return; }
    const s = await d.json();
    const mkt = s.marketCount ?? '?';
    const trained = s.selfTrainRounds ?? 0;
    const alive = s.pollerStatus === 'running';
    const chip = document.getElementById('cLive');
    if(chip){
      chip.textContent = `⟳ live · ${mkt} mkt · ✦${trained}`;
      chip.style.color = alive ? 'var(--green)' : 'var(--gold)';
    }
  } catch(_){ /* silent */ }
}

// Polling interval references for visibility-based pausing
let connInterval, balInterval, syncInterval, imgInterval, liveInterval;

function init(){
  // Restore saved theme
  try{const t=localStorage.getItem('kalshi-theme');if(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeToggle').textContent=t==='dark'?'☀':'🌙';}}catch(_){}
  loadConnection(); loadBalance(); setMode('replay'); loadImages(); pollLiveStatus();

  // Start polling with normal intervals
  connInterval=setInterval(loadConnection,20000);
  balInterval=setInterval(loadBalance,30000);
  syncInterval=setInterval(syncDeck,SYNC_MS);
  imgInterval=setInterval(loadImages,60000);
  liveInterval=setInterval(pollLiveStatus,15000);
  
  // Pause/resume on visibility change to save API quota and battery
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
      // Clear all intervals when tab is hidden
      clearInterval(connInterval); clearInterval(balInterval);
      clearInterval(syncInterval); clearInterval(imgInterval); clearInterval(liveInterval);

      // Set slow fallback intervals (30s for syncDeck, others 2x slower)
      connInterval=setInterval(loadConnection,40000);
      balInterval=setInterval(loadBalance,60000);
      syncInterval=setInterval(syncDeck,30000);
      imgInterval=setInterval(loadImages,120000);
      liveInterval=setInterval(pollLiveStatus,60000);
    }else{
      // Clear slow intervals
      clearInterval(connInterval); clearInterval(balInterval);
      clearInterval(syncInterval); clearInterval(imgInterval); clearInterval(liveInterval);

      // Restore normal intervals
      connInterval=setInterval(loadConnection,20000);
      balInterval=setInterval(loadBalance,30000);
      syncInterval=setInterval(syncDeck,SYNC_MS);
      imgInterval=setInterval(loadImages,60000);
      liveInterval=setInterval(pollLiveStatus,15000);

      // Immediate refresh on tab focus
      loadConnection(); loadBalance(); syncDeck(); loadImages(); pollLiveStatus();
    }
  });
}
document.addEventListener('DOMContentLoaded',init);
</script>
