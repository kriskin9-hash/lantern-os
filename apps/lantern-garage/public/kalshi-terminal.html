<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalshi Swipe — Lantern OS</title>
<style>
  :root{
    --bg0:#0a0c10;--bg1:#12151c;--bg2:#1a1f29;--border:#2a313d;
    --text:#e8eaf0;--text2:#a4adbf;--text3:#7b8498;
    --green:#00d4aa;--red:#ff5f6d;--amber:#f5a623;--blue:#4a9eff;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg0);color:var(--text);font-family:system-ui,-apple-system,sans-serif;
    font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  a{color:var(--blue);text-decoration:none}
  .topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg1);
    border-bottom:1px solid var(--border);flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:.04em}
  .chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--bg2);
    border:1px solid var(--border);color:var(--text2)}
  .chip b{color:var(--text)}
  .chip.live{background:rgba(255,95,109,.15);border-color:var(--red);color:var(--red)}
  .chip.dry{background:rgba(0,212,170,.12);border-color:var(--green);color:var(--green)}
  .chip.fresh{border-color:var(--blue);color:var(--blue)}
  .note{font-size:11px;color:var(--text3);text-align:center;padding:6px 16px}
  .deck{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;padding:8px 16px 0;min-height:0}
  .stage{position:relative;width:min(440px,94vw);height:min(520px,64vh)}
  .card{position:absolute;inset:0;background:linear-gradient(160deg,var(--bg2),var(--bg1));
    border:1px solid var(--border);border-radius:18px;padding:20px;display:flex;flex-direction:column;
    box-shadow:0 18px 50px rgba(0,0,0,.45);will-change:transform;touch-action:none;cursor:grab;user-select:none}
  .card.peek{transform:scale(.94) translateY(14px);filter:brightness(.7);z-index:1;pointer-events:none}
  .card.front{z-index:2}
  .card-top{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);
    font-size:11px;color:var(--text3)}
  .countdown{font-weight:600}
  .countdown.soon{color:var(--amber)}.countdown.now{color:var(--red)}
  .card-q{font-size:20px;font-weight:600;line-height:1.25;margin:12px 0 8px}
  /* favorable hero */
  .fav{border-radius:14px;padding:14px;margin:4px 0 12px;border:1px solid;background:var(--bg0)}
  .fav.yes{border-color:var(--green);box-shadow:0 0 0 1px var(--green) inset}
  .fav.no{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
  .fav-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
  .fav-act{font-size:24px;font-weight:700;margin:3px 0}
  .fav.yes .fav-act{color:var(--green)}.fav.no .fav-act{color:var(--red)}
  .fav-px{font-family:var(--mono);font-size:13px;color:var(--text2)}
  .conv-row{display:flex;align-items:center;gap:8px;margin-top:10px}
  .conv-bar{flex:1;height:7px;border-radius:4px;background:var(--bg1);overflow:hidden;border:1px solid var(--border)}
  .conv-fill{height:100%;border-radius:4px}
  .conv-num{font-family:var(--mono);font-size:11px;color:var(--text2);min-width:54px;text-align:right}
  .reason{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:7px;min-height:13px}
  /* exit card ribbon */
  .ribbon{font-family:var(--mono);font-size:10px;padding:6px 10px;border-radius:8px;
    background:rgba(255,95,109,.15);border:1px solid var(--red);color:var(--red);
    margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
  .ribbon.profit{background:rgba(0,212,170,.12);border-color:var(--green);color:var(--green)}
  /* exit cards: darker bg + distinct border for sell urgency */
  .card.exit{background:linear-gradient(160deg,#1a1f29,#12151c);border-color:#3a3a4a}
  .card.exit .fav{background:rgba(0,0,0,.4)}
  /* context odds */
  .sides{display:flex;gap:10px;margin-top:auto}
  .side{flex:1;border:1px solid var(--border);border-radius:9px;padding:7px;text-align:center;background:var(--bg0)}
  .side .lbl{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .side .pct{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:2px}
  .side.yes .pct{color:var(--green)}.side.no .pct{color:var(--red)}
  /* stamps */
  .stamp{position:absolute;top:22px;font-family:var(--mono);font-weight:800;font-size:26px;
    letter-spacing:.08em;padding:4px 12px;border-radius:8px;border:3px solid;opacity:0}
  .stamp.take{left:20px;color:var(--green);border-color:var(--green);transform:rotate(-12deg)}
  .stamp.pass{right:20px;color:var(--red);border-color:var(--red);transform:rotate(12deg)}
  /* actions */
  .actions{display:flex;gap:34px;align-items:center;justify-content:center;padding:14px}
  .abtn{width:66px;height:66px;border-radius:50%;border:2px solid var(--border);background:var(--bg1);
    font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,border-color .1s}
  .abtn:hover{transform:scale(1.08)}
  .abtn.pass{border-color:var(--red);color:var(--red)}
  .abtn.take{border-color:var(--green);color:var(--green)}
  .alabels{display:flex;gap:34px;justify-content:center;padding-bottom:6px}
  .alabels span{width:66px;text-align:center;font-family:var(--mono);font-size:9px;color:var(--text3)}
  .progress{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center;padding:2px}
  .end{text-align:center;color:var(--text2);font-size:15px;display:none;flex-direction:column;gap:12px;align-items:center}
  .reload{font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:6px;border:1px solid var(--blue);
    background:rgba(74,158,255,.12);color:var(--blue);cursor:pointer}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;
    font-family:var(--mono);font-size:11px;max-width:90vw;opacity:0;transition:.25s;z-index:50;white-space:pre-wrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.dry{border-color:var(--green)}.toast.live{border-color:var(--red)}.toast.err{border-color:var(--amber)}
  /* impossibility engine state badge */
  .state-badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;
    padding:2px 7px;border-radius:4px;border:1px solid;vertical-align:middle}
  .state-badge.DETERMINED{color:var(--green);border-color:var(--green);background:rgba(0,212,170,.1)}
  .state-badge.CONFIDENT{color:var(--amber);border-color:var(--amber);background:rgba(245,166,35,.1)}
  .state-badge.UNCERTAIN{color:var(--text3);border-color:var(--border)}
  .engine-trace{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;
    display:flex;gap:4px;flex-wrap:wrap}
  .trace-chip{padding:1px 5px;border-radius:3px;background:var(--bg1);border:1px solid var(--border)}
  /* sync bar */
  .sync-bar{height:2px;background:var(--border);overflow:hidden;flex-shrink:0}
  .sync-fill{height:100%;background:var(--blue);transform-origin:left;will-change:transform}
  /* sync dot in freshness chip */
  @keyframes sdotpulse{0%{transform:scale(1.8);opacity:1}100%{transform:scale(1);opacity:.7}}
  .sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);
    vertical-align:middle;margin-right:5px;transition:background .3s}
  .sdot.live{background:var(--green);animation:sdotpulse .4s ease-out}
  /* paper book */
  .pbook{padding:6px 16px 10px;max-height:160px;overflow-y:auto;border-top:1px solid var(--border)}
  .pbook-hdr{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--text3);margin-bottom:5px;
    display:flex;justify-content:space-between;align-items:center}
  .prow{font-family:var(--mono);font-size:11px;display:flex;gap:8px;align-items:center;
    padding:4px 8px;border-radius:5px;background:var(--bg1);margin-bottom:3px;border:1px solid var(--border)}
  .prow.sl{border-color:var(--red)}.prow.tp{border-color:var(--green)}
  .pticker{color:var(--text2);min-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pside-yes{color:var(--green)}.pside-no{color:var(--red)}
  .ppnl{min-width:44px;text-align:right}
  .ppnl.pos{color:var(--green)}.ppnl.neg{color:var(--red)}
  .ptag{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid}
  .ptag.sl{color:var(--red);border-color:var(--red)}.ptag.tp{color:var(--green);border-color:var(--green)}
  .pclose{margin-left:auto;cursor:pointer;color:var(--text3);font-size:13px;background:none;border:none;padding:2px 4px}
  .pclose:hover{color:var(--text)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">Kalshi Swipe</span>
  <span class="chip" id="cEnv">env —</span>
  <span class="chip" id="cBal">balance —</span>
  <span class="chip" id="cCreds">creds —</span>
  <span class="chip" id="cMode">mode —</span>
  <span class="chip fresh" id="cFresh"><span class="sdot" id="sdot"></span>—</span>
  <a href="/trader-dashboard.html" style="margin-left:auto;font-size:11px">← Dashboard</a>
</div>
<div class="sync-bar"><div class="sync-fill" id="syncFill"></div></div>
<div class="note" id="note">Green / swipe right = take the favorable position · Red / swipe left = pass. Live now-slice, refreshed every 6s. Practice mode.</div>

<div class="deck">
  <div class="stage" id="stage"></div>
  <div class="end" id="end">
    <div>No open positions</div>
    <div style="font-size:12px;color:var(--text3)">Checking for new positions every 5s automatically.</div>
    <button class="reload" onclick="syncDeck()">↻ Refresh</button>
  </div>
</div>
<div class="progress" id="progress"></div>
<div class="actions">
  <button class="abtn pass" id="bPass" aria-label="Pass" onclick="act('pass')">✗</button>
  <button class="abtn take" id="bTake" aria-label="Take favorable position" onclick="act('take')">✓</button>
</div>
<div class="alabels"><span>Pass</span><span>Take it</span></div>

<div class="toast" id="toast"></div>

<div class="pbook" id="pbook" style="display:none">
  <div class="pbook-hdr">
    <span>PAPER BOOK</span>
    <span id="pbook-count" style="color:var(--text3)"></span>
  </div>
  <div id="pbook-rows"></div>
</div>

<script>
const API='/api/trading/kalshi';
const SYNC_MS=5000;
let conn={}, deck=[], idx=0, busy=false, dragging=false, liveMap={};
let lastSyncMs=0, lastDetCount=null;

async function j(path,opts){ try{const r=await fetch(API+path,opts);return await r.json();}catch(e){return{error:e.message};} }
const c=v=>v==null?'—':v;

async function loadConnection(){
  conn=await j('/connection');
  cEnv.innerHTML='env <b>'+c(conn.env)+'</b>';
  cCreds.innerHTML='creds <b style="color:'+(conn.credentials?'var(--green)':'var(--red)')+'">'+(conn.credentials?'connected':'none')+'</b>';
  const live=conn.canTradeLive, m=document.getElementById('cMode');
  m.className='chip '+(live?'live':'dry'); m.innerHTML=live?'LIVE':'DRY-RUN';
  document.getElementById('note').textContent = live
    ? '⚠ LIVE: "Take it" sells the position at current bid. Right=cash out, left=hold.'
    : '⚠ DRY-RUN: orders not sent. Right=cash out, left=hold. Set KALSHI_TRADING_ENABLED=1 for live.';
}
async function loadBalance(){
  const d=await j('/balance');
  cBal.innerHTML='balance <b>'+(d.error?'—':'$'+(d.balance_dollars!=null?d.balance_dollars:((d.balance||0)/100).toFixed(2)))+'</b>';
}

// ── syncDeck: initial load + live merge every SYNC_MS ────────────────────────
async function syncDeck(){
  const d=await j('/positions-deck');
  if(!d.cards) return;
  const fresh=d.cards;
  liveMap={}; for(const x of fresh) liveMap[x.ticker]=x;
  markFresh(d.count);

  if(deck.length===0){
    // first load
    deck=fresh; idx=0;
    document.getElementById('end').style.display='none';
    render(); return;
  }

  const wasAtEnd=idx>=deck.length;
  const acted=new Set(deck.slice(0,idx).map(c=>c.ticker));
  const pending=new Set(deck.slice(idx).map(c=>c.ticker));
  const freshSet=new Set(fresh.map(c=>c.ticker));

  // 1. update prices on pending cards
  for(let i=idx;i<deck.length;i++){
    if(liveMap[deck[i].ticker]) deck[i]=Object.assign({},deck[i],liveMap[deck[i].ticker]);
  }
  // 2. inject brand-new tickers right after current position
  const newCards=fresh.filter(c=>!acted.has(c.ticker)&&!pending.has(c.ticker));
  if(newCards.length) deck.splice(Math.min(idx+1,deck.length),0,...newCards);
  // 3. prune expired (not in fresh) from pending — never prune the current front
  for(let i=deck.length-1;i>idx;i--){
    if(!freshSet.has(deck[i].ticker)) deck.splice(i,1);
  }
  // 4. auto-resurface: were at end, new cards have arrived
  if(wasAtEnd&&idx<deck.length){
    document.getElementById('end').style.display='none';
    render(); return;
  }
  if(idx>=deck.length) return;
  // 5. patch front in place (no full re-render — preserves swipe state)
  if(!dragging) patchFront(deck[idx]);
  const rem=deck.length-idx;
  document.getElementById('progress').textContent=rem>0?`${rem} of ${deck.length} · soonest first`:'';
}

function markFresh(count){
  lastSyncMs=Date.now(); lastDetCount=count;
  const dot=document.getElementById('sdot');
  if(dot){ dot.className='sdot live'; setTimeout(()=>{if(dot) dot.className='sdot';},600); }
  const fill=document.getElementById('syncFill');
  if(fill){
    fill.style.transition='none'; fill.style.transform='scaleX(1)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      fill.style.transition=`transform ${SYNC_MS}ms linear`; fill.style.transform='scaleX(0)';
    }));
  }
  updateFreshnessChip();
}
function updateFreshnessChip(){
  const chip=document.getElementById('cFresh'); if(!chip) return;
  const age=lastSyncMs?Math.floor((Date.now()-lastSyncMs)/1000):null;
  const ageStr=age==null?'—':age<2?'live':age<60?`${age}s ago`:`${Math.floor(age/60)}m ago`;
  const cnt=lastDetCount!=null?` · <b>${lastDetCount} pos</b>`:'';
  chip.innerHTML=`<span class="sdot" id="sdot"></span>${ageStr}${cnt}`;
}

function convColor(v){ return v>=66?'var(--green)':v>=45?'var(--amber)':'var(--text3)'; }
function fmtCountdown(card){
  if(card.close){
    const ms=Date.parse(card.close)-Date.now();
    if(isFinite(ms)){
      const s=Math.max(0,Math.floor(ms/1000));
      const h=Math.floor(s/3600), m=Math.floor(s%3600/60), ss=s%60;
      const txt = h>0?`${h}h ${m}m`: m>0?`${m}m ${ss}s`:`${ss}s`;
      const cls = s<300?'now': s<3600?'soon':'';
      return {txt:'⏱ '+txt, cls};
    }
  }
  return {txt:'⏱ —', cls:''};
}

function cardInner(card){
  const noPct=100-(card.yesPct||0);
  const cd=fmtCountdown(card);
  const fav=card.favSide;
  const isPosition=card.kind==='position';
  const isExit=card.kind==='exit';
  const isSell=isPosition||isExit;

  // ── Position card (open Kalshi holding) ─────────────────────────────────────
  if(isPosition){
    const pnlPct=card.pnlPct||0;
    const pnlColor=pnlPct>=0?'var(--green)':'var(--red)';
    const pnlSign=pnlPct>=0?'+':'';
    const pnlDollars=card.pnlCents!=null?(card.pnlCents>=0?'+':'')+((card.pnlCents/100).toFixed(2)):null;
    const maxPayout=card.maxPayoutCents!=null?'$'+(card.maxPayoutCents/100).toFixed(2):null;
    const tag=card.exitTag;
    const ribbonCls=tag==='TAKE-PROFIT'?'ribbon profit':'ribbon';
    const ribbon=tag?`<div class="${ribbonCls}">⚠ ${tag} · ${pnlSign}${pnlPct}%</div>`:'';
    const favClass=fav==='yes'?'yes':'no';
    return `
      <div class="stamp take">SELL</div><div class="stamp pass">HOLD</div>
      ${ribbon}
      <div class="card-top"><span class="countdown ${cd.cls}">${cd.txt}</span><span>position</span></div>
      <div class="card-q">${card.title||card.ticker}</div>
      <div class="fav ${favClass}">
        <div class="fav-tag">${card.qty||1} × ${fav.toUpperCase()} · cash out</div>
        <div class="fav-act">● SELL ${card.favLabel||fav.toUpperCase()}</div>
        <div class="fav-px">@ ${card.favAsk!=null?card.favAsk+'¢':'mkt'} bid · ${card.qty||1} contract${(card.qty||1)>1?'s':''}</div>
        <div class="conv-row">
          <div class="conv-bar"><div class="conv-fill" style="width:${Math.min(100,Math.abs(pnlPct)*2)}%;background:${pnlColor}"></div></div>
          <div class="conv-num" style="color:${pnlColor}">${pnlSign}${pnlPct}%</div>
        </div>
        <div class="reason">entry ${card.entryCents||'?'}¢${maxPayout?' · max payout '+maxPayout:''}${pnlDollars?` <span style="float:right;color:${pnlColor}">${pnlDollars}</span>`:''}</div>
      </div>
      <div class="sides">
        <div class="side yes"><div class="lbl">${card.yesLabel||'YES'}</div><div class="pct">${card.yesPct==null?'—':card.yesPct+'%'}</div></div>
        <div class="side no"><div class="lbl">${card.noLabel||'NO'}</div><div class="pct">${card.yesPct==null?'—':noPct+'%'}</div></div>
      </div>`;
  }

  // ── Entry / exit card (original engine cards) ────────────────────────────────
  const favClass=isExit?(card.exitTag==='TAKE-PROFIT'?'yes':'no'):fav;
  const ribbonClass=isExit&&card.exitTag==='TAKE-PROFIT'?'ribbon profit':'ribbon';
  const ribbon=isExit?`<div class="${ribbonClass}">⚠ SELL NOW · ${card.exitTag}${card.pnlPct!=null?' '+(card.pnlPct>=0?'+':'')+card.pnlPct+'%':''}</div>`:'';
  const tag=isExit?'High-priority exit':'Favorable now';
  const act=isSell
    ? `● SELL ${card.favLabel||fav.toUpperCase()}`
    : `${fav==='yes'?'▲':'▼'} BUY ${card.favLabel||fav.toUpperCase()}`;
  const px=isSell
    ? `@ ${card.favAsk!=null?card.favAsk+'¢':'mkt'} · ${card.qty||1} contract${(card.qty||1)>1?'s':''}`
    : `@ ${card.favAsk!=null?card.favAsk+'¢':'mkt'} · 1 contract`;
  const convLabel=isExit?'priority':'certainty';
  const sl=card.stateLabel||'';
  const stateBadge=(!isSell&&sl)?`<span class="state-badge ${sl}">${sl}</span>`:'';
  const traceHtml=(!isSell&&card.trace&&card.trace.length)?
    `<div class="engine-trace">${card.trace.map(t=>`<span class="trace-chip">${t.constraint} −${t.eliminated}</span>`).join('')}</div>`:'';
  return `
    <div class="stamp take">${isSell?'SELL':'TAKE'}</div><div class="stamp pass">PASS</div>
    ${ribbon}
    <div class="card-top"><span class="countdown ${cd.cls}">${cd.txt}</span>${stateBadge}<span>${isExit?'position':'engine'}</span></div>
    <div class="card-q">${card.title||card.ticker}</div>
    <div class="fav ${favClass}">
      <div class="fav-tag">${tag}</div>
      <div class="fav-act">${act}</div>
      <div class="fav-px">${px}</div>
      <div class="conv-row">
        <div class="conv-bar"><div class="conv-fill" style="width:${card.conviction}%;background:${convColor(card.conviction)}"></div></div>
        <div class="conv-num">${card.conviction}% ${convLabel}</div>
      </div>
      <div class="reason">${card.reason||''}</div>
      ${traceHtml}
    </div>
    <div class="sides">
      <div class="side yes"><div class="lbl">${card.yesLabel||'YES'}</div><div class="pct">${card.yesPct==null?'—':card.yesPct+'%'}</div></div>
      <div class="side no"><div class="lbl">${card.noLabel||'NO'}</div><div class="pct">${card.yesPct==null?'—':noPct+'%'}</div></div>
    </div>`;
}

function patchFront(card){
  const el=document.getElementById('front');
  if(el) el.innerHTML=cardInner(card);
}

function render(){
  const stage=document.getElementById('stage');
  const remaining=deck.length-idx;
  document.getElementById('progress').textContent = remaining>0 ? `${remaining} of ${deck.length} · soonest first` : '';
  if(idx>=deck.length){ stage.innerHTML=''; document.getElementById('end').style.display='flex'; return; }
  let html='';
  if(deck[idx+1]){
    const peekExit=deck[idx+1].kind==='exit'?' exit':'';
    html+=`<div class="card peek${peekExit}">${cardInner(deck[idx+1])}</div>`;
  }
  const frontExit=deck[idx].kind==='exit'?' exit':'';
  html+=`<div class="card front${frontExit}" id="front">${cardInner(deck[idx])}</div>`;
  stage.innerHTML=html;
  attachSwipe(document.getElementById('front'));
}

// tick countdown + freshness age every second
setInterval(()=>{
  updateFreshnessChip();
  if(dragging||idx>=deck.length) return;
  const el=document.getElementById('front'); if(!el) return;
  const cd=fmtCountdown(deck[idx]); const c=el.querySelector('.countdown');
  if(c){ c.textContent=cd.txt; c.className='countdown '+cd.cls; }
},1000);

// ── swipe ────────────────────────────────────────────────────────────────────
function attachSwipe(el){
  if(!el) return;
  let startX=0,startY=0,dx=0,dy=0;
  const take=el.querySelector('.stamp.take'), pass=el.querySelector('.stamp.pass');
  const down=e=>{dragging=true;startX=(e.touches?e.touches[0]:e).clientX;startY=(e.touches?e.touches[0]:e).clientY;el.style.cursor='grabbing';el.style.transition='none';};
  const move=e=>{
    if(!dragging)return;
    const p=e.touches?e.touches[0]:e;
    dx=p.clientX-startX; dy=p.clientY-startY;
    el.style.transform=`translate(${dx}px,${dy}px) rotate(${dx*0.05}deg)`;
    take.style.opacity=Math.max(0,Math.min(1,dx/110));
    pass.style.opacity=Math.max(0,Math.min(1,-dx/110));
  };
  const up=()=>{
    if(!dragging)return; dragging=false; el.style.cursor='grab'; el.style.transition='transform .25s ease';
    if(dx>120) flyOut('take'); else if(dx<-120) flyOut('pass');
    else { el.style.transform=''; take.style.opacity=0; pass.style.opacity=0; }
    dx=dy=0;
  };
  el.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  el.addEventListener('touchstart',down,{passive:true}); el.addEventListener('touchmove',move,{passive:true}); el.addEventListener('touchend',up);
}
function flyOut(dir){
  const el=document.getElementById('front'); if(!el) return;
  const x=dir==='take'?700:-700;
  el.style.transition='transform .3s ease,opacity .3s'; el.style.opacity='0';
  el.style.transform=`translate(${x}px,0) rotate(${x*0.04}deg)`;
  setTimeout(()=>act(dir,true),180);
}

// ── act: take favorable / pass ───────────────────────────────────────────────
async function act(dir,fromSwipe){
  if(busy||idx>=deck.length) return;
  if(dir==='pass'){ if(!fromSwipe) return flyOut('pass'); idx++; render(); return; }
  if(dir==='take' && !fromSwipe) return flyOut('take');
  // take favorable position (buy) OR close held position (sell)
  busy=true;
  try {
    const card=deck[idx];
    const side=card.favSide;
    const isSell=card.kind==='exit'||card.kind==='position';
    const action=isSell?'sell':'buy';
    const qty=isSell?(card.qty||1):1;
    const o={ticker:card.ticker,side,action,type:'limit',count:qty,limitCents:card.favAsk||50};
    const res=await j('/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
    showResult(res,card);
    if(!isSell && (res.mode==='dry_run'||res.mode==='live')) recordPaperTrade(card);
    idx++; render();
    if(res.mode==='live') loadBalance();
  } catch(e) {
    showResult({error:e.message},deck[idx]||{});
    idx++;
  } finally {
    busy=false;
  }
}

function showResult(res,card){
  const t=document.getElementById('toast');
  const lbl=(card.favSide==='yes'?'▲ ':'▼ ')+(card.favLabel||card.favSide.toUpperCase());
  if(res.mode==='dry_run'){
    t.className='toast dry show';
    t.textContent=`DRY-RUN · take ${lbl} @ ${card.favAsk||'?'}¢\nplanned, not sent (${(res.wouldBlock||[]).join('; ')})`;
  } else if(res.mode==='live'){
    t.className='toast live show'; t.textContent=`LIVE · took ${lbl} (status ${res.status})`;
  } else { t.className='toast err show'; t.textContent=JSON.stringify(res).slice(0,140); }
  clearTimeout(showResult._h); showResult._h=setTimeout(()=>t.classList.remove('show'),3200);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') act('take');
  else if(e.key==='ArrowLeft') act('pass');
});

// ── paper book: track dry-run entries, poll P&L, auto-exit ───────────────────
const closingIds = new Set(); // prevent double-close race

function recordPaperTrade(card){
  j('/paper-trade',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ticker:card.ticker,title:card.title||card.ticker,
      side:card.favSide,action:'buy',count:1,limitCents:card.favAsk||50})});
}

async function closePaper(id, exitTag){
  if(closingIds.has(id)) return;
  closingIds.add(id);
  await j('/paper-close',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,exitTag})});
}

async function pollPaperBook(){
  const d = await j('/paper-positions');
  const positions = (d.positions||[]).filter(p=>!p.resolved&&!p.expired&&!p.error);
  const el = document.getElementById('pbook');
  if(positions.length===0){ el.style.display='none'; return; }
  el.style.display='';
  document.getElementById('pbook-count').textContent = positions.length+' open';

  // Auto-exit triggered positions
  for(const p of positions){
    if(p.autoExit && !closingIds.has(p.id)){
      closePaper(p.id, p.autoExit);
    }
  }

  const rows = positions.map(p=>{
    const pct = p.pnlPct;
    const pnlClass = pct==null?'': pct>=0?'pos':'neg';
    const pnlTxt = pct==null?'...':(pct>=0?'+':'')+pct+'%';
    const rowCls = p.autoExit==='STOP-LOSS'?'sl': p.autoExit==='TAKE-PROFIT'?'tp':'';
    const tag = p.autoExit
      ? `<span class="ptag ${p.autoExit==='STOP-LOSS'?'sl':'tp'}">${p.autoExit}</span>`
      : (p.minsToClose!=null?`<span style="color:var(--text3)">${p.minsToClose}m</span>`:'');
    const sideClass = p.side==='yes'?'pside-yes':'pside-no';
    return `<div class="prow ${rowCls}">
      <span class="pticker">${(p.title||p.ticker).slice(0,28)}</span>
      <span class="${sideClass}">${p.side.toUpperCase()} @${p.entryCents||'?'}¢</span>
      <span class="ppnl ${pnlClass}">${pnlTxt}</span>
      ${tag}
      <button class="pclose" onclick="closePaper('${p.id}','MANUAL');pollPaperBook()">×</button>
    </div>`;
  }).join('');
  document.getElementById('pbook-rows').innerHTML = rows;
}

function init(){
  loadConnection(); loadBalance(); syncDeck(); pollPaperBook();
  setInterval(loadConnection,20000);
  setInterval(loadBalance,30000);
  setInterval(()=>{ syncDeck(); pollPaperBook(); },SYNC_MS);
}
document.addEventListener('DOMContentLoaded',init);
</script>
