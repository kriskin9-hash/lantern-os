<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dream Journal • Orion</title>
  <style>
    :root {
      --bg: #0a0b10;
      --surface: #12141c;
      --accent: #6b5ce8;
      --text: #e6e8f0;
      --muted: #7a7f96;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1f2230;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 50%;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }
    .message {
      margin-bottom: 16px;
      max-width: 80%;
    }
    .user { align-self: flex-end; text-align: right; }
    .agent { color: #c8cbda; }
    #composer {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid #1f2230;
    }
    #message {
      flex: 1;
      background: #1a1d27;
      border: 1px solid #2a2e40;
      color: var(--text);
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0 24px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <div>
      <strong>Dream Journal</strong><br>
      <span style="font-size:12px; color:var(--muted)">Orion Edition</span>
    </div>
  </header>

  <div id="chat"></div>

  <div id="composer">
    <input id="message" placeholder="Share a dream, a door, or a feeling..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('message');

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<div>${text}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      // Placeholder for real streaming call
      setTimeout(() => {
        addMessage("...", 'agent');
      }, 400);
    }
  </script>
</body>
</html>
