<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalshi Terminal — Progress Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Monaco', monospace; background: linear-gradient(135deg, #0a0c10 0%, #1a1d28 100%); color: #00ff00; padding: 20px; min-height: 100vh; }
  .container { max-width: 1400px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #00ff00; padding-bottom: 20px; }
  h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 0 0 10px #00ff00; }
  .timestamp { color: #00cc00; font-size: 0.9em; }
  .section { background: rgba(0, 20, 0, 0.8); border: 2px solid #00ff00; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .section h2 { font-size: 1.5em; margin-bottom: 20px; color: #00ff00; border-bottom: 2px solid #00cc00; padding-bottom: 10px; }
  .phases { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
  .phase-card { background: rgba(0, 10, 0, 0.9); border: 1px solid #00cc00; border-radius: 6px; padding: 15px; }
  .phase-name { color: #00ff00; font-weight: bold; margin-bottom: 8px; font-size: 1.05em; }
  .phase-status { color: #00aa00; margin-bottom: 8px; font-weight: bold; }
  .phase-desc { color: #00cc00; font-size: 0.9em; margin-bottom: 8px; line-height: 1.4; }
  .training-loops { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
  .loop-card { background: rgba(0, 10, 0, 0.9); border: 1px solid #00cc00; border-radius: 6px; padding: 15px; }
  .loop-card h3 { color: #00ff00; margin-bottom: 10px; }
  .loop-interval { color: #00cc00; font-size: 0.9em; margin-bottom: 10px; }
  .data-files { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
  .file-card { background: rgba(0, 10, 0, 0.9); border: 1px solid #00cc00; border-radius: 6px; padding: 15px; }
  .file-card h3 { color: #00ff00; margin-bottom: 10px; font-size: 1em; }
  .file-detail { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.9em; color: #00cc00; }
  .goals { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
  .goal-item { background: rgba(0, 10, 0, 0.9); border: 1px solid #00cc00; border-radius: 6px; padding: 15px; }
  .goal-target { color: #00ff00; font-weight: bold; margin-bottom: 8px; }
  .goal-status { text-align: center; padding: 8px; border-radius: 4px; background: #00aa00; color: #000; font-weight: bold; font-size: 0.9em; }
  .loading { text-align: center; padding: 40px 20px; color: #00ff00; font-size: 1.2em; }
  .error { background: rgba(255, 0, 0, 0.2); border: 2px solid #ff0000; color: #ff6666; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
  .refresh-btn { background: #00ff00; color: #000; border: none; padding: 12px 24px; border-radius: 6px; font-family: 'Monaco', monospace; font-weight: bold; cursor: pointer; margin: 20px auto; display: block; font-size: 1em; }
  .refresh-btn:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .status-running { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 Kalshi Terminal — Progress Dashboard</h1>
      <div class="timestamp" id="timestamp">Loading...</div>
    </header>
    <button class="refresh-btn" onclick="refreshDashboard()">🔄 Refresh</button>
    <div id="content"></div>
  </div>

<script>
  async function refreshDashboard() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">⏳ Fetching...</div>';
    try {
      const response = await fetch('/api/trading/kalshi/dashboard/progress');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      renderDashboard(data);
    } catch (error) {
      content.innerHTML = `<div class="error">❌ ${error.message}</div>`;
    }
  }
  function renderDashboard(report) {
    const html = `
      <section class="section">
        <h2>📊 5 Phases — All Complete ✅</h2>
        <div class="phases">
          ${Object.values(report.phases).map(p => `
            <div class="phase-card">
              <div class="phase-name">${p.name}</div>
              <div class="phase-status">${p.status}</div>
              <div class="phase-desc">${p.description}</div>
              <div style="color: #ffff00; font-size: 0.9em; margin-top: 10px;">Impact: ${p.impact}</div>
            </div>
          `).join('')}
        </div>
      </section>
      <section class="section">
        <h2>🔄 4 Parallel Training Loops</h2>
        <div class="training-loops">
          ${Object.values(report.trainingLoops).map(l => `
            <div class="loop-card">
              <h3>${l.name}</h3>
              <div class="loop-interval">⏱️ ${l.interval}</div>
              <div style="color: #00cc00; font-size: 0.85em; margin-bottom: 10px;">${l.purpose}</div>
              <div style="color: #ffff00;">→ ${l.dataTarget}</div>
            </div>
          `).join('')}
        </div>
      </section>
      <section class="section">
        <h2>📁 Data Files</h2>
        <div class="data-files">
          ${Object.values(report.dataFiles).map(f => `
            <div class="file-card">
              <h3>${f.file}</h3>
              <div style="color: #00cc00; font-size: 0.85em; margin-bottom: 10px;">${f.purpose}</div>
              <div class="file-detail">
                <span>Size:</span>
                <span style="color: #ffff00;">${f.size}</span>
              </div>
              <div class="file-detail">
                <span>Records:</span>
                <span style="color: #ffff00;">${f.records || f.stats?.markets || 'N/A'}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
      <section class="section">
        <h2>🎯 Core Goals</h2>
        <div class="goals">
          ${Object.values(report.goals).map(g => `
            <div class="goal-item">
              <div class="goal-target">${g.target}</div>
              <div style="color: #00cc00; font-size: 0.9em; margin-bottom: 8px;">${g.approach}</div>
              <div class="goal-status">${g.status}</div>
            </div>
          `).join('')}
        </div>
      </section>
    `;
    document.getElementById('content').innerHTML = html;
    document.getElementById('timestamp').textContent = `Generated: ${new Date().toLocaleString()}`;
  }
  refreshDashboard();
  setInterval(refreshDashboard, 30000);
</script>
<script src="/js/auth-gate.js" defer></script>
</body>
</html>
