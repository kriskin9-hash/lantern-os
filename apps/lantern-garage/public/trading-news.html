<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/site.css">
  <title>Trading News — unisona.ai</title>
  <style>
    @import url('/vendor/fonts/fonts.css'); /* #861: vendored local-first (was Google Fonts CDN) */

    :root {
      --mono: 'IBM Plex Mono', monospace;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      margin: 0;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    header p { font-size: 0.78rem; color: var(--muted); margin: 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 14px;
    }
    .full-width { grid-column: 1 / -1; }

    .loading {
      text-align: center;
      padding: 60px;
      font-family: var(--mono);
      color: var(--muted);
    }

    /* ── News Overview stats ── */
    .stat-row{ display:flex; gap:28px; flex-wrap:wrap; }
    .stat-block{ display:flex; flex-direction:column; gap:3px; }
    .stat-label{ font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .stat-value{ font-family:var(--mono); font-size:1.15rem; font-weight:600; color:var(--text); }
    .stat-value.neg{ color:var(--danger); }
    .last-update{ font-size:.7rem; color:var(--muted); margin-top:10px; }

    /* ── Tab bar ── */
    .tab-bar{ display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .tab{ font-family:var(--mono); font-size:11px; padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; transition:all .15s; letter-spacing:.05em; }
    .tab.active,.tab:hover{ background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }

    /* ── Timeline rail ── */
    .timeline-rail{ position:relative; padding-left:24px; }
    .timeline-rail::before{ content:''; position:absolute; left:7px; top:0; bottom:0; width:2px; background:var(--border); }
    .tl-item{ position:relative; margin-bottom:14px; }
    .tl-dot{ position:absolute; left:-21px; top:5px; width:10px; height:10px; border-radius:50%; border:2px solid var(--border); background:var(--surface2); }
    .tl-dot.high{ border-color:var(--danger); background:rgba(239,68,68,.2); }
    .tl-dot.medium{ border-color:var(--gold); background:rgba(245,158,11,.15); }
    .tl-dot.low{ border-color:var(--border); background:var(--surface2); }
    .tl-card{ background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; transition:border-color .15s; cursor:pointer; }
    .tl-card:hover{ border-color:var(--accent); }
    .tl-time{ font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:4px; }
    .tl-headline{ font-size:12px; font-weight:500; line-height:1.4; color:var(--text); margin-bottom:6px; }
    .tl-meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .tl-badge{ font-family:var(--mono); font-size:9px; font-weight:600; padding:2px 6px; border-radius:4px; }
    .tl-date-divider{ font-family:var(--mono); font-size:10px; color:var(--gold); letter-spacing:.1em; text-transform:uppercase; margin:18px 0 10px; position:relative; }
    .tl-date-divider::after{ content:''; position:absolute; right:0; top:50%; width:calc(100% - 100px); height:1px; background:var(--border); }

    /* ── Filters ── */
    .filter-row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .filter-input{ font-family:var(--mono); font-size:12px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:8px; outline:none; flex:1; min-width:200px; }
    .filter-input:focus{ border-color:var(--accent); }
    .impact-filter{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); margin-left:auto; }
    .impact-filter select{ font-family:var(--mono); font-size:11px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; outline:none; }
    .ticker-filters{ display:flex; flex-wrap:wrap; gap:6px; }
    .ticker-filter{ font-family:var(--mono); font-size:10px; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; transition:all .15s; }
    .ticker-filter.active{ background:rgba(16,185,129,.12); color:var(--green); border-color:rgba(16,185,129,.4); }

    /* ── News grid ── */
    .date-group-title{ font-family:var(--mono); font-size:10px; color:var(--gold); letter-spacing:.1em; margin:16px 0 8px; text-transform:uppercase; }
    .date-group-title:first-child{ margin-top:0; }
    .news-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; margin-bottom:24px; }
    .news-card{ background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; transition:border-color .15s; cursor:pointer; }
    .news-card:hover{ border-color:var(--accent); }
    .news-card-header{ display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
    .impact-badge{ font-family:var(--mono); font-size:10px; font-weight:600; padding:3px 7px; border-radius:4px; flex-shrink:0; margin-top:1px; }
    .impact-high{ background:rgba(239,68,68,.15); color:var(--danger); border:1px solid rgba(239,68,68,.3); }
    .impact-med{ background:rgba(245,158,11,.12); color:var(--gold); border:1px solid rgba(245,158,11,.3); }
    .impact-low{ background:var(--surface); color:var(--muted); border:1px solid var(--border); }
    .news-headline{ font-size:13px; font-weight:500; line-height:1.4; color:var(--text); }
    .news-meta{ display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .news-source{ font-family:var(--mono); font-size:10px; color:var(--muted); }
    .news-date{ font-family:var(--mono); font-size:10px; color:var(--muted); }
    .news-tickers{ display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
    .news-ticker-tag{ font-family:var(--mono); font-size:9px; padding:2px 6px; border-radius:4px; background:rgba(16,185,129,.1); color:var(--green); border:1px solid rgba(16,185,129,.2); }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

        <span class="sep" style="margin: 0 4px;">·</span>

<div class="page">
  <header style="margin-bottom: 28px;">
    <h1 style="font-size: 1.8rem; margin-bottom: 4px;">📰 Trading News</h1>
    <p style="color: var(--muted); font-size: 0.95rem;">Market-moving headlines for your watchlist tickers</p>
  </header>

  <div class="grid">
    <div class="card full-width">
      <h2>News Overview</h2>
      <div class="stat-row">
        <div class="stat-block"><span class="stat-label">Total Articles</span><span class="stat-value" id="statTotal">—</span></div>
        <div class="stat-block"><span class="stat-label">High Impact</span><span class="stat-value neg" id="statHigh">—</span></div>
        <div class="stat-block"><span class="stat-label">Period</span><span class="stat-value" id="statPeriod">Last 30 Days</span></div>
        <div class="stat-block"><span class="stat-label">Tickers Covered</span><span class="stat-value" id="statTickers">—</span></div>
      </div>
      <div id="lastUpdate" class="last-update"></div>
    </div>

    <div class="card full-width">
      <h2>Filters</h2>
      <div class="tab-bar">
        <button class="tab active" onclick="setTab('all')">All News</button>
        <button class="tab" onclick="setTab('stocks')">Stocks</button>
        <button class="tab" onclick="setTab('market')">Broad Market</button>
        <button class="tab" onclick="setView('timeline')" id="tab-timeline">⏱ Timeline</button>
        <button class="tab" onclick="setView('grid')" id="tab-grid" style="background:var(--accent-dim);color:var(--accent);border-color:var(--accent)">⊞ Grid</button>
      </div>
      <div class="filter-row">
        <input class="filter-input" id="searchInput" placeholder="Search headlines..." oninput="applyFilters()">
        <div class="impact-filter">
          <span>Sentiment:</span>
          <select id="sentimentFilter" onchange="applyFilters()">
            <option value="">All</option>
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">⚪ Low</option>
          </select>
        </div>
        <div class="impact-filter">
          <span>Min impact:</span>
          <select id="impactFilter" onchange="applyFilters()">
            <option value="0">All</option>
            <option value="40">Medium+</option>
            <option value="70">High only</option>
          </select>
        </div>
      </div>
      <div id="tickerFilters" class="ticker-filters"></div>
    </div>

    <div class="card full-width">
      <h2>Headlines</h2>
      <div id="newsContainer"><div class="loading">Loading news...</div></div>
    </div>
  </div>
</div>

<script>
let allNews = [];
let currentTab = 'all';
let currentView = 'grid';
let activeTickerFilter = null;

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    if (i < 3) t.classList.toggle('active', ['all','stocks','market'][i] === tab);
  });
  applyFilters();
}

function setView(view) {
  currentView = view;
  const tl = document.getElementById('tab-timeline');
  const gr = document.getElementById('tab-grid');
  const active = 'background:var(--accent-dim);color:var(--accent);border-color:var(--accent)';
  const inactive = '';
  tl.style.cssText = view === 'timeline' ? active : inactive;
  gr.style.cssText = view === 'grid' ? active : inactive;
  applyFilters();
}

function applyFilters() {
  const search    = document.getElementById('searchInput').value.toLowerCase();
  const minImpact = parseInt(document.getElementById('impactFilter').value);
  const sentiment = document.getElementById('sentimentFilter').value;
  let filtered = allNews;

  if (currentTab === 'stocks')  filtered = filtered.filter(n => n.symbols && n.symbols.length > 0);
  if (currentTab === 'market')  filtered = filtered.filter(n => !n.symbols || n.symbols.length === 0);
  if (activeTickerFilter)       filtered = filtered.filter(n => n.symbols && n.symbols.includes(activeTickerFilter));
  if (search)                   filtered = filtered.filter(n => (n.headline||'').toLowerCase().includes(search));
  if (minImpact > 0)            filtered = filtered.filter(n => n.impact >= minImpact);
  if (sentiment)                filtered = filtered.filter(n => impactToSentiment(n.impact) === sentiment);

  if (currentView === 'timeline') renderTimeline(filtered);
  else renderNews(filtered);
}

function impactToSentiment(impact) {
  if (impact >= 70) return 'high';
  if (impact >= 40) return 'medium';
  return 'low';
}

function renderTimeline(items) {
  const el = document.getElementById('newsContainer');
  if (!items.length) {
    el.innerHTML = '<div class="loading">No articles match your filters.</div>';
    return;
  }
  const sorted = [...items].sort((a, b) => new Date(b.published || b.date) - new Date(a.published || a.date));
  const groups = {};
  sorted.forEach(n => {
    const d = n.date || (n.published ? n.published.slice(0,10) : 'Unknown');
    if (!groups[d]) groups[d] = [];
    groups[d].push(n);
  });
  let html = '<div class="timeline-rail">';
  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(date => {
    html += `<div class="tl-date-divider">${formatDate(date)}</div>`;
    groups[date].forEach(n => {
      const sent = impactToSentiment(n.impact);
      const impactClass = sent === 'high' ? 'impact-high' : sent === 'medium' ? 'impact-med' : 'impact-low';
      const impactLabel = sent === 'high' ? '🔴 HIGH' : sent === 'medium' ? '🟡 MED' : '⚪ LOW';
      const tickers = (n.symbols||[]).slice(0,4).map(s => `<span class="news-ticker-tag">${s}</span>`).join('');
      const timeStr = n.published ? new Date(n.published).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
      html += `
        <div class="tl-item">
          <div class="tl-dot ${sent}"></div>
          <div class="tl-card" onclick="window.open('${n.url}','_blank')">
            <div class="tl-time">${timeStr} · ${n.source || ''}</div>
            <div class="tl-headline">${n.headline}</div>
            <div class="tl-meta">
              <span class="tl-badge ${impactClass}">${impactLabel} ${n.impact}</span>
              ${tickers}
            </div>
          </div>
        </div>`;
    });
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderNews(items) {
  const el = document.getElementById('newsContainer');
  if (!items.length) {
    el.innerHTML = '<div class="loading">No articles match your filters.</div>';
    return;
  }

  // Group by date
  const groups = {};
  items.forEach(n => {
    const d = n.date || 'Unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(n);
  });

  const sortedDates = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  let html = '';
  sortedDates.forEach(date => {
    const label = formatDate(date);
    html += `<div class="date-group-title">${label} — ${groups[date].length} articles</div>`;
    html += '<div class="news-grid">';
    groups[date].sort((a,b) => b.impact - a.impact).forEach(n => {
      const impactClass = n.impact >= 70 ? 'impact-high' : n.impact >= 40 ? 'impact-med' : 'impact-low';
      const impactLabel = n.impact >= 70 ? '🔴 HIGH' : n.impact >= 40 ? '🟡 MED' : '⚪ LOW';
      const tickers = (n.symbols||[]).slice(0,4).map(s => `<span class="news-ticker-tag">${s}</span>`).join('');
      html += `
        <div class="news-card" onclick="window.open('${n.url}','_blank')">
          <div class="news-card-header">
            <span class="impact-badge ${impactClass}">${impactLabel} ${n.impact}</span>
            <span class="news-headline">${n.headline}</span>
          </div>
          <div class="news-meta">
            <span class="news-source">${n.source}</span>
            <span class="news-date">${n.published}</span>
            <div class="news-tickers">${tickers}</div>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr);
    const today = new Date();
    const diff  = Math.floor((today - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  } catch { return dateStr; }
}

function buildTickerFilters(news) {
  const tickers = new Set();
  news.forEach(n => (n.symbols||[]).forEach(s => tickers.add(s)));
  const el = document.getElementById('tickerFilters');
  el.innerHTML = Array.from(tickers).sort().map(t => `
    <button class="ticker-filter" onclick="toggleTickerFilter('${t}',this)">${t}</button>
  `).join('');
}

function toggleTickerFilter(ticker, btn) {
  if (activeTickerFilter === ticker) {
    activeTickerFilter = null;
    btn.classList.remove('active');
  } else {
    activeTickerFilter = ticker;
    document.querySelectorAll('.ticker-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  applyFilters();
}

function loadNews() {
  fetch('/api/trading/dashboard/news-feed')
    .then(r => r.json())
    .then(data => {
      const tickerNews = data.ticker_news || [];
      const broadNews = data.broad_news || [];
      if (data.error || (tickerNews.length === 0 && broadNews.length === 0)) {
        loadNewsFromCSF();
        return;
      }
      processNews(tickerNews, broadNews, true);
    })
    .catch(() => loadNewsFromCSF());
}

// Fallback when the dashboard news-feed (port 5050) has no data: pull
// from the local CSF news registry instead, which is always populated.
function loadNewsFromCSF() {
  fetch('/api/trading/news/recent?limit=100')
    .then(r => r.json())
    .then(data => {
      const items = (data.records || []).map(r => ({
        id: r.news_id, headline: r.headline, source: r.source, url: r.url,
        published: r.published, date: r.date, symbols: r.symbols || [], impact: r.impact,
      }));
      const ticker_news = items.filter(n => n.symbols && n.symbols.length > 0);
      const broad_news  = items.filter(n => !n.symbols || n.symbols.length === 0);
      processNews(ticker_news, broad_news, false);
    })
    .catch(err => {
      document.getElementById('newsContainer').innerHTML =
        '<div class="loading" style="color:var(--danger)">Failed to load news: ' + err.message + '</div>';
    });
}

function processNews(ticker_news, broad_news, persistToCSF) {
  allNews = [...ticker_news, ...broad_news];

  // Deduplicate by id
  const seen = new Set();
  allNews = allNews.filter(n => { if(seen.has(n.id)) return false; seen.add(n.id); return true; });

  // Set accurate period label
  if (allNews.length > 0) {
    const dates = allNews.map(n => n.date).filter(Boolean).sort();
    const oldest = dates[0];
    const d = new Date(oldest);
    const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('statPeriod').textContent = label + ' — Today';
  } else {
    document.getElementById('statPeriod').textContent = 'Last 30 Days';
  }

  document.getElementById('statTotal').textContent = allNews.length;
  document.getElementById('statHigh').textContent  = allNews.filter(n => n.impact >= 70).length;
  const tickers = new Set();
  allNews.forEach(n => (n.symbols||[]).forEach(s => tickers.add(s)));
  document.getElementById('statTickers').textContent = tickers.size;
  document.getElementById('lastUpdate').textContent  = 'Updated ' + new Date().toLocaleTimeString();

  if (allNews.length === 0) {
    document.getElementById('newsContainer').innerHTML =
      '<div class="loading">No recent news articles found.</div>';
    return;
  }

  buildTickerFilters(ticker_news);
  applyFilters();

  if (persistToCSF) {
    // Persist to CSF (fire-and-forget; server dedupes by id)
    allNews.forEach(item => {
      fetch('/api/trading/news/record', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(item),
      }).catch(() => {});
    });
  }
}

loadNews();
setInterval(loadNews, 300000); // refresh every 5 min
</script>
<script src="/js/theme-toggle.js"></script>
<script src="/js/auth-gate.js" defer></script>
