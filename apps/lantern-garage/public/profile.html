<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <title>Profile — Lantern OS</title>
  <link rel="stylesheet" href="/css/site.css">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; }
    main { flex: 1; padding: 48px 20px 64px; }

    .profile-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Hero card ── */
    .hero-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      background:
        radial-gradient(circle at top left, rgba(6,182,212,.13), transparent 45%),
        radial-gradient(circle at bottom right, rgba(167,139,250,.10), transparent 40%),
        var(--surface);
      display: flex;
      align-items: center;
      gap: 28px;
    }
    @media (max-width: 540px) {
      .hero-card { flex-direction: column; text-align: center; padding: 28px 20px; }
    }

    .avatar {
      flex-shrink: 0;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff;
      letter-spacing: -.5px;
      border: 3px solid var(--border);
    }

    .hero-info { flex: 1; min-width: 0; }
    .hero-name {
      font-size: 24px; font-weight: 700;
      color: var(--text); margin: 0 0 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hero-email { font-size: 14px; color: var(--muted); margin: 0 0 14px; }

    .tier-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      border: 1px solid;
    }
    .tier-badge.guest    { background: rgba(156,163,175,.15); color: #9ca3af; border-color: rgba(156,163,175,.3); }
    .tier-badge.supporter{ background: rgba(6,182,212,.15);   color: #06b6d4; border-color: rgba(6,182,212,.35); }
    .tier-badge.deep_dreamer,
    .tier-badge.founder  { background: rgba(251,146,60,.15);  color: #fb923c; border-color: rgba(251,146,60,.35); }
    .tier-badge.admin    { background: rgba(167,139,250,.15); color: #a78bfa; border-color: rgba(167,139,250,.35); }

    .hero-actions {
      display: flex; gap: 10px; margin-top: 18px;
      flex-wrap: wrap;
    }
    @media (max-width: 540px) { .hero-actions { justify-content: center; } }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); text-decoration: none;
      transition: border-color .15s, background .15s, color .15s;
      background: var(--surface2); color: var(--text);
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(239,68,68,.1); color: #ef4444; border-color: rgba(239,68,68,.3); }
    .btn-danger:hover { background: rgba(239,68,68,.2); border-color: #ef4444; color: #ef4444; }
    .btn-primary { background: rgba(6,182,212,.15); color: var(--accent); border-color: rgba(6,182,212,.4); }
    .btn-primary:hover { background: rgba(6,182,212,.25); border-color: var(--accent); }

    /* ── Info grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 540px) { .info-grid { grid-template-columns: 1fr; } }

    .info-cell {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      background: var(--surface);
    }
    .info-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 14px; color: var(--text); word-break: break-word;
    }
    .info-value code {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
    }

    /* ── Access grid ── */
    .section-title {
      font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .access-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .access-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--surface);
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .access-card:hover { border-color: var(--accent); background: var(--surface2); }
    .access-card.locked {
      opacity: .45; cursor: default; pointer-events: none;
    }
    .access-icon { font-size: 20px; flex-shrink: 0; }
    .access-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .access-req   { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Edit modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; max-width: 440px; width: 90%;
    }
    .modal h2 { margin: 0 0 24px; font-size: 18px; }
    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block; font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
    }
    .form-row input, .form-row textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface2); color: var(--text); font-size: 14px;
      font-family: inherit;
    }
    .form-row textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    .loading { text-align: center; color: var(--muted); padding: 80px 20px; font-size: 14px; }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-brand" href="/">
    <img src="/mandala.svg" alt="" aria-hidden="true" style="width:24px;height:24px;vertical-align:middle">
    <span style="font-size:18px;font-weight:600">Lantern OS</span>
  </a>
  <div class="nav-links">
    <a href="/dream-chat.html">Journal</a>
    <a href="/trader-dashboard.html">Trader</a>
    <a href="/create.html">Create</a>
    <a href="/explore.html">Explore</a>
  </div>
  <div class="nav-actions">
    <a href="/profile.html" class="nav-btn active" title="Your profile" aria-label="View your profile">👤</a>
    <button class="nav-btn" id="theme-toggle" title="Toggle light / dark mode" aria-label="Toggle light or dark mode">🌙</button>
  </div>
</nav>

<main>
  <div class="profile-wrap" id="profile-wrap">
    <div class="loading">Loading profile…</div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-brand">
      <span class="dot online" id="status-dot" title="Server status"></span>
      <span class="mandala-icon spin-slow" aria-hidden="true"></span> Lantern OS
    </span>
    <span class="sep">·</span>
    <a href="/">Home</a>
    <a href="/dream-chat.html">Journal</a>
  </div>
</footer>

<!-- Edit modal -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h2>Edit Profile</h2>
    <form id="edit-form" onsubmit="saveProfile(event)">
      <div class="form-row">
        <label>Display Name</label>
        <input type="text" id="edit-name" maxlength="80" autocomplete="name">
      </div>
      <div class="form-row">
        <label>Bio</label>
        <textarea id="edit-bio" maxlength="400" placeholder="A short intro…"></textarea>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn" onclick="closeEdit()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/theme-toggle.js"></script>
<script>
// deep_dreamer is the $20 web tier; `founder` kept as a legacy alias (#698).
const ROLE_LEVEL = { guest: 0, supporter: 1, deep_dreamer: 2, founder: 2, admin: 3 };

const TIER_LABELS = {
  guest:        { label: 'Free',              emoji: '🔓' },
  supporter:    { label: 'Wanderer — $5/mo',  emoji: '🌀' },
  deep_dreamer: { label: 'Deep Dreamer — $20/mo', emoji: '✦' },
  founder:      { label: 'Deep Dreamer — $20/mo', emoji: '✦' }, // legacy alias (#698)
  admin:        { label: 'Synthesasia Guild — $200/mo', emoji: '⬡' },
};

const FEATURES = [
  { emoji: '📖', label: 'Journal',     href: '/dream-chat.html',       req: 'guest' },
  { emoji: '📈', label: 'Trader',      href: '/trader-dashboard.html', req: 'admin' },
  { emoji: '✏️', label: 'Create',      href: '/create.html',           req: 'deep_dreamer' },
  { emoji: '🗺️', label: 'Explore',     href: '/explore.html',          req: 'guest' },
  { emoji: '📚', label: 'Knowledge',   href: '/knowledgecenter.html',  req: 'guest' },
  { emoji: '📊', label: 'Crypto',      href: '/crypto-dashboard.html', req: 'guest' },
];

let currentProfile = null;

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function escapeHtml(s) {
  const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' }); }
  catch { return iso; }
}

function hasAccess(userRole, reqRole) {
  return (ROLE_LEVEL[userRole] || 0) >= (ROLE_LEVEL[reqRole] || 0);
}

function renderProfile(profile) {
  const wrap = document.getElementById('profile-wrap');
  const role = profile.role || 'guest';
  const tier = TIER_LABELS[role] || TIER_LABELS.guest;

  const featureCards = FEATURES.map(f => {
    const ok = hasAccess(role, f.req);
    const reqLabel = f.req !== 'guest' ? `Requires ${TIER_LABELS[f.req]?.label || f.req}` : '';
    return ok
      ? `<a class="access-card" href="${f.href}">
           <span class="access-icon">${f.emoji}</span>
           <div><div class="access-label">${f.label}</div></div>
         </a>`
      : `<div class="access-card locked" title="${escapeHtml(reqLabel)}">
           <span class="access-icon">${f.emoji}</span>
           <div><div class="access-label">${f.label}</div><div class="access-req">${escapeHtml(reqLabel)}</div></div>
         </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="hero-card">
      <div class="avatar">${escapeHtml(initials(profile.name))}</div>
      <div class="hero-info">
        <h1 class="hero-name">${escapeHtml(profile.name || 'Member')}</h1>
        <p class="hero-email">${escapeHtml(profile.email || '')}</p>
        <span class="tier-badge ${escapeHtml(role)}">${tier.emoji} ${escapeHtml(tier.label)}</span>
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="openEdit()">✏️ Edit</button>
          <button class="btn btn-danger" onclick="logout()">🚪 Sign out</button>
          <a class="btn" href="/">← Home</a>
        </div>
      </div>
    </div>

    <div class="info-grid">
      ${profile.bio ? `
        <div class="info-cell" style="grid-column:1/-1">
          <div class="info-label">Bio</div>
          <div class="info-value">${escapeHtml(profile.bio)}</div>
        </div>` : ''}
      <div class="info-cell">
        <div class="info-label">Member since</div>
        <div class="info-value">${fmtDate(profile.metadata?.createdAt)}</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Patreon ID</div>
        <div class="info-value"><code>${escapeHtml(profile.patreonId || profile.id || '—')}</code></div>
      </div>
    </div>

    <div>
      <div class="section-title">Feature Access</div>
      <div class="access-grid">${featureCards}</div>
    </div>
  `;
}

function openEdit() {
  document.getElementById('edit-name').value = currentProfile?.name || '';
  document.getElementById('edit-bio').value  = currentProfile?.bio  || '';
  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
}

async function saveProfile(e) {
  e.preventDefault();
  const btn = e.submitter || e.target.querySelector('[type=submit]');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const res = await fetch('/api/profiles/me', {
      method: 'PUT', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('edit-name').value.trim(),
        bio:  document.getElementById('edit-bio').value.trim(),
      }),
    });
    if (!res.ok) throw new Error('Save failed');
    currentProfile = await res.json();
    closeEdit();
    renderProfile(currentProfile);
  } catch (err) {
    alert('Could not save: ' + err.message);
  } finally {
    btn.textContent = 'Save'; btn.disabled = false;
  }
}

async function logout() {
  const res = await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  if (res.ok) location.href = '/auth.html';
  else alert('Logout failed');
}

async function init() {
  try {
    const sr = await fetch('/api/auth/session', { credentials: 'include' });
    const session = sr.ok ? await sr.json() : null;
    if (!session?.authenticated) { location.href = '/auth.html?returnTo=/profile.html'; return; }

    const pr = await fetch('/api/profiles/me', { credentials: 'include' });
    const profile = pr.ok ? await pr.json() : { ...session.user, role: session.role };
    currentProfile = profile;
    renderProfile(profile);
  } catch (err) {
    console.error(err);
    location.href = '/auth.html';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('theme-toggle');
  if (toggle && window.toggleTheme) toggle.addEventListener('click', toggleTheme);
  document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeEdit();
  });
  init();
});
</script>
<script src="/js/auth-gate.js" defer></script>
</body>
</html>
