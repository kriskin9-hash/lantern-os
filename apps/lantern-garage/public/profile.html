<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <title>Profile — Lantern OS</title>
  <link rel="stylesheet" href="/css/site.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .profile-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .profile-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .profile-header h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 12px;
      color: var(--text);
    }
    .profile-header p {
      color: var(--muted);
      font-size: 15px;
      margin: 0;
    }
    .profile-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(6,182,212,.12), transparent 40%),
        radial-gradient(circle at bottom right, rgba(167,139,250,.10), transparent 35%),
        rgba(10,15,25,.88);
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
      margin-bottom: 24px;
    }
    .profile-field {
      margin-bottom: 24px;
    }
    .profile-field:last-child {
      margin-bottom: 0;
    }
    .profile-field-label {
      display: block;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .profile-field-value {
      display: block;
      font-size: 16px;
      color: var(--text);
      word-break: break-word;
    }
    .role-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: capitalize;
      background: rgba(6,182,212,.2);
      color: var(--accent);
    }
    .role-badge.founder {
      background: rgba(251,146,60,.2);
      color: #fb923c;
    }
    .role-badge.admin {
      background: rgba(239,68,68,.2);
      color: #ef4444;
    }
    .profile-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-logout {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      background: rgba(239,68,68,.1);
      color: #ef4444;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .btn-logout:hover {
      background: rgba(239,68,68,.2);
      border-color: #ef4444;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .btn-back:hover {
      background: rgba(255,255,255,.08);
      border-color: var(--accent);
    }
    .error-message {
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 12px;
      padding: 16px;
      background: rgba(239,68,68,.05);
      color: #ef4444;
      margin-bottom: 24px;
      text-align: center;
      font-size: 14px;
    }
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }
  </style>
</head>
<body>

<!-- ── Site nav ── -->
<nav class="site-nav">
  <a class="nav-brand" href="/">
    <img src="/mandala.svg" alt="" aria-hidden="true" style="width:24px;height:24px;vertical-align:middle">
    <span style="font-size:18px;font-weight:600">Lantern OS</span>
  </a>
  <div class="nav-links"></div>
  <div class="nav-actions">
    <button class="nav-btn" id="theme-toggle" title="Toggle light / dark mode" aria-label="Toggle light or dark mode">☀</button>
  </div>
</nav>

<main class="profile-container" id="main-content">

  <div class="profile-header">
    <h1>Your Profile</h1>
    <p>Patreon member account information</p>
  </div>

  <div id="profile-content">
    <div class="loading">Loading profile…</div>
  </div>

  <!-- Edit profile modal -->
  <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.8); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:32px; max-width:500px; width:90%;">
      <h2 style="margin-top:0; margin-bottom:24px;">Edit Profile</h2>
      <form id="edit-form" onsubmit="saveProfile(event)" style="display:flex; flex-direction:column; gap:16px;">
        <div>
          <label style="display:block; font-size:12px; color:var(--accent); margin-bottom:4px; text-transform:uppercase; font-weight:600;">Name</label>
          <input type="text" id="edit-name" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,.04); color:var(--text); font-size:14px;">
        </div>
        <div>
          <label style="display:block; font-size:12px; color:var(--accent); margin-bottom:4px; text-transform:uppercase; font-weight:600;">Bio</label>
          <textarea id="edit-bio" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,.04); color:var(--text); font-size:14px; min-height:80px;"></textarea>
        </div>
        <div style="display:flex; gap:12px;">
          <button type="submit" class="btn-logout" style="flex:1; background:rgba(20,184,166,.2); color:var(--accent); border-color:var(--accent);">Save Changes</button>
          <button type="button" onclick="closeEditModal()" class="btn-back" style="flex:1;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</main>

<!-- ── Site footer ── -->
<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-brand">
      <span class="dot online" id="status-dot" title="Server status"></span>
      <span class="mandala-icon spin-slow" aria-hidden="true"></span> Lantern OS
    </span>
    <span class="sep">·</span>
    <a href="/">Home</a>
    <a href="/dream-chat.html">Journal</a>
  </div>
</footer>

<script src="/js/theme-toggle.js"></script>
<script>
  let currentProfile = null;

  async function loadProfile() {
    try {
      // First check auth session
      const sessionRes = await fetch('/api/auth/session', { credentials: 'include' });
      if (!sessionRes.ok) throw new Error('Not authenticated');

      const session = await sessionRes.json();
      if (!session.authenticated) {
        redirectToLogin();
        return;
      }

      // Load full profile from backend
      const res = await fetch('/api/profiles/me', { credentials: 'include' });
      if (!res.ok) throw new Error('Failed to fetch profile');

      const profile = await res.json();
      currentProfile = profile;

      renderProfile(profile);
    } catch (err) {
      console.error('Profile load error:', err);
      redirectToLogin();
    }
  }

  function renderProfile(profile) {
    const content = document.getElementById('profile-content');
    const role = profile.role || 'guest';
    const roleClass = role === 'founder' ? 'founder' : role === 'admin' ? 'admin' : '';

    content.innerHTML = `
      <div class="profile-card">
        <div class="profile-field">
          <span class="profile-field-label">Name</span>
          <span class="profile-field-value">${escapeHtml(profile.name || 'Not set')}</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Email</span>
          <span class="profile-field-value">${escapeHtml(profile.email || 'Not provided')}</span>
        </div>
        ${profile.bio ? `
          <div class="profile-field">
            <span class="profile-field-label">Bio</span>
            <span class="profile-field-value">${escapeHtml(profile.bio)}</span>
          </div>
        ` : ''}
        <div class="profile-field">
          <span class="profile-field-label">User ID</span>
          <span class="profile-field-value"><code style="font-family:monospace; font-size:12px;">${escapeHtml(profile.id)}</code></span>
        </div>
        ${profile.patreonId ? `
          <div class="profile-field">
            <span class="profile-field-label">Patreon ID</span>
            <span class="profile-field-value">${escapeHtml(profile.patreonId)}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Tier</span>
            <span class="profile-field-value">${escapeHtml(profile.tier || 'None')}</span>
          </div>
        ` : ''}
        <div class="profile-field">
          <span class="profile-field-label">Role</span>
          <span class="profile-field-value">
            <span class="role-badge ${roleClass}">${escapeHtml(role)}</span>
            ${profile.metadata?.source ? `<span style="font-size:11px; color:var(--muted); margin-left:8px;">(${escapeHtml(profile.metadata.source)})</span>` : ''}
          </span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Joined</span>
          <span class="profile-field-value">${formatDate(profile.metadata?.createdAt)}</span>
        </div>
      </div>

      <div class="profile-actions">
        <button class="btn-logout" onclick="openEditModal()" style="background:rgba(106,190,255,.15); color:#6abeff; border-color:rgba(106,190,255,.3);">✏️ Edit Profile</button>
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        <a class="btn-back" href="/">← Back to Home</a>
      </div>
    `;
  }

  function openEditModal() {
    document.getElementById('edit-name').value = currentProfile.name || '';
    document.getElementById('edit-bio').value = currentProfile.bio || '';
    document.getElementById('edit-modal').style.display = 'flex';
  }

  function closeEditModal() {
    document.getElementById('edit-modal').style.display = 'none';
  }

  async function saveProfile(e) {
    e.preventDefault();
    try {
      const res = await fetch('/api/profiles/me', {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('edit-name').value,
          bio: document.getElementById('edit-bio').value,
        }),
      });

      if (!res.ok) throw new Error('Failed to save profile');

      currentProfile = await res.json();
      closeEditModal();
      renderProfile(currentProfile);
    } catch (err) {
      alert('Error saving profile: ' + err.message);
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return 'Unknown';
    try {
      return new Date(iso).toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
      });
    } catch {
      return iso;
    }
  }

  function redirectToLogin() {
    const content = document.getElementById('profile-content');
    content.innerHTML = `
      <div class="error-message">
        Not authenticated. Redirecting to login…
      </div>
    `;
    setTimeout(() => {
      location.href = '/auth.html';
    }, 1500);
  }

  async function logout() {
    try {
      const res = await fetch('/api/auth/logout', {
        method: 'POST',
        credentials: 'include',
      });
      if (res.ok) {
        location.href = '/auth.html';
      } else {
        alert('Logout failed');
      }
    } catch (err) {
      console.error('Logout error:', err);
      alert('Logout error: ' + err.message);
    }
  }

  document.addEventListener('DOMContentLoaded', loadProfile);
  document.addEventListener('click', (e) => {
    const modal = document.getElementById('edit-modal');
    if (e.target === modal) closeEditModal();
  });
</script>
<script src="/js/update-checker.js" defer></script>
</body>
</html>
