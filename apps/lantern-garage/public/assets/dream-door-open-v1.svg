<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c18"/>
      <stop offset="40%" stop-color="#15122a"/>
      <stop offset="70%" stop-color="#1e1838"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#f4c76b" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#7c6af7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0c18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c76b" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#e8a87c" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#7c6af7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- Ambient glow -->
  <rect width="1440" height="900" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="80" r="1.2" opacity="0.8"/>
    <circle cx="280" cy="140" r="0.8" opacity="0.5"/>
    <circle cx="420" cy="60" r="1.5" opacity="0.9"/>
    <circle cx="580" cy="110" r="0.9" opacity="0.4"/>
    <circle cx="720" cy="50" r="1.1" opacity="0.7"/>
    <circle cx="880" cy="130" r="0.7" opacity="0.6"/>
    <circle cx="1050" cy="70" r="1.3" opacity="0.8"/>
    <circle cx="1200" cy="120" r="0.8" opacity="0.5"/>
    <circle cx="1350" cy="55" r="1" opacity="0.7"/>
    <circle cx="180" cy="200" r="0.9" opacity="0.4"/>
    <circle cx="340" cy="250" r="1.1" opacity="0.6"/>
    <circle cx="500" cy="180" r="0.8" opacity="0.5"/>
    <circle cx="660" cy="220" r="1.2" opacity="0.7"/>
    <circle cx="820" cy="170" r="0.7" opacity="0.4"/>
    <circle cx="980" cy="240" r="1" opacity="0.8"/>
    <circle cx="1140" cy="190" r="0.9" opacity="0.5"/>
    <circle cx="1300" cy="230" r="1.1" opacity="0.6"/>
    <circle cx="80" cy="320" r="0.8" opacity="0.3"/>
    <circle cx="260" cy="350" r="1" opacity="0.7"/>
    <circle cx="440" cy="310" r="0.9" opacity="0.5"/>
    <circle cx="620" cy="340" r="1.3" opacity="0.8"/>
    <circle cx="780" cy="300" r="0.7" opacity="0.4"/>
    <circle cx="940" cy="330" r="1.1" opacity="0.6"/>
    <circle cx="1100" cy="360" r="0.8" opacity="0.5"/>
    <circle cx="1260" cy="320" r="1" opacity="0.7"/>
    <circle cx="1420" cy="290" r="0.9" opacity="0.4"/>
    <circle cx="150" cy="420" r="1.2" opacity="0.6"/>
    <circle cx="310" cy="450" r="0.8" opacity="0.3"/>
    <circle cx="550" cy="410" r="1" opacity="0.7"/>
    <circle cx="710" cy="440" r="0.9" opacity="0.5"/>
    <circle cx="950" cy="400" r="1.1" opacity="0.8"/>
    <circle cx="1110" cy="430" r="0.7" opacity="0.4"/>
    <circle cx="1270" cy="460" r="0.9" opacity="0.6"/>
    <circle cx="1380" cy="390" r="1" opacity="0.5"/>
  </g>

  <!-- Larger glowing stars -->
  <g fill="#f4c76b" opacity="0.7">
    <circle cx="200" cy="150" r="1.5" filter="url(#blur)"/>
    <circle cx="200" cy="150" r="0.8"/>
    <circle cx="850" cy="100" r="1.8" filter="url(#blur)"/>
    <circle cx="850" cy="100" r="1"/>
    <circle cx="1250" cy="180" r="1.4" filter="url(#blur)"/>
    <circle cx="1250" cy="180" r="0.7"/>
    <circle cx="380" cy="280" r="1.6" filter="url(#blur)"/>
    <circle cx="380" cy="280" r="0.9"/>
    <circle cx="1080" cy="260" r="1.3" filter="url(#blur)"/>
    <circle cx="1080" cy="260" r="0.7"/>
  </g>

  <!-- Distant mountains / hills -->
  <path d="M0 750 Q 200 680, 400 720 T 800 700 T 1200 730 T 1440 710 L 1440 900 L 0 900 Z" fill="#0e1020" opacity="0.9"/>
  <path d="M0 780 Q 300 730, 600 760 T 1100 740 T 1440 760 L 1440 900 L 0 900 Z" fill="#0a0c16" opacity="0.95"/>

  <!-- Stone archway / door frame -->
  <g transform="translate(720, 480)">
    <!-- Outer dark stone -->
    <path d="M-180 180 L-180 -60 Q-180 -160, 0 -180 Q180 -160, 180 -60 L180 180 Z" fill="#121420" stroke="#1a1c2e" stroke-width="2"/>
    <!-- Inner stone border -->
    <path d="M-155 180 L-155 -45 Q-155 -135, 0 -155 Q155 -135, 155 -45 L155 180 Z" fill="#0d0f1a" stroke="#2a2540" stroke-width="1"/>
    <!-- Stone texture lines -->
    <path d="M-180 -60 L-155 -45 M180 -60 L155 -45" stroke="#1e2035" stroke-width="2" fill="none"/>
    <path d="M-160 40 L-130 35 M160 40 L130 35 M-165 100 L-135 95 M165 100 L135 95" stroke="#1a1c2e" stroke-width="1.5" fill="none"/>

    <!-- Door opening light -->
    <path d="M-130 180 L-130 -30 Q-130 -120, 0 -138 Q130 -120, 130 -30 L130 180 Z" fill="url(#light)"/>

    <!-- Inner glow -->
    <ellipse cx="0" cy="40" rx="90" ry="110" fill="#f4c76b" opacity="0.12" filter="url(#softblur)"/>
    <ellipse cx="0" cy="20" rx="60" ry="80" fill="#ffffff" opacity="0.08" filter="url(#softblur)"/>

    <!-- Moon in the door opening -->
    <circle cx="-30" cy="-60" r="22" fill="#f4e4bc" opacity="0.85"/>
    <circle cx="-36" cy="-66" r="18" fill="#f4c76b" opacity="0.3" filter="url(#blur)"/>

    <!-- Vines / foliage on archway -->
    <g fill="#1a1520" opacity="0.85">
      <ellipse cx="-165" cy="-40" rx="18" ry="28"/>
      <ellipse cx="-170" cy="-10" rx="14" ry="22"/>
      <ellipse cx="-160" cy="30" rx="12" ry="20"/>
      <ellipse cx="-155" cy="70" rx="10" ry="16"/>
      <ellipse cx="165" cy="-50" rx="16" ry="26"/>
      <ellipse cx="172" cy="-15" rx="13" ry="21"/>
      <ellipse cx="168" cy="25" rx="11" ry="18"/>
      <ellipse cx="162" cy="65" rx="9" ry="14"/>
    </g>

    <!-- Glowing particles near door -->
    <g fill="#f4c76b">
      <circle cx="-190" cy="20" r="2" opacity="0.6" filter="url(#blur)"/>
      <circle cx="195" cy="-30" r="1.5" opacity="0.5" filter="url(#blur)"/>
      <circle cx="-170" cy="100" r="1.8" opacity="0.7" filter="url(#blur)"/>
      <circle cx="185" cy="80" r="2.2" opacity="0.6" filter="url(#blur)"/>
      <circle cx="-200" cy="-50" r="1.5" opacity="0.4" filter="url(#blur)"/>
      <circle cx="200" cy="40" r="1.8" opacity="0.5" filter="url(#blur)"/>
    </g>
  </g>

  <!-- Ground / steps leading to door -->
  <path d="M620 720 L680 660 L760 660 L820 720 Z" fill="#0d0f1a" opacity="0.85"/>
  <path d="M650 720 L690 680 L750 680 L790 720 Z" fill="#0a0c14" opacity="0.9"/>
  <path d="M680 720 L710 690 L730 690 L760 720 Z" fill="#070810" opacity="0.95"/>

  <!-- Foreground foliage silhouettes -->
  <g fill="#060810" opacity="0.95">
    <ellipse cx="200" cy="850" rx="180" ry="120"/>
    <ellipse cx="350" cy="880" rx="140" ry="90"/>
    <ellipse cx="100" cy="820" rx="100" ry="80"/>
    <ellipse cx="1240" cy="860" rx="200" ry="130"/>
    <ellipse cx="1080" cy="890" rx="160" ry="100"/>
    <ellipse cx="1380" cy="830" rx="120" ry="90"/>
  </g>

  <!-- Small glowing orbs / fireflies -->
  <g fill="#f4c76b" opacity="0.5">
    <circle cx="280" cy="650" r="3" filter="url(#blur)"/>
    <circle cx="280" cy="650" r="1"/>
    <circle cx="1160" cy="680" r="2.5" filter="url(#blur)"/>
    <circle cx="1160" cy="680" r="0.8"/>
    <circle cx="420" cy="720" r="2" filter="url(#blur)"/>
    <circle cx="420" cy="720" r="0.7"/>
    <circle cx="1020" cy="740" r="2.8" filter="url(#blur)"/>
    <circle cx="1020" cy="740" r="1"/>
    <circle cx="340" cy="600" r="2.2" filter="url(#blur)"/>
    <circle cx="340" cy="600" r="0.8"/>
    <circle cx="1100" cy="620" r="2.5" filter="url(#blur)"/>
    <circle cx="1100" cy="620" r="0.9"/>
  </g>

  <!-- Purple nebula clouds -->
  <ellipse cx="400" cy="300" rx="250" ry="120" fill="#7c6af7" opacity="0.04" filter="url(#softblur)"/>
  <ellipse cx="1000" cy="250" rx="280" ry="100" fill="#9b7cf7" opacity="0.03" filter="url(#softblur)"/>
  <ellipse cx="700" cy="150" rx="300" ry="80" fill="#6a5af0" opacity="0.05" filter="url(#softblur)"/>
</svg>
