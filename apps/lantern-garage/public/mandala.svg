<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -5 210 210">
<defs>
  <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="200" y2="200">
    <stop offset="0%"   stop-color="#ff3366"/>
    <stop offset="25%"  stop-color="#ff9900"/>
    <stop offset="50%"  stop-color="#33ffaa"/>
    <stop offset="75%"  stop-color="#3366ff"/>
    <stop offset="100%" stop-color="#ff3366"/>
    <animateTransform attributeName="gradientTransform" type="rotate"
      from="0 100 100" to="360 100 100" dur="5s" repeatCount="indefinite"/>
  </linearGradient>
  <style>
    .m { stroke: url(#grad); fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .dot { fill: url(#grad); stroke: none; }
    .inner   { transform-origin: 100px 100px; animation: fwd 20s linear infinite; }
    .mid     { transform-origin: 100px 100px; animation: rev 30s linear infinite; }
    .outer-a { transform-origin: 100px 100px; animation: fwd 45s linear infinite; }
    .outer-b { transform-origin: 100px 100px; animation: rev 28s linear infinite; }
    @keyframes fwd { to { transform: rotate(360deg); } }
    @keyframes rev { to { transform: rotate(-360deg); } }
  </style>
</defs>

