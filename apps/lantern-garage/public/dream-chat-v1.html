<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dream Journal</title>
  <style>
    body { margin:0; background:#0f1117; color:#e8eaf6; font-family:system-ui; display:flex; flex-direction:column; height:100vh; }
    #chat { flex:1; overflow-y:auto; padding:20px; max-width:780px; margin:0 auto; width:100%; }
    .msg { margin-bottom:14px; }
    .user { color:#7c6af7; }
    .agent { color:#e8eaf6; }
    #inputbar { display:flex; gap:8px; padding:16px; border-top:1px solid #2e3350; background:#1a1d27; }
    #message { flex:1; background:#22263a; border:1px solid #2e3350; color:#e8eaf6; padding:12px; font-size:15px; }
    #send { background:#7c6af7; color:white; border:none; padding:0 24px; cursor:pointer; }
    #provider { background:#22263a; border:1px solid #2e3350; color:#e8eaf6; padding:8px; margin:12px auto; display:block; width:200px; }
  </style>
</head>
<body>
<div style="position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:4px;padding:0 16px;height:44px;background:#0f1117;border-bottom:1px solid #2e3350;font-family:system-ui,sans-serif;font-size:13px">
  <a href="/" style="font-weight:700;color:#e8eaf6;text-decoration:none;margin-right:8px">🪔 Lantern OS</a>
  <span style="color:#7880a4;font-size:12px">Dream Journal</span>
  <a href="/" style="margin-left:auto;color:#7880a4;text-decoration:none;font-size:12px">← Home</a>
</div>
  <select id="provider">
    <option value="claude">Claude</option>
    <option value="openai">GPT-4o</option>
    <option value="gemini">Gemini</option>
  </select>

  <div id="chat"></div>

  <div id="inputbar">
    <input id="message" placeholder="Type your dream..." onkeydown="if(event.key==='Enter') send()">
    <button id="send" onclick="send()">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('message');
    const providerSel = document.getElementById('provider');

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';

      const provider = providerSel.value;
      const res = await fetch(`/api/dream/stream?message=${encodeURIComponent(text)}&provider=${provider}`);
      if (!res.ok) {
        addMessage("Error: Provider failed to respond", 'agent');
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data:')) {
            try {
              const data = JSON.parse(line.slice(5));
              if (data.type === 'token') addMessage(data.text, 'agent');
              if (data.type === 'error') addMessage("Error: " + data.text, 'agent');
            } catch {}
          }
        }
      }
    }
  </script>
</body>
</html>
