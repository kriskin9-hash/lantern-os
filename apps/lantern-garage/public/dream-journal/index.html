<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lantern Dream Journal</title>
  <style>
    :root {
      --bg: #1a1520;
      --surface: #252030;
      --border: #3a3048;
      --text: #e8e0f0;
      --muted: #a090b8;
      --accent: #7b68ee;
      --accent2: #ff8c42;
      --user-bubble: #3a3058;
      --agent-bubble: #2a2540;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { margin: 0; font-size: 1.3rem; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin: 0.15rem 0 0; font-size: 0.8rem; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--agent-bubble);
      border-bottom-left-radius: 4px;
    }
    .msg .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-bar textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      min-height: 2.5rem;
      max-height: 120px;
    }
    .input-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1.2rem;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .input-bar button:hover { opacity: 0.9; }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      padding: 0.25rem 1rem 0.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar a, .toolbar button.link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .toolbar a:hover, .toolbar button.link:hover { text-decoration: underline; }
    .notepad {
      display: grid;
      gap: 0.45rem;
      padding: 0.65rem 1rem;
      border-top: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(123, 104, 238, 0.14), rgba(255, 140, 66, 0.08));
      flex-shrink: 0;
    }
    .notepad-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .notepad-head strong {
      color: var(--text);
      font-size: 0.84rem;
    }
    .notepad-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .notepad-actions button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--agent-bubble);
      color: var(--text);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 0.3rem 0.6rem;
    }
    .notepad textarea {
      width: 100%;
      min-height: 72px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(26, 21, 32, 0.92);
      color: var(--text);
      font: inherit;
      line-height: 1.45;
      padding: 0.65rem 0.75rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Lantern Dream Journal</h1>
      <p>Freeform RP. Local-only. Say anything.</p>
    </header>

    <div class="chat" id="chat"></div>

    <section class="notepad" aria-label="Convergence notepad">
      <div class="notepad-head">
        <strong>Convergence Notepad</strong>
        <span id="draftStats">0 words · saved locally</span>
      </div>
      <textarea id="draftInput" placeholder="Catch fragments before they fade: images, people, places, feelings, symbols..."></textarea>
      <div class="notepad-actions">
        <button id="convergeBtn" type="button">Send as !convergence</button>
        <button id="dreamPromptBtn" type="button">Add dream prompts</button>
        <button id="clearDraftBtn" type="button">Clear draft</button>
      </div>
    </section>

    <div class="input-bar">
      <textarea id="msgInput" placeholder="Say something..."></textarea>
      <button id="sendBtn">Send</button>
    </div>

    <div class="toolbar">
      <a href="../index.html">Back</a>
      <button class="link" id="clearBtn">Clear Chat</button>
      <button class="link" id="exportBtn">Export</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'lantern_dream_chat_v2';
    const DRAFT_KEY = 'lantern_dream_notepad_draft_v1';

    function loadMessages() {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }
    function saveMessages(msgs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
    }
    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
    function appendMessage(role, text) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `<div class="meta">${role === 'user' ? 'You' : 'Lantern'} &middot; ${time}</div>` + escapeHtml(text);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    function render() {
      const chat = document.getElementById('chat');
      chat.innerHTML = '';
      loadMessages().forEach(m => appendMessage(m.role, m.text));
    }
    function send() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      const msgs = loadMessages();
      msgs.push({ role: 'user', text, time: new Date().toISOString() });
      saveMessages(msgs);
      appendMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
    }
    function updateDraftStats() {
      const draft = document.getElementById('draftInput').value.trim();
      const words = draft ? draft.split(/\s+/).length : 0;
      document.getElementById('draftStats').textContent = `${words} word${words === 1 ? '' : 's'} · saved locally`;
    }
    function saveDraft() {
      localStorage.setItem(DRAFT_KEY, document.getElementById('draftInput').value);
      updateDraftStats();
    }
    function loadDraft() {
      const draftInput = document.getElementById('draftInput');
      draftInput.value = localStorage.getItem(DRAFT_KEY) || '';
      updateDraftStats();
    }
    function sendConvergence() {
      const draftInput = document.getElementById('draftInput');
      const draft = draftInput.value.trim();
      if (!draft) return;
      document.getElementById('msgInput').value = `!convergence\n\nDream fragments:\n${draft}\n\nWhat converges here?`;
      send();
      draftInput.value = '';
      saveDraft();
    }
    function addDreamPrompts() {
      const draftInput = document.getElementById('draftInput');
      const prompt = '\n\nImages:\nPeople:\nPlaces:\nFeelings:\nSymbols:\nWhat changed by morning:';
      draftInput.value = `${draftInput.value.trim()}${prompt}`;
      draftInput.focus();
      saveDraft();
    }

    document.getElementById('sendBtn').addEventListener('click', send);
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    document.getElementById('draftInput').addEventListener('input', saveDraft);
    document.getElementById('convergeBtn').addEventListener('click', sendConvergence);
    document.getElementById('dreamPromptBtn').addEventListener('click', addDreamPrompts);
    document.getElementById('clearDraftBtn').addEventListener('click', () => {
      if (confirm('Clear the saved notepad draft?')) {
        document.getElementById('draftInput').value = '';
        saveDraft();
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Clear all chat history?')) {
        localStorage.removeItem(STORAGE_KEY);
        render();
      }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const msgs = loadMessages();
      const blob = new Blob(msgs.map(m => JSON.stringify(m) + '\n'), { type: 'application/jsonl' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `chat_${new Date().toISOString().slice(0,10)}.jsonl`;
      a.click();
    });

    render();
    loadDraft();
  </script>
</body>
</html>
