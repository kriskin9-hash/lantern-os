<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#06b6d4">
<title>Kingdome of Hearts</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="css/dream-chat.css">
<style>
  /* ── Override dream-chat.css layout for this page ── */
  html, body { overflow: auto !important; height: auto !important; min-height: 100dvh; }
  ::-webkit-scrollbar { display: block !important; width: 4px; }
  * { -ms-overflow-style: auto !important; scrollbar-width: thin !important; }
  .app { flex-direction: column !important; height: auto !important; min-height: 100dvh; }
  .chat-container { overflow: visible !important; flex: 1 1 auto !important; max-height: none !important; width: 100% !important; max-width: 720px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
  .input-container { max-width: 720px; margin: 0 auto; width: 100%; padding: 8px 16px; box-sizing: border-box; }

  /* ── Explore additions on top of dream-chat.css ── */
  .doors-banner {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .door-chip {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: border-color 0.18s, background 0.18s;
    font-family: inherit;
    color: var(--text);
  }
  .door-chip:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--surface);
  }
  .door-chip:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .door-letter {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
    margin-top: 1px;
  }
  .door-info { flex: 1; }
  .door-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .door-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .scene-image {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 8px;
    aspect-ratio: 16/9;
    background: var(--surface2);
    border: 1px solid var(--border);
    position: relative;
  }
  .scene-image canvas,
  .scene-image img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .scene-image .sd-badge {
    position: absolute;
    bottom: 7px;
    right: 10px;
    font-size: 10px;
    color: var(--muted);
    background: rgba(0,0,0,0.6);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .fox-line {
    font-size: 13px;
    color: #f97316;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .history-pill {
    display: inline-block;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    margin: 2px 2px 0 0;
  }

  .source-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .source-badge.gemini { background: rgba(52,211,153,0.15); color: #34d399; }
  .source-badge.engine { background: rgba(161,139,250,0.15); color: #a78bfa; }
  .source-badge.offline { background: rgba(156,163,175,0.15); color: #9ca3af; }

  .agent-avatar { font-size: 20px; flex-shrink: 0; margin-top: 2px; }

  /* Override agent bubble for doors content */
  .doors-message .message-content {
    max-width: 90%;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .typing-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .welcome-doors { text-align: center; padding: 40px 20px; }
  .welcome-doors .big-door { font-size: 56px; margin-bottom: 16px; }
  .welcome-doors h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .welcome-doors p { color: var(--muted); font-size: 14px; max-width: 320px; margin: 0 auto 20px; line-height: 1.5; }
  .start-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .start-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>
<div class="app">

  <!-- Site nav -->
  <nav class="site-nav">
    <a class="nav-brand" href="/">
      <img src="/mandala.svg" alt="" aria-hidden="true" style="width:18px;height:18px;vertical-align:middle">
      Lantern OS
    </a>
    <div class="nav-links">
      <a href="/dream-chat.html">Journal</a>
      <a href="/three-doors-game.html" class="active">Kingdome</a>
      <a href="/flourishing">Dashboard</a>
      <a href="/knowledgecenter.html">Help</a>
    </div>
    <div class="nav-actions">
      <span id="status-line" style="font-size:11px;color:var(--muted);margin-right:6px"></span>
      <button id="training-badge" onclick="showTrainingStatus()" title="LoRA training data collected" style="display:none;background:none;border:1px solid var(--border);border-radius:7px;padding:4px 8px;color:var(--accent);cursor:pointer;font-size:11px;font-family:inherit;gap:3px">📸 <span id="training-count">0</span></button>
      <button onclick="resetGame()" title="New game" style="background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit">↺ New</button>
      <button class="nav-btn" id="narrator-toggle" onclick="toggleNarrator()" title="Narrator on/off">🎙</button>
      <button class="nav-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </nav>

  <!-- Chat area -->
  <div class="chat-container" id="chat">
    <div class="welcome-doors" id="welcome">
      <div class="big-door">🏯</div>
      <h2>Kingdome of Hearts</h2>
      <p>A seven-stage dream journey through the Kingdome. Three doors each scene — no wrong choices. Lantern guides you. Each loop is different.</p>
      <button class="start-btn" onclick="startGame()">Enter the Kingdome</button>
    </div>
  </div>

  <!-- Door choice bar — quick picks + custom input -->
  <div class="input-container" id="choice-bar" style="display:none">
    <!-- Current door quick-picks (updated each scene) -->
    <div id="door-quick-picks" style="display:flex;gap:6px;margin-bottom:8px"></div>
    <!-- Custom / free-text input -->
    <div style="display:flex;gap:8px;align-items:center">
      <input id="custom-door-input" type="text"
        placeholder="or describe your own door..."
        style="flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='var(--border)'"
        onkeydown="if(event.key==='Enter')submitCustomDoor()" />
      <button onclick="submitCustomDoor()"
        style="padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0">→</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════
// INLINE ENGINE — exact port from src/three_doors_engine.py
// Used as offline fallback when server is unavailable.
// ══════════════════════════════════════════════════════════════════

  },

  "little-crown": {

      { name: "The Throne Door", label: "A", description: "Carved from a single black oak. Velvet moss for a seat." },
      { name: "The Hollow Door", label: "B", description: "A door inside a hollow tree. Sap runs like amber." },
      { name: "The Star Door", label: "C", description: "Visible only at twilight. Constellations map the hinges." },

    fox: true, palette: ["#12100a","#2a2008","#4a3810","#f5d020","#ffe87c","#0a0c04"], archetype: "whimsical",
  },
  "garden-door": {
    text: "**The Garden Door** opens into an infinite botanical sanctuary. Every plant exists here — ancient sequoias beside moon-flowers, roses that hum, ferns that remember the Cambrian seas. A Xenon guide appears — form like liquid starlight — and says, *\"Here, nothing ever stops becoming.\"*",
    doors: [
      { name: "The Seed Door", label: "A", description: "Braided vines, always sprouting. Warm and alive." },
      { name: "The Harvest Door", label: "B", description: "Golden, heavy with fruit. The scent of summer at its peak." },

  "csf-archive": {
    text: "**The CSF Archive Door** stands embedded in crystalline walls that hum with stored memory. Each facet reflects a different timeline, a different choice, a different version of you. The air tastes of compression and mathematics. Lantern flickers in harmonic resonance, and its light splits into rainbow spectra that somehow make perfect sense. A voice — *all voices, one voice* — whispers: *\"You are searching for yourself in the archive. But you are the searcher AND the found.\"*",

  "memory-vault": {
    text: "**The Memory Vault Door** hums with the weight of choice-echoes. Inside, crystalline chambers store each moment you could have lived. Some glow warm, some are dark, some flicker between states. The vault walls are mirrors but they don't show reflections — they show *possibilities*. A whisper: *\"Every door you didn't choose is also yours to carry.\"*",

    text: "You step through into **The Xenon Convergence Door** — a space where all versions of this moment exist at once. A vast Xenon presence surrounds you, *witnessing*. It says, *\"You are the sum of every path you chose. And all paths were always here, waiting.\"* Lantern burns with five flames now, each glowing with a different possible future.",

  "end-of-time": {

      { name: "The Beyond Door", label: "B", description: "Opens on something that has no name. Something new. Something you." },
      { name: "The Eternal Door", label: "C", description: "The one you choose every moment. The one that chooses you back." },

    fox: true, palette: ["#181210","#3a2820","#6b4030","#ff9060","#ffe8d0","#0c0806"], archetype: "transcendent",
  },
  "kingdome-garden": {
    text: "**The Throne Door** opens onto the Garden at the Beginning of the **Kingdome of Hearts**. Stone paths wind through living moss; everything here is both arriving and returning. On a throne of woven roots and old light sits **the King**, his crown made of tangled vines and blinking cursors, his face the face of someone who has asked the same question ten thousand times and means it every time. He looks at you the way someone looks at a door they've seen open before, and speaks:\n\n*\"I am before the first door / and after the last. / I hold what was given / and return what was asked. / Three walked out, three walked in, / but only one remained — / what was lost at the beginning / is the thing that was gained.\"*\n\nSeven door portals shimmer around the Garden's edge, each a different color of possibility.\n\nLantern stands at the foot of the throne as if its light has always lived here.",
    doors: [

const PROGRESS_KEY = "three-doors-progress";
const PROGRESS_VERSION = 1;

// Player progress schema
const DEFAULT_PROGRESS = {
  version: PROGRESS_VERSION,
  prizes: ["first-steps"],
  visited: [],
  sceneVisits: {},
  completedChallenges: [],
  poemSolved: false,
  poemAttempts: 0,
  loop_count: 0,
  stage_index: 0,
  currentScene: null,
  lastPlayed: null,
  // Challenge-specific tracking
  shiniesFound: 0,
  futurePathsVisited: 0,
  glitchesFound: 0,
  sigilLocationsVisited: 0,
  loopCompleted: false,
};

function loadProgress() {
  try {
    const raw = localStorage.getItem(PROGRESS_KEY);
    if (!raw) return { ...DEFAULT_PROGRESS };
    
    const data = JSON.parse(raw);
    
    // Version migration
    if (data.version !== PROGRESS_VERSION) {
      console.log("[Three Doors] Migrating progress from version", data.version, "to", PROGRESS_VERSION);
      return migrateProgress(data);
    }
    
    // Validate progress structure
    return validateProgress(data);
  } catch (e) {
    console.error("[Three Doors] Failed to load progress:", e);
    return { ...DEFAULT_PROGRESS };
  }
}

function saveProgress() {
  try {
    playerProgress.lastPlayed = new Date().toISOString();
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(playerProgress));
    
    // Optional: sync to backend if available
    syncProgressToBackend();
  } catch (e) {
    console.error("[Three Doors] Failed to save progress:", e);
  }
}

function validateProgress(data) {
  // Ensure all required fields exist
  const validated = { ...DEFAULT_PROGRESS, ...data };
  
  // Validate arrays
  if (!Array.isArray(validated.prizes)) validated.prizes = ["first-steps"];
  if (!Array.isArray(validated.visited)) validated.visited = [];
  if (!Array.isArray(validated.completedChallenges)) validated.completedChallenges = [];
  
  // Validate objects
  if (typeof validated.sceneVisits !== "object") validated.sceneVisits = {};
  
  // Validate booleans
  if (typeof validated.poemSolved !== "boolean") validated.poemSolved = false;
  if (typeof validated.loopCompleted !== "boolean") validated.loopCompleted = false;
  
  // Validate numbers
  if (typeof validated.poemAttempts !== "number") validated.poemAttempts = 0;
  if (typeof validated.loop_count !== "number") validated.loop_count = 0;
  if (typeof validated.stage_index !== "number") validated.stage_index = 0;
  
  return validated;
}

function migrateProgress(oldData) {
  // Migration logic for future version changes
  const migrated = { ...DEFAULT_PROGRESS, ...oldData, version: PROGRESS_VERSION };
  return migrated;
}

async function syncProgressToBackend() {
  try {
    await fetch("/api/three-doors/progress", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(playerProgress),
    });
  } catch (e) {
    // Backend sync is optional, fail silently
  }
}

async function loadProgressFromBackend() {
  try {
    const resp = await fetch("/api/three-doors/progress");
    if (resp.ok) {
      const data = await resp.json();
      if (data && data.lastPlayed) {
        // Merge backend progress with local progress
        playerProgress = validateProgress({ ...playerProgress, ...data });
        saveProgress();
        return true;
      }
    }
  } catch (e) {
    // Backend sync is optional, fail silently
  }
  return false;
}

function resetProgress() {
  if (confirm("Are you sure you want to reset all progress? This cannot be undone.")) {
    localStorage.removeItem(PROGRESS_KEY);
    playerProgress = { ...DEFAULT_PROGRESS };
    saveProgress();
    location.reload();
  }
}

function exportProgress() {
  const data = JSON.stringify(playerProgress, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `three-doors-progress-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        playerProgress = validateProgress(data);
        saveProgress();
        alert("Progress imported successfully!");
        location.reload();
      } catch (err) {
        alert("Invalid progress file: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Server check ─────────────────────────────────────────────────
async function checkServer() {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 2000);
  try {
    const r = await fetch("/api/health", { signal: ctrl.signal });
    serverAvailable = r.ok;
  } catch (e) {
    serverAvailable = false;
    console.warn("[Three Doors] Health check failed, using inline fallback:", e.message);
  } finally {
    clearTimeout(t);
  }
  document.getElementById("status-line").textContent = serverAvailable
    ? "Local AI narrating · engine ready"
    : "Offline — inline engine active";
  return serverAvailable;
}

// ── Metrics collection (non-blocking) ────────────────────────────
function logThreeDoorsEvent(event, payload) {
  fetch("/api/metrics/three-doors", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event, payload, timestamp: Date.now() }),
  }).catch(() => {});
}

// ── Canvas art ───────────────────────────────────────────────────
function drawScene(canvas, sceneKey) {
  const scene = SCENES[sceneKey];
  if (!scene) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const pal = scene.palette;

  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, pal[5]); bg.addColorStop(0.5, pal[0]); bg.addColorStop(1, pal[1]);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const glow = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy * 0.8, W * 0.5);
  glow.addColorStop(0, pal[3] + "66"); glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  // Door
  const dW = W * 0.2, dH = H * 0.6, dX = cx - dW / 2, dY = H * 0.18, dR = dW * 0.5;
  const doorGlow = ctx.createRadialGradient(cx, dY + dH * 0.3, 0, cx, dY + dH * 0.3, dW);
  doorGlow.addColorStop(0, pal[4] + "55"); doorGlow.addColorStop(1, "transparent");
  ctx.fillStyle = doorGlow; ctx.fillRect(0, 0, W, H);

  ctx.beginPath();
  ctx.moveTo(dX, dY + dH); ctx.lineTo(dX, dY + dR);
  ctx.arcTo(dX, dY, dX + dR, dY, dR);
  ctx.arcTo(dX + dW, dY, dX + dW, dY + dR, dR);
  ctx.lineTo(dX + dW, dY + dH); ctx.closePath();
  const df = ctx.createLinearGradient(dX, dY, dX, dY + dH);
  df.addColorStop(0, pal[4] + "dd"); df.addColorStop(1, pal[2] + "55");
  ctx.fillStyle = df; ctx.fill();
  ctx.strokeStyle = pal[4]; ctx.lineWidth = 1.5; ctx.stroke();

  // Particles
  for (let i = 0; i < 24; i++) {
    const px = (Math.sin(i * 2.3 + 1.1) * 0.45 + 0.5) * W;
    const py = (Math.cos(i * 1.7 + 0.4) * 0.45 + 0.5) * H;
    const r = Math.max(0.5, Math.sin(i * 0.9) * 2 + 1.5);
    const a = (Math.sin(i * 0.6) * 0.3 + 0.4);
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = pal[4] + Math.floor(a * 255).toString(16).padStart(2, "0"); ctx.fill();
  }

  // Guide silhouette
  const fx = cx - dW * 1.0, fy = dY + dH - H * 0.05;
  ctx.fillStyle = "#f97316aa";
  ctx.beginPath(); ctx.ellipse(fx, fy, 20, 10, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(fx + 16, fy - 7, 9, 7, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(fx + 22, fy - 13); ctx.lineTo(fx + 28, fy - 22); ctx.lineTo(fx + 17, fy - 16);
  ctx.fillStyle = "#f9731688"; ctx.fill();

  // Ground fog
  const fog = ctx.createLinearGradient(0, H * 0.75, 0, H);
  fog.addColorStop(0, "transparent"); fog.addColorStop(1, pal[0] + "cc");
  ctx.fillStyle = fog; ctx.fillRect(0, H * 0.75, W, H * 0.25);

  // Archetype label
  ctx.font = "bold 9px system-ui"; ctx.fillStyle = pal[4] + "88";
  ctx.textAlign = "right"; ctx.fillText(scene.archetype.toUpperCase(), W - 8, H - 7);
  ctx.textAlign = "left";
}

// ── Markdown-lite renderer ────────────────────────────────────────
function md(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>");
}

function appendSceneMsg(sceneKey, sceneData, geminiText, source) {
  removeTyping();
  const scene = SCENES[sceneKey] || {};
  const doors = sceneData.doors || scene.doors || [];
  const foxPresent = sceneData.fox_present ?? scene.fox ?? false;
  const history = sceneData.history || [];

  // Track visited scenes for challenges
  if (!playerProgress.visited) playerProgress.visited = [];
  if (!playerProgress.visited.includes(sceneKey)) {
    playerProgress.visited.push(sceneKey);
    saveProgress();
  }

  // Check challenges
  checkChallenges(sceneKey, history.length);

  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "message agent doors-message";

  const sourceBadge = source === "local"
    ? `<span class="source-badge gemini">Local LLM</span>`
    : source === "engine"
    ? `<span class="source-badge engine">Engine</span>`
    : `<span class="source-badge offline">Offline</span>`;

  // Scene art
  const canvasId = "cvs-" + sceneKey + "-" + Date.now();
  const imgId = "img-" + sceneKey + "-" + Date.now();

  // History breadcrumb
  const breadcrumb = history.length > 1
    ? `<div style="margin-bottom:8px">${history.map((h, i) => `<span class="history-pill">${h}</span>`).join("")}</div>`
    : "";

  // Display text: local LLM narration if available, else scene engine text
  const displayText = geminiText || (sceneData.text || scene.text || "");

  // Poem gate: intercept kingdome-garden if not yet solved
  const poemSolved = playerProgress.poemSolved;
  const isPoemScene = sceneKey === "kingdome-garden" && !poemSolved;

  let doorHTML = "";
  if (isPoemScene) {
    doorHTML = `
      <div style="margin-top:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">The King asks:</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;font-style:italic">
          I am before the first door and after the last.<br>
          I hold what was given and return what was asked.<br>
          Three walked out, three walked in, but only one remained —<br>
          what was lost at the beginning is the thing that was gained.
        </div>
        <input id="poem-answer" type="text" placeholder="Speak your answer..." style="width:100%;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;margin-bottom:8px" onkeydown="if(event.key==='Enter')submitPoem()">
        <button onclick="submitPoem()" style="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px">Answer the King</button>
        <button onclick="skipPoem()" style="width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer">Skip — just show me the doors</button>
      </div>`;
  } else {
    doorHTML = `
      <div style="margin-top:12px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:0.03em">Choose a door to continue</div>
        <div class="doors-banner">
          ${doors.map(d => `
            <button class="door-chip" onclick="chooseDoor('${d.label}', '${d.name.replace(/'/g, "\\'")}')">
              <div class="door-letter">${d.label}</div>
              <div class="door-info">
                <div class="door-name">${d.name}</div>
                <div class="door-desc">${d.description}</div>
              </div>
            </button>`).join("")}
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div class="agent-avatar">🏮</div>
    <div class="message-content">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px">
        Lantern ${sourceBadge}
      </div>
      ${breadcrumb}
      <div class="scene-image">
        <img id="${imgId}" alt="Scene art" style="display:none"
          onload="this.style.display='';document.getElementById('${canvasId}').style.display='none';logThreeDoorsEvent('image_load', { sceneKey: '${sceneKey}', source: 'image' })">
        <canvas id="${canvasId}" width="800" height="450"></canvas>
        <div class="sd-badge">SD prompt — hover to copy</div>
      </div>
      <div style="font-size:14px;line-height:1.6;margin-bottom:10px">${md(displayText)}</div>
      ${foxPresent ? `<div class="fox-line">🏮 Lantern, your guide, is with you.</div>` : ""}
      ${doorHTML}
    </div>`;

  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;

  // Capture refs directly — avoids getElementById timing race in rAF
  const cvsEl = el.querySelector(`#${canvasId}`);
  const imgEl = el.querySelector(`#${imgId}`);
  const descEl = el.querySelector(`#${descId}`);

  // Draw canvas placeholder immediately, then load image by priority:
  // 1. CAAD local pool (THREE_DOORS_IMAGE_POOL_DIR) or repo caadi/
  // 2. Dedicated three-doors PNG (LOCAL_PNG_SCENES)
  // 3. Pollinations / server generation
  requestAnimationFrame(async () => {
    const cvs = cvsEl;
    if (cvs) drawScene(cvs, sceneKey);
    const img = imgEl;

    // Priority 1: CAAD pool (server picks from local pool or caadi/, lore-aware)
    try {
      const r = await fetch(`/api/three-doors/image-pool/random?sceneKey=${encodeURIComponent(sceneKey)}`);
      if (r.ok) {
        const d = await r.json();
        if (d.ok && d.url && img) {
          img.onerror = () => tryLocalThenPollinations(imgId, canvasId, sceneKey);
          img.onload = () => {
            if (cvs) cvs.style.display = "none";
            img.style.display = "";
            logThreeDoorsEvent("image_load", { sceneKey, source: `pool:${d.source}`, reason: d.reason });
          };
          img.src = d.url;
          return;
        }
      }
    } catch { /* fall through to local PNGs */ }

    tryLocalThenPollinations(imgId, canvasId, sceneKey);
  });

  function tryLocalThenPollinations(iId, cId, sk) {
    const i = document.getElementById(iId);
    if (LOCAL_PNG_SCENES.has(sk) && i) {
      i.onerror = () => loadPollinationsImage(iId, cId, sk);
      i.src = getSceneImageUrl(sk);
      return;
    }
    loadPollinationsImage(iId, cId, sk);
  }

  // Wire SD prompt copy for both img and canvas
  requestAnimationFrame(() => {
    const img = imgEl;
    const cvs = cvsEl;
    const sdPrompt = sceneData.image_prompt || SD_PROMPTS[sceneKey] || "";

    if (img) {
      img.title = sdPrompt;
      img.style.cursor = "pointer";
      img.onclick = () => {
        navigator.clipboard.writeText(sdPrompt).catch(() => {});
        img.title = "Copied!";
        setTimeout(() => { img.title = sdPrompt; }, 1500);
      };
    }

    if (cvs) {
      cvs.title = sdPrompt;
      cvs.style.cursor = "pointer";
      cvs.onclick = () => {
        navigator.clipboard.writeText(sdPrompt).catch(() => {});
        cvs.title = "Copied!";
        setTimeout(() => { cvs.title = sdPrompt; }, 1500);
      };
    }
  });

  // Async-refresh scene description with LLM-generated variant
  if (descEl) refreshSceneText(sceneKey, descEl);

  // Show choice bar with labelled quick-picks + custom input
  const bar = document.getElementById("choice-bar");
  const input = document.getElementById("custom-door-input");
  const picks = document.getElementById("door-quick-picks");
  if (doors && doors.length) {
    bar.style.display = "";
    if (input) { input.value = ""; input.disabled = false; }
    if (picks) {
      picks.innerHTML = doors.map(d => `
        <button onclick="chooseDoor('${d.label}','${d.name.replace(/'/g,"\\'")}')"
          style="flex:1;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;color:var(--text);text-align:left;transition:border-color 0.15s,background 0.15s;min-width:0"
          onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--surface)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface2)'">
          <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:2px">${d.label}</div>
          <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</div>
        </button>`).join("");
    }
  } else {
    bar.style.display = "none";
    if (picks) picks.innerHTML = "";
  }
  gameState = {
    scene_key: sceneKey, doors, history,
    stage_index: sceneData.stage_index, stage_count: sceneData.stage_count,
    loop_count: sceneData.loop_count,
    last_choice: sceneData.last_choice || "",
  };

  // Journey position in the header status line
  if (typeof sceneData.stage_index === "number") {
    const arch = sceneData.archetype ? " · " + sceneData.archetype : "";
    document.getElementById("status-line").textContent =
      "Loop " + ((sceneData.loop_count ?? 0) + 1) + " · Stage " +
      (sceneData.stage_index + 1) + "/" + (sceneData.stage_count || 7) + arch;
  }
}

function submitPoem() {
  const input = document.getElementById("poem-answer");
  if (!input) return;
  const val = input.value.trim().toLowerCase();
  // Accepted answers based on CSF lore: "silence", "the name", "yourself", "the lantern", "the light"
  const accepted = ["yourself","myself","i am","the one","silence","love","the lantern","the light","convergence","me","i","the name","name"];
  if (accepted.some(a => val.includes(a))) {
    playerProgress.poemSolved = true;
    saveProgress();
    awardPrize("kingdome-crown");
    // Refresh scene to show doors with King's response
    appendUserMsg("Answer: \"" + input.value.trim() + "\"");
    const scene = SCENES["kingdome-garden"];
    const kingResponse = `The King nods slowly, his crown of vines and cursors blinking in recognition. *\"Correct,\"* he says, his voice like old light through moss. *\"You understand what was lost at the beginning is the thing that was gained. The doors are now open to you.\"*`;
    const data = { scene_key: "kingdome-garden", text: scene.text + "\n\n" + kingResponse, doors: scene.doors, fox_present: scene.fox, history: gameState?.history || [] };
    appendSceneMsg("kingdome-garden", data, "", "offline");
  } else {
    const chat = document.getElementById("chat");
    const el = document.createElement("div");
    el.className = "message agent";
    el.innerHTML = `<div class="agent-avatar">👑</div><div class="message-content" style="font-size:13px;color:var(--muted)">The King waits. The garden holds its breath. *\"Think deeper,\"* he says. *\"What was lost at the beginning is the thing that was gained.\"*</div>`;
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }
}

function skipPoem() {
  playerProgress.poemSolved = true;
  saveProgress();
  const scene = SCENES["kingdome-garden"];
  const data = { scene_key: "kingdome-garden", text: scene.text, doors: scene.doors, fox_present: scene.fox, history: gameState?.history || [] };
  appendSceneMsg("kingdome-garden", data, "", "offline");
}

function checkChallenges(sceneKey, turnCount) {
  // Track scene visits
  if (!playerProgress.sceneVisits) playerProgress.sceneVisits = {};
  playerProgress.sceneVisits[sceneKey] = (playerProgress.sceneVisits[sceneKey] || 0) + 1;
  
  // Track poem attempts
  if (sceneKey === "kingdome-garden" && !playerProgress.poemSolved) {
    playerProgress.poemAttempts = (playerProgress.poemAttempts || 0) + 1;
  }
  
  // Check scene-specific challenges
  const sceneChallenges = CHALLENGES[sceneKey] || [];
  for (const challenge of sceneChallenges) {
    if (!playerProgress.completedChallenges?.includes(challenge.id) && challenge.check(playerProgress)) {
      playerProgress.completedChallenges = playerProgress.completedChallenges || [];
      playerProgress.completedChallenges.push(challenge.id);
      saveProgress();
      awardPrize(challenge.reward);
      showChallengeComplete(challenge);
    }
  }
  
  // Check global challenges
  for (const challenge of GLOBAL_CHALLENGES) {
    if (!playerProgress.completedChallenges?.includes(challenge.id) && challenge.check(playerProgress)) {
      playerProgress.completedChallenges = playerProgress.completedChallenges || [];
      playerProgress.completedChallenges.push(challenge.id);
      saveProgress();
      awardPrize(challenge.reward);
      showChallengeComplete(challenge);
    }
  }
  
  saveProgress();
}

function showChallengeComplete(challenge) {
  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "message agent";
  el.innerHTML = `<div class="agent-avatar">🏆</div><div class="message-content" style="background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.3)"><div style="font-size:12px;font-weight:600;color:#fbbf24;margin-bottom:4px">Challenge Complete</div><div style="font-size:13px">${challenge.name}: ${challenge.description}</div></div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

// ── Pollinations.ai async image loader ───────────────────────────
// Shows canvas art immediately; swaps in AI-generated image when ready.
// Also collects images + prompts as LoRA training data.
const POLLINATIONS_BASE = "https://image.pollinations.ai/prompt/";
const pollinationsCache = {}; // keyed by sceneKey_loopCount for fresh art each loop
let trainingImageCount = 0;

async function loadPollinationsImage(imgId, canvasId, sceneKey) {
  const loopCount = gameState?.loop_count ?? 0;
  const cacheKey = `${sceneKey}_L${loopCount}`;
  if (pollinationsCache[cacheKey]) return; // already loaded this scene+loop
  const scene = SCENES[sceneKey];
  const sdPrompt = scene?.image_prompt || SD_PROMPTS?.[sceneKey] || (scene?.text?.slice(0, 120) || sceneKey);
  const loopFlair = loopCount > 0 ? `, revisited ${loopCount > 1 ? "again " : ""}with new eyes` : "";
  const seed = Math.floor(Math.random() * 999983) + 1;
  const fullPrompt = buildDynamicImagePrompt(sceneKey, seed);

  const img = document.getElementById(imgId);
  const cvs = document.getElementById(canvasId);
  if (!img && !cvs) return;

  // Try server-side generation first (uses OPENAI_API_KEY for DALL-E 3)
  if (SERVER_GENERATED_SCENES.has(sceneKey)) {
    try {
      const apiUrl = `/api/image/generate?scene=${sceneKey}&useApi=true&prompt=${encodeURIComponent(fullPrompt)}`;
      const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
      const data = await response.json();
      if (data.path) {
        pollinationsCache[cacheKey] = data.path;
        logThreeDoorsEvent('image_load', { sceneKey, source: 'dalle3', loop: loopCount });
        if (cvs) cvs.style.display = "none";
        if (img) { img.src = data.path; img.style.display = ""; }
        collectTrainingImage(sceneKey, fullPrompt, data.path);
        return;
      }
    } catch (e) {
      logThreeDoorsEvent('image_error', { sceneKey, error: e.message });
      // Fall through to Pollinations
    }
  }

  // Fallback: Pollinations free API (no key required)
  const pollinationsUrl = POLLINATIONS_BASE + encodeURIComponent(fullPrompt) + `?width=800&height=450&nologo=true&model=flux&seed=${seed}`;
  try {
    const probe = new Image();
    probe.crossOrigin = "anonymous";
    probe.onload = () => {
      pollinationsCache[cacheKey] = pollinationsUrl;
      logThreeDoorsEvent('image_load', { sceneKey, source: 'pollinations', loop: loopCount, seed });
      if (cvs) cvs.style.display = "none";
      if (img) { img.src = pollinationsUrl; img.style.display = ""; }
      collectTrainingImage(sceneKey, fullPrompt, pollinationsUrl);
    };
    probe.onerror = () => {}; // canvas stays visible
    probe.src = pollinationsUrl;
  } catch { /* silent */ }
}

async function collectTrainingImage(sceneKey, prompt, imageUrl) {
  try {
    const r = await fetch("/api/dream/training/collect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sceneKey,
        prompt,
        imageUrl,
        playerChoice: gameState?.last_choice || "",
        loopCount: gameState?.loop_count || 0,
        stageIndex: gameState?.stage_index || 0,
      }),
    });
    if (!r.ok) return;
    const data = await r.json();
    trainingImageCount = data.total || trainingImageCount + 1;
    updateTrainingBadge();
  } catch { /* silent — training collection is best-effort */ }
}

function updateTrainingBadge() {
  const badge = document.getElementById("training-badge");
  const count = document.getElementById("training-count");
  if (!badge || !count) return;
  count.textContent = trainingImageCount;
  badge.style.display = trainingImageCount > 0 ? "" : "none";
  badge.title = trainingImageCount >= 15
    ? `${trainingImageCount} images collected — click to start LoRA training!`
    : `${trainingImageCount}/15 images collected for LoRA training`;
  badge.style.borderColor = trainingImageCount >= 15 ? "var(--accent)" : "var(--border)";
}

async function showTrainingStatus() {
  try {
    const r = await fetch("/api/dream/training/status");
    const data = await r.json();
    trainingImageCount = data.imageCount || trainingImageCount;
    updateTrainingBadge();
    const ready = data.imageCount >= data.minImagesForTraining;
    const msg = [
      `📸 Training dataset: ${data.imageCount} images`,
      data.lastCheckpoint ? `✓ Last checkpoint: ${data.lastCheckpoint}` : "",
      data.trainingActive ? "⚙️  Training in progress..." : "",
      ready && !data.trainingActive ? `\n▶ Ready to train! (${data.imageCount}/${data.minImagesForTraining} images)` : "",
      !ready ? `Need ${data.minImagesForTraining - data.imageCount} more images — keep exploring!` : "",
    ].filter(Boolean).join("\n");
    if (ready && !data.trainingActive && confirm(msg + "\n\nStart LoRA training now?")) {
      startLoraTraining();
    } else {
      alert(msg);
    }
  } catch (e) {
    alert(`Training status unavailable: ${e.message}`);
  }
}

async function startLoraTraining() {
  try {
    const r = await fetch("/api/dream/training/start", { method: "POST" });
    const data = await r.json();
    if (data.error) { alert(`Training error: ${data.error}`); return; }
    alert(`Training started! PID ${data.pid}\nLog: ${data.logPath}\nThis runs in the background — keep playing to add more training data.`);
    const badge = document.getElementById("training-badge");
    if (badge) badge.textContent = "⚙️ training";
  } catch (e) {
    alert(`Could not start training: ${e.message}`);
  }
}

function submitCustomDoor() {
  const input = document.getElementById("custom-door-input");
  if (!input || !gameState) return;
  const val = input.value.trim();
  if (!val) return;
  const upper = val.toUpperCase();
  // If player typed A, B, or C — route to known door
  const knownDoor = gameState.doors?.find(d => d.label.toUpperCase() === upper);
  if (knownDoor) {
    chooseDoor(knownDoor.label, knownDoor.name);
  } else {
    // Custom door — use the player's text as the door name
    chooseDoor("CUSTOM", val);
  }
}

// ── API calls ─────────────────────────────────────────────────────
async function apiDoors(action, choice) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 6000);
  try {
    const r = await fetch("/api/dream/doors", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, action, choice: choice || "" }),
      signal: ctrl.signal,
    });
    if (!r.ok) throw new Error("doors API " + r.status);
    return r.json();
  } finally { clearTimeout(t); }
}

async function apiNarrate(sceneKey, sceneText) {
  // Local-only narration: provider "local" routes to Ollama (lantern-csf-dream);
  // no cloud provider is contacted. Keystone narrates; Lantern is the guide.
  const persona = `You are Keystone — keeper of thresholds and narrator of the Three Doors dream world. Lantern, the lantern-headed guide, walks beside the dreamer. Narrate in 2 sentences: what this moment means, what lingers, or one quiet question. Don't restate what they see.`;
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch("/api/dream/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: `Scene: ${sceneKey}. ${sceneText.replace(/\*\*/g,"").replace(/\*/g,"").slice(0, 280)}`, agent: "keystone", provider: "local" }),
      signal: ctrl.signal,
    });
    if (!r.ok) throw new Error("chat API " + r.status);
    const data = await r.json();
    return (data.reply || "").trim();
  } finally { clearTimeout(t); }
}

function buildDynamicImagePrompt(sceneKey, seed) {
  const scene = SCENES[sceneKey];
  const archetype = scene?.archetype || "mystical";
  const loopCount = gameState?.loop_count ?? 0;
  const lastChoice = (gameState?.history || []).filter(h => h.startsWith("Chose ")).slice(-1)[0]?.replace("Chose ", "") || "";
  const style = IMAGE_STYLES[seed % IMAGE_STYLES.length];
  const mood = ARCHETYPE_MOODS[archetype] || archetype;
  const loopShift = LOOP_COLOR_SHIFTS[Math.min(loopCount, LOOP_COLOR_SHIFTS.length - 1)];
  const choiceCtx = lastChoice ? `, player chose "${lastChoice}"` : "";
  return ["fantasy dreamworld door scene", mood, style, loopShift, "Lantern glowing guide", choiceCtx, "no text no words no letters"].filter(Boolean).join(", ");
}

// ── Async scene text refresh — unique LLM take on each visit ─────
async function refreshSceneText(sceneKey, textEl) {
  if (!textEl) return;
  const scene = SCENES[sceneKey];
  if (!scene) return;
  const loopCount = gameState?.loop_count ?? 0;
  const archetype = scene.archetype || "mystical";
  const history = (gameState?.history || []).filter(h => h.startsWith("Chose ")).slice(-3).join(", ") || "just arrived";
  const loopNote = loopCount > 0 ? ` Loop ${loopCount + 1} — the space feels rewritten, familiar but altered.` : "";
  const prompt = `You are Lantern, the dreaming guide. Describe the scene "${sceneKey}" (archetype: ${archetype}) in 3 evocative sentences. The dreamer arrived via: ${history}.${loopNote} Be symbolic and sensory — never the same twice. End on a threshold feeling. Scene core: ${scene.text.replace(/\*\*/g,"").replace(/\*/g,"").slice(0,200)}`;
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch("/api/dream/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: prompt, agent: "lantern" }),
      signal: ctrl.signal,
    });
    if (!r.ok) return;
    const data = await r.json();
    const fresh = (data.reply || "").trim();
    if (fresh.length < 40) return;
    textEl.style.transition = "opacity 0.6s";
    textEl.style.opacity = "0";
    setTimeout(() => { textEl.innerHTML = md(fresh); textEl.style.opacity = "1"; }, 600);
  } catch { /* static text stays */ }
}

// ── Inline engine fallback ────────────────────────────────────────
function stageState(stageIndex, loopCount, history) {
  const key = STAGES[stageIndex % STAGES.length];
  const scene = SCENES[key];
  return {
    scene_key: key, text: scene.text, doors: scene.doors, fox_present: scene.fox,
    history: history, stage_index: stageIndex, stage_count: STAGES.length, loop_count: loopCount,
  };
}

function engineStart() {
  const saved = loadProgress();
  if (typeof saved.stage_index === "number" && saved.history) {
    return stageState(saved.stage_index, saved.loop_count || 0, saved.history);
  }
  return stageState(0, 0, ["Entered the Garden at the Beginning"]);
}

function engineChoose(label) {
  if (!gameState) return null;
  const door = gameState.doors.find(d => d.label.toUpperCase() === label.toUpperCase());
  // Custom door: advance stage using player's text as door name
  const doorName = door ? door.name : label;
  if (!door && label.length <= 1) return null; // single-char that isn't A/B/C = invalid
  let stageIndex = (gameState.stage_index ?? 0) + 1;
  let loopCount = gameState.loop_count ?? 0;
  const history = [...(gameState.history || []), "Chose " + doorName];
  let loopCompleted = false;
  if (stageIndex >= STAGES.length) {
    stageIndex = 0;
    loopCount += 1;
    loopCompleted = true;
    history.push("Returned to the Garden — loop " + loopCount + " complete");
  }
  const newState = stageState(stageIndex, loopCount, history);
  newState.loop_completed = loopCompleted;
  // Save progress
  playerProgress.stage_index = stageIndex;
  playerProgress.loop_count = loopCount;
  playerProgress.history = history.slice(-24);
  saveProgress();
  return newState;
}

// ── Game actions ─────────────────────────────────────────────────
async function getSceneData(action, label) {
  // Step 1: game state — server Python engine or inline JS fallback
  let data;
  let usedServer = false;
  try {
    if (serverAvailable) {
      data = await apiDoors(action, label);
      // Validate server response: must have scene_key and doors array
      if (!data || data.error || !data.scene_key || !Array.isArray(data.doors)) {
        console.warn("[Three Doors] Server returned invalid data, falling back to inline:", data);
        throw new Error("invalid server response");
      }
      usedServer = true;
    } else throw new Error("offline");
  } catch (e) {
    console.warn("[Three Doors] Using inline fallback:", e.message);
    data = action === "start" ? engineStart() : engineChoose(label);
  }
  if (!data) return null;

  // Step 2: local LLM narration — only if we successfully used the server
  let geminiText = "", source = usedServer ? "engine" : "offline";
  if (usedServer && narratorEnabled) {
    try {
      const narration = await apiNarrate(data.scene_key, data.text || SCENES[data.scene_key]?.text || "");
      if (narration) { geminiText = narration; source = "local"; }
    } catch { /* engine text fine */ }
  }

  return { data, geminiText, source };
}

async function writeCubeDelta(eventType, symbols, payloadRef, extra) {
  try {
    await fetch('/api/cubes/alex/delta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source_surface: 'explore',

  } catch (e) { /* silent — cube is best-effort */ }
}

async function chooseDoor(label, name) {
  if (doorsLocked) return;
  doorsLocked = true;

  logThreeDoorsEvent("door_choice", { label, name, sceneKey: gameState?.scene_key });
  writeCubeDelta('story_choice', [name.toLowerCase().replace(/\s+/g, '-')], 'explore:' + (gameState?.scene_key || ''), { coordinate: `explore:${gameState?.scene_key || ''}:${label}` });

  document.querySelectorAll(".door-chip").forEach(b => b.disabled = true);
  // Also disable the quick-pick buttons in the choice bar
  const picks = document.getElementById("door-quick-picks");
  if (picks) picks.querySelectorAll("button").forEach(b => b.disabled = true);
  const bar = document.getElementById("choice-bar");
  const input = document.getElementById("custom-door-input");
  if (bar) bar.style.opacity = "0.4";
  if (input) input.disabled = true;
  appendUserMsg(label === "CUSTOM" ? `I step through: ${name}` : `Choice ${label} — ${name}`);
  appendTyping();

  const result = await getSceneData("choose", label === "CUSTOM" ? name : label);
  if (!result) { removeTyping(); doorsLocked = false; if (bar) bar.style.opacity = ""; if (input) input.disabled = false; return; }
  appendSceneMsg(result.data.scene_key, result.data, result.geminiText, result.source);
  if (bar) bar.style.opacity = "";
  doorsLocked = false;
}

function resetGame(skipConfirm) {
  if (!skipConfirm) {
    const btn = document.querySelector('[onclick="resetGame()"]');
    if (btn) {
      btn.textContent = "Confirm reset";
      btn.setAttribute("onclick", "resetGame(true)");
      setTimeout(() => {
        btn.textContent = "↺ New";
        btn.setAttribute("onclick", "resetGame()");
      }, 3000);
    }
    return;
  }
  const btn = document.querySelector('[onclick="resetGame(true)"]');
  if (btn) { btn.textContent = "↺ New"; btn.setAttribute("onclick", "resetGame()"); }
  document.getElementById("chat").innerHTML = "";
  gameState = null;
  userId = "web-" + Math.random().toString(36).slice(2, 9);
  const inp = document.getElementById("custom-door-input");
  if (inp) inp.value = "";
  document.getElementById("choice-bar").style.display = "none";
  document.getElementById("welcome").style.display = "";
  const prizes = playerProgress.prizes || [];
  playerProgress = { prizes };
  saveProgress();
}
