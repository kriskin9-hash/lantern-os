<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#06b6d4">
<title>Three Doors — Lantern OS</title>
<link rel="stylesheet" href="css/dream-chat.css">
<style>
  /* ── Override dream-chat.css scroll lock for this page ── */
  html, body { overflow: auto !important; height: auto !important; min-height: 100dvh; }
  ::-webkit-scrollbar { display: block !important; width: 4px; }
  * { -ms-overflow-style: auto !important; scrollbar-width: thin !important; }
  .app { height: auto !important; min-height: 100dvh; }
  .chat-container { overflow: visible !important; flex: none !important; max-height: none !important; }

  /* ── Three Doors additions on top of dream-chat.css ── */
  .doors-banner {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .door-chip {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: border-color 0.18s, background 0.18s;
    font-family: inherit;
    color: var(--text);
  }
  .door-chip:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--surface);
  }
  .door-chip:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .door-letter {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
    margin-top: 1px;
  }
  .door-info { flex: 1; }
  .door-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .door-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .scene-image {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 8px;
    aspect-ratio: 16/9;
    background: var(--surface2);
    border: 1px solid var(--border);
    position: relative;
  }
  .scene-image canvas { width: 100%; height: 100%; display: block; }
  .scene-image .sd-badge {
    position: absolute;
    bottom: 7px;
    right: 10px;
    font-size: 10px;
    color: var(--muted);
    background: rgba(0,0,0,0.6);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .fox-line {
    font-size: 13px;
    color: #f97316;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .history-pill {
    display: inline-block;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    margin: 2px 2px 0 0;
  }

  .source-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .source-badge.gemini { background: rgba(52,211,153,0.15); color: #34d399; }
  .source-badge.engine { background: rgba(161,139,250,0.15); color: #a78bfa; }
  .source-badge.offline { background: rgba(156,163,175,0.15); color: #9ca3af; }

  .agent-avatar { font-size: 20px; flex-shrink: 0; margin-top: 2px; }

  .return-chip { opacity: 0.65; border-style: dashed; }
  .return-chip:hover:not(:disabled) { opacity: 1; border-style: solid; }

  /* Override agent bubble for doors content */
  .doors-message .message-content {
    max-width: 90%;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .typing-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .welcome-doors { text-align: center; padding: 40px 20px; }
  .welcome-doors .big-door { font-size: 56px; margin-bottom: 16px; }
  .welcome-doors h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .welcome-doors p { color: var(--muted); font-size: 14px; max-width: 320px; margin: 0 auto 20px; line-height: 1.5; }
  .start-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .start-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>
<div class="app">

  <!-- Header — matches dream-chat.html -->
  <header>
    <a class="back-link" href="/" title="Home">←</a>
    <div class="agent-avatar">🚪</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:600;line-height:1.2">Three Doors</div>
      <div id="status-line" style="font-size:11px;color:var(--muted)">Follow the fox through the dream world</div>
    </div>
    <button onclick="resetGame()" title="New game" style="background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit">↺ New</button>
    <button onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit" title="Toggle theme">☀</button>
  </header>

  <!-- Chat area -->
  <div class="chat-container" id="chat">
    <div class="welcome-doors" id="welcome">
      <div class="big-door">🚪</div>
      <h2>Three Doors</h2>
      <p>A branching dream-world game. Follow the fox through moss, bells, and convergence. Seven scenes, infinite returns.</p>
      <button class="start-btn" onclick="startGame()">Enter the Moss Door</button>
    </div>
  </div>

  <!-- Door choice bar — 3 buttons only -->
  <div class="input-container" id="choice-bar" style="display:none">
    <div style="display:flex;gap:10px" id="choice-buttons"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════
// INLINE ENGINE — exact port from src/three_doors_engine.py
// Used as offline fallback when server is unavailable.
// ══════════════════════════════════════════════════════════════════
const SCENES = {
  "moss-entry": {
    text: "You stand inside **The Moss Door**. The air is thick with green light, soft earth, and the smell of rain on ferns. Lanterns hang from ancient branches. A moss-covered fox sits beside you, wearing a brass tag that reads: **FRIEND OF THE ONE WHO CHOSE GREEN**. It looks up and says, *\"You came back.\"*",
    doors: [
      { name: "The Burrow Door", label: "A", description: "Small, root-framed, warm. Smells of rain and old blankets." },
      { name: "The Sunken Bell Door", label: "B", description: "Half underwater. Rings softly when no one touches it." },
      { name: "The Little Crown Door", label: "C", description: "Tiny golden door in a tree stump, widening when trusted." },
    ],
    fox: true, palette: ["#0d2b1a","#1a4a2e","#2d6b45","#3ecf8e","#7fff9a","#0a1f10"], archetype: "primordial",
  },
  "burrow": {
    text: "You crawl through **The Burrow Door** into a snug earthen chamber lined with woven roots and faded quilts. Rain drums overhead. The fox curls up on a blanket and closes its eyes. A single lantern flickers in the corner.",
    doors: [
      { name: "The Root Door", label: "A", description: "Twisted oak roots form an arch. Something hums beyond." },
      { name: "The Ember Door", label: "B", description: "Warmth radiates. Ash drifts under the crack like snow." },
      { name: "The Stream Door", label: "C", description: "Water rushes somewhere close. The floor is slick moss." },
    ],
    fox: true, palette: ["#1a0e05","#3d2010","#6b3a18","#f5a623","#ffe0a0","#0d0804"], archetype: "intimate",
  },
  "sunken-bell": {
    text: "Beneath **The Sunken Bell Door**, water reaches your ankles in a stone hallway. A bell hangs above, dripping, and it chimes once though no wind blows. Reflections of lanterns dance on the ceiling like fish.",
    doors: [
      { name: "The Deep Door", label: "A", description: "Submerged stairs descend into green-black silence." },
      { name: "The Echo Door", label: "B", description: "Your own voice returns as song from the other side." },
      { name: "The Surface Door", label: "C", description: "Sunlight visible through cracks. The sound of birds." },
    ],
    fox: true, palette: ["#040d1a","#0a1f3a","#0d3a5c","#5b9cf6","#a8d4ff","#020810"], archetype: "mystical",
  },
  "little-crown": {
    text: "Through **The Little Crown Door**, the forest opens into a glade where every tree stump wears a tiny golden crown. Yours widened just enough to let you through. The fox trots ahead, its tail brushing against jeweled leaves.",
    doors: [
      { name: "The Throne Door", label: "A", description: "Carved from a single black oak. Velvet moss for a seat." },
      { name: "The Hollow Door", label: "B", description: "A door inside a hollow tree. Sap runs like amber." },
      { name: "The Star Door", label: "C", description: "Visible only at twilight. Constellations map the hinges." },
    ],
    fox: true, palette: ["#12100a","#2a2008","#4a3810","#f5d020","#ffe87c","#0a0c04"], archetype: "whimsical",
  },
  "garden-door": {
    text: "**The Garden Door** opens into an infinite botanical sanctuary. Every plant exists here — ancient sequoias beside moon-flowers, roses that hum, ferns that remember the Cambrian seas. A Xenon guide appears — form like liquid starlight — and says, *\"Here, nothing ever stops becoming.\"*",
    doors: [
      { name: "The Seed Door", label: "A", description: "Braided vines, always sprouting. Warm and alive." },
      { name: "The Harvest Door", label: "B", description: "Golden, heavy with fruit. The scent of summer at its peak." },
      { name: "The Convergence Bloom", label: "C", description: "Crystallized flowers shifting between colors no name has claimed." },
    ],
    fox: true, palette: ["#061208","#0f2a14","#1a4a22","#3ecf8e","#b8ffda","#030a04"], archetype: "bountiful",
  },
  "xenon-convergence": {
    text: "You step through into **The Xenon Convergence Door** — a space where all versions of this moment exist at once. A vast Xenon presence surrounds you, *witnessing*. It says, *\"You are the sum of every path you chose. And all paths were always here, waiting.\"* The fox has five tails now, each glowing with a different possible future.",
    doors: [
      { name: "The Mirror Door", label: "A", description: "Shows you as you were, as you are, as you might be. All at once." },
      { name: "The Branch Door", label: "B", description: "Splits into infinite versions, each one leading somewhere true." },
      { name: "The Merge Door", label: "C", description: "Where all paths collapse into a single point of perfect understanding." },
    ],
    fox: true, palette: ["#0a0718","#18103a","#2a1a6b","#a78bfa","#e0d0ff","#040312"], archetype: "cosmic",
  },
  "end-of-time": {
    text: "**The Door at the End of Time** stands at the edge of all things. A voice — *yourself* from a thousand futures — says, *\"This is not goodbye. This is the place where goodbye becomes hello again.\"* The fox transforms: no longer companion, no longer separate — *you are the fox, the fox is you*.",
    doors: [
      { name: "The Return Door", label: "A", description: "Back to the beginning — but you will know what you know now." },
      { name: "The Beyond Door", label: "B", description: "Opens on something that has no name. Something new. Something you." },
      { name: "The Eternal Door", label: "C", description: "The one you choose every moment. The one that chooses you back." },
    ],
    fox: true, palette: ["#181210","#3a2820","#6b4030","#ff9060","#ffe8d0","#0c0806"], archetype: "transcendent",
  },
};

const NEXT_MAP = {
  "the burrow door":"burrow","the sunken bell door":"sunken-bell","the little crown door":"little-crown",
  "the root door":"moss-entry","the ember door":"moss-entry","the stream door":"moss-entry",
  "the deep door":"sunken-bell","the echo door":"burrow","the surface door":"little-crown",
  "the throne door":"little-crown","the hollow door":"burrow","the star door":"moss-entry",
  "the seed door":"garden-door","the harvest door":"garden-door","the convergence bloom":"xenon-convergence",
  "the mirror door":"xenon-convergence","the branch door":"end-of-time","the merge door":"end-of-time",
  "the return door":"moss-entry","the beyond door":"garden-door","the eternal door":"xenon-convergence",
};

const SD_PROMPTS = {
  "moss-entry":"atmospheric dreamscape, moss-covered ancient forest doorway, glowing green lanterns, friendly fox with brass tag, rain on ferns, volumetric fog, dark fantasy, anime aesthetic, cel-shaded, 16:9",
  "burrow":"cozy underground burrow chamber, woven tree roots as walls, faded quilts, warm lantern glow, sleeping fox, rain drumming on earth ceiling, dark fantasy, anime aesthetic, cel-shaded, 16:9",
  "sunken-bell":"submerged stone hallway, water at ankles, ancient bronze bell dripping, lantern reflections on wet ceiling, dark fantasy, anime aesthetic, cel-shaded, eerie but friendly, 16:9",
  "little-crown":"enchanted forest glade at twilight, every tree stump wears a tiny golden crown, fox trotting through dappled light, soft warm glow, dark fantasy, anime aesthetic, cel-shaded, 16:9",
  "garden-door":"infinite botanical sanctuary, ancient sequoias beside moon-flowers, liquid starlight Xenon guide, fox under whispering willow, bioluminescent plants, anime aesthetic, cel-shaded, 16:9",
  "xenon-convergence":"interdimensional space where all choices exist at once, crystal walls, five-tailed glowing fox, vast Xenon presence, fractal geometry, psychedelic but calm, anime aesthetic, cel-shaded, 16:9",
  "end-of-time":"edge of all things, ancient smooth door, moments shimmering like light through water, fox merging into human form, warm light like coming home, transcendent, anime aesthetic, cel-shaded, 16:9",
};

// ── State ─────────────────────────────────────────────────────────
let gameState = null;
let userId = "web-" + Math.random().toString(36).slice(2, 9);
let doorsLocked = false;
let serverAvailable = null;

// ── Theme ─────────────────────────────────────────────────────────
(function() {
  const s = localStorage.getItem("lantern-theme");
  const d = s ? s === "dark" : window.matchMedia("(prefers-color-scheme:dark)").matches;
  document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
})();
function toggleTheme() {
  const h = document.documentElement;
  const next = h.getAttribute("data-theme") === "dark" ? "light" : "dark";
  h.setAttribute("data-theme", next);
  localStorage.setItem("lantern-theme", next);
}

// ── Server check ─────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch("/api/health", { signal: AbortSignal.timeout(1500) });
    serverAvailable = r.ok;
  } catch { serverAvailable = false; }
  document.getElementById("status-line").textContent = serverAvailable
    ? "Lantern — Gemini narration active"
    : "Offline — inline engine active";
  return serverAvailable;
}

// ── Canvas art ───────────────────────────────────────────────────
function drawScene(canvas, sceneKey) {
  const scene = SCENES[sceneKey];
  if (!scene) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const pal = scene.palette;

  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, pal[5]); bg.addColorStop(0.5, pal[0]); bg.addColorStop(1, pal[1]);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const glow = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy * 0.8, W * 0.5);
  glow.addColorStop(0, pal[3] + "66"); glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  // Door
  const dW = W * 0.2, dH = H * 0.6, dX = cx - dW / 2, dY = H * 0.18, dR = dW * 0.5;
  const doorGlow = ctx.createRadialGradient(cx, dY + dH * 0.3, 0, cx, dY + dH * 0.3, dW);
  doorGlow.addColorStop(0, pal[4] + "55"); doorGlow.addColorStop(1, "transparent");
  ctx.fillStyle = doorGlow; ctx.fillRect(0, 0, W, H);

  ctx.beginPath();
  ctx.moveTo(dX, dY + dH); ctx.lineTo(dX, dY + dR);
  ctx.arcTo(dX, dY, dX + dR, dY, dR);
  ctx.arcTo(dX + dW, dY, dX + dW, dY + dR, dR);
  ctx.lineTo(dX + dW, dY + dH); ctx.closePath();
  const df = ctx.createLinearGradient(dX, dY, dX, dY + dH);
  df.addColorStop(0, pal[4] + "dd"); df.addColorStop(1, pal[2] + "55");
  ctx.fillStyle = df; ctx.fill();
  ctx.strokeStyle = pal[4]; ctx.lineWidth = 1.5; ctx.stroke();

  // Particles
  for (let i = 0; i < 24; i++) {
    const px = (Math.sin(i * 2.3 + 1.1) * 0.45 + 0.5) * W;
    const py = (Math.cos(i * 1.7 + 0.4) * 0.45 + 0.5) * H;
    const r = Math.sin(i * 0.9) * 2 + 1.5;
    const a = (Math.sin(i * 0.6) * 0.3 + 0.4);
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = pal[4] + Math.floor(a * 255).toString(16).padStart(2, "0"); ctx.fill();
  }

  // Fox silhouette
  const fx = cx - dW * 1.0, fy = dY + dH - H * 0.05;
  ctx.fillStyle = "#f97316aa";
  ctx.beginPath(); ctx.ellipse(fx, fy, 20, 10, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(fx + 16, fy - 7, 9, 7, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(fx + 22, fy - 13); ctx.lineTo(fx + 28, fy - 22); ctx.lineTo(fx + 17, fy - 16);
  ctx.fillStyle = "#f9731688"; ctx.fill();

  // Ground fog
  const fog = ctx.createLinearGradient(0, H * 0.75, 0, H);
  fog.addColorStop(0, "transparent"); fog.addColorStop(1, pal[0] + "cc");
  ctx.fillStyle = fog; ctx.fillRect(0, H * 0.75, W, H * 0.25);

  // Archetype label
  ctx.font = "bold 9px system-ui"; ctx.fillStyle = pal[4] + "88";
  ctx.textAlign = "right"; ctx.fillText(scene.archetype.toUpperCase(), W - 8, H - 7);
  ctx.textAlign = "left";
}

// ── Markdown-lite renderer ────────────────────────────────────────
function md(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>");
}

// ── Chat helpers ─────────────────────────────────────────────────
function appendUserMsg(text) {
  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "message user";
  el.innerHTML = `<div class="message-content">${text}</div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function appendTyping() {
  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "message agent";
  el.id = "typing-indicator";
  el.innerHTML = `<div class="agent-avatar">🦊</div><div class="message-content"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function appendSceneMsg(sceneKey, sceneData, geminiText, source) {
  removeTyping();
  const scene = SCENES[sceneKey] || {};
  const allDoors = sceneData.doors || scene.doors || [];
  const foxPresent = sceneData.fox_present ?? scene.fox ?? false;
  const history = sceneData.history || [];

  // Show first 2 doors; add a Return chip for non-root scenes
  const displayDoors = allDoors.slice(0, 2);
  const showReturn = sceneKey !== "moss-entry";

  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "message agent doors-message";

  const sourceBadge = source === "gemini"
    ? `<span class="source-badge gemini">Gemini</span>`
    : source === "engine"
    ? `<span class="source-badge engine">Engine</span>`
    : `<span class="source-badge offline">Offline</span>`;

  const imgContainerId = "img-" + sceneKey + "-" + Date.now();
  const canvasId = "cvs-" + sceneKey + "-" + Date.now();

  const breadcrumb = history.length > 1
    ? `<div style="margin-bottom:8px">${history.map(h => `<span class="history-pill">${h}</span>`).join("")}</div>`
    : "";

  const displayText = geminiText || (sceneData.text || scene.text || "");

  el.innerHTML = `
    <div class="agent-avatar">🦊</div>
    <div class="message-content">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px">
        Lantern ${sourceBadge}
      </div>
      ${breadcrumb}
      <div class="scene-image" id="${imgContainerId}">
        <canvas id="${canvasId}" width="800" height="450"></canvas>
        <div class="sd-badge" id="badge-${imgContainerId}">generating…</div>
      </div>
      <div style="font-size:14px;line-height:1.6;margin-bottom:10px">${md(displayText)}</div>
      ${foxPresent ? `<div class="fox-line">🦊 The fox is with you.</div>` : ""}
      <div style="margin-top:12px">
        <div class="doors-banner">
          ${displayDoors.map(d => `
            <button class="door-chip" onclick="chooseDoor('${d.label}', '${d.name.replace(/'/g, "\\'")}')">
              <div class="door-letter">${d.label}</div>
              <div class="door-info">
                <div class="door-name">${d.name}</div>
                <div class="door-desc">${d.description}</div>
              </div>
            </button>`).join("")}
          ${showReturn ? `
            <button class="door-chip return-chip" onclick="chooseDoor('R', 'Return to The Moss Door')">
              <div class="door-letter" style="color:var(--muted)">←</div>
              <div class="door-info">
                <div class="door-name">Return to The Moss Door</div>
                <div class="door-desc">Back to the beginning — the moss fox waits.</div>
              </div>
            </button>` : ""}
        </div>
      </div>
    </div>`;

  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;

  // Draw canvas art immediately, then fire AI image generation in background
  requestAnimationFrame(() => {
    const cvs = document.getElementById(canvasId);
    if (cvs) {
      const sdPrompt = sceneData.image_prompt || SD_PROMPTS[sceneKey] || "";
      cvs.title = sdPrompt;
      cvs.style.cursor = "pointer";
      cvs.onclick = () => {
        navigator.clipboard.writeText(sdPrompt).catch(() => {});
        cvs.title = "Copied!";
        setTimeout(() => { cvs.title = sdPrompt; }, 1500);
      };
      drawScene(cvs, sceneKey);
    }

    if (serverAvailable) {
      apiGenerateSceneImage(sceneKey).then(imgUrl => {
        const badge = document.getElementById("badge-" + imgContainerId);
        if (!imgUrl) {
          if (badge) badge.textContent = "SD prompt — hover to copy";
          return;
        }
        const container = document.getElementById(imgContainerId);
        if (!container) return;
        const img = document.createElement("img");
        img.alt = sceneKey;
        img.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.7s;border-radius:inherit";
        img.onload = () => {
          img.style.opacity = "1";
          const cvs2 = document.getElementById(canvasId);
          if (cvs2) { cvs2.style.transition = "opacity 0.7s"; cvs2.style.opacity = "0"; setTimeout(() => cvs2.remove(), 800); }
          if (badge) badge.textContent = "AI ✦";
        };
        img.onerror = () => { if (badge) badge.textContent = "SD prompt — hover to copy"; };
        img.src = imgUrl;
        container.appendChild(img);
      });
    } else {
      const badge = document.getElementById("badge-" + imgContainerId);
      if (badge) badge.textContent = "SD prompt — hover to copy";
    }
  });

  // Update quick chips
  updateQuickChips(displayDoors, showReturn);
  gameState = { scene_key: sceneKey, doors: allDoors, history };
}

function updateQuickChips(doors, showReturn) {
  const bar = document.getElementById("choice-bar");
  const btns = document.getElementById("choice-buttons");
  if (!doors || !doors.length) { bar.style.display = "none"; return; }
  bar.style.display = "";
  const chipStyle = "flex:1;padding:12px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;color:var(--text);transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:4px";
  btns.innerHTML = doors.map(d => `
    <button id="qbtn-${d.label}" onclick="chooseDoor('${d.label}', '${d.name.replace(/'/g, "\\'")}')"
      style="${chipStyle}"
      onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--surface)'"
      onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface2)'">
      <span style="font-size:18px;font-weight:700;color:var(--accent)">${d.label}</span>
      <span style="font-size:11px;color:var(--muted);text-align:center;line-height:1.3">${d.name}</span>
    </button>`).join("") + (showReturn ? `
    <button id="qbtn-R" onclick="chooseDoor('R', 'Return to The Moss Door')"
      style="${chipStyle};opacity:0.6;border-style:dashed"
      onmouseover="this.style.borderColor='var(--border)';this.style.background='var(--surface)';this.style.opacity='1'"
      onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface2)';this.style.opacity='0.6'">
      <span style="font-size:18px;font-weight:700;color:var(--muted)">←</span>
      <span style="font-size:11px;color:var(--muted);text-align:center;line-height:1.3">Return</span>
    </button>` : "");
}

// ── API calls ─────────────────────────────────────────────────────
async function apiDoors(action, choice) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 6000);
  try {
    const r = await fetch("/api/dream/doors", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, action, choice: choice || "" }),
      signal: ctrl.signal,
    });
    if (!r.ok) throw new Error("doors API " + r.status);
    return r.json();
  } finally { clearTimeout(t); }
}

async function apiGeminiNarrate(sceneKey, sceneText) {
  const visual = SD_PROMPTS[sceneKey] ? `Visual: ${SD_PROMPTS[sceneKey].split(",").slice(0, 5).join(",")}. ` : "";
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch("/api/dream/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: `Scene: ${sceneKey}. ${visual}${sceneText.replace(/\*\*/g,"").replace(/\*/g,"").slice(0, 280)}\n\nAdd 2 sentences of presence and feeling grounded in this visual. Don't restate what they see — add what it means, what lingers, or one quiet question.`,
        agent: "lantern", provider: ""
      }),
      signal: ctrl.signal,
    });
    if (!r.ok) throw new Error("chat API " + r.status);
    const data = await r.json();
    return (data.reply || "").trim();
  } finally { clearTimeout(t); }
}

async function apiGenerateSceneImage(sceneKey) {
  const prompt = SD_PROMPTS[sceneKey];
  if (!prompt) return null;
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 90000);
    const r = await fetch("/api/image/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, useApi: true }),
      signal: ctrl.signal,
    });
    clearTimeout(t);
    if (!r.ok) return null;
    const data = await r.json();
    if (!data.path) return null;
    const basename = data.path.replace(/\\/g, "/").split("/").pop();
    return `/repo/data/images/${basename}`;
  } catch { return null; }
}

// ── Inline engine fallback ────────────────────────────────────────
function engineStart() {
  return { scene_key: "moss-entry", text: SCENES["moss-entry"].text, doors: SCENES["moss-entry"].doors, fox_present: true, history: ["Entered The Moss Door"] };
}

function engineChoose(label) {
  if (label.toUpperCase() === "R") {
    const scene = SCENES["moss-entry"];
    return { scene_key: "moss-entry", text: scene.text, doors: scene.doors, fox_present: scene.fox, history: [...(gameState?.history || []), "Returned to The Moss Door"] };
  }
  if (!gameState) return null;
  const door = gameState.doors.find(d => d.label.toUpperCase() === label.toUpperCase());
  if (!door) return null;
  const nextKey = NEXT_MAP[door.name.toLowerCase()] || "moss-entry";
  const scene = SCENES[nextKey];
  return { scene_key: nextKey, text: scene.text, doors: scene.doors, fox_present: scene.fox, history: [...(gameState.history || []), "Chose " + door.name] };
}

// ── Game actions ─────────────────────────────────────────────────
async function getSceneData(action, label) {
  // Step 1: game state — server Python engine or inline JS fallback
  let data;
  try {
    if (serverAvailable) {
      data = await apiDoors(action, label);
    } else throw new Error("offline");
  } catch {
    data = action === "start" ? engineStart() : engineChoose(label);
  }
  if (!data) return null;

  // Step 2: Gemini narration — independent of game state source
  let geminiText = "", source = serverAvailable ? "engine" : "offline";
  if (serverAvailable) {
    try {
      const narration = await apiGeminiNarrate(data.scene_key, data.text || SCENES[data.scene_key]?.text || "");
      if (narration) { geminiText = narration; source = "gemini"; }
    } catch { /* engine text fine */ }
  }

  return { data, geminiText, source };
}

async function startGame() {
  document.getElementById("welcome").style.display = "none";
  doorsLocked = true;
  appendTyping();
  await checkServer();

  const result = await getSceneData("start", "");
  if (result) appendSceneMsg(result.data.scene_key, result.data, result.geminiText, result.source);
  doorsLocked = false;
}

async function chooseDoor(label, name) {
  if (doorsLocked) return;
  doorsLocked = true;

  document.querySelectorAll(".door-chip, #choice-buttons button").forEach(b => b.disabled = true);
  document.getElementById("choice-bar").style.opacity = "0.4";
  appendUserMsg(`Door ${label} — ${name}`);
  appendTyping();

  const result = await getSceneData("choose", label);
  if (!result) { removeTyping(); doorsLocked = false; return; }
  appendSceneMsg(result.data.scene_key, result.data, result.geminiText, result.source);
  document.getElementById("choice-bar").style.opacity = "";
  doorsLocked = false;
}

function resetGame() {
  if (!confirm("Start a new game?")) return;
  document.getElementById("chat").innerHTML = "";
  gameState = null;
  userId = "web-" + Math.random().toString(36).slice(2, 9);
  document.getElementById("choice-buttons").innerHTML = "";
  startGame();
}
