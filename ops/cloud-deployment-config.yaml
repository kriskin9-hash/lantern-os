# Lantern OS Cloud Deployment Configuration
# Generated: 2026-05-28
# Purpose: Infrastructure as Code for cloud deployment

version: "3.8"

services:
  # Windsurf Developer Interface
  windsurf-dev:
    image: nginx:alpine
    container_name: windsurf-dev-cloud
    ports:
      - "8080:80"
    volumes:
      - ../surfaces/windsurf-dev:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - lantern-cloud-network

  # Lantern Garage Web Application
  lantern-garage:
    build:
      context: ../apps/lantern-garage
      dockerfile: ../../ops/Dockerfile-lantern-garage
    container_name: lantern-garage-cloud
    ports:
      - "4177:4177"
    environment:
      - NODE_ENV=production
      - LANTERN_GARAGE_PORT=4177
      - LANTERN_CLOUD_MODE=true
      - LANTERN_USER_CONTEXT=multi_agent
    volumes:
      - ../data:/app/data:ro
      - ../manifests:/app/manifests:ro
    restart: unless-stopped
    networks:
      - lantern-cloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4177/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Discord Lounge Bot
  discord-bot:
    build:
      context: ../src/discord_lounge_bot
      dockerfile: ../../ops/Dockerfile-discord-bot
    container_name: discord-lounge-bot-cloud
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - LANTERN_DISCORD_GUILD_ID=${LANTERN_DISCORD_GUILD_ID}
      - LANTERN_DISCORD_CHANNEL_ID=${LANTERN_DISCORD_CHANNEL_ID}
      - LANTERN_STATUS_URL=http://lantern-garage:4177/api/status
      - LANTERN_CLOUD_MODE=true
    restart: unless-stopped
    networks:
      - lantern-cloud-network
    depends_on:
      - lantern-garage

  # RAG Cache Service (Optional - for enhanced RAG performance)
  rag-cache:
    image: redis:alpine
    container_name: lantern-rag-cache
    ports:
      - "6379:6379"
    volumes:
      - rag-cache-data:/data
    restart: unless-stopped
    networks:
      - lantern-cloud-network
    command: redis-server --appendonly yes

networks:
  lantern-cloud-network:
    driver: bridge
    name: lantern-cloud-network

volumes:
  rag-cache-data:
    driver: local