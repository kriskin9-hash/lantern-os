<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440" width="320" height="440" role="img" aria-label="Triagon — low-poly signal mascot, idle hover">
  <title>Triagon — idle hover</title>
  <desc>Original low-poly digital familiar: a floating triangular-prism head with a dark display face and split-diamond eyes, a hovering tetrahedral core on three glowing struts, three wedge stabilizers, and three orbiting tail plates that trace a triangle. Flat hard-edged planes, no gradients.</desc>
  <!-- Palette: ink #0B1220 · signal cyan #38D7FF · violet #A78BFA · bright neutral #F4FFFD · amber #FFB454 -->
  <g transform="translate(160,230)" stroke="#0B1220" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">

    <!-- TAIL: three linked triangular plates orbiting behind, tracing a loose triangle (signature motion) -->
    <g fill="none" stroke="#38D7FF" stroke-width="2.5" opacity="0.7">
      <path d="M -135 -165 L 135 -165 L 0 -225 Z"/>
    </g>
    <g stroke-width="3">
      <path d="M -135 -150 L -113 -150 L -124 -178 Z" fill="#38D7FF"/>
      <path d="M 113 -150 L 135 -150 L 124 -178 Z" fill="#A78BFA"/>
      <path d="M -12 -225 L 12 -225 L 0 -201 Z" fill="#38D7FF"/>
    </g>

    <!-- HEAD: broad arrowhead prism (front plane + top bevel + chin signal facet) -->
    <polygon points="-96,-150 96,-150 120,-104 64,-24 0,44 -64,-24 -120,-104" fill="#F4FFFD"/>
    <!-- top bevel facet -->
    <polygon points="-96,-150 96,-150 72,-124 -72,-124" fill="#A78BFA"/>
    <!-- chin signal facet (the clean emitted answer) -->
    <polygon points="0,44 -30,-2 30,-2" fill="#38D7FF"/>
    <!-- center crease for the low-poly read -->
    <line x1="0" y1="-124" x2="0" y2="-2" stroke-width="2" opacity="0.45"/>

    <!-- DISPLAY PANEL: dark inset screen on the front plane -->
    <polygon points="-66,-126 66,-126 60,-84 0,-72 -60,-84" fill="#0B1220" stroke-width="3"/>
    <!-- split-diamond eyes, wide apart -->
    <g stroke-width="2.5">
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#38D7FF"/>
      <line x1="-30" y1="-118" x2="-30" y2="-90" stroke="#0B1220" stroke-width="2"/>
      <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/>
      <line x1="30" y1="-118" x2="30" y2="-90" stroke="#0B1220" stroke-width="2"/>
    </g>

    <!-- THREE STRUTS: short glowing links from chin to core -->
    <g stroke="#38D7FF" stroke-width="6">
      <line x1="-16" y1="50" x2="-12" y2="80"/>
      <line x1="0" y1="48" x2="0" y2="78"/>
      <line x1="16" y1="50" x2="12" y2="80"/>
    </g>
    <g stroke="#F4FFFD" stroke-width="2">
      <line x1="-16" y1="50" x2="-12" y2="80"/>
      <line x1="0" y1="48" x2="0" y2="78"/>
      <line x1="16" y1="50" x2="12" y2="80"/>
    </g>

    <!-- TETRAHEDRAL CORE: two visible faces -->
    <polygon points="-40,140 40,140 0,80" fill="#F4FFFD"/>
    <polygon points="-40,140 0,140 0,80" fill="#38D7FF"/>
    <polygon points="40,140 0,140 0,80" fill="#A78BFA"/>

    <!-- THREE STABILIZERS at 120° (tripod silhouette) -->
    <polygon points="-12,138 12,138 0,178" fill="#F4FFFD"/>
    <polygon points="-40,118 -26,140 -64,150" fill="#F4FFFD"/>
    <polygon points="40,118 26,140 64,150" fill="#F4FFFD"/>
  </g>
</svg>
