<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Triagon 32px silhouette">
  <title>Triagon — 32px monochrome silhouette</title>
  <desc>Acceptance check: the mascot must read at 32×32 and in monochrome. Arrowhead head, tetra core, three stabilizers, and three tail dots above — the three-point silhouette holds at icon size.</desc>
  <!-- single-ink silhouette; swap fill to invert for light/dark backgrounds -->
  <g fill="#0B1220">
    <!-- tail: three plates as a triangle of dots above the head -->
    <circle cx="6" cy="5" r="1.6"/>
    <circle cx="26" cy="5" r="1.6"/>
    <circle cx="16" cy="2.4" r="1.6"/>
    <!-- head arrowhead -->
    <polygon points="4,9 28,9 30,14 20,20 16,24 12,20 2,14"/>
    <!-- tetra core -->
    <polygon points="11,24 21,24 16,17.5"/>
    <!-- three stabilizers -->
    <polygon points="13.5,23 18.5,23 16,29.5"/>
    <polygon points="11,21 14,24.5 6,26"/>
    <polygon points="21,21 18,24.5 26,26"/>
  </g>
</svg>
