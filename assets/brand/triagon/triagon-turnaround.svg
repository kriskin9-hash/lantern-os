<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520" role="img" aria-label="Triagon mascot — front, side, and back turnaround">
  <title>Triagon — turnaround (front · side · back)</title>
  <desc>Construction turnaround of the Triagon mascot in three views. Front shows the display face and split-diamond eyes; side shows the prism wedge profile, the chin emitter, the tetra core on struts, and one stabilizer; back shows the rear of the prism with the three tail plates fanned behind.</desc>

  <style>
    .label { font: 600 18px ui-sans-serif, system-ui, "Segoe UI", sans-serif; fill: #38D7FF; text-anchor: middle; }
    .gl { stroke:#0B1220; stroke-width:4; stroke-linejoin:round; stroke-linecap:round; }
  </style>
  <rect x="0" y="0" width="960" height="520" fill="#0e1726"/>
  <text x="480" y="34" class="label" style="font-size:22px">TRIAGON · turnaround</text>

  <!-- FRONT -->
  <svg x="0" y="50" width="320" height="430" viewBox="-160 -240 320 440">
    <g class="gl">
      <polygon points="-135,-150 -113,-150 -124,-178" fill="#38D7FF" stroke-width="3"/>
      <polygon points="113,-150 135,-150 124,-178" fill="#A78BFA" stroke-width="3"/>
      <polygon points="-12,-225 12,-225 0,-201" fill="#38D7FF" stroke-width="3"/>
      <polygon points="-96,-150 96,-150 120,-104 64,-24 0,44 -64,-24 -120,-104" fill="#F4FFFD"/>
      <polygon points="-96,-150 96,-150 72,-124 -72,-124" fill="#A78BFA"/>
      <polygon points="0,44 -26,2 26,2" fill="#38D7FF"/>
      <polygon points="-40,140 40,140 0,80" fill="#F4FFFD"/>
      <polygon points="-40,140 0,140 0,80" fill="#38D7FF"/>
      <polygon points="40,140 0,140 0,80" fill="#A78BFA"/>
      <polygon points="-12,138 12,138 0,178" fill="#F4FFFD"/>
      <polygon points="-40,118 -26,140 -64,150" fill="#F4FFFD"/>
      <polygon points="40,118 26,140 64,150" fill="#F4FFFD"/>
    </g>
    <polygon points="-66,-126 66,-126 60,-84 0,-72 -60,-84" fill="#0B1220" stroke="#0B1220" stroke-width="3"/>
    <g stroke="#0B1220" stroke-width="2.5">
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#38D7FF"/><line x1="-30" y1="-118" x2="-30" y2="-90"/>
      <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/><line x1="30" y1="-118" x2="30" y2="-90"/>
    </g>
  </svg>
  <text x="160" y="506" class="label">front</text>

  <!-- SIDE (facing right): prism wedge profile -->
  <svg x="320" y="50" width="320" height="430" viewBox="-160 -240 320 440">
    <g class="gl">
      <!-- tail plates fanned behind (to the left) -->
      <polygon points="-150,-150 -120,-150 -134,-186" fill="#38D7FF" stroke-width="3"/>
      <polygon points="-120,-120 -92,-120 -106,-156" fill="#A78BFA" stroke-width="3"/>
      <!-- head wedge profile: rounded arrowhead seen edge-on, nose to the right -->
      <polygon points="-92,-150 70,-132 110,-94 60,-26 0,40 -54,-20 -92,-104" fill="#F4FFFD"/>
      <polygon points="-92,-150 70,-132 40,-118 -72,-126" fill="#A78BFA"/>
      <!-- display panel reads as a thin dark band on the front (right) face -->
      <polygon points="78,-118 96,-92 56,-40 34,-66" fill="#0B1220" stroke="#0B1220" stroke-width="3"/>
      <polygon points="64,-92 75,-78 64,-66 53,-78" fill="#38D7FF" stroke-width="2.5"/>
      <line x1="64" y1="-92" x2="64" y2="-66" stroke="#0B1220" stroke-width="2"/>
      <!-- chin emitter -->
      <polygon points="0,40 -20,2 22,4" fill="#38D7FF"/>
      <!-- struts + core + one stabilizer in profile -->
      <g stroke="#38D7FF" stroke-width="6"><line x1="-2" y1="46" x2="0" y2="80"/><line x1="18" y1="40" x2="12" y2="80"/></g>
      <polygon points="-34,140 38,140 0,80" fill="#F4FFFD"/>
      <polygon points="0,140 38,140 0,80" fill="#38D7FF"/>
      <polygon points="-34,140 0,140 0,80" fill="#A78BFA"/>
      <polygon points="-10,138 14,138 2,178" fill="#F4FFFD"/>
      <polygon points="34,118 22,140 60,150" fill="#F4FFFD"/>
    </g>
  </svg>
  <text x="480" y="506" class="label">side</text>

  <!-- BACK: rear of the prism, three tail plates fanned, no face -->
  <svg x="640" y="50" width="320" height="430" viewBox="-160 -240 320 440">
    <g class="gl">
      <polygon points="-150,-150 -128,-150 -139,-184" fill="#38D7FF" stroke-width="3"/>
      <polygon points="128,-150 150,-150 139,-184" fill="#A78BFA" stroke-width="3"/>
      <polygon points="-14,-228 14,-228 0,-202" fill="#38D7FF" stroke-width="3"/>
      <!-- rear plane: same silhouette, flat neutral with a central spine seam -->
      <polygon points="-96,-150 96,-150 120,-104 64,-24 0,44 -64,-24 -120,-104" fill="#F4FFFD"/>
      <polygon points="-96,-150 96,-150 72,-124 -72,-124" fill="#A78BFA"/>
      <line x1="0" y1="-124" x2="0" y2="40" stroke="#0B1220" stroke-width="3" opacity="0.5"/>
      <polygon points="-72,-124 0,-110 0,40 -64,-24" fill="#38D7FF" fill-opacity="0.12"/>
      <polygon points="0,44 -26,2 26,2" fill="#38D7FF"/>
      <polygon points="-40,140 40,140 0,80" fill="#F4FFFD"/>
      <polygon points="-40,140 0,140 0,80" fill="#A78BFA"/>
      <polygon points="40,140 0,140 0,80" fill="#38D7FF"/>
      <polygon points="-12,138 12,138 0,178" fill="#F4FFFD"/>
      <polygon points="-40,118 -26,140 -64,150" fill="#F4FFFD"/>
      <polygon points="40,118 26,140 64,150" fill="#F4FFFD"/>
    </g>
  </svg>
  <text x="800" y="506" class="label">back</text>
</svg>
