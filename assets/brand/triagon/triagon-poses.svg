<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1040" width="960" height="1040" role="img" aria-label="Triagon mascot — six-pose exploration sheet">
  <title>Triagon — six-pose exploration sheet</title>
  <desc>Idle hover, curious tilt, scanning, converging, error/contradiction, and happy answer. Original low-poly signal mascot; flat hard-edged planes; the three-point motif appears in every pose.</desc>

  <defs>
    <!-- Shared body: head prism, display panel, chin signal facet, glowing struts, tetra core, three stabilizers.
         Authored around the origin so each pose can <use> it and overlay pose-specific eyes / tail / face. -->
    <g id="body" stroke="#0B1220" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
      <!-- head front plane -->
      <polygon points="-96,-150 96,-150 120,-104 64,-24 0,44 -64,-24 -120,-104" fill="#F4FFFD"/>
      <!-- top bevel facet -->
      <polygon points="-96,-150 96,-150 72,-124 -72,-124" fill="#A78BFA"/>
      <!-- chin signal facet -->
      <polygon points="0,44 -26,2 26,2" fill="#38D7FF"/>
      <!-- three struts (glow + highlight) -->
      <g stroke="#38D7FF" stroke-width="6">
        <line x1="-16" y1="50" x2="-12" y2="80"/><line x1="0" y1="48" x2="0" y2="78"/><line x1="16" y1="50" x2="12" y2="80"/>
      </g>
      <g stroke="#F4FFFD" stroke-width="2">
        <line x1="-16" y1="50" x2="-12" y2="80"/><line x1="0" y1="48" x2="0" y2="78"/><line x1="16" y1="50" x2="12" y2="80"/>
      </g>
      <!-- tetra core -->
      <polygon points="-40,140 40,140 0,80" fill="#F4FFFD"/>
      <polygon points="-40,140 0,140 0,80" fill="#38D7FF"/>
      <polygon points="40,140 0,140 0,80" fill="#A78BFA"/>
      <!-- three stabilizers (tripod) -->
      <polygon points="-12,138 12,138 0,178" fill="#F4FFFD"/>
      <polygon points="-40,118 -26,140 -64,150" fill="#F4FFFD"/>
      <polygon points="40,118 26,140 64,150" fill="#F4FFFD"/>
    </g>

    <!-- display panel (dark screen) -->
    <polygon id="panel" points="-66,-126 66,-126 60,-84 0,-72 -60,-84" fill="#0B1220" stroke="#0B1220" stroke-width="3"/>

    <!-- idle tail: three plates tracing a triangle behind the head -->
    <g id="tailIdle" stroke="#0B1220" stroke-width="3" stroke-linejoin="round">
      <path d="M -135 -165 L 135 -165 L 0 -225 Z" fill="none" stroke="#38D7FF" stroke-width="2.5" opacity="0.7"/>
      <path d="M -135 -150 L -113 -150 L -124 -178 Z" fill="#38D7FF"/>
      <path d="M 113 -150 L 135 -150 L 124 -178 Z" fill="#A78BFA"/>
      <path d="M -12 -225 L 12 -225 L 0 -201 Z" fill="#38D7FF"/>
    </g>

    <!-- converging tail: plates pulled inward into one luminous triangle -->
    <g id="tailConverge" stroke="#0B1220" stroke-width="3" stroke-linejoin="round">
      <path d="M -46 -150 L 46 -150 L 0 -214 Z" fill="#38D7FF" fill-opacity="0.55" stroke="#38D7FF"/>
      <path d="M -22 -162 L 22 -162 L 0 -192 Z" fill="#F4FFFD"/>
    </g>

    <!-- error tail: plates scattered, no connecting path -->
    <g id="tailScatter" stroke="#0B1220" stroke-width="3" stroke-linejoin="round">
      <path d="M -150 -128 L -128 -136 L -134 -162 Z" fill="#38D7FF"/>
      <path d="M 132 -176 L 154 -168 L 140 -148 Z" fill="#A78BFA"/>
      <path d="M -8 -230 L 20 -226 L 4 -204 Z" fill="#FFB454"/>
    </g>

    <!-- scan rays from the three stabilizers -->
    <g id="rays" stroke="#38D7FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 7" opacity="0.9">
      <line x1="0" y1="180" x2="0" y2="226"/>
      <line x1="-58" y1="150" x2="-96" y2="186"/>
      <line x1="58" y1="150" x2="96" y2="186"/>
    </g>
  </defs>

  <style>
    .label { font: 600 17px ui-sans-serif, system-ui, "Segoe UI", sans-serif; fill: #38D7FF; text-anchor: middle; }
    .n     { font: 700 17px ui-sans-serif, system-ui, sans-serif; fill: #A78BFA; text-anchor: middle; }
  </style>

  <rect x="0" y="0" width="960" height="1040" fill="#0e1726"/>
  <text x="480" y="36" class="label" style="font-size:22px">TRIAGON · first drawing sheet</text>

  <!-- Row 1 -->
  <!-- 1 Idle hover -->
  <svg x="0" y="56" width="320" height="430" viewBox="-160 -240 320 440">
    <use href="#tailIdle"/><use href="#body"/><use href="#panel"/>
    <g stroke="#0B1220" stroke-width="2.5">
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#38D7FF"/><line x1="-30" y1="-118" x2="-30" y2="-90"/>
      <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/><line x1="30" y1="-118" x2="30" y2="-90"/>
    </g>
  </svg>
  <text x="160" y="514" class="label"><tspan class="n">1 · </tspan>idle hover</text>

  <!-- 2 Curious tilt -->
  <svg x="320" y="56" width="320" height="430" viewBox="-160 -240 320 440">
    <g transform="rotate(15)">
      <use href="#tailIdle"/><use href="#body"/><use href="#panel"/>
      <g stroke="#0B1220" stroke-width="2.5">
        <polygon points="-30,-118 -17,-104 -30,-88 -43,-104" fill="#F4FFFD"/><line x1="-30" y1="-118" x2="-30" y2="-88"/>
        <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/><line x1="30" y1="-118" x2="30" y2="-90"/>
      </g>
    </g>
  </svg>
  <text x="480" y="514" class="label"><tspan class="n">2 · </tspan>curious tilt</text>

  <!-- 3 Scanning -->
  <svg x="640" y="56" width="320" height="430" viewBox="-160 -240 320 440">
    <use href="#tailIdle"/><use href="#body"/><use href="#rays"/><use href="#panel"/>
    <g stroke="#0B1220" stroke-width="2.5">
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#38D7FF"/><line x1="-30" y1="-118" x2="-30" y2="-90"/>
      <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/><line x1="30" y1="-118" x2="30" y2="-90"/>
    </g>
  </svg>
  <text x="800" y="514" class="label"><tspan class="n">3 · </tspan>scanning</text>

  <!-- Row 2 -->
  <!-- 4 Converging -->
  <svg x="0" y="546" width="320" height="430" viewBox="-160 -240 320 440">
    <use href="#tailConverge"/><use href="#body"/><use href="#panel"/>
    <g stroke="#0B1220" stroke-width="2.5">
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#38D7FF"/><line x1="-30" y1="-118" x2="-30" y2="-90"/>
      <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/><line x1="30" y1="-118" x2="30" y2="-90"/>
    </g>
  </svg>
  <text x="160" y="1004" class="label"><tspan class="n">4 · </tspan>converging</text>

  <!-- 5 Error / contradiction -->
  <svg x="320" y="546" width="320" height="430" viewBox="-160 -240 320 440">
    <use href="#tailScatter"/><use href="#body"/><use href="#panel"/>
    <g stroke="#0B1220" stroke-width="2.5">
      <!-- one amber eye, the other blinking (a flat line) -->
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#FFB454"/><line x1="-30" y1="-118" x2="-30" y2="-90"/>
      <line x1="19" y1="-104" x2="41" y2="-104" stroke="#38D7FF" stroke-width="4"/>
    </g>
  </svg>
  <text x="480" y="1004" class="label"><tspan class="n">5 · </tspan>error / contradiction</text>

  <!-- 6 Happy answer -->
  <svg x="640" y="546" width="320" height="430" viewBox="-160 -240 320 440">
    <use href="#tailIdle"/><use href="#body"/><use href="#panel"/>
    <g stroke="#0B1220" stroke-width="2.5">
      <polygon points="-30,-118 -19,-104 -30,-90 -41,-104" fill="#38D7FF"/><line x1="-30" y1="-118" x2="-30" y2="-90"/>
      <polygon points="30,-118 41,-104 30,-90 19,-104" fill="#38D7FF"/><line x1="30" y1="-118" x2="30" y2="-90"/>
    </g>
    <!-- display becomes an upward chevron -->
    <polyline points="-22,-88 0,-104 22,-88" fill="none" stroke="#38D7FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- stabilizers spark outward -->
    <g stroke="#FFB454" stroke-width="3" stroke-linecap="round">
      <line x1="-74" y1="158" x2="-92" y2="150"/><line x1="74" y1="158" x2="92" y2="150"/><line x1="0" y1="186" x2="0" y2="206"/>
    </g>
  </svg>
  <text x="800" y="1004" class="label"><tspan class="n">6 · </tspan>happy answer</text>
</svg>
